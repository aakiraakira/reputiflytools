<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reputifly | Lead Extractor V4</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --bg-deep: #0B0A14;
            --accent-primary: #E6397F;
            --accent-secondary: #FF8A00;
            --text-main: #F0F0F0;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(20, 20, 30, 0.6);
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::selection {
            background: var(--accent-primary);
            color: white;
        }

        h1, h2, h3, .brand-font { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }

        /* Ambient Glows */
        .ambient-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(230, 57, 127, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -2;
            filter: blur(80px);
            animation: drift 20s infinite alternate;
        }
        .glow-1 { top: -200px; left: -100px; }
        .glow-2 {
            bottom: -200px; right: -100px;
            background: radial-gradient(circle, rgba(255, 138, 0, 0.1) 0%, transparent 70%);
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 50px); }
        }

        /* Stealth Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { 
            background: rgba(255, 255, 255, 0.1); 
            border-radius: 4px; 
            transition: background 0.3s;
        }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        /* Glass Components */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), border-color 0.3s ease;
        }

        /* Buttons */
        .btn-liquid-glow {
            background: radial-gradient(circle at top, rgba(255,255,255,0.4) 0%, transparent 60%),
                        linear-gradient(90deg, #E6397F, #FF8A00);
            box-shadow: 0 10px 30px -10px rgba(230, 57, 127, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.4), inset 0 -2px 0 rgba(0, 0, 0, 0.2);
            border: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 9999px;
            color: white;
            font-weight: 700;
            padding: 16px 40px;
            font-size: 16px;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            cursor: pointer;
        }
        .btn-liquid-glow:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 20px 40px -10px rgba(255, 138, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.6);
        }

        .btn-hero-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            border-radius: 9999px;
            color: #ccc;
            font-weight: 600;
            padding: 8px 16px;
            font-size: 12px;
            display: inline-flex; align-items: center; gap: 6px;
            cursor: pointer;
        }
        .btn-hero-glass:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.3);
            color: white;
        }

        /* Custom Textarea styling */
        textarea {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            border-radius: 12px;
            transition: all 0.3s ease;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 1px var(--accent-primary), 0 10px 30px -10px rgba(230, 57, 127, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }
        textarea::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="max-w-6xl mx-auto px-6 py-12 relative z-10">
        
        <header class="text-center mb-12 flex flex-col items-center">
            <div class="p-4 rounded-2xl bg-white/5 border border-white/10 mb-6 inline-block backdrop-blur-md">
                <i data-feather="filter" class="w-8 h-8 text-pink-500"></i>
            </div>
            <h1 class="text-5xl font-bold mb-4 brand-font text-gradient">Lead Extractor</h1>
            <p class="text-gray-400 max-w-xl mx-auto text-lg">Extract mobile numbers (+65 8/9) with <strong class="text-white">No Website</strong> securely from raw Google Maps data.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
            <div class="glass-panel p-6 flex flex-col h-full">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-8 rounded-full bg-pink-500/20 flex items-center justify-center text-pink-400 border border-pink-500/30">
                        <span class="font-bold text-sm">1</span>
                    </div>
                    <h3 class="font-bold text-lg text-white">Raw Maps Data</h3>
                </div>
                <textarea id="rawInput" class="w-full h-64 p-4 font-mono text-sm" placeholder="Paste the raw text from Google Maps results here..."></textarea>
            </div>

            <div class="glass-panel p-6 flex flex-col h-full">
                <div class="flex items-center gap-3 mb-4">
                    <div class="w-8 h-8 rounded-full bg-orange-500/20 flex items-center justify-center text-orange-400 border border-orange-500/30">
                        <span class="font-bold text-sm">2</span>
                    </div>
                    <h3 class="font-bold text-lg text-white">Existing Master CSV</h3>
                    
                    <div class="ml-auto flex items-center gap-2">
                        <label for="csvUpload" class="btn-hero-glass m-0 text-xs px-3 py-1 cursor-pointer">
                            <i data-feather="upload" class="w-3 h-3"></i> Upload
                        </label>
                        <input type="file" id="csvUpload" accept=".csv, .txt" class="hidden" onchange="handleFileUpload(event)">
                        <span class="text-xs font-semibold bg-white/10 text-gray-300 px-3 py-1 rounded-full border border-white/5 hidden sm:inline-block">Optional</span>
                    </div>
                </div>
                <textarea id="existingCsv" class="w-full h-64 p-4 font-mono text-sm" placeholder="+6591234567,+6581112222..."></textarea>
            </div>
        </div>

        <div class="flex justify-center mb-12">
            <button onclick="processData()" class="btn-liquid-glow w-full md:w-auto md:min-w-[300px]">
                <i data-feather="cpu" class="w-5 h-5"></i>
                Clean & Filter Leads
            </button>
        </div>

        <div id="statsArea" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-panel p-6 text-center flex flex-col items-center justify-center relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-green-500/10 to-transparent"></div>
                <h4 class="text-5xl font-bold text-green-400 mb-2 brand-font" id="statNew">0</h4>
                <p class="text-sm text-gray-400 uppercase tracking-widest font-semibold flex items-center gap-2">
                    <i data-feather="check-circle" class="w-4 h-4"></i> New Leads
                </p>
            </div>
            
            <div class="glass-panel p-6 text-center flex flex-col items-center justify-center relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-orange-500/10 to-transparent"></div>
                <h4 class="text-5xl font-bold text-orange-400 mb-2 brand-font" id="statRepeated">0</h4>
                <p class="text-sm text-gray-400 uppercase tracking-widest font-semibold flex items-center gap-2">
                    <i data-feather="refresh-cw" class="w-4 h-4"></i> Repeated / Skipped
                </p>
            </div>

            <div class="glass-panel p-6 text-center flex flex-col items-center justify-center relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-gray-500/10 to-transparent"></div>
                <h4 class="text-5xl font-bold text-gray-400 mb-2 brand-font" id="statIgnored">0</h4>
                <p class="text-sm text-gray-400 uppercase tracking-widest font-semibold flex items-center gap-2">
                    <i data-feather="phone-off" class="w-4 h-4"></i> Landlines Ignored
                </p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass-panel p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <i data-feather="message-circle" class="w-5 h-5 text-pink-500"></i>
                        <h3 class="font-bold text-white text-sm uppercase tracking-wider">New Numbers (To Text)</h3>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyContent('newNumbersOutput', this)" class="btn-hero-glass">
                            <i data-feather="copy" class="w-3 h-3"></i> Copy
                        </button>
                        <button onclick="downloadCSV('newNumbersOutput', 'new_leads.csv')" class="btn-hero-glass">
                            <i data-feather="download" class="w-3 h-3"></i> CSV
                        </button>
                    </div>
                </div>
                <textarea id="newNumbersOutput" readonly class="w-full h-40 p-4 font-mono text-sm bg-black/50" placeholder="Extracted numbers will appear here..."></textarea>
            </div>

            <div class="glass-panel p-6">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-2">
                        <i data-feather="database" class="w-5 h-5 text-orange-500"></i>
                        <h3 class="font-bold text-white text-sm uppercase tracking-wider">Updated Master CSV</h3>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="copyContent('masterCsvOutput', this)" class="btn-hero-glass">
                            <i data-feather="copy" class="w-3 h-3"></i> Copy
                        </button>
                        <button onclick="downloadCSV('masterCsvOutput', 'master_database.csv')" class="btn-hero-glass">
                            <i data-feather="download" class="w-3 h-3"></i> CSV
                        </button>
                    </div>
                </div>
                <textarea id="masterCsvOutput" readonly class="w-full h-40 p-4 font-mono text-sm bg-black/50" placeholder="Updated database will appear here..."></textarea>
            </div>
        </div>

    </div>

    <script>
        // Initialize Icons
        feather.replace();

        // 1. Handle File Uploads
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                // Remove existing newlines/spaces if they uploaded a vertical list, turn into comma separated for logic processing
                const formattedContent = e.target.result.replace(/\r?\n|\r/g, ',').replace(/\s+/g, '');
                document.getElementById('existingCsv').value = formattedContent;
            };
            reader.readAsText(file);
        }

        // 2. Download Data as CSV
        function downloadCSV(elementId, filename) {
            const content = document.getElementById(elementId).value;
            if (!content) return alert("No data to download!");

            // Format as a single column (1 per line) for Excel/CRM friendliness
            const columnFormatted = content.split(',').filter(x => x).join('\n');
            
            const blob = new Blob([columnFormatted], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", filename);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 3. Copy to clipboard utility
        function copyContent(elementId, btnElement) {
            const textarea = document.getElementById(elementId);
            if (!textarea.value) return;
            
            textarea.select();
            document.execCommand('copy');
            
            // Visual feedback
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = `<i data-feather="check" class="w-3 h-3 text-green-400"></i> Copied`;
            feather.replace();
            
            setTimeout(() => {
                btnElement.innerHTML = originalHTML;
                feather.replace();
            }, 2000);
        }

        // 4. Core Processing Logic
        function processData() {
            const rawData = document.getElementById('rawInput').value;
            const existingRaw = document.getElementById('existingCsv').value;
            
            if (!rawData) return alert("Please paste the raw Google Maps data first.");

            const existingSet = new Set(
                existingRaw.split(',')
                .map(n => n.trim().replace(/\s+/g, ''))
                .filter(n => n.length > 0)
            );

            // Match SG numbers: optional +65/65, then 6,8,9 followed by 7 digits
            const phoneRegex = /(?:\+65|65)?\s?([689]\d{3}\s?\d{4})/g;
            
            let match;
            const foundPhoneIndices = [];
            
            while ((match = phoneRegex.exec(rawData)) !== null) {
                foundPhoneIndices.push({
                    fullMatch: match[0],
                    cleanNumber: '+65' + match[1].replace(/\s+/g, ''),
                    index: match.index,
                    type: match[1].startsWith('6') ? 'landline' : 'mobile'
                });
            }

            let countNew = 0;
            let countRepeated = 0;
            let countLandline = 0;
            let newLeadsList = [];

            for (let i = 0; i < foundPhoneIndices.length; i++) {
                const current = foundPhoneIndices[i];
                
                if (current.type === 'landline') {
                    countLandline++;
                    continue;
                }

                const nextIndex = foundPhoneIndices[i + 1] ? foundPhoneIndices[i + 1].index : rawData.length;
                const chunk = rawData.substring(current.index, nextIndex);
                
                const hasWebsite = /website/i.test(chunk);

                if (!hasWebsite) {
                    if (!existingSet.has(current.cleanNumber)) {
                        newLeadsList.push(current.cleanNumber);
                        existingSet.add(current.cleanNumber);
                        countNew++;
                    } else {
                        countRepeated++;
                    }
                } else {
                    countRepeated++; 
                }
            }

            // Generate Output Strings
            const newLeadsStr = newLeadsList.join(',');
            const masterStr = Array.from(existingSet).join(',');

            // Push Outputs to UI
            document.getElementById('newNumbersOutput').value = newLeadsStr;
            document.getElementById('masterCsvOutput').value = masterStr;
            
            // Auto-Refresh Input 2 (Existing Master CSV) for the next batch
            document.getElementById('existingCsv').value = masterStr;
            
            // Clear Input 1 to prep for next Copy-Paste
            document.getElementById('rawInput').value = '';

            // Update Stats & Show Dash
            const statsArea = document.getElementById('statsArea');
            statsArea.classList.remove('hidden');
            
            // Animation for numbers
            animateValue("statNew", 0, countNew, 1000);
            animateValue("statRepeated", 0, countRepeated, 1000);
            animateValue("statIgnored", 0, countLandline, 1000);
        }

        // Eye-candy number counter animation
        function animateValue(id, start, end, duration) {
            if (start === end) {
                document.getElementById(id).innerHTML = end;
                return;
            }
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                document.getElementById(id).innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
</body>
</html>
