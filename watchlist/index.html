<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex,nofollow" />
<title>The Watchlist — Reputifly</title>
<link rel="icon" type="image/jpeg" href="https://reputifly.com/wp-content/uploads/2026/01/IMG_2123.jpg" />
<link rel="apple-touch-icon" href="https://reputifly.com/wp-content/uploads/2026/01/IMG_2123.jpg" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg-main:#0B0A14;--accent-primary:#E6397F;--accent-secondary:#FF8A00}
*{-webkit-tap-highlight-color:transparent}
body{
  background-color:var(--bg-main);color:#F0F0F0;font-family:'Inter',sans-serif;
  background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);
  background-size:40px 40px;overflow-x:hidden;
}
h1,h2,h3{font-family:'Inter',sans-serif;letter-spacing:-0.035em}
h1{font-weight:900}
.hword{font-weight:900;font-size:inherit;line-height:1;letter-spacing:-0.035em;display:inline-block}
.dynamic-gradient-text{
  background:linear-gradient(to right,#E6397F,#FF8A00,#E6397F);background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:text-shimmer 4s linear infinite;font-weight:900;
}
@keyframes text-shimmer{to{background-position:200% center}}

.liquid-glass{
  background:rgba(13,13,18,0.75);backdrop-filter:blur(40px) saturate(140%);-webkit-backdrop-filter:blur(40px) saturate(140%);
  border:1px solid rgba(255,255,255,0.08);border-radius:24px;
  box-shadow:0 40px 80px -12px rgba(0,0,0,0.8),inset 0 1px 0 0 rgba(255,255,255,0.15),inset 0 0 40px rgba(0,0,0,0.3);
  position:relative;overflow:hidden;
}
.liquid-glass::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;
  background:radial-gradient(circle at top left,rgba(255,255,255,0.05),transparent 70%);pointer-events:none;z-index:1}
.glass-content{position:relative;z-index:10}

.liquid-glow{
  background:radial-gradient(circle at top,rgba(255,255,255,0.4) 0%,transparent 60%),linear-gradient(90deg,#E6397F,#FF8A00);
  box-shadow:0 6px 20px rgba(230,57,127,0.4),inset 0 1px 0 rgba(255,255,255,0.4);
  border:none;border-radius:9999px;color:#fff;font-weight:700;transition:all .3s ease;
}
.liquid-glow:active{transform:scale(.985)}
.liquid-glow:disabled{opacity:.4;box-shadow:none;cursor:not-allowed}

.ambient-glow{position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(100px);z-index:-1;pointer-events:none}
.glow-top{top:-260px;left:50%;transform:translateX(-50%);background:radial-gradient(circle,rgba(230,57,127,0.15) 0%,transparent 70%)}
.glow-bottom{bottom:-260px;right:-120px;background:radial-gradient(circle,rgba(255,138,0,0.1) 0%,transparent 70%)}

.sec-num{font-size:12px;font-weight:900;letter-spacing:.16em;color:#E6397F;display:block;margin-bottom:6px}
.sec-title{font-size:26px;font-weight:900;letter-spacing:-0.035em;line-height:1.15;margin-bottom:6px}
.hint{font-size:14px;color:#767d8d;line-height:1.55}

.fld{
  width:100%;background:rgba(255,255,255,0.045);border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;padding:14px 15px;color:#fff;font-size:16px;transition:border-color .2s,background .2s;
}
.fld::placeholder{color:#5d6472}
.fld:focus{outline:none;border-color:rgba(230,57,127,0.55);background:rgba(255,255,255,0.07)}
input[type=date].fld{appearance:none}
input[type=date].fld::-webkit-calendar-picker-indicator{filter:invert(.6);cursor:pointer}

.rowlbl{font-size:11.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#6d7484;margin-bottom:8px;display:block}

/* ---- watch cards ---- */
.wcard{background:rgba(255,255,255,0.028);border:1px solid rgba(255,255,255,0.075);border-radius:20px;
  padding:16px 18px;margin-bottom:12px;transition:border-color .2s,background .2s;cursor:pointer}
.wcard:active{background:rgba(255,255,255,0.045)}
.wcard.due{background:rgba(255,138,0,0.07);border-color:rgba(255,138,0,0.34)}
.wcard.open{cursor:default;background:rgba(255,255,255,0.05);border-color:rgba(230,57,127,0.4)}
.wname{font-size:17px;font-weight:800;letter-spacing:-0.02em;color:#fff;line-height:1.25}
.wnote{font-size:14.5px;color:#aeb4c2;line-height:1.5;margin-top:5px;white-space:pre-wrap;word-break:break-word}
.wnote.clamp{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.datechip{display:inline-flex;align-items:center;gap:6px;margin-top:10px;
  font-size:12px;font-weight:800;letter-spacing:.04em;padding:5px 11px;border-radius:999px;
  background:rgba(255,255,255,0.06);color:#8b93a3;border:1px solid rgba(255,255,255,0.07)}
.datechip.due{background:rgba(255,138,0,0.16);color:#FFB65C;border-color:rgba(255,138,0,0.36)}
.stamp{font-size:11.5px;color:#5f6675;margin-top:12px}

.addbtn{width:100%;border:1px dashed rgba(255,255,255,0.17);border-radius:16px;padding:15px;
  color:#8b93a3;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .22s ease;background:transparent}
.addbtn:active{border-color:rgba(230,57,127,0.6);color:#E6397F;background:rgba(230,57,127,0.06)}

.ghostbtn{border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:11px 18px;
  color:#9aa0ad;font-weight:700;font-size:14px;background:rgba(255,255,255,0.03);transition:all .2s}
.ghostbtn:active{background:rgba(255,255,255,0.07)}
.dangerbtn{border:1px solid rgba(230,57,127,0.35);border-radius:999px;padding:11px 18px;
  color:#E6397F;font-weight:700;font-size:14px;background:rgba(230,57,127,0.08);transition:all .2s}
.dangerbtn:active{background:rgba(230,57,127,0.2)}

.statchip{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#8b93a3;
  background:rgba(255,255,255,0.045);border:1px solid rgba(255,255,255,0.08);border-radius:999px;padding:8px 14px}
.statchip b{color:#fff;font-weight:900}
.statchip.due{background:rgba(255,138,0,0.13);border-color:rgba(255,138,0,0.32);color:#FFB65C}
.statchip.due b{color:#FFB65C}

.savechip{font-size:12px;font-weight:600;color:#5f6675;display:flex;align-items:center;gap:6px;transition:color .3s}
.savechip.flash{color:#25D366}
.pvbadge{font-size:11px;font-weight:800;letter-spacing:.1em;color:#FFB65C;background:rgba(255,138,0,0.13);
  border:1px solid rgba(255,138,0,0.32);border-radius:999px;padding:5px 11px}
.empty{text-align:center;padding:38px 20px;color:#6d7484;font-size:14.5px;line-height:1.6}
</style>
</head>
<body class="min-h-screen">

<div class="ambient-glow glow-top"></div>
<div class="ambient-glow glow-bottom"></div>

<main class="max-w-2xl mx-auto px-4 py-8 md:py-12">

  <div class="flex items-center justify-between mb-7">
    <img src="https://reputifly.com/wp-content/uploads/2025/05/cropped-reputifly-new-e1746390492876.png"
         class="h-6 w-auto object-contain brightness-125" alt="Reputifly">
    <div class="flex items-center gap-2">
      <span class="pvbadge" id="pvBadge" style="display:none">PREVIEW</span>
      <div class="savechip" id="saveChip"><i data-feather="cloud" class="w-3.5 h-3.5"></i><span id="saveTxt">Loading</span></div>
    </div>
  </div>

  <div class="mb-7">
    <p class="sec-num">WHO WE'RE CHASING</p>
    <h1 class="text-4xl md:text-6xl leading-none mb-4"><span class="hword">The</span> <span class="hword dynamic-gradient-text">Watchlist</span></h1>
    <p class="hint max-w-md">Anyone worth chasing, what they actually want, and when to chase them next. Tap a card to edit it.</p>
  </div>

  <div class="flex flex-wrap gap-2 mb-6" id="stats"></div>

  <button type="button" class="addbtn mb-6" id="addBtn">
    <i data-feather="plus" class="w-4 h-4"></i> Add someone
  </button>

  <div id="list"></div>

</main>

<script>
var ENDPOINT = "https://script.google.com/macros/s/AKfycbzv9qV2UHNvCRW5lWyrwEC2E3TNaNOu6z-dtPJwJ_XFZscS5GUVZ5OZ_q9Ad6HlvjDa2Q/exec";

/* Local preview runs entirely off localStorage with seeded examples —
   nothing touches the live sheet until this is served from reputifly.org. */
var PREVIEW = location.protocol==='file:' || /^(localhost|127\.0\.0\.1|\[::1\]|0\.0\.0\.0)$/.test(location.hostname);
var PV_KEY = "rfly_watchlist_preview";

var rows = [];          // live rows from the server (or preview store)
var openId = null;      // which card is expanded
var newDraft = null;    // an unsaved brand-new card

/* ---------- helpers ---------- */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function todayISO(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function shiftISO(n){var d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function prettyDate(iso){
  if(!iso) return '';
  var p=iso.split('-'); var d=new Date(+p[0],+p[1]-1,+p[2]);
  return d.toLocaleDateString('en-SG',{day:'numeric',month:'short'});
}
function dateLabel(iso){
  if(!iso) return {txt:'No date set',due:false};
  var t=todayISO();
  if(iso<t)  return {txt:'Overdue — '+prettyDate(iso),due:true};
  if(iso===t)return {txt:'Due today',due:true};
  if(iso===shiftISO(1)) return {txt:'Due tomorrow',due:false};
  return {txt:'Due '+prettyDate(iso),due:false};
}
function status(txt,flash){
  document.getElementById('saveTxt').textContent=txt;
  var c=document.getElementById('saveChip');
  if(flash){c.classList.add('flash');setTimeout(function(){c.classList.remove('flash')},1100)}
}

/* ---------- sorting: overdue → due today → soonest → undated last ---------- */
function sortRows(a,b){
  var t=todayISO();
  var ad=a.followUp||'', bd=b.followUp||'';
  if(!ad&&!bd) return (b.updatedAt||'').localeCompare(a.updatedAt||'');
  if(!ad) return 1;
  if(!bd) return -1;
  var ao=ad<=t, bo=bd<=t;
  if(ao!==bo) return ao?-1:1;
  return ad.localeCompare(bd);
}

/* ---------- transport ---------- */
function jsonp(params){
  return new Promise(function(resolve,reject){
    var cb='wlcb_'+Math.floor(performance.now()*1000)+'_'+(jsonp._n=(jsonp._n||0)+1);
    var s=document.createElement('script');
    var to=setTimeout(function(){cleanup();reject(new Error('timeout'))},15000);
    function cleanup(){clearTimeout(to);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s)}
    window[cb]=function(data){cleanup();resolve(data)};
    s.onerror=function(){cleanup();reject(new Error('network'))};
    var q=Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k])});
    q.push('callback='+cb);
    s.src=ENDPOINT+'?'+q.join('&');
    document.body.appendChild(s);
  });
}
function post(body){
  return fetch(ENDPOINT,{method:'POST',mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body)});
}

/* ---------- preview store ---------- */
function pvLoad(){
  try{var r=localStorage.getItem(PV_KEY); if(r) return JSON.parse(r)}catch(e){}
  var seed=[
    {id:'p1',name:'9123 4567',note:'Renovation contractor in Woodlands. Saw his sample site, said he likes it but wants to check with his partner first. Asked twice about ranking on Google.',followUp:shiftISO(-2),updatedAt:shiftISO(-2)+'T21:10:00'},
    {id:'p2',name:'8877 6655',note:'Vinyl flooring, Tuas. Comparing us against a cheaper guy. Price is the whole conversation — do not drop below $590, offer the $100 lever only if he is ready to pay same day.',followUp:todayISO(),updatedAt:shiftISO(-1)+'T19:02:00'},
    {id:'p3',name:'Mr Lee — curtains',note:'Already a client. Ads running. Asked what a blog would cost — quoted around $500, he did not say no.',followUp:shiftISO(3),updatedAt:shiftISO(-4)+'T11:40:00'},
    {id:'p4',name:'9044 2210',note:'Interior design, wants to see a sample before anything else. No sample sent yet.',followUp:'',updatedAt:shiftISO(-6)+'T09:15:00'}
  ];
  try{localStorage.setItem(PV_KEY,JSON.stringify(seed))}catch(e){}
  return seed;
}
function pvSave(){try{localStorage.setItem(PV_KEY,JSON.stringify(rows))}catch(e){}}

/* ---------- load ---------- */
function load(){
  if(PREVIEW){ rows=pvLoad(); render(); status('Preview data'); return Promise.resolve() }
  status('Loading');
  return jsonp({action:'list'}).then(function(res){
    rows=(res&&res.rows)||[]; render(); status('Up to date');
  }).catch(function(){ status('Offline — could not load'); render() });
}

/* ---------- writes ---------- */
function saveRow(row){
  if(PREVIEW){
    var i=rows.findIndex(function(r){return r.id===row.id});
    row.updatedAt=new Date().toISOString();
    if(i<0) rows.push(row); else rows[i]=row;
    pvSave(); render(); status('Saved',true); return Promise.resolve();
  }
  status('Saving…');
  return post({action:'save',row:row}).then(load).then(function(){status('Saved',true)})
    .catch(function(){status('Save failed — check connection')});
}
function removeRow(id){
  if(PREVIEW){
    rows=rows.filter(function(r){return r.id!==id});
    pvSave(); render(); status('Removed',true); return Promise.resolve();
  }
  status('Removing…');
  return post({action:'remove',id:id}).then(load).then(function(){status('Removed',true)})
    .catch(function(){status('Remove failed — check connection')});
}

/* ---------- render ---------- */
function render(){
  var host=document.getElementById('list');
  var sorted=rows.slice().sort(sortRows);
  var t=todayISO();
  var dueCount=rows.filter(function(r){return r.followUp&&r.followUp<=t}).length;

  document.getElementById('stats').innerHTML=
    '<span class="statchip"><b>'+rows.length+'</b> on the list</span>'
    +(dueCount?'<span class="statchip due"><i data-feather="clock" class="w-3.5 h-3.5"></i><b>'+dueCount+'</b> to chase now</span>':'');

  var html='';
  if(newDraft) html+=cardHTML(newDraft,true);
  if(!sorted.length && !newDraft){
    html+='<div class="empty">Nobody on the watchlist yet.<br>Tap <b>Add someone</b> when a lead says something worth remembering.</div>';
  }
  sorted.forEach(function(r){ html+=cardHTML(r,r.id===openId) });
  host.innerHTML=html;
  feather.replace();
  wire();
}

function cardHTML(r,open){
  var dl=dateLabel(r.followUp);
  var cls='wcard'+(dl.due&&!open?' due':'')+(open?' open':'');
  if(!open){
    return '<div class="'+cls+'" data-id="'+esc(r.id)+'" data-openable="1">'
      +'<div class="wname">'+esc(r.name)+'</div>'
      +'<div class="wnote clamp">'+esc(r.note)+'</div>'
      +'<span class="datechip'+(dl.due?' due':'')+'">'
        +(dl.due?'<i data-feather="alert-triangle" class="w-3 h-3"></i>':'<i data-feather="calendar" class="w-3 h-3"></i>')
        +esc(dl.txt)+'</span>'
      +'</div>';
  }
  return '<div class="'+cls+'" data-id="'+esc(r.id)+'">'
    +'<span class="rowlbl">Phone number or name</span>'
    +'<input class="fld mb-4" data-f="name" placeholder="9123 4567" value="'+esc(r.name)+'">'
    +'<span class="rowlbl">What you need to remember</span>'
    +'<textarea class="fld mb-4" data-f="note" rows="4" placeholder="What they want, what they said, what is holding them back">'+esc(r.note)+'</textarea>'
    +'<span class="rowlbl">Chase them again on (optional)</span>'
    +'<input type="date" class="fld mb-5" data-f="followUp" value="'+esc(r.followUp||'')+'">'
    +'<div class="flex items-center justify-between gap-3">'
      +'<button type="button" class="dangerbtn" data-remove="'+esc(r.id)+'">Remove</button>'
      +'<div class="flex gap-2">'
        +'<button type="button" class="ghostbtn" data-cancel="1">Cancel</button>'
        +'<button type="button" class="liquid-glow px-6 py-3 text-sm" data-save="1">Save</button>'
      +'</div>'
    +'</div>'
    +(r.updatedAt?'<div class="stamp">Last updated '+esc(stampTxt(r.updatedAt))+'</div>':'')
    +'</div>';
}
function stampTxt(iso){
  try{var d=new Date(iso);
    return d.toLocaleDateString('en-SG',{day:'numeric',month:'short'})+', '+d.toLocaleTimeString('en-SG',{hour:'numeric',minute:'2-digit'});
  }catch(e){return ''}
}

/* ---------- interaction ---------- */
function wire(){
  document.querySelectorAll('[data-openable]').forEach(function(el){
    el.onclick=function(){ newDraft=null; openId=el.getAttribute('data-id'); render(); };
  });
  var card=document.querySelector('.wcard.open'); if(!card) return;

  var cancel=card.querySelector('[data-cancel]');
  if(cancel) cancel.onclick=function(){ newDraft=null; openId=null; render(); };

  var save=card.querySelector('[data-save]');
  if(save) save.onclick=function(){
    var id=card.getAttribute('data-id');
    var name=card.querySelector('[data-f="name"]').value.trim();
    var note=card.querySelector('[data-f="note"]').value.trim();
    var fu=card.querySelector('[data-f="followUp"]').value;
    if(!name||!note){ status('Name and note are both needed'); return }
    var existing=rows.filter(function(r){return r.id===id})[0]||{};
    newDraft=null; openId=null;
    saveRow({id:id,name:name,note:note,followUp:fu,createdAt:existing.createdAt||new Date().toISOString()});
  };

  var rm=card.querySelector('[data-remove]');
  if(rm) rm.onclick=function(){
    var id=rm.getAttribute('data-remove');
    if(newDraft&&newDraft.id===id){ newDraft=null; openId=null; render(); return }
    var who=(rows.filter(function(r){return r.id===id})[0]||{}).name||'this person';
    if(!confirm('Remove '+who+' from the watchlist?\n\nThey come off your list. The record is kept.')) return;
    openId=null; removeRow(id);
  };

  var first=card.querySelector('[data-f="name"]');
  if(first && newDraft && card.getAttribute('data-id')===newDraft.id) first.focus();
}

document.getElementById('addBtn').onclick=function(){
  newDraft={id:'w'+Date.now()+Math.floor(Math.random()*1000),name:'',note:'',followUp:'',updatedAt:''};
  openId=newDraft.id;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
};

if(PREVIEW) document.getElementById('pvBadge').style.display='';
load(); feather.replace();
</script>
</body>
</html>
