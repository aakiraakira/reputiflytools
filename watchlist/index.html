<style>
/* ===== Reputifly Professional (verbatim design system) ===== */
/* =========================================================================
   REPUTIFLY PROFESSIONAL -- the exact design system of Reputifly Mail.
   White, polished, Inter everywhere. Apple-grade LIGHT UI for client-facing
   software. Primary #007aff with EXPLICIT white text. Full pill rounding.
   Soft neutral shadows. cubic-bezier(0.25,0.8,0.25,1) easing. >=44px tap targets.

   Framework-agnostic: plain CSS custom properties + component classes. Paste
   verbatim into any project (HTML/CSS, React, Vue, Svelte, etc.). Pair with the
   Inter webfont (see the <link> in SKILL.md). For a Tailwind v4 project, change
   the ":root {" line below to "@theme {" and keep everything else.
   ========================================================================= */

:root {
  /* ---- Color: surfaces ---- */
  --color-canvas: #f7f8fa;        /* app background (soft off-white) */
  --color-surface: #ffffff;       /* cards, panels, sheets */
  --color-surface-2: #f3f4f6;     /* subtle raised / hover fills */
  --color-surface-3: #eceef1;     /* pressed / active fills */

  /* ---- Color: ink (text) ---- */
  --color-ink: #0a0a0a;           /* primary text */
  --color-ink-2: #3f4754;         /* secondary text */
  --color-muted: #6b7280;         /* tertiary / meta */
  --color-faint: #9ca3af;         /* placeholder / disabled */

  /* ---- Color: lines ---- */
  --color-line: #e8eaed;          /* hairline borders */
  --color-line-2: #dfe2e7;        /* stronger borders */

  /* ---- Color: brand / semantic ---- */
  --color-primary: #007aff;
  --color-primary-hover: #0a6fe0;
  --color-primary-active: #0563cc;
  --color-primary-soft: #e9f2ff;  /* tinted background for selected rows */
  --color-on-primary: #ffffff;

  --color-success: #34c759;
  --color-warn: #ff9500;
  --color-danger: #ff3b30;
  --color-danger-hover: #e11d0f;

  /* ---- Radii ---- */
  --radius-pill: 9999px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 12px;
  --radius-xs: 9px;

  /* ---- Shadows (soft, neutral) ---- */
  --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.04);
  --shadow-sm: 0 1px 3px rgba(16, 24, 40, 0.06), 0 1px 2px rgba(16, 24, 40, 0.04);
  --shadow-md: 0 4px 12px rgba(16, 24, 40, 0.08), 0 2px 4px rgba(16, 24, 40, 0.04);
  --shadow-lg: 0 12px 32px rgba(16, 24, 40, 0.12), 0 4px 8px rgba(16, 24, 40, 0.06);
  --shadow-focus: 0 0 0 3px rgba(0, 122, 255, 0.28);

  /* ---- Motion ---- */
  --ease: cubic-bezier(0.25, 0.8, 0.25, 1);

  /* ---- Type ---- */
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

  /* ---- Layout ---- */
  --sidebar-w: 264px;
}

/* ---- Base ---- */
html, body {
  margin: 0;
  min-height: 100vh;
  min-height: 100dvh;
}
html {
  background: var(--color-canvas);
  color: var(--color-ink);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  font-feature-settings: "cv02", "cv03", "cv04", "cv11";
}
body {
  margin: 0;
  font-size: 14px;
  line-height: 1.5;
  letter-spacing: -0.006em;
  color: var(--color-ink);
  background: var(--color-canvas);
  overflow-x: hidden;            /* zero horizontal overflow, ever */
}
* { box-sizing: border-box; }
::selection { background: rgba(0, 122, 255, 0.16); }

h1, h2, h3, h4 { letter-spacing: -0.02em; font-weight: 700; margin: 0; }

a { color: var(--color-primary); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Accessible focus -- keyboard users get a ring on interactive elements. */
:focus { outline: none; }
.btn:focus-visible,
a:focus-visible,
button:focus-visible,
[tabindex]:focus-visible {
  box-shadow: var(--shadow-focus);
  border-radius: var(--radius-xs);
}

button { font-family: inherit; }

/* Custom scrollbars -- thin, neutral, unobtrusive */
* {
  scrollbar-width: thin;
  scrollbar-color: #d3d6db transparent;
}
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb {
  background: #d3d6db;
  border-radius: 9999px;
  border: 3px solid transparent;
  background-clip: padding-box;
}
*::-webkit-scrollbar-thumb:hover { background: #b9bdc4; background-clip: padding-box; }
*::-webkit-scrollbar-track { background: transparent; }

/* =========================================================================
   Component layer -- reusable, consistent primitives
   ========================================================================= */

/* ---- Buttons ---- */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 8px;
  min-height: 44px; padding: 0 20px;
  border-radius: var(--radius-pill);
  border: 1px solid transparent;
  font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
  cursor: pointer; user-select: none; white-space: nowrap;
  transition: background-color 0.18s var(--ease), border-color 0.18s var(--ease),
              color 0.18s var(--ease), transform 0.12s var(--ease), box-shadow 0.18s var(--ease);
}
.btn:active { transform: translateY(0.5px) scale(0.99); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }

.btn--primary {
  background: var(--color-primary);
  color: var(--color-on-primary);   /* explicit white text */
  box-shadow: var(--shadow-xs);
}
.btn--primary:hover { background: var(--color-primary-hover); }
.btn--primary:active { background: var(--color-primary-active); }

.btn--ghost {
  background: var(--color-surface);
  color: var(--color-ink);
  border-color: var(--color-line-2);
}
.btn--ghost:hover { background: var(--color-surface-2); }

.btn--subtle {
  background: transparent;
  color: var(--color-ink-2);
}
.btn--subtle:hover { background: var(--color-surface-2); color: var(--color-ink); }

.btn--danger {
  background: var(--color-danger);
  color: #ffffff;
}
.btn--danger:hover { background: var(--color-danger-hover); }

.btn--sm { min-height: 36px; padding: 0 14px; font-size: 13px; gap: 6px; }
.btn--icon {
  display: inline-flex; align-items: center; justify-content: center;
  min-height: 40px; min-width: 40px; padding: 0;
  border-radius: var(--radius-pill);
  background: transparent; color: var(--color-ink-2);
  transition: background-color .15s var(--ease), color .15s var(--ease);
}
.btn--icon:hover { background: var(--color-surface-3); color: var(--color-ink); }
.btn--icon:active { background: #e2e5e9; }

/* ---- Dropdown / overflow menu row (icon + text) ---- */
.menu-item {
  display: flex; align-items: center; gap: 12px;
  width: 100%;
  padding: 0 14px;
  min-height: 40px;
  font-size: 14px; font-weight: 500;
  text-align: left;
  color: var(--color-ink-2);
  cursor: pointer;
  transition: background-color 0.13s var(--ease), color 0.13s var(--ease);
}
.menu-item:hover { background: var(--color-surface-2); color: var(--color-ink); }
.menu-item svg { flex-shrink: 0; }

/* ---- Inputs ---- */
.input {
  width: 100%;
  min-height: 44px; padding: 0 14px;
  background: var(--color-surface);
  border: 1px solid var(--color-line-2);
  border-radius: var(--radius-sm);
  font-size: 16px; color: var(--color-ink);
  transition: border-color 0.18s var(--ease), box-shadow 0.18s var(--ease), background-color 0.18s var(--ease);
}
.input::placeholder { color: var(--color-faint); }
.input:hover { border-color: var(--color-line); }
.input:focus {
  border-color: var(--color-primary);
  box-shadow: var(--shadow-focus);
}
/* Kill Chrome's yellow autofill box; keep the white surface + focus ring. */
.input:-webkit-autofill,
.input:-webkit-autofill:hover,
.input:-webkit-autofill:focus,
.input:-webkit-autofill:active {
  -webkit-text-fill-color: var(--color-ink);
  -webkit-box-shadow: 0 0 0 1000px var(--color-surface) inset;
  box-shadow: 0 0 0 1000px var(--color-surface) inset;
  caret-color: var(--color-ink);
  transition: background-color 9999s ease-in-out 0s;
  border-radius: var(--radius-sm);
}
.input:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0 1000px var(--color-surface) inset, var(--shadow-focus);
  box-shadow: 0 0 0 1000px var(--color-surface) inset, var(--shadow-focus);
}
textarea.input { padding: 12px 14px; resize: vertical; line-height: 1.6; }

.label {
  display: block;
  font-size: 13px; font-weight: 600; color: var(--color-ink-2);
  margin-bottom: 7px; letter-spacing: -0.01em;
}

/* ---- Cards ---- */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
}

/* ---- Pills / chips ---- */
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  height: 26px; padding: 0 11px;
  border-radius: var(--radius-pill);
  background: var(--color-surface-2);
  color: var(--color-ink-2);
  font-size: 12px; font-weight: 600;
}
.chip--primary { background: var(--color-primary-soft); color: var(--color-primary-active); }

/* ---- Count badge ---- */
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; padding: 0 6px;
  border-radius: var(--radius-pill);
  background: var(--color-surface-3); color: var(--color-ink-2);
  font-size: 11px; font-weight: 700;
}
.badge--primary { background: var(--color-primary); color: #fff; }

/* ---- Sidebar nav item ---- */
.nav-item {
  background: transparent;
  color: var(--color-ink-2);
  font-weight: 500;
  transition: background-color 0.15s var(--ease), color 0.15s var(--ease);
}
.nav-item:hover { background: var(--color-surface-2); }
.nav-item--active,
.nav-item--active:hover {
  background: var(--color-primary-soft);
  color: var(--color-primary-active);
  font-weight: 600;
}

/* ---- List row (e.g. inbox row, table row, result row) ---- */
.list-row {
  position: relative;
  background: var(--color-surface);
  transition: background-color 0.13s var(--ease);
  cursor: pointer;
}
.list-row:hover { background: var(--color-surface-2); }
.list-row--active,
.list-row--active:hover { background: var(--color-primary-soft); }
.list-row--unread::before {
  content: "";
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--color-primary);
}
.list-row--read { background: #fcfcfd; }

/* ---- Search pill (flush, fills its slot) ---- */
.search-pill {
  display: flex; align-items: center; gap: 9px;
  width: 100%;
  height: 42px; padding: 0 14px;
  background: var(--color-surface-2);
  border: 1px solid transparent;
  border-radius: var(--radius-pill);
  transition: background-color 0.18s var(--ease), border-color 0.18s var(--ease), box-shadow 0.18s var(--ease);
}
.search-pill:hover { background: var(--color-surface-3); }
.search-pill--focused,
.search-pill--focused:hover {
  background: var(--color-surface);
  border-color: var(--color-primary);
  box-shadow: var(--shadow-focus);
}
.search-pill input {
  flex: 1; min-width: 0;
  border: none; outline: none; background: transparent;
  font-size: 16px; color: var(--color-ink);
}
.search-pill input::placeholder { color: var(--color-faint); }

/* ---- Keyword highlight ---- */
mark.hl {
  background: #ffec99;
  color: var(--color-ink);
  border-radius: 3px;
  padding: 0 1px;
}

/* ---- Borderless / flush field (for compose-style or inline editing) ---- */
.field-flush {
  width: 100%; border: none; background: transparent;
  font-size: 16px; color: var(--color-ink); min-height: 38px;
  outline: none;
}
.field-flush::placeholder { color: var(--color-faint); }
.field-flush:focus { outline: none; box-shadow: none; }

/* 14px only on true mouse/desktop pointers; EVERY touch device keeps 16px so
   iOS never zooms the page when an input is focused (the <16px trigger). */
@media (hover: hover) and (pointer: fine) {
  .input, .field-flush, .search-pill input { font-size: 14px; }
}

/* ---- Loader spin ---- */
@keyframes rf-spin { to { transform: rotate(360deg); } }
.rf-spin { animation: rf-spin 0.7s linear infinite; }

/* ---- Fade / pop / slide for modals, sheets, toasts, drawers ---- */
@keyframes rf-fade-in { from { opacity: 0; } to { opacity: 1; } }
@keyframes rf-pop-in { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
@keyframes rf-slide-in-left { from { transform: translateX(-100%); } to { transform: translateX(0); } }
.rf-fade-in { animation: rf-fade-in 0.2s var(--ease); }
.rf-pop-in { animation: rf-pop-in 0.22s var(--ease); }
.rf-slide-in-left { animation: rf-slide-in-left 0.24s var(--ease); }

@media (prefers-reduced-motion: reduce) {
  .rf-spin, .rf-fade-in, .rf-pop-in, .rf-slide-in-left { animation: none; }
}

/* ---- Safe-area helpers for notch / home-indicator on iOS ---- */
@supports (padding: env(safe-area-inset-top)) {
  .safe-top { padding-top: env(safe-area-inset-top); }
  .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
}

/* ===================================================================
   APP SHELL — mobile-first, full-bleed. No nested containers.
   Sections are edge-to-edge white on phones and become rounded cards
   only once there is room for them.
   =================================================================== */
body{ padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px)); }

/* Form controls do NOT inherit the page font by default — without this the
   inputs and textareas render in the browser's default face, not Inter. */
input, textarea, select, button, optgroup { font-family: inherit; }

/* Buttons used as layout surfaces (rows, cards, add-links) still carry the
   browser's default border/background, which reads as a hard black box. */
.wtap, .row, .addrow {
  border: none; -webkit-appearance: none; appearance: none;
  font: inherit; color: inherit; margin: 0;
}

.topbar{
  position:sticky; top:0; z-index:30;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  height:60px; padding:0 16px;
  background:rgba(255,255,255,.86);
  -webkit-backdrop-filter:saturate(180%) blur(16px); backdrop-filter:saturate(180%) blur(16px);
  border-bottom:1px solid var(--color-line);
}
.topbar img{ height:21px; width:auto; display:block; }
.topbar .meta{ font-size:12px; font-weight:600; color:var(--color-muted); letter-spacing:.02em; text-transform:uppercase; }

.wrap{ max-width:560px; margin:0 auto; }

.hero{ padding:20px 18px 14px; }
.hero h1{ font-size:27px; line-height:1.14; letter-spacing:-.03em; margin:0 0 6px; }
.hero p{ margin:0; font-size:14px; color:var(--color-muted); line-height:1.5; }

.sect{
  background:var(--color-surface);
  border-top:1px solid var(--color-line);
  border-bottom:1px solid var(--color-line);
  margin-bottom:12px;
}
.sect-head{ padding:16px 18px 0; }
.sect-eyebrow{
  display:block; font-size:11px; font-weight:700; letter-spacing:.1em;
  text-transform:uppercase; color:var(--color-primary); margin-bottom:5px;
}
.sect-eyebrow.opt{ color:var(--color-muted); }
.sect h2{ font-size:19px; letter-spacing:-.022em; margin:0 0 4px; }
.sect .sub{ font-size:13.5px; color:var(--color-muted); line-height:1.5; margin:0; }
.sect-body{ padding:14px 18px 18px; }

/* justified pill groups */
.pillrow{ display:grid; gap:8px; }
.pillrow.n2{ grid-template-columns:repeat(2,1fr); }
.pillrow.n3{ grid-template-columns:repeat(3,1fr); }
.pillrow.n6{ grid-template-columns:repeat(6,1fr); }
.opt{ }
.optpill{
  display:flex; align-items:center; justify-content:center;
  min-height:46px; padding:0 8px; width:100%;
  border-radius:var(--radius-pill);
  background:var(--color-surface-2); border:1px solid transparent;
  color:var(--color-ink-2); font-size:14px; font-weight:600; letter-spacing:-.01em;
  cursor:pointer; white-space:nowrap;
  transition:background-color .15s var(--ease), color .15s var(--ease), border-color .15s var(--ease), transform .12s var(--ease);
}
.optpill:active{ transform:scale(.97); }
.optpill[aria-pressed="true"]{
  background:var(--color-primary); color:var(--color-on-primary);
  border-color:var(--color-primary); box-shadow:var(--shadow-xs);
}
.optpill.wide2{ grid-column:span 2; }
.fieldlbl{ display:block; font-size:12.5px; font-weight:600; color:var(--color-muted); margin:0 0 9px; letter-spacing:-.005em; }

/* compact list rows */
.rowlist{ display:flex; flex-direction:column; }
.row{
  display:flex; align-items:center; gap:12px;
  min-height:60px; padding:11px 0;
  border-bottom:1px solid var(--color-line);
  cursor:pointer; text-align:left; width:100%; background:transparent;
  transition:opacity .15s var(--ease);
}
.row:active{ opacity:.6; }
.row:last-child{ border-bottom:none; }
.row-main{ flex:1; min-width:0; }
.row-t{ font-size:15px; font-weight:600; color:var(--color-ink); letter-spacing:-.012em;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.row-s{ font-size:13px; color:var(--color-muted); margin-top:2px;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.row-chev{ color:var(--color-faint); flex-shrink:0; }

.addrow{
  display:flex; align-items:center; gap:10px;
  min-height:48px; width:100%; margin-top:6px;
  color:var(--color-primary); font-size:14.5px; font-weight:600; letter-spacing:-.01em;
  background:transparent; cursor:pointer;
}
.addrow:active{ opacity:.6; }

.empty{ padding:6px 0 10px; font-size:13.5px; color:var(--color-faint); }

/* warning note */
.note-warn{
  display:flex; gap:9px; align-items:flex-start;
  background:#fff7e8; border:1px solid #ffe0ad; border-radius:var(--radius-md);
  padding:11px 13px; font-size:13px; color:#8a5300; line-height:1.5; margin-top:14px;
}

/* summary */
.sumgrid{ display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.sumcell{ background:var(--color-surface-2); border-radius:var(--radius-md); padding:13px 15px; }
.sumcell.full{ grid-column:1 / -1; }
.sumcell .k{ font-size:12.5px; color:var(--color-muted); font-weight:500; }
.sumcell .v{ font-size:24px; font-weight:800; letter-spacing:-.03em; margin-top:1px; }

/* ---- bottom sheet ---- */
.backdrop{
  position:fixed; inset:0; z-index:60; background:rgba(10,12,16,.42);
  opacity:0; pointer-events:none; transition:opacity .24s var(--ease);
  -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px);
}
.backdrop.on{ opacity:1; pointer-events:auto; }
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:61;
  background:var(--color-surface);
  border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  box-shadow:var(--shadow-lg);
  transform:translateY(101%);
  /* visibility is the real guard: translateY(101%) only moves the sheet by its
     own height, which cannot clear a bottom offset, so it used to peek. */
  visibility:hidden; opacity:0;
  transition:transform .28s var(--ease), opacity .2s var(--ease), visibility 0s linear .28s;
  max-height:92dvh; display:flex; flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom, 0px);
}
.sheet.on{
  transform:translateY(0); visibility:visible; opacity:1;
  transition:transform .28s var(--ease), opacity .2s var(--ease), visibility 0s;
}
@media (min-width:640px){
  .sheet{ left:50%; right:auto; transform:translate(-50%,calc(101% + 32px)); width:460px;
    border-radius:var(--radius-lg); bottom:24px; }
  .sheet.on{ transform:translate(-50%,0); }
}
.grab{ width:38px; height:5px; border-radius:999px; background:var(--color-line-2);
  margin:9px auto 0; flex-shrink:0; }
@media (min-width:640px){ .grab{ display:none; } }
.sheet-head{
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  padding:12px 12px 12px; border-bottom:1px solid var(--color-line); flex-shrink:0;
}
.sheet-head h3{ font-size:16px; letter-spacing:-.02em; flex:1; text-align:center; }
.sheet-body{ padding:20px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
.sheet-body .label{ margin-top:0; }
.sheet-body .stack > * + *{ margin-top:18px; }

/* Destructive actions are red TEXT, not a red slab — a solid danger button
   shouts louder than the primary action it sits next to. */
.btn--quietdanger{ background:transparent; color:var(--color-danger); }
.btn--quietdanger:hover{ background:#fff1f0; }

/* ---- bottom tab bar ---- */
.tabbar{
  position:fixed; left:0; right:0; bottom:0; z-index:40;
  display:flex; background:rgba(255,255,255,.92);
  -webkit-backdrop-filter:saturate(180%) blur(16px); backdrop-filter:saturate(180%) blur(16px);

<script type="module">
/* ===================================================================
   Auth — reuses the SAME Firebase project as the Reputifly control
   panel (reputifly-automation), so there is one set of logins, not two.
   The backend re-verifies every token, so this gate is not the security
   boundary — it is the UX. See verifyToken_() in Code.gs.
   =================================================================== */
const AUTH_ON = window.__AUTH_ON === true;

const gate = document.getElementById("gate");
const errBox = document.getElementById("gateErr");

function showErr(msg){ errBox.textContent = msg; errBox.hidden = false; }
function hideErr(){ errBox.hidden = true; }

/* Auth off → run the app exactly as before, with no token. */
if (!AUTH_ON) {
  window.__rflyToken = () => Promise.resolve("");
  window.__boot();
} else {
  /* The gate stays hidden and the boot splash stays up until Firebase has
     resolved the stored session. Revealing the login first would flash it at
     someone who is already signed in — the session survives closing the app. */
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js");
  const { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence,
          browserLocalPersistence, signOut } =
    await import("https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js");

  const app = initializeApp({
    apiKey: "AIzaSyB4_6wJOcQddUFz8BemeG9HQgbuZtoHp20",
    authDomain: "reputifly-automation.firebaseapp.com",
    projectId: "reputifly-automation",
    storageBucket: "reputifly-automation.firebasestorage.app",
    messagingSenderId: "1095726999398",
    appId: "1:1095726999398:web:4e26ec90770da0244c0aa7",
  });
  const auth = getAuth(app);
  await setPersistence(auth, browserLocalPersistence);

  let booted = false;
  window.__rflyToken = () =>
    auth.currentUser ? auth.currentUser.getIdToken() : Promise.resolve("");

  /* Ask the backend whether this account is actually allowed in.
     The email allowlist lives in ONE place — Code.gs — so adding a
     teammate never means editing and redeploying these pages. */
  function whoami(token){
    return new Promise((resolve) => {
      const cb = "wa_" + Math.floor(performance.now() * 1000);
      const s = document.createElement("script");
      const to = setTimeout(() => { cleanup(); resolve({ ok:false, error:"timeout" }); }, 15000);
      function cleanup(){ clearTimeout(to); delete window[cb]; if (s.parentNode) s.remove(); }
      window[cb] = (d) => { cleanup(); resolve(d); };
      s.onerror = () => { cleanup(); resolve({ ok:false, error:"network" }); };
      s.src = window.__ENDPOINT + "?action=whoami&callback=" + cb + "&t=" + encodeURIComponent(token);
      document.body.appendChild(s);
    });
  }

  /* Drop the boot splash and show the login. Only ever called once we know
     for certain there is no usable session. */
  function revealGate(msg){
    if (window.__fadeBoot) window.__fadeBoot();
    gate.hidden = false;
    if (msg) showErr(msg);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { revealGate(); return; }
    const token = await user.getIdToken();
    const who = await whoami(token);
    if (!who || !who.ok || !who.allowed) {
      /* A network blip must NOT sign someone out — that would strand them
         offline with a login they cannot complete. Only a real refusal does. */
      if (who && (who.error === "network" || who.error === "timeout")) {
        revealGate("Could not reach the server. Check your connection and reload.");
        return;
      }
      await signOut(auth);
      revealGate("That account does not have access to this app.");
      return;
    }
    window.__me = who;
    gate.hidden = true;
    if (!booted) { booted = true; window.__boot(); }
    if (window.__fadeBoot) window.__fadeBoot();
    const w = document.getElementById("whoami");
    if (w) {
      w.hidden = false;
      w.querySelector("span").textContent = who.email;
      w.querySelector("button").onclick = () => signOut(auth).then(() => location.reload());
    }
  });

  document.getElementById("gateForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    hideErr();
    const btn = document.getElementById("gateBtn");
    const email = document.getElementById("gateEmail").value.trim();
    const pass = document.getElementById("gatePass").value;
    if (!email || !pass) { showErr("Enter your email and password."); return; }
    btn.disabled = true; btn.textContent = "Signing in…";
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      /* onAuthStateChanged takes it from here */
    } catch (err) {
      const map = {
        "auth/invalid-credential": "Wrong email or password.",
        "auth/wrong-password": "Wrong email or password.",
        "auth/user-not-found": "No account for that email.",
        "auth/invalid-email": "That email does not look right.",
        "auth/too-many-requests": "Too many tries. Wait a minute and try again.",
        "auth/network-request-failed": "No connection. Try again.",
        "auth/unauthorized-domain": "This domain is not authorised in Firebase yet.",
      };
      showErr(map[err.code] || ("Could not sign in (" + (err.code || "unknown") + ")."));
    } finally {
      btn.disabled = false; btn.textContent = "Sign in";
    }
  });
}
</script>

function shiftISO(n){var d=new Date();d.setDate(d.getDate()+n);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function pretty(iso){var p=iso.split("-");return new Date(+p[0],+p[1]-1,+p[2]).toLocaleDateString("en-SG",{day:"numeric",month:"short"})}

/* ---------- transport (every call carries the signed-in user's token) ---------- */
function jsonp(params){
  return window.__rflyToken().then(function(tok){
    return new Promise(function(resolve,reject){
      var cb="wlcb_"+Math.floor(performance.now()*1000)+"_"+(jsonp._n=(jsonp._n||0)+1);
      var s=document.createElement("script");
      var to=setTimeout(function(){cleanup();reject(new Error("timeout"))},15000);
      function cleanup(){clearTimeout(to);delete window[cb];if(s.parentNode)s.parentNode.removeChild(s)}
      window[cb]=function(d){cleanup();resolve(d)};
      s.onerror=function(){cleanup();reject(new Error("network"))};
      var q=Object.keys(params).map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(params[k])});
      q.push("callback="+cb);
      if(tok) q.push("t="+encodeURIComponent(tok));
      s.src=ENDPOINT+"?"+q.join("&");
      document.body.appendChild(s);
    });
  });
}
function post(body){
  return window.__rflyToken().then(function(tok){
    if(tok) body.idToken=tok;

  return seed;
}
function pvSave(){try{localStorage.setItem(PV_KEY,JSON.stringify(rows))}catch(e){}}

/* ---------- data ---------- */
function load(){
  if(PREVIEW){rows=pvLoad();render();return Promise.resolve()}
  return jsonp({action:"list"}).then(function(res){rows=(res&&res.rows)||[];render()})
    .catch(function(){toast("Could not load — check your connection","err");render()});
}
/* Optimistic writes: the screen updates on the tap, the sheet catches up in
   the background. A round trip is ~4s — far too long to stare at a spinner
   for something that essentially always succeeds. If it does fail we put the
   old state back and say so, so the UI never lies about what was saved. */
function applyLocal(row){
  var i=rows.findIndex(function(r){return r.id===row.id});
  row.updatedAt=new Date().toISOString();
  if(i<0) rows.push(row); else rows[i]=row;
}
function saveRow(row,msg){
  var snapshot=JSON.parse(JSON.stringify(rows));
  applyLocal(row); render();
  if(PREVIEW){ pvSave(); toast(msg||"Saved"); return Promise.resolve(); }
  toast(msg||"Saved");
  return post({action:"save",row:row})
    .then(load)
    .catch(function(){ rows=snapshot; render(); toast("Could not save - check your connection","err") });
}
function archiveRow(id){
  var snapshot=JSON.parse(JSON.stringify(rows));
  rows=rows.filter(function(r){return r.id!==id}); render();
  if(PREVIEW){ pvSave(); toast("Archived"); return Promise.resolve(); }
  toast("Archived");
  return post({action:"remove",id:id})
    .then(load)
    .catch(function(){ rows=snapshot; render(); toast("Could not archive - check your connection","err") });
}

/* ---------- render ---------- */
function sortByDate(a,b){
  var ad=a.followUp||"", bd=b.followUp||"";
  if(!ad&&!bd) return (b.updatedAt||"").localeCompare(a.updatedAt||"");
  if(!ad) return 1; if(!bd) return -1;
  return ad.localeCompare(bd);
}
function render(){
  var t=todayISO();
  var chase=rows.filter(function(r){return r.followUp&&r.followUp<=t}).sort(sortByDate);
  var soon =rows.filter(function(r){return r.followUp&&r.followUp>t}).sort(sortByDate);
  var none =rows.filter(function(r){return !r.followUp}).sort(sortByDate);

  var h="";
  if(!rows.length){
    h='<div class="emptybox"><div class="ic">'
      +'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
      +'</div><h3>Nobody on the watchlist</h3>'
      +'<p>Tap <b>Add</b> when a lead says something worth remembering.</p></div>';
  }else{
    if(chase.length) h+='<div class="grouphead urgent">Chase now <span class="n">'+chase.length+'</span></div>'+chase.map(card).join("");
    if(soon.length)  h+='<div class="grouphead">Coming up <span class="n">'+soon.length+'</span></div>'+soon.map(card).join("");
    if(none.length)  h+='<div class="grouphead">No date set <span class="n">'+none.length+'</span></div>'+none.map(card).join("");
  }
  document.getElementById("list").innerHTML=h;
  wireCards();
}
function card(r){
  var d=dateInfo(r.followUp);
  var tone=d.cls==="late"?" urgent":(d.cls==="today"?" soon":"");
  return '<article class="wcard'+tone+'">'
    +'<button type="button" class="wtap" data-open="'+esc(r.id)+'">'
      +'<div class="wname">'+esc(r.name)+'</div>'
      +'<div class="wnote">'+esc(r.note)+'</div>'
      +'<div class="wmeta"><span class="datechip '+d.cls+'">'
        +(d.cls?'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>'
               :'<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>')
        +esc(d.txt)+'</span></div>'
    +'</button>'
    +'<div class="wacts">'
      +'<a class="wa" data-stop="1" target="_blank" rel="noopener" aria-label="Message about '+esc(r.name)+' on WhatsApp" href="'+esc(waLink(r))+'">'+WA_ICON+'</a>'
      +(r.followUp
        ? '<button type="button" class="btn btn--ghost" data-done="'+esc(r.id)+'">'
            +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
            +'Follow-up done</button>'
        : '')
    +'</div>'
    +'</article>';
}
function wireCards(){
  document.querySelectorAll("[data-open]").forEach(function(b){
    b.onclick=function(){openSheet(b.getAttribute("data-open"))};
  });
  /* Done = the chase happened. Clears the date, KEEPS the person. Never archives. */
  document.querySelectorAll("[data-done]").forEach(function(b){
    b.onclick=function(ev){
      ev.stopPropagation();
      var r=rows.filter(function(x){return x.id===b.getAttribute("data-done")})[0];
      if(!r) return;
      saveRow({id:r.id,name:r.name,note:r.note,followUp:"",createdAt:r.createdAt},"Ticked off — still on your list");
    };
  });
}

/* ---------- sheet ---------- */
function openSheet(id){
  sheetIsNew=!id;
  var r=id?rows.filter(function(x){return x.id===id})[0]:null;
  sheetDraft=r?JSON.parse(JSON.stringify(r))
              :{id:"w"+Date.now()+Math.floor(Math.random()*1000),name:"",note:"",followUp:""};
  document.getElementById("sheetTitle").textContent=sheetIsNew?"Add someone":"Edit";
  var hasDate=!!sheetDraft.followUp;
  document.getElementById("sheetBody").innerHTML='<div class="stack">'
    +'<div><label class="label" for="wName">Phone number or name</label>'
      +'<input class="input" id="wName" placeholder="9123 4567" value="'+esc(sheetDraft.name)+'"></div>'
    +'<div><label class="label" for="wNote">What you need to remember</label>'
      +'<textarea class="input" id="wNote" rows="5" placeholder="What they want, what they said, what is holding them back">'+esc(sheetDraft.note)+'</textarea></div>'
    +'<div><label class="label" for="wDate">Chase them again on <span style="font-weight:500;color:var(--color-faint)">(optional)</span></label>'
      +'<input class="input" id="wDate" type="date" value="'+esc(sheetDraft.followUp||"")+'"></div>'
    /* same action row as the card: WhatsApp left, the tick right */
    +(sheetIsNew?'':'<div class="sheetacts">'
        +'<a class="wa" target="_blank" rel="noopener" aria-label="Message on WhatsApp" href="'+esc(waLink(sheetDraft))+'">'+WA_ICON+'</a>'
        +(hasDate?'<button type="button" class="btn btn--ghost" id="sheetDone">'
            +'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
            +'Follow-up done</button>':'')
      +'</div>')
    +(sheetIsNew?'':'<button type="button" class="btn btn--quietdanger btn--sm" id="sheetArchive" style="width:100%">Archive — lead is dead</button>')
    +'</div>';

  var del=document.getElementById("sheetArchive");
  if(del) del.onclick=function(){
    if(!confirm("Archive "+(sheetDraft.name||"this person")+"?\n\nOnly do this if the lead is dead.\nIf you just finished chasing them, use “Follow-up done” instead.")) return;
    closeSheet(); archiveRow(sheetDraft.id);
  };
  var dn=document.getElementById("sheetDone");
  if(dn) dn.onclick=function(){
    closeSheet();
    saveRow({id:sheetDraft.id,name:sheetDraft.name,note:sheetDraft.note,followUp:"",createdAt:sheetDraft.createdAt},"Ticked off — still on your list");
  };

  document.getElementById("backdrop").classList.add("on");
  document.getElementById("sheet").classList.add("on");
  document.body.style.overflow="hidden";
  if(sheetIsNew) setTimeout(function(){document.getElementById("wName").focus()},320);
}
function closeSheet(){
  document.getElementById("backdrop").classList.remove("on");
  document.getElementById("sheet").classList.remove("on");
  document.body.style.overflow=""; sheetDraft=null;
}
document.getElementById("sheetCancel").onclick=closeSheet;
document.getElementById("backdrop").onclick=closeSheet;
document.addEventListener("keydown",function(e){if(e.key==="Escape"&&sheetDraft)closeSheet()});
document.getElementById("addBtn").onclick=function(){openSheet(null)};
document.getElementById("sheetSave").onclick=function(){
  var name=document.getElementById("wName").value.trim();
  var note=document.getElementById("wNote").value.trim();
  var fu=document.getElementById("wDate").value;
  if(!name){toast("Add a phone number or name","err");return}
  if(!note){toast("Add a note so you remember why","err");return}
  var d=sheetDraft; closeSheet();
  saveRow({id:d.id,name:name,note:note,followUp:fu,createdAt:d.createdAt||new Date().toISOString()});
};

/* ---------- go ----------
   __boot() is called by the auth gate: immediately when auth is off, or
   once a known account has signed in. Nothing loads before that. */
window.__ENDPOINT=ENDPOINT;
/* localhost stays ungated so the preview loop needs no password */
window.__AUTH_ON=AUTH_ON && !PREVIEW;
window.__boot=function(){
  if(PREVIEW) document.getElementById("pvBanner").style.display="";
  load();
};
window.__fadeBoot=function(){
  var b=document.getElementById("boot");
  if(!b||b.getAttribute("data-gone")) return;
  b.setAttribute("data-gone","1");
  b.classList.add("is-fading");
  setTimeout(function(){b.style.display="none"},500);
};
window.addEventListener("load",function(){
  /* Use the EFFECTIVE flag, not the raw one - they differ on localhost, and
     disagreeing left the splash up forever. When auth is on it owns the
     splash (it must stay up until the stored session resolves, so a
     signed-in user never sees a flash). The 8s timer is a failsafe: a CDN
     hiccup loading the Firebase SDK must never strand a white screen. */
  if(!window.__AUTH_ON) setTimeout(window.__fadeBoot,180);
  setTimeout(window.__fadeBoot,8000);
});
</script>
