<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archimedes Admin | Client Manager</title>
    <link rel="icon" type="image/png" href="https://media.licdn.com/dms/image/v2/D560BAQEScnUkJITXAg/company-logo_200_200/B56ZajOckKHsAI-/0/1746495195792?e=2147483647&v=beta&t=Z7yQpp5jSwm-De46D45WIC5fY_2w0GVgEWLoEOM1aug">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <style>
        :root { --bg-deep:#0B0A14;--accent-primary:#E6397F;--accent-secondary:#FF8A00;--text-main:#F0F0F0;--glass-border:rgba(255,255,255,0.08);--glass-bg:rgba(20,20,30,0.6); }
        body { background:var(--bg-deep);color:var(--text-main);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased; }
        ::selection { background:var(--accent-primary);color:white; }
        h1,h2,h3,h4,.brand-font { font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em; }
        .ambient-glow { position:fixed;width:600px;height:600px;border-radius:50%;pointer-events:none;z-index:-2;filter:blur(80px);animation:drift 20s infinite alternate; }
        .glow-1 { top:-200px;left:-100px;background:radial-gradient(circle,rgba(230,57,127,0.15) 0%,transparent 70%); }
        .glow-2 { bottom:-200px;right:-100px;background:radial-gradient(circle,rgba(255,138,0,0.1) 0%,transparent 70%); }
        @keyframes drift { 0%{transform:translate(0,0)} 100%{transform:translate(30px,50px)} }
        ::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:10px}
        .glass-panel { background:var(--glass-bg);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--glass-border);border-top:1px solid rgba(255,255,255,0.15);box-shadow:0 30px 60px -12px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05);border-radius:20px; }
        .btn-liquid-glow { background:radial-gradient(circle at top,rgba(255,255,255,0.4) 0%,transparent 60%),linear-gradient(90deg,#E6397F,#FF8A00);box-shadow:0 10px 30px -10px rgba(230,57,127,0.6),inset 0 1px 0 rgba(255,255,255,0.4),inset 0 -2px 0 rgba(0,0,0,0.2);border:none;overflow:hidden;transition:all .3s cubic-bezier(.25,.8,.25,1);border-radius:9999px;color:white;font-weight:700;padding:12px 30px;font-size:14px;text-shadow:0 1px 2px rgba(0,0,0,0.2);display:inline-flex;align-items:center;gap:8px;cursor:pointer; }
        .btn-liquid-glow:hover { transform:translateY(-3px) scale(1.02);box-shadow:0 20px 40px -10px rgba(255,138,0,0.5),inset 0 1px 0 rgba(255,255,255,0.6); }
        .btn-liquid-glow:disabled { opacity:.5;pointer-events:none; }
        .btn-hero-glass { background:rgba(255,255,255,0.03);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);box-shadow:inset 0 1px 0 rgba(255,255,255,0.05);transition:all .3s;border-radius:9999px;color:#ccc;font-weight:600;padding:12px 30px;font-size:14px;display:inline-flex;align-items:center;gap:8px;cursor:pointer; }
        .btn-hero-glass:hover { background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.3);transform:translateY(-2px);color:white; }
        .btn-sm { padding:8px 16px;font-size:12px; }
        .btn-xs { padding:5px 12px;font-size:11px; }
        .text-gradient { background:linear-gradient(to right,#E6397F,#FF8A00);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
        .input-dark { background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:14px 18px;color:#F0F0F0;font-size:14px;width:100%;outline:none;transition:border-color .3s,background .3s; }
        .input-dark:focus { border-color:rgba(230,57,127,0.5);background:rgba(255,255,255,0.08); }
        .input-dark::placeholder { color:rgba(255,255,255,0.3); }
        .input-dark-sm { border-radius:12px;padding:10px 14px;font-size:13px; }
        textarea.input-dark { resize:vertical;min-height:100px;border-radius:16px; }
        .screen { display:none; }
        .screen.active { display:block; }
        .modal-backdrop { position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px; }
        .toast-container { position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px; }
        .toast { padding:14px 20px;border-radius:14px;font-size:13px;font-weight:600;backdrop-filter:blur(20px);animation:slideIn .3s ease;display:flex;align-items:center;gap:10px;min-width:280px;box-shadow:0 20px 40px rgba(0,0,0,0.4); }
        .toast-success { background:rgba(34,197,94,0.2);border:1px solid rgba(34,197,94,0.3);color:#4ade80; }
        .toast-error { background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.3);color:#f87171; }
        .toast-info { background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.3);color:#60a5fa; }
        @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
        .client-row { padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.05);transition:background .2s; }
        .client-row:hover { background:rgba(255,255,255,0.03); }
        .client-row:last-child { border-bottom:none; }
        .status-badge { padding:3px 10px;border-radius:9999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em; }
        .badge-configured { background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.2); }
        .badge-not-configured { background:rgba(255,255,255,0.05);color:#888;border:1px solid rgba(255,255,255,0.1); }
        .badge-revoked { background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.2); }
        @media(max-width:768px) {
            .glass-panel{border-radius:16px} .input-dark{padding:12px 14px;border-radius:14px}
            .btn-liquid-glow,.btn-hero-glass{padding:10px 20px;font-size:13px}
            .client-row{padding:12px 16px}
            .toast{min-width:auto;max-width:calc(100vw - 48px)} .toast-container{left:24px;right:24px;bottom:16px}
            .modal-backdrop>div{max-height:90vh;overflow-y:auto}
        }
    </style>
</head>
<body>
<div class="ambient-glow glow-1"></div>
<div class="ambient-glow glow-2"></div>

<!-- LOGIN -->
<div id="screenLogin" class="screen active">
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-panel p-8 md:p-10 w-full max-w-md text-center">
            <div class="mb-6">
                <h1 class="text-2xl font-bold mb-1">Archimedes <span class="text-gradient">Admin</span></h1>
                <p class="text-sm text-gray-400">Client Configuration Manager</p>
            </div>
            <form id="loginForm" class="space-y-4 text-left">
                <input type="email" id="loginEmail" class="input-dark" placeholder="Admin email" required>
                <input type="password" id="loginPassword" class="input-dark" placeholder="Password" required>
                <p id="loginError" class="text-red-400 text-sm hidden"></p>
                <button type="submit" class="btn-liquid-glow w-full justify-center">
                    <i data-feather="log-in" class="w-4 h-4"></i> Sign In
                </button>
            </form>
        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="screenDashboard" class="screen">
    <div class="max-w-5xl mx-auto px-4 md:px-6 py-6">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-xl font-bold">Client <span class="text-gradient">Manager</span></h1>
                <p class="text-xs text-gray-500 mt-1">Logged in as <span id="adminEmail" class="text-gray-400"></span></p>
            </div>
            <div class="flex gap-2">
                <button class="btn-hero-glass btn-sm" onclick="refreshAll()">
                    <i data-feather="refresh-cw" class="w-4 h-4"></i>
                </button>
                <button class="btn-hero-glass btn-sm" onclick="doLogout()">
                    <i data-feather="log-out" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <!-- STATS -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="glass-panel p-4 text-center">
                <p id="statTotal" class="text-2xl font-bold text-gradient">0</p>
                <p class="text-xs text-gray-500 mt-1">Total Clients</p>
            </div>
            <div class="glass-panel p-4 text-center">
                <p id="statConfigured" class="text-2xl font-bold" style="color:#4ade80">0</p>
                <p class="text-xs text-gray-500 mt-1">Configured</p>
            </div>
            <div class="glass-panel p-4 text-center">
                <p id="statPending" class="text-2xl font-bold" style="color:#fbbf24">0</p>
                <p class="text-xs text-gray-500 mt-1">Not Configured</p>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="flex gap-3 mb-4">
            <div class="flex-1 relative">
                <i data-feather="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                <input id="clientSearch" class="input-dark input-dark-sm pl-10" placeholder="Search clients..." oninput="renderClients()">
            </div>
        </div>

        <!-- CLIENT LIST -->
        <div id="clientList" class="glass-panel overflow-hidden">
            <div class="p-8 text-center text-gray-500 text-sm">Loading clients...</div>
        </div>
    </div>
</div>

<!-- MODAL: ASSIGN JSON -->
<div id="assignModal" class="modal-backdrop hidden" onclick="closeAssignModal(event)">
    <div class="glass-panel p-6 md:p-8 w-full max-w-lg" onclick="event.stopPropagation()">
        <div class="flex items-center justify-between mb-4">
            <h3 id="assignModalTitle" class="text-lg font-bold">Assign Profile</h3>
            <button class="btn-hero-glass btn-xs" onclick="closeAssignModal()"><i data-feather="x" class="w-4 h-4"></i></button>
        </div>
        <div class="space-y-4">
            <!-- Client info (read-only) -->
            <div>
                <label class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 block">Client</label>
                <p id="assignClientEmail" class="text-sm text-white font-medium"></p>
                <p id="assignClientName" class="text-xs text-gray-500"></p>
            </div>

            <!-- JSON Upload or Paste -->
            <div>
                <label class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 block">Agent Profile JSON</label>
                <div class="flex gap-2 mb-2">
                    <button class="btn-hero-glass btn-xs flex-1 justify-center" onclick="document.getElementById('assignJsonFile').click()">
                        <i data-feather="upload" class="w-3 h-3"></i> Upload JSON
                    </button>
                    <input type="file" id="assignJsonFile" class="hidden" accept=".json,application/json">
                </div>
                <textarea id="assignJsonArea" class="input-dark" rows="6" placeholder='Paste JSON or upload file...'></textarea>
            </div>

            <!-- Label -->
            <div>
                <label class="text-xs font-bold uppercase tracking-wider text-gray-400 mb-2 block">Label <span style="opacity:.5;font-weight:400;text-transform:none">(optional)</span></label>
                <input id="assignLabel" class="input-dark input-dark-sm" placeholder="e.g. Eco Greenscape SG">
            </div>

            <p id="assignModalError" class="text-red-400 text-sm hidden"></p>

            <div class="flex gap-3 justify-end pt-2">
                <button class="btn-hero-glass btn-sm" onclick="closeAssignModal()">Cancel</button>
                <button class="btn-liquid-glow btn-sm" onclick="saveAssignment()">
                    <i data-feather="save" class="w-4 h-4"></i> Save
                </button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: CONFIRM -->
<div id="confirmModal" class="modal-backdrop hidden" onclick="closeConfirm(event)">
    <div class="glass-panel p-6 md:p-8 w-full max-w-md" onclick="event.stopPropagation()">
        <h3 id="confirmTitle" class="text-lg font-bold mb-2"></h3>
        <p id="confirmBody" class="text-sm text-gray-400 mb-6"></p>
        <div id="confirmActions" class="flex gap-3 justify-end"></div>
    </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const firebaseConfig = {
    apiKey: "AIzaSyB4_6wJOcQddUFz8BemeG9HQgbuZtoHp20",
    authDomain: "reputifly-automation.firebaseapp.com",
    projectId: "reputifly-automation",
    storageBucket: "reputifly-automation.firebasestorage.app",
    messagingSenderId: "1095726999398",
    appId: "1:1095726999398:web:4e26ec90770da0244c0aa7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const SUPER_ADMIN_UID = 'wyeWdXkzCNf4ghrLxmoyvVbURAv2';
const API_ADMIN = 'https://manageteam-5resuz4f5a-as.a.run.app';
const COLLECTION = 'client_profiles';

let currentUser = null;
let allDeployUsers = [];   // from deploy API
let allProfiles = {};      // from Firestore {docId: data}
let assigningEmail = null;

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    feather.replace();
}

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
onAuthStateChanged(auth, async (user) => {
    if (user) {
        if (user.uid !== SUPER_ADMIN_UID) {
            toast('Access denied — admin only', 'error');
            await signOut(auth);
            return;
        }
        currentUser = user;
        document.getElementById('adminEmail').textContent = user.email;
        showScreen('screenDashboard');
        await refreshAll();
    } else {
        currentUser = null;
        showScreen('screenLogin');
    }
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errEl = document.getElementById('loginError');
    errEl.classList.add('hidden');
    try {
        await signInWithEmailAndPassword(auth, document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
    } catch (err) {
        errEl.textContent = err.code === 'auth/invalid-credential' ? 'Invalid email or password.' : err.message;
        errEl.classList.remove('hidden');
    }
});

window.doLogout = async () => { await signOut(auth); };


// ═══════════════════════════════════════════
// LOAD DATA — Deploy API users + Firestore profiles
// ═══════════════════════════════════════════
window.refreshAll = async () => {
    document.getElementById('clientList').innerHTML = '<div class="p-8 text-center text-gray-500 text-sm">Loading...</div>';
    await Promise.all([loadDeployUsers(), loadFirestoreProfiles()]);
    renderClients();
};

async function loadDeployUsers() {
    try {
        const token = await auth.currentUser.getIdToken();
        const res = await fetch(API_ADMIN, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ action: 'list' })
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.success) throw new Error(data.error || 'HTTP ' + res.status);
        // Only keep client accounts (not staff)
        allDeployUsers = (data.users || []).filter(u => !u.isStaff && u.uid !== SUPER_ADMIN_UID);
    } catch (err) {
        toast('Failed to load users: ' + err.message, 'error');
        allDeployUsers = [];
    }
}

async function loadFirestoreProfiles() {
    try {
        const snap = await getDocs(collection(db, COLLECTION));
        allProfiles = {};
        snap.forEach(s => { allProfiles[s.id] = s.data(); });
    } catch (err) {
        // Firestore may not be set up yet — that's OK
        allProfiles = {};
    }
}

function emailToDocId(email) {
    return email.toLowerCase().replace(/[^a-zA-Z0-9]/g, '_');
}


// ═══════════════════════════════════════════
// RENDER MERGED CLIENT LIST
// ═══════════════════════════════════════════
window.renderClients = () => {
    const container = document.getElementById('clientList');
    const search = (document.getElementById('clientSearch')?.value || '').toLowerCase().trim();

    // Merge: deploy users + any Firestore-only profiles
    const merged = [];
    const seenEmails = new Set();

    allDeployUsers.forEach(u => {
        const email = (u.email || '').toLowerCase();
        seenEmails.add(email);
        const docId = emailToDocId(email);
        const profile = allProfiles[docId] || null;
        merged.push({
            email,
            name: u.name || '',
            uid: u.uid,
            clientProject: u.clientProject || '',
            deployUser: true,
            profile,
            docId
        });
    });

    // Add Firestore-only profiles (manually added clients not in deploy)
    Object.entries(allProfiles).forEach(([docId, profile]) => {
        const email = (profile.email || '').toLowerCase();
        if (!seenEmails.has(email)) {
            seenEmails.add(email);
            merged.push({ email, name: '', uid: '', clientProject: '', deployUser: false, profile, docId });
        }
    });

    let filtered = merged;
    if (search) {
        filtered = merged.filter(c =>
            c.email.includes(search) ||
            (c.name || '').toLowerCase().includes(search) ||
            (c.profile?.label || '').toLowerCase().includes(search) ||
            (c.profile?.site_name || '').toLowerCase().includes(search)
        );
    }

    // Stats
    const configured = merged.filter(c => c.profile && c.profile.status !== 'revoked').length;
    const revoked = merged.filter(c => c.profile?.status === 'revoked').length;
    document.getElementById('statTotal').textContent = merged.length;
    document.getElementById('statConfigured').textContent = configured;
    document.getElementById('statPending').textContent = merged.length - configured - revoked;

    if (filtered.length === 0) {
        container.innerHTML = '<div class="p-8 text-center text-gray-500 text-sm"><i data-feather="users" class="w-8 h-8 mx-auto mb-2 opacity-40"></i><p>' + (search ? 'No clients match' : 'No client accounts found') + '</p></div>';
        feather.replace();
        return;
    }

    // Sort: configured first, then by email
    filtered.sort((a, b) => {
        const aConf = a.profile ? 1 : 0;
        const bConf = b.profile ? 1 : 0;
        if (bConf !== aConf) return bConf - aConf;
        return a.email.localeCompare(b.email);
    });

    container.innerHTML = filtered.map(c => {
        const hasProfile = !!c.profile;
        const isRevoked = c.profile?.status === 'revoked';
        const displayName = c.name || c.email.split('@')[0];
        const siteLabel = c.profile?.label || c.profile?.site_name || c.clientProject || '';

        let badgeClass, badgeText;
        if (isRevoked) { badgeClass = 'badge-revoked'; badgeText = 'Revoked'; }
        else if (hasProfile) { badgeClass = 'badge-configured'; badgeText = 'Configured'; }
        else { badgeClass = 'badge-not-configured'; badgeText = 'Not Configured'; }

        return `<div class="client-row flex items-center justify-between gap-3">
            <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                    <span class="font-semibold text-sm truncate">${esc(displayName)}</span>
                    <span class="status-badge ${badgeClass}">${badgeText}</span>
                </div>
                <p class="text-xs text-gray-500 truncate">${esc(c.email)}${siteLabel ? ' — ' + esc(siteLabel) : ''}</p>
                ${hasProfile ? `<p class="text-xs text-gray-600 mt-0.5">Updated: ${c.profile.updated_at ? new Date(c.profile.updated_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—'}</p>` : ''}
            </div>
            <div class="flex gap-1 shrink-0">
                <button class="btn-liquid-glow btn-xs" onclick="openAssign('${esc(c.email)}','${esc(c.name)}','${esc(c.docId)}')" title="${hasProfile ? 'Edit Profile' : 'Assign JSON'}">
                    <i data-feather="${hasProfile ? 'edit-2' : 'link'}" class="w-3 h-3"></i> ${hasProfile ? 'Edit' : 'Assign'}
                </button>
                ${hasProfile ? `
                    <button class="btn-hero-glass btn-xs" onclick="toggleStatus('${esc(c.docId)}')" title="${isRevoked ? 'Activate' : 'Revoke'}">
                        <i data-feather="${isRevoked ? 'eye' : 'eye-off'}" class="w-3 h-3"></i>
                    </button>
                    <button class="btn-hero-glass btn-xs text-red-400" onclick="removeProfile('${esc(c.docId)}','${esc(c.email)}')" title="Remove profile">
                        <i data-feather="trash-2" class="w-3 h-3"></i>
                    </button>
                ` : ''}
            </div>
        </div>`;
    }).join('');
    feather.replace();
};


// ═══════════════════════════════════════════
// ASSIGN / EDIT PROFILE MODAL
// ═══════════════════════════════════════════
window.openAssign = (email, name, docId) => {
    assigningEmail = email;
    document.getElementById('assignModalTitle').textContent = allProfiles[docId] ? 'Edit Profile' : 'Assign Profile';
    document.getElementById('assignClientEmail').textContent = email;
    document.getElementById('assignClientName').textContent = name || '';
    document.getElementById('assignModalError').classList.add('hidden');

    const existing = allProfiles[docId];
    if (existing) {
        document.getElementById('assignJsonArea').value = JSON.stringify({ api_base: existing.api_base, api_key: existing.api_key }, null, 2);
        document.getElementById('assignLabel').value = existing.label || '';
    } else {
        document.getElementById('assignJsonArea').value = '';
        document.getElementById('assignLabel').value = '';
    }

    document.getElementById('assignModal').classList.remove('hidden');
    feather.replace();
};

window.closeAssignModal = (event) => {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('assignModal').classList.add('hidden');
    assigningEmail = null;
};

document.getElementById('assignJsonFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { document.getElementById('assignJsonArea').value = ev.target.result; };
    reader.readAsText(file);
    e.target.value = '';
});

window.saveAssignment = async () => {
    const errEl = document.getElementById('assignModalError');
    errEl.classList.add('hidden');

    if (!assigningEmail) return;

    const rawJson = document.getElementById('assignJsonArea').value.trim();
    if (!rawJson) { errEl.textContent = 'JSON profile is required.'; errEl.classList.remove('hidden'); return; }

    let parsed;
    try { parsed = JSON.parse(rawJson); } catch { errEl.textContent = 'Invalid JSON format.'; errEl.classList.remove('hidden'); return; }

    const apiBase = parsed.api_base || parsed.apiBase;
    const apiKey = parsed.api_key || parsed.apiKey || (parsed.authentication && (parsed.authentication.agent_key || parsed.authentication.api_key));
    if (!apiBase || !apiKey) { errEl.textContent = 'JSON must contain api_base and an API key.'; errEl.classList.remove('hidden'); return; }

    const label = document.getElementById('assignLabel').value.trim();
    let siteName = '';
    try { siteName = new URL(apiBase).hostname.replace(/^www\./, ''); } catch {}

    const docId = emailToDocId(assigningEmail);
    try {
        await setDoc(doc(db, COLLECTION, docId), {
            email: assigningEmail.toLowerCase(),
            api_base: apiBase,
            api_key: apiKey,
            site_name: siteName,
            label: label || siteName,
            status: 'active',
            updated_at: new Date().toISOString(),
            updated_by: currentUser.email,
        }, { merge: true });
        toast('Profile saved for ' + assigningEmail, 'success');
        closeAssignModal();
        await loadFirestoreProfiles();
        renderClients();
    } catch (err) {
        errEl.textContent = 'Save failed: ' + err.message;
        errEl.classList.remove('hidden');
    }
};


// ═══════════════════════════════════════════
// TOGGLE STATUS / REMOVE
// ═══════════════════════════════════════════
window.toggleStatus = async (docId) => {
    const profile = allProfiles[docId];
    if (!profile) return;
    const newStatus = profile.status === 'revoked' ? 'active' : 'revoked';
    try {
        await setDoc(doc(db, COLLECTION, docId), { status: newStatus, updated_at: new Date().toISOString() }, { merge: true });
        toast(newStatus === 'revoked' ? 'Access revoked' : 'Access restored', 'success');
        await loadFirestoreProfiles();
        renderClients();
    } catch (err) { toast(err.message, 'error'); }
};

let confirmCb = null;
window.removeProfile = (docId, email) => {
    document.getElementById('confirmTitle').textContent = 'Remove Profile';
    document.getElementById('confirmBody').textContent = 'Remove console profile for ' + email + '? They will need to upload JSON manually.';
    confirmCb = async () => {
        try {
            await deleteDoc(doc(db, COLLECTION, docId));
            toast('Profile removed', 'success');
            await loadFirestoreProfiles();
            renderClients();
        } catch (err) { toast(err.message, 'error'); }
    };
    document.getElementById('confirmActions').innerHTML = `
        <button class="btn-hero-glass btn-sm" onclick="closeConfirm()">Cancel</button>
        <button class="btn-liquid-glow btn-sm" onclick="doConfirm()">Remove</button>`;
    document.getElementById('confirmModal').classList.remove('hidden');
    feather.replace();
};

window.closeConfirm = (event) => {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('confirmModal').classList.add('hidden');
    confirmCb = null;
};
window.doConfirm = async () => { if (confirmCb) await confirmCb(); closeConfirm(); };


// ═══════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════
function esc(str) { if (!str) return ''; const d = document.createElement('div'); d.textContent = String(str); return d.innerHTML; }
function emailToDocId(email) { return email.toLowerCase().replace(/[^a-zA-Z0-9]/g, '_'); }

window.toast = (msg, type = 'info') => {
    const container = document.getElementById('toastContainer');
    const el = document.createElement('div');
    el.className = 'toast toast-' + type;
    const iconMap = { success: 'check-circle', error: 'alert-circle', info: 'info' };
    el.innerHTML = '<i data-feather="' + (iconMap[type]||'info') + '" class="w-4 h-4 shrink-0"></i><span>' + esc(msg) + '</span>';
    container.appendChild(el);
    feather.replace();
    setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateX(100%)'; setTimeout(() => el.remove(), 300); }, 4000);
};

feather.replace();
</script>
