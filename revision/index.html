<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reputifly | Revision Hub</title>

    <link rel="icon" type="image/png" href="https://reputifly.com/wp-content/uploads/2026/01/IMG_2123.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        // 1. Editor Database Config (For reading/saving revisions)
        const editorConfig = {
            apiKey: "AIzaSyDqpzqEVtrEtQvvmcMie_Et7xiNh8QU_Ao",
            authDomain: "reputifly-editor.firebaseapp.com",
            projectId: "reputifly-editor",
            storageBucket: "reputifly-editor.firebasestorage.app",
            messagingSenderId: "455384979132",
            appId: "1:455384979132:web:9079ec81182115b16622b9"
        };

        // 2. Automation Auth Config (Staff Authentication)
        const authConfig = {
            apiKey: "AIzaSyB4_6wJOcQddUFz8BemeG9HQgbuZtoHp20",
            authDomain: "reputifly-automation.firebaseapp.com",
            projectId: "reputifly-automation",
            storageBucket: "reputifly-automation.firebasestorage.app",
            messagingSenderId: "1095726999398",
            appId: "1:1095726999398:web:4e26ec90770da0244c0aa7"
        };

        // Initialize Apps
        const app = initializeApp(editorConfig);
        const authApp = initializeApp(authConfig, "authApp");

        // Bind to Window
        window.db = getFirestore(app);
        window.collection = collection;
        window.onSnapshot = onSnapshot;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.query = query;
        window.orderBy = orderBy;
        window.deleteDoc = deleteDoc;

        window.auth = getAuth(authApp);
        window.onAuthStateChanged = onAuthStateChanged;
        window.signOut = signOut;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;

        window.dispatchEvent(new Event('firebaseReady'));
    </script>

    <style>
        body {
            background-color: #05050A;
            background-image: radial-gradient(circle at 50% 0%, #160D1E 0%, #05050A 70%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: #F0F0F0;
            -webkit-font-smoothing: antialiased;
        }

        .brand-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass-panel {
            background: rgba(15, 15, 20, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8);
        }

        .btn-primary {
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.3) 0%, transparent 60%),
                linear-gradient(90deg, #E6397F, #FF8A00);
            box-shadow: 0 10px 20px -5px rgba(230, 57, 127, 0.4);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            border: none;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(255, 138, 0, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            border-radius: 12px;
            padding: 12px 16px;
            width: 100%;
            outline: none;
            transition: 0.3s ease;
            font-size: 14px;
        }

        .input-field:focus {
            border-color: #E6397F;
            background: rgba(0, 0, 0, 0.6);
        }

        .status-badge {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .status-pending {
            background: rgba(255, 138, 0, 0.15);
            color: #FF8A00;
            border: 1px solid rgba(255, 138, 0, 0.3);
        }

        .status-locked {
            background: rgba(16, 185, 129, 0.15);
            color: #10B981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1a1a24;
            border: 1px solid #E6397F;
            padding: 12px 24px;
            border-radius: 99px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 200;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>

<body class="antialiased">

    <div class="fixed top-[-20%] left-[-10%] w-[60%] h-[60%] bg-[#E6397F]/10 rounded-full blur-[150px] pointer-events-none z-0"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-[#10B981]/10 rounded-full blur-[150px] pointer-events-none z-0"></div>

    <div id="appContainer" class="hidden min-h-screen pb-20 relative z-10">
        <header class="border-b border-white/5 bg-[#05050A]/80 backdrop-blur-xl sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <img src="https://reputifly.com/wp-content/uploads/2025/05/cropped-reputifly-new-e1746390492876.png" class="h-8 md:h-10">
                    <div class="h-8 w-px bg-white/10 hidden md:block"></div>
                    <span class="text-xs md:text-sm font-bold brand-font text-white hidden md:block tracking-wide">Revision Portal</span>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex flex-col items-end hidden sm:flex">
                        <span class="text-[10px] text-gray-400 font-bold uppercase tracking-wider">Staff Terminal</span>
                        <span id="userEmailDisplay" class="text-xs text-white"></span>
                    </div>
                    <button id="mainSignOutBtn" class="btn-secondary py-2 px-3 text-xs md:text-sm text-gray-400 hover:text-red-400 hover:border-red-500/30 hover:bg-red-500/10 transition-colors">
                        <i data-feather="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Sign Out</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 md:px-6 py-10">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-8">
                <div>
                    <h1 class="text-3xl md:text-4xl font-bold brand-font text-white mb-2 tracking-tight">Incoming Revisions</h1>
                    <p class="text-gray-400 text-sm">Monitor, track, and process client payload submissions.</p>
                </div>
                <div class="bg-white/5 border border-white/10 rounded-xl p-3 flex items-center gap-3">
                    <i data-feather="activity" class="w-5 h-5 text-[#E6397F]"></i>
                    <span class="text-sm font-bold text-white"><span id="activeCount">0</span> Active Submissions</span>
                </div>
            </div>

            <div id="revisionsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="glass-panel p-6 rounded-2xl animate-pulse">
                    <div class="h-6 w-3/4 bg-white/10 rounded mb-4"></div>
                    <div class="h-4 w-1/2 bg-white/5 rounded mb-8"></div>
                    <div class="space-y-3">
                        <div class="h-10 w-full bg-white/5 rounded-xl"></div>
                        <div class="h-10 w-full bg-white/5 rounded-xl"></div>
                    </div>
                </div>
            </div>
            
            <div id="emptyState" class="hidden text-center py-20 glass-panel rounded-3xl mt-6 border-dashed border-2 border-white/10">
                <div class="w-20 h-20 rounded-full bg-white/5 flex items-center justify-center mx-auto mb-6 border border-white/10">
                    <i data-feather="inbox" class="w-10 h-10 text-gray-500"></i>
                </div>
                <h3 class="text-xl font-bold text-white mb-2">Inbox Zero</h3>
                <p class="text-gray-400 text-sm">No pending client revisions at the moment.</p>
            </div>
        </main>
    </div>

    <div id="toast"><i data-feather="info" class="w-4 h-4 text-[#E6397F]"></i><span id="toastMsg">...</span></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            feather.replace();
            initAdminAuth();
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toastMsg').innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ==========================================
        // AUTHENTICATION & GATEKEEPER
        // ==========================================
        function initAdminAuth() {
            // Inject Login UI
            const authOverlay = document.createElement('div');
            authOverlay.id = 'authOverlayWrapper';
            authOverlay.className = 'fixed inset-0 bg-[#05050A] z-[99999] flex flex-col items-center justify-center transition-opacity duration-300 px-4';
            authOverlay.innerHTML = `
                <div id="authLoadingState" class="flex flex-col items-center">
                    <div class="w-12 h-12 border-[3px] border-[#E6397F]/30 border-t-[#E6397F] rounded-full animate-spin mb-6"></div>
                    <h2 class="text-xl font-bold brand-font text-white tracking-widest uppercase">Securing Connection...</h2>
                </div>
                
                <div id="authLoginState" class="hidden w-full max-w-sm glass-panel rounded-3xl p-8 relative overflow-hidden text-center border border-white/10 shadow-[0_0_50px_rgba(230,57,127,0.1)]">
                    <div class="w-16 h-16 rounded-full bg-gradient-to-br from-[#E6397F]/20 to-[#FF8A00]/20 flex items-center justify-center mx-auto mb-6 border border-white/10">
                        <i data-feather="shield" class="w-7 h-7 text-white"></i>
                    </div>
                    <h2 class="text-2xl font-bold brand-font text-white mb-2">Portal Login</h2>
                    <p class="text-gray-400 text-sm mb-8">Staff authentication required.</p>
                    
                    <form id="nexusLoginForm" class="space-y-4 text-left">
                        <div>
                            <input type="email" id="nexusEmail" required placeholder="Staff Email" class="input-field">
                        </div>
                        <div>
                            <input type="password" id="nexusPassword" required placeholder="Password" class="input-field">
                        </div>
                        <button type="submit" id="nexusLoginBtn" class="w-full btn-primary py-3.5 mt-2 shadow-lg text-sm uppercase tracking-wide">Authenticate</button>
                        <p id="nexusErrorMsg" class="text-red-400 text-xs text-center hidden mt-3 font-bold"></p>
                    </form>
                </div>
            `;
            document.body.appendChild(authOverlay);
            feather.replace();

            // Handle Form Submission
            setTimeout(() => {
                const loginForm = document.getElementById('nexusLoginForm');
                if (loginForm) {
                    loginForm.addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const btn = document.getElementById('nexusLoginBtn');
                        const err = document.getElementById('nexusErrorMsg');
                        btn.innerHTML = '<i data-feather="loader" class="w-4 h-4 animate-spin"></i> Verifying...';
                        btn.disabled = true;
                        err.classList.add('hidden');
                        feather.replace();

                        try {
                            await window.signInWithEmailAndPassword(
                                window.auth,
                                document.getElementById('nexusEmail').value.trim(),
                                document.getElementById('nexusPassword').value
                            );
                        } catch (error) {
                            err.innerText = "Invalid credentials. Access Denied.";
                            err.classList.remove('hidden');
                            btn.innerHTML = 'Authenticate';
                            btn.disabled = false;
                        }
                    });
                }
            }, 100);

            // Listen for State & Role Validation
            window.onAuthStateChanged(window.auth, async (user) => {
                const loadState = document.getElementById('authLoadingState');
                const loginState = document.getElementById('authLoginState');

                if (!user) {
                    if (loadState) loadState.classList.add('hidden');
                    if (loginState) loginState.classList.remove('hidden');
                    return;
                }

                if (loadState) loadState.classList.remove('hidden');
                if (loginState) loginState.classList.add('hidden');

                try {
                    const token = await user.getIdToken();
                    const res = await fetch("https://listsamples-5resuz4f5a-as.a.run.app", {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (!res.ok) throw new Error("Verification failed.");
                    const data = await res.json();

                    if (data.userRole === 'superadmin' || data.userRole === 'staff') {
                        // Authorized Access
                        document.getElementById('userEmailDisplay').innerText = user.email;
                        document.getElementById('authOverlayWrapper').style.opacity = '0';
                        setTimeout(() => document.getElementById('authOverlayWrapper').remove(), 300);
                        
                        document.getElementById('appContainer').classList.remove('hidden');
                        
                        // Bind global sign out
                        document.getElementById('mainSignOutBtn').addEventListener('click', () => {
                            window.signOut(window.auth).then(() => window.location.reload());
                        });

                        // Start fetching data
                        initDashboardData();
                    } else {
                        // Unauthorized
                        document.getElementById('authOverlayWrapper').innerHTML = `
                            <div class="glass-panel p-10 text-center max-w-sm w-full rounded-3xl border border-red-500/20">
                                <i data-feather="x-circle" class="w-12 h-12 text-red-500 mx-auto mb-4"></i>
                                <h2 class="text-2xl font-bold brand-font text-white mb-2">Access Restricted</h2>
                                <p class="text-gray-400 text-sm mb-8 leading-relaxed">Your account does not have staff privileges required to view the Revision Hub.</p>
                                <button id="forceSignOutBtn" class="btn-primary py-3 w-full text-sm">Sign Out</button>
                            </div>
                        `;
                        feather.replace();
                        document.getElementById('forceSignOutBtn').onclick = () => window.signOut(window.auth).then(() => window.location.reload());
                    }
                } catch (error) {
                    console.error("Auth Error:", error);
                    window.signOut(window.auth).then(() => window.location.reload());
                }
            });
        }

        // ==========================================
        // DATA FETCHING & RENDERING
        // ==========================================
        function initDashboardData() {
            const grid = document.getElementById('revisionsGrid');
            const emptyState = document.getElementById('emptyState');
            const countBadge = document.getElementById('activeCount');

            const q = window.query(window.collection(window.db, "pending_revisions"), window.orderBy("timestamp", "desc"));
            
            window.onSnapshot(q, (snapshot) => {
                grid.innerHTML = '';
                countBadge.innerText = snapshot.size;

                if (snapshot.empty) {
                    emptyState.classList.remove('hidden');
                    return;
                }
                
                emptyState.classList.add('hidden');

                snapshot.forEach(docSnap => {
                    const data = docSnap.data();
                    const docId = docSnap.id;
                    const isLocked = data.locked === true;
                    
                    // Format Date
                    const dateObj = data.submittedAt ? new Date(data.submittedAt) : new Date(data.timestamp);
                    const dateStr = dateObj.toLocaleDateString('en-SG', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });

                    // Badges
                    const statusBadge = isLocked 
                        ? `<span class="status-badge status-locked"><i data-feather="lock" class="w-3 h-3"></i> Locked</span>`
                        : `<span class="status-badge status-pending"><i data-feather="clock" class="w-3 h-3"></i> Open</span>`;

                    const card = document.createElement('div');
                    card.className = "glass-panel p-6 rounded-3xl flex flex-col justify-between transition-all hover:border-white/20 group";
                    card.innerHTML = `
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                ${statusBadge}
                                <button onclick="deleteRevision('${docId}')" class="text-gray-500 hover:text-red-400 transition-colors bg-white/5 hover:bg-white/10 p-1.5 rounded-lg opacity-0 group-hover:opacity-100" title="Delete Record">
                                    <i data-feather="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <h3 class="text-xl md:text-2xl font-bold text-white mb-1 truncate" title="${data.projectName || 'Unknown Project'}">${data.projectName || 'Unknown Project'}</h3>
                            <div class="flex items-center gap-2 text-xs text-gray-500 font-mono mb-6">
                                <i data-feather="calendar" class="w-3 h-3"></i> ${dateStr}
                            </div>
                        </div>

                        <div class="space-y-3 mt-4 pt-4 border-t border-white/10">
                            <a href="${data.zipUrl}" target="_blank" class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-white py-3 rounded-xl flex items-center justify-center gap-2 text-sm font-bold transition-colors">
                                <i data-feather="download-cloud" class="w-4 h-4 text-[#FF8A00]"></i> Download .ZIP Master
                            </a>
                            
                            <button onclick="openTracker('${docId}')" class="w-full btn-primary py-3 rounded-xl text-sm justify-center ${isLocked ? 'opacity-75' : ''}">
                                <i data-feather="layout" class="w-4 h-4"></i> Process in Tracker
                            </button>
                            
                            <button onclick="toggleLock('${docId}', ${isLocked})" class="w-full bg-transparent border border-white/5 hover:border-white/20 text-gray-400 hover:text-white py-2.5 rounded-xl text-xs font-bold transition-colors flex items-center justify-center gap-2">
                                ${isLocked ? '<i data-feather="unlock" class="w-3 h-3 text-gray-400"></i> Unlock Tracker' : '<i data-feather="lock" class="w-3 h-3 text-red-400"></i> Lock Edits (Read-Only)'}
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
                feather.replace();
            }, (error) => {
                console.error("Firestore Listen Error:", error);
                showToast("Failed to load revisions.");
            });
        }

        // ==========================================
        // ACTIONS
        // ==========================================
        
        // Opens tracking.html and appends the auto_load parameter for the 1-click launch
        window.openTracker = (docId) => {
            // Adjust this path if tracking.html is hosted on a different route
            const trackerUrl = `tracking.html?auto_load=${docId}`; 
            window.open(trackerUrl, '_blank');
        };

        window.toggleLock = async (docId, currentState) => {
            try {
                const newState = !currentState;
                await window.updateDoc(window.doc(window.db, "pending_revisions", docId), {
                    locked: newState
                });
                showToast(newState ? "Revision Locked 🔒" : "Revision Unlocked 🔓");
            } catch (err) {
                console.error(err);
                showToast("Error updating lock status.");
            }
        };

        window.deleteRevision = async (docId) => {
            if (!confirm("Are you sure you want to delete this revision record? The downloaded ZIP and generated Tracker will be lost.")) return;
            
            try {
                await window.deleteDoc(window.doc(window.db, "pending_revisions", docId));
                showToast("Record Deleted.");
            } catch (err) {
                console.error(err);
                showToast("Failed to delete record.");
            }
        }
    </script>
</body>

</html>
