<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reputifly | Asset Uploader</title>

    <link rel="icon" type="image/png" href="https://reputifly.com/wp-content/uploads/2026/01/IMG_2123.jpg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: '#E6397F',
                        secondary: '#FF8A00'
                    }
                }
            }
        };
    </script>

    <style>
        body {
            background-color: #05050A;
            background-image: radial-gradient(circle at 50% 0%, #160D1E 0%, #05050A 70%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: #F0F0F0;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3 {
            font-family: 'Space Grotesk', sans-serif;
            letter-spacing: -0.02em;
        }

        .glass-panel {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .btn-liquid-glow {
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.4) 0%, transparent 60%),
                linear-gradient(90deg, #E6397F, #FF8A00);
            box-shadow:
                0 10px 30px -10px rgba(230, 57, 127, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.4),
                inset 0 -2px 0 rgba(0, 0, 0, 0.2);
            border: none;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 9999px;
            color: white;
            font-weight: 700;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-liquid-glow:hover:not(:disabled) {
            transform: translateY(-2px) scale(1.02);
            box-shadow:
                0 20px 40px -10px rgba(255, 138, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .btn-hero-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            border-radius: 9999px;
            color: #D1D5DB;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-hero-glass:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            color: white;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .input-dark {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #F0F0F0;
            transition: all 0.3s ease;
        }

        .input-dark:focus {
            border-color: #E6397F;
            background: rgba(0, 0, 0, 0.6);
            outline: none;
            box-shadow: 0 0 0 4px rgba(230, 57, 127, 0.15);
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }

        /* Toast System */
        #toastContainer {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }

        .toast {
            min-width: 300px;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.25rem;
            padding: 1rem 1.25rem;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.85rem;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.6);
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.success { border-left: 4px solid #10B981; }
        .toast.error { border-left: 4px solid #EF4444; }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4 sm:p-8 relative overflow-x-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#E6397F]/10 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-[#FF8A00]/10 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="w-full max-w-3xl glass-panel rounded-[2.5rem] p-6 sm:p-10 relative z-10 shadow-2xl">
        
        <div class="text-center mb-8">
            <img src="https://reputifly.com/wp-content/uploads/2025/05/cropped-reputifly-new-e1746390492876.png" alt="Reputifly" class="h-14 sm:h-16 mx-auto mb-6 drop-shadow-[0_0_15px_rgba(230,57,127,0.3)]">
            <h1 class="text-3xl sm:text-4xl font-bold mb-3 tracking-tight">Asset Uploader</h1>
            <p class="text-sm text-gray-400 max-w-md mx-auto leading-relaxed">Securely upload your images to our global CDN network to generate direct embed links.</p>
        </div>

        <div id="dropZone" class="cursor-pointer glass-card border-dashed border-2 border-white/10 hover:border-primary/50 rounded-[2rem] p-10 text-center transition-all duration-300 flex flex-col items-center justify-center min-h-[250px] mb-8 group">
            <input type="file" id="fileInput" accept="image/*" multiple class="hidden">
            
            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-white/5 to-white/10 border border-white/10 flex items-center justify-center mb-6 group-hover:scale-110 group-hover:shadow-[0_0_40px_rgba(230,57,127,0.2)] transition-all duration-500">
                <i data-feather="image" class="w-8 h-8 text-primary"></i>
            </div>
            <p class="font-bold text-xl text-white mb-2">Drag & Drop Images</p>
            <p class="text-xs text-gray-400 mb-6">Supports PNG, JPG, WEBP, and SVG</p>
            
            <button type="button" class="btn-hero-glass py-3 px-6 text-sm z-10 relative border-primary/30 hover:border-primary" onclick="document.getElementById('fileInput').click(); event.stopPropagation();">
                Browse Files
            </button>
        </div>

        <div id="filesHeader" class="hidden flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-4 border-b border-white/5 pb-4">
            <h3 class="text-lg font-bold text-white flex items-center gap-2">
                <i data-feather="server" class="w-4 h-4 text-secondary"></i> Uploaded Assets
            </h3>
            <div class="flex items-center gap-3">
                <span id="fileCountBadge" class="text-[10px] uppercase tracking-widest font-bold bg-white/10 text-gray-300 px-3 py-1.5 rounded-full">0 Files</span>
                <button id="copyAllBtn" class="hidden btn-liquid-glow py-1.5 px-4 text-[11px] h-auto shadow-none group">
                    <i data-feather="copy" class="w-3 h-3 group-hover:scale-110 transition-transform"></i> Copy All URLs
                </button>
            </div>
        </div>

        <div id="filesList" class="space-y-3 max-h-[300px] overflow-y-auto hide-scrollbar pr-1">
            </div>

    </div>

    <div id="toastContainer"></div>

    <script>
        // Initialize Icons
        feather.replace();

        // Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const filesList = document.getElementById('filesList');
        const filesHeader = document.getElementById('filesHeader');
        const fileCountBadge = document.getElementById('fileCountBadge');
        const copyAllBtn = document.getElementById('copyAllBtn');

        // Global State
        let uploadedFiles = [];

        // Drag & Drop Events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.add('border-primary', 'bg-primary/5');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => {
                dropZone.classList.remove('border-primary', 'bg-primary/5');
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            handleFiles(files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
            this.value = ''; // Reset input
        });

        // Click on dropzone opens file picker
        dropZone.addEventListener('click', (e) => {
            if (e.target.tagName !== 'BUTTON') {
                fileInput.click();
            }
        });

        async function handleFiles(files) {
            const imageFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            
            if (imageFiles.length === 0) {
                showToast("Please select valid image files.", "error");
                return;
            }

            filesHeader.classList.remove('hidden');

            for (const file of imageFiles) {
                const fileId = 'file-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
                const fileExt = file.name.split('.').pop().toUpperCase();
                
                // Read local file for preview
                const localPreview = await getBase64(file);

                const itemHtml = `
                    <div id="${fileId}" class="flex flex-col sm:flex-row items-start sm:items-center gap-4 bg-white/[0.02] border border-white/5 p-4 rounded-2xl transition-all hover:bg-white/[0.04]">
                        <div class="w-16 h-16 rounded-xl bg-black/50 border border-white/10 overflow-hidden shrink-0 flex items-center justify-center relative group">
                            <img src="${localPreview}" class="w-full h-full object-cover opacity-50" />
                            <div class="absolute inset-0 flex items-center justify-center">
                                <i data-feather="loader" class="w-5 h-5 text-white animate-spin loader-icon"></i>
                            </div>
                        </div>
                        
                        <div class="flex-1 min-w-0 w-full">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-sm font-bold text-white truncate">${file.name}</span>
                                <span class="text-[9px] font-bold uppercase tracking-widest text-gray-500 bg-black/50 px-2 py-0.5 rounded border border-white/5">${fileExt} -> WEBP</span>
                            </div>
                            <div class="relative w-full">
                                <input type="text" id="url-${fileId}" class="w-full input-dark rounded-xl px-3 py-2 text-xs font-mono text-gray-400 placeholder-gray-600" value="Optimizing & Uploading..." readonly>
                            </div>
                        </div>

                        <div class="shrink-0 w-full sm:w-auto mt-2 sm:mt-0 flex gap-2">
                            <button id="copy-${fileId}" class="w-full sm:w-auto btn-hero-glass py-2.5 px-4 text-xs disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                <i data-feather="copy" class="w-3.5 h-3.5"></i> Copy URL
                            </button>
                        </div>
                    </div>
                `;
                
                filesList.insertAdjacentHTML('afterbegin', itemHtml);
                feather.replace();

                // 2. Upload with optimization to WordPress
                try {
                    const finalUrl = await uploadToServer(file, fileId);
                    
                    // 3. Update UI on Success
                    document.querySelector(`#${fileId} img`).classList.remove('opacity-50');
                    document.querySelector(`#${fileId} .loader-icon`).remove();
                    
                    const urlInput = document.getElementById(`url-${fileId}`);
                    urlInput.value = finalUrl;
                    urlInput.classList.add('text-primary');

                    const copyBtn = document.getElementById(`copy-${fileId}`);
                    copyBtn.disabled = false;
                    copyBtn.onclick = () => copyToClipboard(finalUrl, copyBtn);
                    
                    uploadedFiles.push(finalUrl);
                    updateCount();

                } catch (error) {
                    document.querySelector(`#${fileId} .loader-icon`).setAttribute('data-feather', 'alert-circle');
                    document.querySelector(`#${fileId} .loader-icon`).classList.remove('animate-spin');
                    document.querySelector(`#${fileId} .loader-icon`).classList.add('text-red-500');
                    document.getElementById(`url-${fileId}`).value = error.message || "Upload failed.";
                    feather.replace();
                    showToast(`Failed to upload ${file.name}`, "error");
                }
            }
        }

        // ==========================================
        // OPTIMIZER & WORDPRESS UPLOAD LOGIC
        // ==========================================
        window.compressImageBase64 = (base64Str, filename) => {
            return new Promise((resolve) => {
                const ext = filename.split('.').pop().toLowerCase();
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX_SIZE = 2500;
                    if (width > MAX_SIZE || height > MAX_SIZE) {
                        if (width > height) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                        else { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const newDataUrl = canvas.toDataURL('image/webp', 0.85);
                    const newBase64 = newDataUrl.split(',')[1];
                    const newName = filename.replace(/\.(png|jpe?g)$/i, ".webp");
                    resolve({ name: newName, content: newBase64 });
                };
                img.onerror = () => resolve({ name: filename, content: base64Str });
                img.src = base64Str.includes('data:') ? base64Str : `data:image/${ext === 'jpg' ? 'jpeg' : ext};base64,${base64Str}`;
            });
        };

        const getMimeType = (filename) => {
            const ext = filename.split('.').pop().toLowerCase();
            const mimes = { png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg', webp: 'image/webp', gif: 'image/gif', svg: 'image/svg+xml' };
            return mimes[ext] || 'application/octet-stream';
        };

        const b64toBlob = (b64Data, contentType='') => {
            const byteCharacters = atob(b64Data);
            const byteArrays = [];
            for (let offset = 0; offset < byteCharacters.length; offset += 512) {
                const slice = byteCharacters.slice(offset, offset + 512);
                const byteNumbers = new Array(slice.length);
                for (let i = 0; i < slice.length; i++) {
                    byteNumbers[i] = slice.charCodeAt(i);
                }
                byteArrays.push(new Uint8Array(byteNumbers));
            }
            return new Blob(byteArrays, {type: contentType});
        };

        async function uploadToServer(file, fileId) {
            let base64Data = await getBase64(file);
            if (base64Data.includes('base64,')) base64Data = base64Data.split('base64,')[1];
            
            let ext = file.name.split('.').pop().toLowerCase();
            let baseName = file.name.substring(0, file.name.lastIndexOf('.'));
            
            // Optimize PNG/JPG to WebP specifically for WordPress scale
            if (file.name.match(/\.(png|jpe?g)$/i)) {
                const optResult = await window.compressImageBase64(base64Data, file.name);
                base64Data = optResult.content;
                ext = 'webp';
                baseName = optResult.name.replace('.webp', '');
            }
            
            const uniqueHash = Date.now().toString(36) + Math.random().toString(36).substring(2, 6);
            const wpFileName = `${baseName}-${uniqueHash}.${ext}`.replace(/[^a-zA-Z0-9.-]/g, '-');
            
            const blob = b64toBlob(base64Data, getMimeType(wpFileName));
            
            // WordPress REST API details
            const WP_URL = "https://reputifly3.sg-host.com/wp-json/wp/v2/media";
            const WP_AUTH = "Basic " + btoa("julian:6ZMS Y66m DHcE Ghgr pGH3 HKVh");

            const wpRes = await fetch(WP_URL, {
                method: "POST",
                headers: {
                    "Authorization": WP_AUTH,
                    "Content-Disposition": `attachment; filename="${wpFileName}"`
                },
                body: blob
            });
            
            if (!wpRes.ok) {
                throw new Error("WP Upload Failed (Check CORS or Auth).");
            }
            
            const wpData = await wpRes.json();
            return wpData.source_url;
        }

        // Helpers
        function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function updateCount() {
            fileCountBadge.innerText = `${uploadedFiles.length} File${uploadedFiles.length !== 1 ? 's' : ''}`;
            if (uploadedFiles.length > 1) {
                copyAllBtn.classList.remove('hidden');
                copyAllBtn.classList.add('flex');
            }
        }

        copyAllBtn.addEventListener('click', function() {
            if (uploadedFiles.length === 0) return;
            navigator.clipboard.writeText(uploadedFiles.join('\n'));
            const originalHtml = this.innerHTML;
            this.innerHTML = '<i data-feather="check" class="w-3 h-3 text-green-400"></i> Copied All!';
            this.classList.add('text-green-400');
            feather.replace();
            
            setTimeout(() => {
                this.innerHTML = originalHtml;
                this.classList.remove('text-green-400');
                feather.replace();
            }, 2000);
        });

        function copyToClipboard(text, btnElement) {
            navigator.clipboard.writeText(text);
            const originalHtml = btnElement.innerHTML;
            btnElement.innerHTML = '<i data-feather="check" class="w-3.5 h-3.5 text-green-400"></i> Copied';
            btnElement.classList.add('border-green-500/50', 'text-green-400');
            feather.replace();
            
            setTimeout(() => {
                btnElement.innerHTML = originalHtml;
                btnElement.classList.remove('border-green-500/50', 'text-green-400');
                feather.replace();
            }, 2000);
        }

        // Global Toast System
        window.showToast = (message, type = 'success') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            let icon = 'check-circle';
            let iconColor = 'text-green-400';
            if (type === 'error') { icon = 'alert-circle'; iconColor = 'text-red-400'; }

            toast.innerHTML = `
                <i data-feather="${icon}" class="w-5 h-5 ${iconColor} shrink-0"></i>
                <p class="text-sm font-medium text-gray-200 leading-relaxed">${message}</p>
            `;

            container.appendChild(toast);
            feather.replace();

            requestAnimationFrame(() => {
                setTimeout(() => toast.classList.add('show'), 10);
            });

            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 4000);
        };
    </script>
</body>
</html>
