<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reputifly | Command Center</title>
    
    <link rel="icon" type="image/png" href="https://media.licdn.com/dms/image/v2/D560BAQEScnUkJITXAg/company-logo_200_200/B56ZajOckKHsAI-/0/1746495195792?e=2147483647&v=beta&t=Z7yQpp5jSwm-De46D45WIC5fY_2w0GVgEWLoEOM1aug">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/feather-icons"></script>

    <style>
        :root {
            --bg-deep: #0B0A14;
            --accent-primary: #E6397F;
            --accent-secondary: #FF8A00;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(20px);
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(230, 57, 127, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(255, 138, 0, 0.05), transparent 25%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden; 
        }

        h1, h2, h3, h4, h5, h6, .font-display { font-family: 'Space Grotesk', sans-serif; }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }

        .btn-gradient {
            background: linear-gradient(135deg, var(--accent-primary) 0%, var(--accent-secondary) 100%);
            color: white;
            transition: all 0.3s ease;
        }
        .btn-gradient:hover { box-shadow: 0 10px 20px -10px rgba(230, 57, 127, 0.5); transform: translateY(-1px); }
        .btn-gradient:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.2s ease;
        }
        .btn-glass:hover, .btn-glass.active {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .btn-glass.active {
            border-color: var(--accent-primary);
            color: #F9A8D4;
        }

        /* Mobile Scrollbar hiding for variant tabs */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Loader */
        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Sliding Drawer */
        #override-drawer {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #override-drawer.open { transform: translateX(0); }

        .code-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            color: #10B981;
            font-family: monospace;
            font-size: 13px;
        }
        .code-input:focus { outline: none; border-color: var(--accent-primary); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <nav class="h-16 border-b border-white/10 bg-black/40 backdrop-blur-md flex items-center justify-between px-4 lg:px-6 flex-shrink-0 z-20">
        <div class="flex items-center gap-3">
            <img src="https://reputifly.com/wp-content/uploads/2025/05/cropped-reputifly-new-e1746390492876.png" alt="Reputifly" class="h-6 opacity-80">
            <div class="h-4 w-px bg-white/20 hidden lg:block"></div>
            <span class="font-display font-bold text-sm tracking-widest text-gray-300 uppercase hidden lg:inline">Command Center</span>
        </div>
        <div id="status-badge" class="flex items-center gap-2 text-[10px] lg:text-xs font-mono text-yellow-400 bg-yellow-400/10 px-3 py-1.5 rounded-full border border-yellow-400/20">
            <div class="w-2 h-2 rounded-full bg-yellow-400 animate-pulse"></div> Loading Data...
        </div>
    </nav>

    <div class="flex flex-col lg:flex-row flex-1 overflow-hidden relative">
        
        <main class="flex-1 flex flex-col relative bg-[#05050A] w-full h-full">
            
            <div id="controls-header" class="lg:h-20 p-4 lg:p-0 border-b border-white/10 flex flex-col lg:flex-row items-center justify-between lg:px-6 glass-panel rounded-none border-t-0 border-l-0 border-r-0 opacity-50 pointer-events-none transition-opacity duration-300 z-10 gap-4 lg:gap-0">
                
                <div class="flex flex-col text-center lg:text-left w-full lg:w-auto">
                    <h3 id="preview-biz-name" class="font-display font-bold text-xl text-white truncate">Initializing...</h3>
                    <p id="preview-industry" class="text-xs text-gray-400 truncate">Fetching from server</p>
                </div>

                <div class="flex items-center gap-2 p-1 bg-white/5 rounded-lg border border-white/10 w-full lg:w-auto overflow-x-auto hide-scrollbar justify-start lg:justify-center">
                    <button class="btn-glass active px-4 py-2 lg:py-1.5 rounded-md text-sm font-medium whitespace-nowrap" onclick="switchVariant(0, this)">Variant 1</button>
                    <button class="btn-glass px-4 py-2 lg:py-1.5 rounded-md text-sm font-medium whitespace-nowrap" onclick="switchVariant(1, this)">Variant 2</button>
                    <button class="btn-glass px-4 py-2 lg:py-1.5 rounded-md text-sm font-medium whitespace-nowrap" onclick="switchVariant(2, this)">Variant 3</button>
                    <button class="btn-glass px-4 py-2 lg:py-1.5 rounded-md text-sm font-medium whitespace-nowrap" onclick="switchVariant(3, this)">Variant 4</button>
                    <button class="btn-glass px-4 py-2 lg:py-1.5 rounded-md text-sm font-medium whitespace-nowrap" onclick="switchVariant(4, this)">Variant 5</button>
                </div>

                <button id="btn-approve" onclick="approveCurrentVariant()" class="btn-gradient w-full lg:w-auto px-6 py-3 lg:py-2.5 rounded-lg font-display font-bold text-sm flex items-center justify-center gap-2 shadow-lg">
                    <i data-feather="zap" class="w-4 h-4"></i> Approve & Deploy
                </button>

            </div>

            <div class="flex-1 p-2 lg:p-6 overflow-hidden">
                <div class="w-full h-full rounded-xl overflow-hidden border border-white/10 bg-white shadow-2xl relative">
                    <iframe id="preview-frame" class="w-full h-full border-none opacity-0 transition-opacity duration-500"></iframe>
                </div>
            </div>

            <div id="override-drawer" class="absolute top-0 right-0 bottom-0 w-full lg:w-[500px] glass-panel rounded-none border-t-0 border-r-0 border-b-0 shadow-2xl z-30 flex flex-col bg-[#0B0A14]">
                <div class="p-4 lg:p-6 border-b border-white/10 flex justify-between items-center bg-red-500/10">
                    <div>
                        <h2 class="font-display font-bold text-lg lg:text-xl text-red-400 flex items-center gap-2">
                            <i data-feather="alert-triangle" class="w-5 h-5"></i> AI Generation Failed
                        </h2>
                        <p id="fail-reason" class="text-xs text-gray-300 mt-1">Manual Override Required</p>
                    </div>
                    <button onclick="closeOverride()" class="text-gray-400 hover:text-white p-2">
                        <i data-feather="x" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="flex-1 overflow-y-auto p-4 lg:p-6 flex flex-col gap-6">
                    <div>
                        <div class="flex justify-between items-end mb-2">
                            <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">1. Copy Prompt</label>
                            <button onclick="copyPrompt()" class="text-xs text-pink-400 hover:text-pink-300 flex items-center gap-1 font-mono bg-pink-500/10 px-2 py-1 rounded">
                                <i data-feather="copy" class="w-3 h-3"></i> Copy
                            </button>
                        </div>
                        <textarea id="override-prompt" class="w-full h-40 lg:h-48 code-input rounded-lg p-3 text-gray-400" readonly></textarea>
                    </div>

                    <div class="flex-1 flex flex-col">
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">2. Paste Gemini JSON</label>
                        <textarea id="override-json" class="w-full flex-1 code-input rounded-lg p-3 text-green-400" placeholder="Paste the ```json block here..."></textarea>
                    </div>
                </div>

                <div class="p-4 lg:p-6 border-t border-white/10 bg-black/40">
                    <button onclick="forceManualDeploy()" id="btn-force" class="w-full btn-gradient px-6 py-4 rounded-lg font-display font-bold text-sm flex items-center justify-center gap-2">
                        <i data-feather="upload-cloud" class="w-5 h-5"></i> Force Push to Live
                    </button>
                </div>
            </div>

            <div id="loading-overlay" class="absolute inset-0 bg-black/90 backdrop-blur-md z-40 hidden flex-col items-center justify-center text-center p-6">
                <div id="loading-spinner" class="spinner mb-6 w-12 h-12 border-4 border-pink-500/30 border-t-pink-500"></div>
                <div id="success-icon" class="hidden mb-6 text-green-400"><i data-feather="check-circle" class="w-16 h-16 mx-auto"></i></div>
                <h3 id="loading-text" class="font-display font-bold text-2xl text-white">AI is writing content...</h3>
                <p id="loading-sub" class="text-sm text-gray-400 mt-2">Connecting to Gemini 1.5 Flash</p>
                <a id="live-link" href="#" target="_blank" class="hidden mt-6 btn-gradient px-8 py-3 rounded-lg font-bold">View Live Site</a>
            </div>

        </main>
    </div>

    <script>
        feather.replace();

        // ** REPLACE WITH YOUR FIREBASE REGION URL **
        const API_BASE = "[https://asia-southeast1-reputifly-automation.cloudfunctions.net](https://asia-southeast1-reputifly-automation.cloudfunctions.net)";
        
        let currentProject = null;
        let activeVariantIndex = 0;
        let failedRawHtml = ""; // Stores HTML if AI fails so we can do manual merge

        // On Load: Extract ?folder= from URL
        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const folderId = urlParams.get('folder');

            if (!folderId) {
                setStatus("Error: No folder specified in URL", "red");
                return;
            }

            try {
                // Fetch all pending projects from our new API
                const res = await fetch(`${API_BASE}/getPendingProjects`);
                const data = await res.json();

                if (!data.success) throw new Error(data.error);

                // Find the specific project
                currentProject = data.projects.find(p => p.id === folderId);

                if (!currentProject) {
                    setStatus("Project not found or already deployed.", "red");
                    document.getElementById('preview-biz-name').innerText = "Not Found";
                    return;
                }

                // Unlock UI
                setStatus("System Online", "green");
                document.getElementById('controls-header').classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('preview-biz-name').innerText = currentProject.businessName;
                document.getElementById('preview-industry').innerText = currentProject.industry;

                // Load Variant 1
                renderIframe();

            } catch (err) {
                setStatus("API Connection Failed", "red");
                console.error(err);
            }
        };

        function setStatus(text, color) {
            const badge = document.getElementById('status-badge');
            badge.innerHTML = `<div class="w-2 h-2 rounded-full bg-${color}-400 ${color === 'green' ? '' : 'animate-pulse'}"></div> ${text}`;
            badge.className = `flex items-center gap-2 text-[10px] lg:text-xs font-mono text-${color}-400 bg-${color}-400/10 px-3 py-1.5 rounded-full border border-${color}-400/20`;
        }

        // --- PREVIEW LOGIC ---
        function switchVariant(index, btnElement) {
            activeVariantIndex = index;
            const btns = btnElement.parentElement.querySelectorAll('.btn-glass');
            btns.forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            renderIframe();
        }

        function renderIframe() {
            if (!currentProject || !currentProject.previewVariants) return;
            const iframe = document.getElementById('preview-frame');
            iframe.style.opacity = '0'; // fade out
            setTimeout(() => {
                iframe.srcdoc = currentProject.previewVariants[activeVariantIndex];
                iframe.onload = () => iframe.style.opacity = '1'; // fade in
            }, 200);
        }

        // --- DEPLOYMENT LOGIC ---
        async function approveCurrentVariant() {
            if (!currentProject) return;
            
            showLoading(true, "AI is writing content...", "Do not close this window. Pushing to GitHub...");

            try {
                const res = await fetch(`${API_BASE}/approveSample`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        folder: currentProject.id,
                        chosenIndex: activeVariantIndex
                    })
                });

                const data = await res.json();

                if (data.success) {
                    // 🎉 SUCCESS!
                    showSuccess(data.url);
                } else if (data.rawHtml) {
                    // ⚠️ AI FAILED. Trigger Manual Override.
                    showLoading(false);
                    failedRawHtml = data.rawHtml; 
                    triggerOverrideUI(data.reason);
                } else {
                    // Hard error
                    throw new Error(data.error || "Unknown Error");
                }
            } catch (err) {
                showLoading(false);
                alert("Critical Error communicating with server: " + err.message);
            }
        }

        // --- FAILSAFE MANUAL OVERRIDE ---
        function triggerOverrideUI(reason) {
            document.getElementById('fail-reason').innerText = "Reason: " + (reason || "Hallucination / Timeout");
            
            // Generate the exact prompt dynamically in the browser to ensure ID mapping matches
            const prompt = generatePromptFromHtml(failedRawHtml, currentProject.businessName, currentProject.industry, currentProject.notes);
            document.getElementById('override-prompt').value = prompt;
            
            document.getElementById('override-drawer').classList.add('open');
        }

        function closeOverride() {
            document.getElementById('override-drawer').classList.remove('open');
        }

        async function forceManualDeploy() {
            const jsonStr = document.getElementById('override-json').value.trim();
            if (!jsonStr) return alert("Please paste the JSON output from Gemini first.");

            const btn = document.getElementById('btn-force');
            btn.innerHTML = '<div class="spinner w-5 h-5 border-2"></div> Pushing to GitHub...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/manualDeploy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        folder: currentProject.id,
                        rawHtml: failedRawHtml,
                        jsonString: jsonStr
                    })
                });

                const data = await res.json();
                if (data.success) {
                    closeOverride();
                    showSuccess(data.url);
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                alert("Manual Deploy Failed: " + err.message);
                btn.innerHTML = '<i data-feather="upload-cloud" class="w-5 h-5"></i> Force Push to Live';
                btn.disabled = false;
                feather.replace();
            }
        }

        // --- HELPER FUNCTIONS ---
        function showLoading(show, title = "", sub = "") {
            const overlay = document.getElementById('loading-overlay');
            if (show) {
                document.getElementById('loading-text').innerText = title;
                document.getElementById('loading-sub').innerText = sub;
                document.getElementById('loading-spinner').style.display = 'block';
                document.getElementById('success-icon').style.display = 'none';
                document.getElementById('live-link').style.display = 'none';
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
            }
        }

        function showSuccess(url) {
            const overlay = document.getElementById('loading-overlay');
            document.getElementById('loading-spinner').style.display = 'none';
            document.getElementById('success-icon').style.display = 'block';
            document.getElementById('loading-text').innerText = "Deployment Successful!";
            document.getElementById('loading-sub').innerText = "The site is now live on GitHub.";
            
            const link = document.getElementById('live-link');
            link.href = url;
            link.style.display = 'inline-block';
            
            overlay.style.display = 'flex';
        }

        function copyPrompt() {
            const prompt = document.getElementById('override-prompt');
            prompt.select();
            document.execCommand('copy');
            alert("Prompt Copied!");
        }

        // DOM Parser for Failsafe Prompt Generation
        function generatePromptFromHtml(html, name, industry, notes) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, "text/html");
            const map = { texts: {}, images: {} };

            let tIdx = 0;
            doc.querySelectorAll('h1, h2, h3, h4, p, li, a.btn, a.button, blockquote, [class*="title"], [class*="subtitle"], [class*="kicker"], [class*="badgeText"]').forEach(el => {
                if (el.querySelector('div, section, article')) return;
                let innerTxt = el.innerHTML;
                if (!innerTxt) return;
                innerTxt = innerTxt.trim().replace(/\s+/g, ' ');
                if (innerTxt.length > 2) map.texts[`txt_${tIdx++}`] = innerTxt;
            });

            let iIdx = 0;
            doc.querySelectorAll('img').forEach(img => {
                if (img.classList.contains('logo') || (img.src && (img.src.includes('logo') || img.src.includes('pravatar')))) return;
                map.images[`img_${iIdx++}`] = "context_placeholder";
            });

            return `You are an expert web designer and copywriter. Rewrite this website's content.

BUSINESS: ${name}
INDUSTRY: ${industry}
EXTRA NOTES: ${notes}

STRICT FORMATTING RULES:
1. Return ONLY a valid JSON object wrapped in a \`\`\`json block.
2. NO LITERAL NEWLINES inside strings. Use "<br>" for line breaks.
3. UNIQUE IMAGES (ANTI-CAT RULE): For each "img_X" key, provide EXACTLY ONE BROAD NOUN (e.g., "house", "tools", "water"). Do NOT use phrases. Do NOT repeat words.
4. THEME ROUNDING: Based on the industry vibe, provide a "rounding" value. Use "30px" (friendly), "12px" (modern), or "0px" (sharp).

JSON STRUCTURE TO RETURN:
{
  "theme": { "rounding": "12px" },
  "texts": ${JSON.stringify(map.texts, null, 2)},
  "images": ${JSON.stringify(map.images, null, 2)}
}`;
        }
    </script>
</body>
</html>
