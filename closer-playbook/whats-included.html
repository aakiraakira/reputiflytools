<!doctype html><html lang="en"><head><meta charset="utf-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;box-sizing:border-box}
body{width:1080px;height:1350px;background:#f7f8fa;font-family:"Inter",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-0.02em;color:#0a0a0a;overflow:hidden}
.card{position:absolute;inset:48px;background:#fff;border-radius:40px;box-shadow:0 24px 64px rgba(16,24,40,.10);padding:64px 64px 56px;display:flex;flex-direction:column}
.logo{height:54px;width:auto;align-self:flex-start;margin-bottom:46px}
.kicker{font-size:24px;font-weight:700;color:#007aff;letter-spacing:.02em;text-transform:uppercase;margin-bottom:14px}
h1{font-size:62px;font-weight:800;line-height:1.05;letter-spacing:-0.03em;margin-bottom:8px}
h1 .price{color:#007aff}
.sub{font-size:26px;color:#6b7280;font-weight:500;margin-bottom:42px}
.list{display:flex;flex-direction:column;gap:21px;flex:1}
.row{display:flex;align-items:flex-start;gap:22px}
.tick{width:46px;height:46px;border-radius:50%;background:#e9f7ee;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tick svg{width:26px;height:26px}
.row .t{font-size:30px;font-weight:600;letter-spacing:-0.02em;line-height:46px}
.row .t b{font-weight:800}
.row .t .eg{font-weight:500;color:#9ca3af}
.foot{display:flex;gap:16px;margin-top:38px}
.chip{flex:1;background:#f3f4f6;border-radius:20px;padding:22px 14px;text-align:center}
.chip .big{font-size:29px;font-weight:800;color:#0a0a0a;letter-spacing:-0.02em}
.chip.blue{background:#e9f2ff}.chip.blue .big{color:#007aff}
.chip .sm{font-size:17px;font-weight:600;color:#6b7280;margin-top:4px}
</style></head>
<body><div class="card">
<img class="logo" src="reputifly-logo.png"/>
<div class="kicker">Website Package</div>
<h1>Everything In Your <span class="price">$590</span> Website</h1>
<div class="sub">a real, full website. built live. before you pay.</div>
<div class="list" id="list"></div>
<div class="foot">
  <div class="chip blue"><div class="big">$590</div><div class="sm">all in</div></div>
  <div class="chip"><div class="big">5 Days</div><div class="sm">to live</div></div>
  <div class="chip"><div class="big">1 Year</div><div class="sm">free hosting + domain</div></div>
</div>
</div>
<script>
var full=new URLSearchParams(location.search).get("seo")==="full";
var items=[
  "A Full *Multi-Page Website*",
  "Mobile-Responsive Design",
  "Contact Form + WhatsApp Button",
  full ? "*Full SEO Setup*" : "Basic SEO Setup",
  "1 Year *Free Hosting* + Domain Name",
  "*Free Business Email* §(you@yourbiz.com)§",
  "*3 Rounds* Of Revisions"
];
var tick='<svg viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7.5" stroke="#34c759" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
document.getElementById("list").innerHTML=items.map(function(t){
  var h=t.replace(/\*([^*]+)\*/g,"<b>$1</b>").replace(/§([^§]+)§/g,'<span class="eg">$1</span>');
  return '<div class="row"><div class="tick">'+tick+'</div><div class="t">'+h+'</div></div>';
}).join("");
</script>
</body></html>
