<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" role="img" font-family="Inter, system-ui, -apple-system, sans-serif">
<title>The close decision tree</title>
<desc>Sample sent, then the buy signal, then the mandatory step of saying the price, then one question: can he say yes himself. Yes goes to invoice, no goes to a five minute call. Never ask for the invoice before the price is said.</desc>

<g>
  <rect x="90" y="20" width="220" height="52" rx="12" fill="#F1EFE8" stroke="#B4B2A9"/>
  <text x="200" y="45" text-anchor="middle" font-size="18" font-weight="500" fill="#2C2C2A">sample sent</text>
  <text x="200" y="64" text-anchor="middle" font-size="14" fill="#5F5E5A">you send the live link</text>
</g>
<path d="M200 72 L200 90" stroke="#B4B2A9" stroke-width="2"/>
<path d="M195 85 L200 92 L205 85" fill="none" stroke="#B4B2A9" stroke-width="2"/>

<g>
  <rect x="30" y="94" width="340" height="52" rx="12" fill="#E1F5EE" stroke="#5DCAA5"/>
  <text x="200" y="119" text-anchor="middle" font-size="18" font-weight="500" fill="#04342C">he likes it, or wants changes</text>
  <text x="200" y="138" text-anchor="middle" font-size="14" fill="#0F6E56">this is the buy signal</text>
</g>
<path d="M200 146 L200 164" stroke="#B4B2A9" stroke-width="2"/>
<path d="M195 159 L200 166 L205 159" fill="none" stroke="#B4B2A9" stroke-width="2"/>

<g>
  <rect x="20" y="168" width="360" height="72" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="2"/>
  <text x="200" y="196" text-anchor="middle" font-size="19" font-weight="500" fill="#26215C">say the price. always.</text>
  <text x="200" y="217" text-anchor="middle" font-size="14" fill="#534AB7">$590 all in, what's included,</text>
  <text x="200" y="233" text-anchor="middle" font-size="14" fill="#534AB7">and the tweaks are included</text>
</g>
<path d="M200 240 L200 258" stroke="#B4B2A9" stroke-width="2"/>
<path d="M195 253 L200 260 L205 253" fill="none" stroke="#B4B2A9" stroke-width="2"/>

<text x="200" y="278" text-anchor="middle" font-size="15" font-weight="500" fill="#2C2C2A">can he say yes right now, on his own?</text>

<g>
  <rect x="20" y="292" width="360" height="92" rx="12" fill="#E1F5EE" stroke="#5DCAA5"/>
  <rect x="34" y="304" width="38" height="20" rx="10" fill="#1D9E75"/>
  <text x="53" y="318" text-anchor="middle" font-size="12" font-weight="500" fill="#FFFFFF">yes</text>
  <text x="200" y="341" text-anchor="middle" font-size="18" font-weight="500" fill="#04342C">he can say yes himself</text>
  <text x="200" y="360" text-anchor="middle" font-size="14" fill="#0F6E56">"shall we get started? just need</text>
  <text x="200" y="376" text-anchor="middle" font-size="14" fill="#0F6E56">your company name" &#8594; invoice, 70/30</text>
</g>

<g>
  <rect x="20" y="396" width="360" height="92" rx="12" fill="#E1F5EE" stroke="#5DCAA5"/>
  <rect x="34" y="408" width="34" height="20" rx="10" fill="#0F6E56"/>
  <text x="51" y="422" text-anchor="middle" font-size="12" font-weight="500" fill="#FFFFFF">no</text>
  <text x="200" y="445" text-anchor="middle" font-size="18" font-weight="500" fill="#04342C">someone else has to say yes</text>
  <text x="200" y="464" text-anchor="middle" font-size="14" fill="#0F6E56">"perfect, quick 5 min call to clarify</text>
  <text x="200" y="480" text-anchor="middle" font-size="14" fill="#0F6E56">a few things" &#8594; close on the call</text>
</g>

<g>
  <rect x="20" y="510" width="360" height="66" rx="12" fill="#FCEBEB" stroke="#F09595" stroke-width="2"/>
  <text x="200" y="536" text-anchor="middle" font-size="17" font-weight="500" fill="#501313">never ask for the invoice</text>
  <text x="200" y="558" text-anchor="middle" font-size="17" font-weight="500" fill="#501313">before the price is said</text>
</g>
</svg>
