<style>
:root{
  --color-canvas:#f7f8fa;--color-surface:#ffffff;--color-surface-2:#f3f4f6;--color-surface-3:#eceef1;
  --color-ink:#0a0a0a;--color-ink-2:#3f4754;--color-muted:#6b7280;--color-faint:#9ca3af;
  --color-line:#e8eaed;--color-line-2:#dfe2e7;
  --color-primary:#007aff;--color-primary-hover:#0a6fe0;--color-primary-active:#0563cc;--color-primary-soft:#e9f2ff;--color-on-primary:#ffffff;
  --color-success:#34c759;--color-warn:#ff9500;--color-danger:#ff3b30;--color-danger-hover:#e11d0f;
  --radius-pill:9999px;--radius-lg:20px;--radius-md:14px;--radius-sm:12px;--radius-xs:9px;
  --shadow-xs:0 1px 2px rgba(16,24,40,.04);--shadow-sm:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-md:0 4px 12px rgba(16,24,40,.08),0 2px 4px rgba(16,24,40,.04);--shadow-lg:0 12px 32px rgba(16,24,40,.12),0 4px 8px rgba(16,24,40,.06);
  --shadow-focus:0 0 0 3px rgba(0,122,255,.28);--ease:cubic-bezier(0.25,0.8,0.25,1);
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
html,body{margin:0;min-height:100vh;min-height:100dvh}
html{background:var(--color-canvas);color:var(--color-ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-feature-settings:"cv02","cv03","cv04","cv11"}
body{margin:0;font-size:14px;line-height:1.5;letter-spacing:-0.006em;color:var(--color-ink);background:var(--color-canvas);overflow-x:hidden}
*{box-sizing:border-box}
::selection{background:rgba(0,122,255,.16)}
h1,h2,h3,h4{letter-spacing:-0.02em;font-weight:700;margin:0}
button{font-family:inherit}
:focus{outline:none}
button:focus-visible,[tabindex]:focus-visible{box-shadow:var(--shadow-focus);border-radius:var(--radius-xs)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 20px;border-radius:var(--radius-pill);border:1px solid transparent;font-size:14px;font-weight:600;letter-spacing:-0.01em;cursor:pointer;user-select:none;white-space:nowrap;transition:background-color .18s var(--ease),border-color .18s var(--ease),color .18s var(--ease),transform .12s var(--ease),box-shadow .18s var(--ease)}
.btn:active{transform:translateY(0.5px) scale(0.99)}
.btn--primary{background:var(--color-primary);color:var(--color-on-primary);box-shadow:var(--shadow-xs)}
.btn--primary:hover{background:var(--color-primary-hover)}
.card{background:var(--color-surface);border:1px solid var(--color-line);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm)}
.list-row{position:relative;background:var(--color-surface);transition:background-color .13s var(--ease);cursor:pointer}
@keyframes rf-pop-in{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes rf-fade-in{from{opacity:0}to{opacity:1}}
.rf-pop-in{animation:rf-pop-in .22s var(--ease)}
.rf-fade-in{animation:rf-fade-in .2s var(--ease)}
@media (prefers-reduced-motion:reduce){.rf-pop-in,.rf-fade-in{animation:none}}

.wrap{max-width:560px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--color-canvas)}
.appbar{position:sticky;top:0;z-index:20;height:60px;display:flex;align-items:center;gap:12px;padding:0 16px;background:rgba(255,255,255,.86);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--color-line)}
.branddot{width:26px;height:26px;border-radius:8px;background:var(--color-primary);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0}
.appbar h1{font-size:16px;font-weight:700}
.appbar .sub{font-size:11.5px;color:var(--color-muted);font-weight:500;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:230px}
.stage{flex:1;padding:16px 16px 40px}
.menu{display:flex;flex-direction:column;gap:8px}
.srow{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:14px 14px;border:1px solid var(--color-line);border-radius:var(--radius-md);background:var(--color-surface);box-shadow:var(--shadow-xs);cursor:pointer;transition:background-color .13s var(--ease),border-color .13s var(--ease),transform .12s var(--ease)}
.srow:hover{background:var(--color-surface-2)}
.srow:active{transform:scale(.992)}
.srow .ic{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--color-primary-soft)}
.srow .tx{flex:1;min-width:0}
.srow .tt{font-size:14.5px;font-weight:600;letter-spacing:-0.01em}
.srow .ds{font-size:12.5px;color:var(--color-muted);margin-top:1px}
.srow .arw{color:var(--color-faint);flex-shrink:0}
.grouplabel{font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--color-faint);margin:14px 4px 6px}
.grouplabel:first-of-type{margin-top:2px}

.back{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px 0 8px;border-radius:var(--radius-pill);background:var(--color-surface-2);color:var(--color-ink-2);font-size:13px;font-weight:600;border:none;cursor:pointer;margin-bottom:14px}
.back:hover{background:var(--color-surface-3)}
.nodehd{font-size:20px;font-weight:800;letter-spacing:-0.02em;line-height:1.25;margin:0 0 4px}
.nodetag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--radius-pill);margin-bottom:12px}
.tag-hot{background:#ffe9e7;color:#c0271c}.tag-warm{background:#fff1de;color:#9a5a00}.tag-cool{background:#e9f2ff;color:var(--color-primary-active)}.tag-dead{background:#f0f1f3;color:#6b7280}
.doblk{display:flex;gap:10px;padding:13px 14px;background:var(--color-primary-soft);border:1px solid #d4e6ff;border-radius:var(--radius-md);margin-bottom:14px}
.doblk .lab{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--color-primary-active);margin-bottom:3px}
.doblk .tx{font-size:13.5px;color:var(--color-ink);line-height:1.5}
.scriptcard{border:1px solid var(--color-line);border-radius:var(--radius-md);overflow:hidden;margin-bottom:12px;background:var(--color-surface)}
.scripthd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 12px;background:var(--color-surface-2);border-bottom:1px solid var(--color-line)}
.scripthd .lbl{font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--color-muted)}
.scriptbody{padding:14px;font-size:14px;line-height:1.62;color:var(--color-ink);white-space:pre-wrap}
.copybtn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border-radius:var(--radius-pill);background:var(--color-primary);color:#fff;border:none;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background-color .15s var(--ease),transform .12s var(--ease)}
.copybtn:hover{background:var(--color-primary-hover)}.copybtn:active{transform:scale(.97)}
.copybtn.ok{background:var(--color-success)}
.fill{background:#fff4c2;border-radius:4px;padding:0 3px;font-weight:600;color:#8a6d00}
.msgnum{font-size:11px;font-weight:700;color:var(--color-primary-active);margin:4px 2px 6px}
.nextlbl{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--color-muted);margin:18px 2px 8px}
.nexts{display:flex;flex-direction:column;gap:8px}
.nextbtn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;padding:12px 14px;border:1px solid var(--color-line-2);border-radius:var(--radius-md);background:var(--color-surface);font-size:13.5px;font-weight:600;color:var(--color-ink);cursor:pointer;transition:background-color .13s var(--ease),border-color .13s var(--ease)}
.nextbtn:hover{background:var(--color-surface-2);border-color:var(--color-primary)}
.nextbtn .arw{color:var(--color-primary);flex-shrink:0}
.note{font-size:12px;color:var(--color-muted);margin-top:14px;padding:10px 12px;background:var(--color-surface-2);border-radius:var(--radius-sm);line-height:1.5}

.scrim{position:fixed;inset:0;z-index:50;background:rgba(10,12,16,.42);display:flex;align-items:flex-end;justify-content:center;animation:rf-fade-in .18s var(--ease)}
@media(min-width:560px){.scrim{align-items:center}}
.sheet{width:100%;max-width:520px;background:var(--color-surface);border-radius:20px 20px 0 0;box-shadow:var(--shadow-lg);padding:8px 18px 26px;animation:rf-pop-in .24s var(--ease)}
@media(min-width:560px){.sheet{border-radius:20px}}
.sheet .grab{width:38px;height:4px;border-radius:9999px;background:var(--color-line-2);margin:8px auto 14px}
.sheet h2{font-size:17px;font-weight:800;margin-bottom:3px}
.sheet .sh-sub{font-size:12.5px;color:var(--color-muted);margin-bottom:16px}
.rl{display:flex;gap:11px;padding:11px 0;border-top:1px solid var(--color-line)}
.rl .n{width:24px;height:24px;border-radius:7px;background:var(--color-danger);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rl .t{font-size:13.5px;line-height:1.45}.rl .t b{font-weight:700}
.redpill{margin-left:auto;display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 13px;border-radius:var(--radius-pill);background:#ffe9e7;color:#c0271c;border:none;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap}
.foot{text-align:center;font-size:11px;color:var(--color-faint);padding:18px 0 26px}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);z-index:80;background:var(--color-ink);color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:var(--radius-pill);box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s var(--ease),transform .2s var(--ease)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <div class="appbar">
    <div class="branddot">R</div>
    <div style="flex:1;min-width:0">
      <h1>Closer Playbook</h1>
      <div class="sub" id="bcrumb">Where are you right now?</div>
    </div>
    <button class="redpill" data-act="redlines">⛔ Red lines</button>
  </div>
  <div class="stage" id="stage"></div>
  <div class="foot">prototype · sample copy, not final — this shows you how it would work</div>
</div>
<div id="toast" class="toast"></div>

<script>
var ARROW = '<svg class="arw" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var COPYICON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 012-2h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';

var MENU = [
  {g:"A new lead just messaged"},
  {id:"newlead", ic:"👋", tt:"New lead — what to open with", ds:"3 openers, pick one"},
  {id:"gotinfo", ic:"🧭", tt:"They told me their business", ds:"now figure out the build"},
  {id:"silent", ic:"🌑", tt:"They're not replying", ds:"one nudge only"},
  {g:"Figuring out what to build"},
  {id:"hassite", ic:"🔁", tt:"They have a website", ds:"redesign — get URL + keep/kill"},
  {id:"nosite", ic:"✨", tt:"No website yet", ds:"new build — 3 quick asks"},
  {id:"store", ic:"🛒", tt:"They want a shop / checkout", ds:"out-ramp — never $590"},
  {g:"Sending the live site"},
  {id:"building", ic:"⚙️", tt:"It's building", ds:"kill the dead air"},
  {id:"reveal", ic:"🚀", tt:"Send them the live site", ds:"the reveal + the ask"},
  {id:"telemetry", ic:"📡", tt:"They saw it — read the reaction", ds:"this replaces “are you urgent?”"},
  {g:"Closing"},
  {id:"close", ic:"✅", tt:"They're ready — close it", ds:"scope-lock → hand to Julian"},
  {id:"price", ic:"💸", tt:"Price pushback / cheaper guy", ds:"the SEO lever — hold $590"},
  {id:"meet", ic:"📞", tt:"They want to meet / call", ds:"hot signal → Google Meet"},
  {id:"followup", ic:"⏳", tt:"Went quiet after seeing it", ds:"7-day decay = the urgency"},
  {g:"Other"},
  {id:"astronaut", ic:"🛰️", tt:"Random question (hosting etc)", ds:"answer THEN redirect"},
  {id:"timewaster", ic:"🚩", tt:"Smells like a time-waster", ds:"the tells + the warm eject"},
  {id:"whois", ic:"🧑", tt:"“Who are you / where's Julian?”", ds:"team-member line"},
];

var NODES = {
  newlead:{title:"New lead — what to open with",tag:null,
    do:"Don't lead with a form-wall — that's what the cheap guys do. Open like a human, get them talking, and tell them you'll build something REAL. Pick the opener that fits — all three get them to tell you their business.",
    scripts:[
      {n:"Option A — warm + human (default)",t:"hey! thanks for reaching out 🙂 i build proper websites for SG businesses — and i'll actually build yours live so you can see the real thing, not just talk about it. quick one to start: what's your business + what do you do?"},
      {n:"Option B — straight to the value",t:"hey! happy to help 🙌 easiest way — tell me your business name + what you do, and i'll build you a real homepage you can actually look at. sound good?"},
      {n:"Option C — if they want specifics",t:`thanks for reaching out! to build you something real, drop me:
1) business name
2) what you do
3) do you already have a website?
and i'll get started`}],
    next:[{l:"They told me their business → figure out the build",to:"gotinfo"},{l:"They went quiet",to:"silent"}]},
  gotinfo:{title:"They told me their business",tag:null,
    do:"Now the one fork that decides everything: do they already have a website, or not? (And catch a store BEFORE you build anything.)",
    scripts:[],
    next:[{l:"They HAVE a website → redesign",to:"hassite"},{l:"NO website → new build",to:"nosite"},{l:"They sell products / want checkout",to:"store"},{l:"Smells like a time-waster",to:"timewaster"}]},
  silent:{title:"They're not replying",tag:{x:"cool"},
    do:"One nudge only. If still nothing, mark them follow-up and move on — don't chase a ghost.",
    scripts:[{t:"still keen on that free homepage? 🙂 just need your business name + what you do and i'll build it for you"}],
    next:[{l:"They reply",to:"gotinfo"},{l:"Nothing → nurture later",to:"followup"}]},
  hassite:{title:"They have a website (redesign)",tag:null,
    do:"Collect only what makes the build easy: their current site link (you reuse their logo + images from it) + what to keep vs change. Show a same-industry example if you have one — if not, use the fallback.",
    scripts:[
      {n:"If you HAVE a same-industry example to show",t:"awesome — drop me your current site link? and tell me what you'd want to keep vs change. i'll rebuild it way sharper. here's one i did recently for another «their industry» so you get the vibe 👇"},
      {n:"If you DON'T have one to show",t:"awesome — drop me your current site link? and tell me what you'd want to keep vs change, and i'll rebuild it way sharper. give me a bit and i'll send you the live version to look at 👍"}],
    next:[{l:"Got the link + brief → build it",to:"building"},{l:"Won't give the link after 2 asks",to:"timewaster"}]},
  nosite:{title:"No website (new build)",tag:null,
    do:"Collect only what makes the build easy. Three asks — logo, what they do, and the look they like. Keep it tight.",
    scripts:[{t:`easy, i'll build it from scratch. 3 quick things:
1) your logo, if you have one (no stress if not)
2) one line on what makes you different
3) a website or two whose design you like — so i build it to your taste`}],
    next:[{l:"Got their inputs → build it",to:"building"},{l:"Won't give one input after 2 asks",to:"timewaster"}]},
  store:{title:"They want a shop / checkout",tag:{x:"warm"},
    do:"A store is NOT the $590 product. Catch it early, don't quote, capture what they sell, and flag Julian for the right plan.",
    scripts:[{t:"ahh if people actually buy + checkout on the site, that's a different build to a normal site — let me get you the right plan for that 👍 what are you selling, and roughly how many products?"}],
    next:[{l:"Captured → flag Julian, back to start",to:"home"}]},
  building:{title:"It's building",tag:null,
    do:"You build NOTHING — the system builds it. Send a holding line so there's no dead air, then wait for the live link.",
    scripts:[{t:"on it — building your homepage now, i'll send you the live link in a bit 🚀"}],
    next:[{l:"It's live → send it",to:"reveal"}]},
  reveal:{title:"Send them the live site",tag:{x:"cool"},
    do:"Never call it a “sample/preview” — it's their real, live site. Msg 1 = the reveal (short, it's THEIRS). Msg 2 (after they open) = the proof. Msg 3 = get their reaction + push to a call. Frame it as the starting point — the full build is even better.",
    scripts:[
      {n:"Message 1 — the reveal",t:`your site's done — it's live right now 👉 «link»
have a look on your phone`},
      {n:"Message 2 — after they open it (the proof)",t:"try this — fill in your own contact form on the site and watch the enquiry land on a phone in 10 seconds. it's real, and it's yours"},
      {n:"Message 3 — their reaction + push to a call",t:"what do you think? 🙂 honestly this is just the starting point — the full build is even sharper and we make it exactly how you want. it's $590 all in (1 year hosting + domain included). want to hop on a quick google meet so i can walk you through it + answer anything? a call works too 👍"}],
    next:[{l:"Read how they react",to:"telemetry"}]},
  telemetry:{title:"Read the reaction",tag:null,
    do:"Don't ask “how urgent are you?” — READ it. How they react to the live site is the strongest buy-signal there is. Tap what they did:",
    scripts:[],
    next:[
      {l:"🔥 Opened fast / filled the form / “can you change X” → HOT",to:"close"},
      {l:"🙂 Likes it, wants changes or has a question → WARM",to:"price"},
      {l:"📞 “can we call / meet?” → HOT (SG signal)",to:"meet"},
      {l:"🌫️ Opened but quiet / didn't open → COOL",to:"followup"},
      {l:"🚩 Haggling before valuing it → time-waster",to:"timewaster"}]},
  close:{title:"Close it",tag:{x:"hot"},
    do:"Paste the scope-lock line FIRST (it protects you AND closes them). Then hand off — YOU don't invoice, Julian sends it himself so the terms stay clean. Your job ends at “yes.”",
    scripts:[{t:"perfect 🙌 just to lock it in: 4 pages, mobile, contact form, 1 year hosting + domain + email, and 3 rounds of changes — anything on top of that is a paid add-on later, all good? i'll get your invoice over to you 👍"}],
    next:[{l:"They're in → Julian sends the invoice",to:"home"},{l:"“let me think”",to:"followup"},{l:"Pushes on price",to:"price"}]},
  price:{title:"Price pushback / cheaper freelancer",tag:{x:"warm"},
    do:"HOLD $590 — never match, never unbundle. Re-anchor on the SEO lever in a HUMAN voice (lowercase, contractions — perfect grammar IS the bot tell). The −$100 is Julian's call ONLY.",
    scripts:[{t:"i get it 🙂 honestly the real difference is i actually rank you — proper google traffic, not just a nice-looking page. ask the cheaper guys to show you proof of their SEO… most can't. you're not just getting a site, you're getting someone who runs the whole thing for you. happy to keep it at $590 👍"}],
    next:[{l:"Cleared → close",to:"close"},{l:"Only wants cheaper → flag Julian",to:"timewaster"},{l:"Went quiet",to:"followup"}]},
  meet:{title:"They want to meet / call",tag:{x:"hot"},
    do:"Buying intent in Singapore — say yes fast. Default to a Google Meet (keeps the energy, no stranger-meets-stranger). Show the live site + the 129-businesses proof, then close on the spot. A normal call works too.",
    scripts:[{t:"yeah let's do it 🙂 easiest is a quick google meet — i'll walk you through your live site and answer anything, same as meeting just faster. or a call works too 👍 when suits you?"}],
    next:[{l:"On the call → close",to:"close"},{l:"No-show",to:"followup"}]},
  followup:{title:"Went quiet — follow-up",tag:{x:"cool"},
    do:"Use the expiring site as the reason to message — NEVER “just checking in.” Max 3 touches. The Day-6 loss-aversion line is the closer.",
    scripts:[
      {n:"Day 2",t:"hey 🙂 the homepage i built you is still live — anything you'd want me to tweak on it?"},
      {n:"Day 6 — loss aversion (the one that closes)",t:"heads up — i'll be taking the site i built you down tomorrow. if you want to keep it + move it onto your own domain, the deposit locks it in 👍"}],
    next:[{l:"Re-engages → close",to:"close"},{l:"Still nothing → park + reuse later",to:"home"}]},
  astronaut:{title:"Random question",tag:null,
    do:"Answer the fact in ONE line, then immediately steer back to the site. Never just answer and wait.",
    scripts:[
      {n:"“how much is hosting?”",t:"first year's free, then it's $240/yr — that's it, no monthly fees 👍 did you get a look at the site i built you?"},
      {n:"“do i own it?”",t:"yep, fully yours — i just build it and run it all for you 🙂 what did you think of the site?"},
      {n:"“how long does it take?”",t:"5 business days once you send your changes — but honestly it's already live right now for you to see 🙂"}],
    next:[{l:"Back to reading the reaction",to:"telemetry"}]},
  timewaster:{title:"Time-waster check",tag:{x:"dead"},
    do:"Need 2+ tells (one alone isn't enough): haggles before seeing anything · won't give one input after 2 asks · ghosts then haggles · agency/recon vibe fishing for your system. If real-but-cheap, try the SEO lever first. Otherwise: ONE warm exit, leave the site to decay, stop replying to haggling. Door stays open.",
    scripts:[{t:"no worries at all 🙂 i'll leave the site i built you up for a few days in case you change your mind — here if you need me 👍"}],
    next:[{l:"Done — back to start",to:"home"},{l:"Actually real, just price → SEO lever",to:"price"}]},
  whois:{title:"“Who are you / where's Julian?”",tag:null,
    do:"Stay confident + human — you're part of the team, no big deal. Keep it short and move back to their site.",
    scripts:[{t:"hey 🙂 i'm «your name», i work with Julian on the builds — i'll get you sorted 👍"}],
    next:[{l:"Back to start",to:"home"}],
    pending:"Julian to confirm the exact line — and whether to ever mention the army."},
};

var RED_LINES = [
  "<b>$590 is the price.</b> Never quote anything else.",
  "<b>50% deposit floor.</b> Never take less to lock a build (70% is the default ask).",
  "<b>Scope-lock every time:</b> 4 pages · mobile · contact form · 1yr hosting+domain+email · 3 revisions. Beyond that = a paid add-on.",
  "<b>No discounts.</b> The −$100 lever is Julian's call only — flag him, don't offer it.",
  "<b>Julian sends the invoice + handles payment.</b> Your job is to get them to “yes” — money flows through Julian only.",
];

var stage = document.getElementById("stage");
var bcrumb = document.getElementById("bcrumb");
var navStack = [];
var curScripts = [];

function esc(s){ return String(s).split("&").join("&amp;").split("<").join("&lt;").split(">").join("&gt;"); }
function fillify(s){ return esc(s).replace(/«([^»]+)»/g, function(m,g){ return '<span class="fill">'+g+'</span>'; }); }

function renderHome(){
  bcrumb.textContent = "Where are you right now?";
  curScripts = [];
  var h = '<div class="menu rf-fade-in">';
  for(var i=0;i<MENU.length;i++){
    var m = MENU[i];
    if(m.g){ h += '<div class="grouplabel">'+esc(m.g)+'</div>'; continue; }
    h += '<button class="srow" data-go="'+m.id+'"><div class="ic">'+m.ic+'</div>'+
         '<div class="tx"><div class="tt">'+esc(m.tt)+'</div><div class="ds">'+esc(m.ds)+'</div></div>'+ARROW+'</button>';
  }
  h += '</div>';
  stage.innerHTML = h;
}

function renderNode(id){
  var n = NODES[id];
  if(!n){ renderHome(); return; }
  bcrumb.textContent = n.title;
  curScripts = (n.scripts||[]).map(function(s){ return s.t; });
  var h = '<div class="rf-fade-in">';
  h += '<button class="back" data-act="back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>Back</button>';
  h += '<div class="nodehd">'+esc(n.title)+'</div>';
  if(n.tag){ var map={hot:["tag-hot","🔥 HOT"],warm:["tag-warm","WARM"],cool:["tag-cool","COOL"],dead:["tag-dead","HANDLE WITH CARE"]}; var t=map[n.tag.x]; h+='<span class="nodetag '+t[0]+'">'+t[1]+'</span>'; }
  h += '<div class="doblk"><div><div class="lab">Do this</div><div class="tx">'+esc(n.do)+'</div></div></div>';
  for(var i=0;i<(n.scripts||[]).length;i++){
    var s = n.scripts[i];
    if(s.n) h += '<div class="msgnum">'+esc(s.n)+'</div>';
    h += '<div class="scriptcard"><div class="scripthd"><span class="lbl">Tap to copy → paste in WhatsApp</span>'+
         '<button class="copybtn" data-act="copy" data-i="'+i+'">'+COPYICON+'Copy</button>'+
         '</div><div class="scriptbody">'+fillify(s.t)+'</div></div>';
  }
  if(n.next&&n.next.length){
    h += '<div class="nextlbl">Then what happened?</div><div class="nexts">';
    for(var j=0;j<n.next.length;j++){
      h += '<button class="nextbtn" data-go="'+n.next[j].to+'"><span>'+esc(n.next[j].l)+'</span>'+ARROW+'</button>';
    }
    h += '</div>';
  }
  if(n.pending) h += '<div class="note">⚠️ '+esc(n.pending)+'</div>';
  else if(id==="reveal"||id==="hassite") h += '<div class="note">Highlighted bits like <span class="fill">link</span> are the only things you edit before sending.</div>';
  h += '</div>';
  stage.innerHTML = h;
  window.scrollTo(0,0);
}

function go(id){ if(id==="home"){ navStack=[]; renderHome(); window.scrollTo(0,0); return; } navStack.push(id); renderNode(id); }
function back(){ navStack.pop(); var prev=navStack[navStack.length-1]; if(prev) renderNode(prev); else renderHome(); window.scrollTo(0,0); }

function doCopy(i, btn){
  var raw = curScripts[i]; if(raw==null) return;
  var done=function(){ btn.classList.add("ok"); btn.innerHTML='✓ Copied'; toast("Copied — paste it in WhatsApp"); setTimeout(function(){ btn.classList.remove("ok"); btn.innerHTML=COPYICON+'Copy'; },1400); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(raw).then(done, function(){ fallback(raw,done); }); } else fallback(raw,done);
}
function fallback(t,cb){ var ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); cb(); }

var toastT;
function toast(msg){ var el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){ el.classList.remove("show"); },1700); }

function openRedLines(){
  var s=document.createElement("div"); s.className="scrim";
  var h='<div class="sheet"><div class="grab"></div><h2>⛔ The 5 red lines</h2><div class="sh-sub">These never bend — they are on page 1 for a reason.</div>';
  for(var i=0;i<RED_LINES.length;i++){ h+='<div class="rl"><div class="n">'+(i+1)+'</div><div class="t">'+RED_LINES[i]+'</div></div>'; }
  h+='<div style="margin-top:18px"><button class="btn btn--primary" data-act="closesheet" style="width:100%">Got it</button></div></div>';
  s.innerHTML=h;
  s.addEventListener("click", function(e){ if(e.target===s || (e.target.getAttribute && e.target.getAttribute("data-act")==="closesheet")) s.remove(); });
  document.body.appendChild(s);
}

document.addEventListener("click", function(e){
  var t = e.target.closest ? e.target.closest("[data-go],[data-act]") : null;
  if(!t) return;
  if(t.hasAttribute("data-go")){ go(t.getAttribute("data-go")); return; }
  var act = t.getAttribute("data-act");
  if(act==="back") back();
  else if(act==="redlines") openRedLines();
  else if(act==="copy") doCopy(parseInt(t.getAttribute("data-i"),10), t);
});

renderHome();
</script>
</body>
</html>
