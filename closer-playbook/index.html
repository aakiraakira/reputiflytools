<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#ffffff" />
<title>Reputifly · Closer Playbook</title>
<link rel="icon" href="favicon.png" />
<link rel="apple-touch-icon" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --color-canvas:#f7f8fa;--color-surface:#ffffff;--color-surface-2:#f3f4f6;--color-surface-3:#eceef1;
  --color-ink:#0a0a0a;--color-ink-2:#3f4754;--color-muted:#6b7280;--color-faint:#9ca3af;
  --color-line:#e8eaed;--color-line-2:#dfe2e7;
  --color-primary:#007aff;--color-primary-hover:#0a6fe0;--color-primary-active:#0563cc;--color-primary-soft:#e9f2ff;--color-on-primary:#ffffff;
  --color-success:#34c759;--color-warn:#ff9500;--color-danger:#ff3b30;
  --radius-pill:9999px;--radius-lg:20px;--radius-md:14px;--radius-sm:12px;--radius-xs:9px;
  --shadow-xs:0 1px 2px rgba(16,24,40,.04);--shadow-sm:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-md:0 4px 12px rgba(16,24,40,.08),0 2px 4px rgba(16,24,40,.04);--shadow-lg:0 12px 32px rgba(16,24,40,.12),0 4px 8px rgba(16,24,40,.06);
  --shadow-focus:0 0 0 3px rgba(0,122,255,.28);--ease:cubic-bezier(0.25,0.8,0.25,1);
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
html,body{margin:0;height:100%;}
html{background:var(--color-canvas);color:var(--color-ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-feature-settings:"cv02","cv03","cv04","cv11"}
body{margin:0;font-size:14px;line-height:1.5;letter-spacing:-0.006em;color:var(--color-ink);background:var(--color-canvas);overflow:hidden}
*{box-sizing:border-box}
::selection{background:rgba(0,122,255,.16)}
h1,h2,h3,h4{letter-spacing:-0.02em;font-weight:700;margin:0}
button{font-family:inherit}
:focus{outline:none}
button:focus-visible,[tabindex]:focus-visible{box-shadow:var(--shadow-focus);border-radius:var(--radius-xs)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 20px;border-radius:var(--radius-pill);border:1px solid transparent;font-size:14px;font-weight:600;letter-spacing:-0.01em;cursor:pointer;user-select:none;white-space:nowrap;transition:background-color .18s var(--ease),transform .12s var(--ease)}
.btn:active{transform:translateY(0.5px) scale(0.99)}
.btn--primary{background:var(--color-primary);color:var(--color-on-primary);box-shadow:var(--shadow-xs)}
.btn--primary:hover{background:var(--color-primary-hover)}
@keyframes rf-pop-in{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes rf-fade-in{from{opacity:0}to{opacity:1}}
.rf-fade-in{animation:rf-fade-in .2s var(--ease)}
@media (prefers-reduced-motion:reduce){.rf-fade-in{animation:none}}

/* app shell: header fixed, panes scroll = header always stuck */
.app{height:100dvh;display:flex;flex-direction:column;background:var(--color-canvas)}
.topbar{flex-shrink:0;height:64px;display:flex;align-items:center;gap:14px;padding:0 22px;background:#fff;border-bottom:1px solid var(--color-line);z-index:30}
.topbar .logo{height:25px;width:auto;display:block}
.hback{display:none;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:transparent;border:none;cursor:pointer;color:var(--color-ink);flex-shrink:0;margin-left:-8px;transition:background-color .14s var(--ease)}
.hback:hover{background:var(--color-surface-2)}.hback:active{background:var(--color-surface-3)}
.topbar .sep{width:1px;height:22px;background:var(--color-line-2)}
.topbar .title{font-size:15px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap}
.redpill{margin-left:auto;display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 16px;border-radius:var(--radius-pill);background:#ffe9e7;color:#c0271c;border:none;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background-color .15s var(--ease)}
.redpill:hover{background:#ffdcd8}
.bodyrow{flex:1;display:flex;min-height:0}

/* sidebar */
.sidebar{width:362px;flex-shrink:0;border-right:1px solid var(--color-line);background:#fff;display:flex;flex-direction:column;min-height:0}
.searchwrap{padding:16px 16px 10px}
.search-pill{display:flex;align-items:center;gap:10px;width:100%;height:44px;padding:0 15px;background:var(--color-surface-2);border:1.5px solid transparent;border-radius:var(--radius-pill);transition:background-color .16s var(--ease),border-color .16s var(--ease)}
.search-pill.foc{background:#fff;border-color:var(--color-primary)}
.search-pill input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-size:15px;color:var(--color-ink);font-weight:500}
.search-pill input::placeholder{color:var(--color-faint);font-weight:400}
.clearbtn{display:none;flex-shrink:0;width:20px;height:20px;padding:0;border:none;border-radius:50%;background:var(--color-line-2);color:#fff;cursor:pointer;align-items:center;justify-content:center;transition:background-color .12s var(--ease)}
.clearbtn:hover{background:var(--color-faint)}
.clearbtn svg{width:11px;height:11px;display:block}
.search-pill.has-text .clearbtn{display:flex}
.sidescroll{flex:1;overflow-y:auto;padding:6px 14px 32px}
.grouplabel{font-size:13px;font-weight:800;letter-spacing:-0.01em;color:var(--color-ink);margin:22px 8px 9px;display:flex;align-items:center;gap:9px}
.grouplabel:first-child{margin-top:8px}
.grouplabel .gline{flex:1;height:1px;background:var(--color-line)}
.srow{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:12px 13px;border-radius:var(--radius-md);background:transparent;border:1.5px solid transparent;cursor:pointer;transition:background-color .12s var(--ease),border-color .12s var(--ease);margin-bottom:3px}
.srow:hover{background:var(--color-surface-2)}
.srow.active{background:var(--color-primary-soft);border-color:#bcdcff}
.srow .ic{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--color-surface-2);transition:background-color .12s var(--ease)}
.srow.active .ic{background:#fff}
.srow .tx{flex:1;min-width:0}
.srow .tt{font-size:14.5px;font-weight:600;letter-spacing:-0.015em;color:var(--color-ink);line-height:1.25}
.srow.active .tt{color:var(--color-primary-active)}
.srow .ds{font-size:12px;color:var(--color-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.noresult{padding:34px 12px;text-align:center;color:var(--color-faint);font-size:13.5px;line-height:1.5}

/* detail */
.detail{flex:1;min-width:0;overflow-y:auto;padding:34px 44px 80px}
.detail .inner{max-width:720px;margin:0 auto}
.backbtn{display:none}
.detail.welcomeview{display:flex;align-items:center;justify-content:center;padding-top:34px;padding-bottom:34px}
.welcome{max-width:460px;margin:0 auto;text-align:center}
.welcome .wlogo{height:38px;margin-bottom:24px;opacity:.92}
.welcome h2{font-size:23px;font-weight:800;margin-bottom:10px;letter-spacing:-0.025em}
.welcome p{color:var(--color-muted);font-size:15px;line-height:1.65}
.nodehd{font-size:27px;font-weight:800;letter-spacing:-0.025em;line-height:1.18;margin:0 0 12px}
.metarow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.nodetag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;padding:5px 12px;border-radius:var(--radius-pill);letter-spacing:.01em}
.tag-hot{background:#ffe9e7;color:#c0271c}.tag-warm{background:#fff1de;color:#9a5a00}.tag-cool{background:#e9f2ff;color:var(--color-primary-active)}.tag-dead{background:#f0f1f3;color:#6b7280}
.labelpill{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;padding:5px 12px 5px 10px;border-radius:var(--radius-pill);background:var(--color-surface-2);color:var(--color-ink-2)}
.labelpill .dot{width:9px;height:9px;border-radius:50%}
.doblk{display:flex;gap:12px;padding:16px 18px;background:var(--color-primary-soft);border:1px solid #cfe3ff;border-radius:var(--radius-md);margin-bottom:18px}
.doblk .lab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-primary-active);margin-bottom:5px}
.doblk .tx{font-size:14.5px;color:var(--color-ink);line-height:1.6;white-space:pre-wrap}
.doblk .tx b{font-weight:700}
.rcard{padding:15px 17px;background:#fff8ec;border:1px solid #ffe2b0;border-radius:var(--radius-md);margin-top:28px;margin-bottom:10px}
.rcard .lab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#9a5a00;margin-bottom:7px}
.rcard .tx{font-size:13.5px;color:#5c4a2b;line-height:1.6;white-space:pre-wrap}
.rcard .tx b{font-weight:800;font-size:15px;color:#7a4a12}
.intakecard{border:1px solid var(--color-line);border-radius:var(--radius-md);background:#fff;padding:16px 18px;margin-bottom:18px;box-shadow:var(--shadow-xs)}
.intakecard .lab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-muted);margin-bottom:11px}
.intakecard ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
.intakecard li{display:flex;align-items:flex-start;gap:11px;font-size:14px;line-height:20px;color:var(--color-ink)}
.intakecard li .ck{width:20px;height:20px;border-radius:50%;background:#e9f7ee;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:0}
.intakecard li>span:last-child{padding-top:0}
.intakecard li b{font-weight:700}
.proofimg{width:100%;border:1px solid var(--color-line);border-radius:var(--radius-md);margin-bottom:8px;box-shadow:var(--shadow-sm);display:block}
.proofcap{font-size:12px;color:var(--color-muted);margin:0 2px 18px}
.sectlbl{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-muted);margin:22px 2px 11px}
.msgnum{font-size:13.5px;font-weight:700;color:var(--color-primary-active);margin:0 2px 8px;letter-spacing:-0.01em}
.scriptcard{border:1px solid var(--color-line);border-radius:var(--radius-md);overflow:hidden;margin-bottom:14px;background:#fff;box-shadow:var(--shadow-xs)}
.scripthd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;background:var(--color-surface-2);border-bottom:1px solid var(--color-line)}
.scripthd .lbl{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--color-muted)}
.scriptbody{padding:16px;font-size:15px;line-height:1.6;color:var(--color-ink);white-space:pre-wrap}
.scriptbody b{font-weight:700}
.copybtn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:var(--radius-pill);background:var(--color-primary);color:#fff;border:none;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background-color .15s var(--ease),transform .12s var(--ease)}
.copybtn:hover{background:var(--color-primary-hover)}.copybtn:active{transform:scale(.97)}
.copybtn.ok{background:var(--color-success)}
.fill{background:#fff4c2;border-radius:4px;padding:0 4px;font-weight:600;color:#8a6d00}
.asset{border:1px solid var(--color-line);border-radius:var(--radius-md);background:#fff;padding:14px;margin-bottom:14px;box-shadow:var(--shadow-xs)}
.asset .ahd{font-size:12px;font-weight:700;color:var(--color-ink-2);margin-bottom:11px;display:flex;align-items:center;gap:7px}
.asset .assetgrid{display:flex;gap:14px}
.asset .assetcol{flex:1;min-width:0}
.asset .assetcol img{width:100%;border-radius:10px;border:1px solid var(--color-line);display:block;box-shadow:var(--shadow-sm)}
.asset .acap{font-size:12px;color:var(--color-muted);margin-top:9px;line-height:1.5}
.nextlbl{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-muted);margin:26px 2px 11px}
.nexts{display:flex;flex-direction:column;gap:9px}
.nextbtn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;padding:14px 16px;border:1.5px solid var(--color-line-2);border-radius:var(--radius-md);background:#fff;font-size:14px;font-weight:600;color:var(--color-ink);cursor:pointer;transition:background-color .13s var(--ease),border-color .13s var(--ease),transform .12s var(--ease)}
.nextbtn:hover{background:var(--color-surface-2);border-color:var(--color-primary)}
.nextbtn:active{transform:scale(.995)}
.nextbtn .arw{color:var(--color-primary);flex-shrink:0}
.note{font-size:12.5px;color:var(--color-muted);margin-top:18px;padding:12px 14px;background:var(--color-surface-2);border-radius:var(--radius-sm);line-height:1.55}

.scrim{position:fixed;inset:0;z-index:60;background:rgba(10,12,16,.42);display:flex;align-items:center;justify-content:center;padding:16px;animation:rf-fade-in .18s var(--ease)}
@media(max-width:560px){.scrim{align-items:flex-end;padding:0}}
.sheet{width:100%;max-width:540px;background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);padding:10px 22px 28px;animation:rf-fade-in .2s var(--ease)}
@media(max-width:560px){.sheet{border-radius:20px 20px 0 0}}
.sheet .grab{width:38px;height:4px;border-radius:9999px;background:var(--color-line-2);margin:8px auto 16px}
.sheet h2{font-size:18px;font-weight:800;margin-bottom:4px}
.sheet .sh-sub{font-size:13px;color:var(--color-muted);margin-bottom:16px}
.rl{display:flex;gap:12px;padding:13px 0;border-top:1px solid var(--color-line)}
.rl .n{width:25px;height:25px;border-radius:8px;background:var(--color-danger);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rl .t{font-size:14px;line-height:1.5}.rl .t b{font-weight:700}
.rl .t .fill{font-weight:700}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(8px);z-index:80;background:var(--color-ink);color:#fff;font-size:13.5px;font-weight:600;padding:12px 20px;border-radius:var(--radius-pill);box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s var(--ease),transform .2s var(--ease)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:860px){
  .bodyrow{display:block;overflow-y:auto}
  .app{height:auto;min-height:100dvh}
  body{overflow:auto}
  .topbar{position:sticky;top:0;padding:0 16px;gap:10px}
  .topbar .logo{transform:translateY(0.5px)}
  body.viewing .hback{margin-left:-16px;transform:translateY(-1.5px)}
  .sidebar{width:100%;border-right:none}
  .sidescroll{overflow:visible}
  .detail{display:none;padding:20px 16px 60px;overflow:visible}
  .detail.welcomeview{display:none}
  .detail .inner{max-width:100%}
  body.viewing .sidebar{display:none}
  body.viewing .detail{display:block}
  .backbtn{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px 0 10px;border-radius:var(--radius-pill);background:var(--color-surface-2);color:var(--color-ink-2);font-size:13px;font-weight:600;border:none;cursor:pointer;margin-bottom:16px}
  .topbar .title,.topbar .sep{display:none}
  body.viewing .topbar .hback{display:inline-flex}
  .asset .assetgrid{flex-direction:column;gap:18px}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="hback" data-act="back" aria-label="Back to situations"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <img class="logo" src="reputifly-logo.png" alt="Reputifly" />
    <div class="sep"></div>
    <div class="title">Closer Playbook</div>
  </div>
  <div class="bodyrow">
    <aside class="sidebar">
      <div class="searchwrap">
        <div class="search-pill" id="searchpill">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#9ca3af" stroke-width="2"/><path d="M20 20l-3-3" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/></svg>
          <input id="search" type="text" placeholder="Search a situation…" autocomplete="off" />
          <button id="clearsearch" class="clearbtn" type="button" aria-label="Clear search"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/></svg></button>
        </div>
      </div>
      <div class="sidescroll" id="sidescroll"></div>
    </aside>
    <main class="detail" id="detail"></main>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
var ARROW='<svg class="arw" width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var COPYICON='<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 012-2h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
var TICK='<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 12.5l4.5 4.5L19 7.5" stroke="#34c759" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';

var LABELCOLOR={"pending sample":"#ff9500","sample sent":"#007aff","follow up":"#ff9500","closed — invoice":"#34c759","time waster":"#ff3b30"};

var INTAKE=[
  "*Business name + what they do* (the one must-have)",
  "A site whose *look* they like (highest leverage, builds it to their taste)",
  "Their *logo*, if any (no stress if not)",
  "Current website or socials (we reuse their logo + photos)",
  "Location (confirm Singapore)",
  "Do they *sell + checkout* online? (catches the e-commerce out-ramp early)"
];

var MENU=[
  {g:"A New Lead Just Messaged"},
  {id:"newlead",ic:"👋",tt:"New Lead — What To Open With",ds:"4 openers, pick one",kw:"first message hello inquiry start open"},
  {id:"gotinfo",ic:"🧭",tt:"They Told Me Their Business",ds:"now figure out the build",kw:"category fork has site"},
  {id:"silent",ic:"🌑",tt:"They're Not Replying",ds:"one nudge only",kw:"ghost ghosted no reply quiet silent ignored seen zoned read"},
  {g:"Figuring Out What To Build"},
  {id:"hassite",ic:"🔁",tt:"They Have A Website",ds:"redesign, get the link",kw:"redesign existing site url keep change"},
  {id:"nosite",ic:"✨",tt:"No Website Yet",ds:"new build, 3 asks",kw:"new build scratch logo"},
  {id:"store",ic:"🛒",tt:"They Want A Shop / Checkout",ds:"out-ramp, never $590",kw:"ecommerce store checkout products"},
  {g:"Sending The Live Site"},
  {id:"building",ic:"⚙️",tt:"It's Building",ds:"kill the dead air",kw:"holding wait building"},
  {id:"reveal",ic:"🚀",tt:"Send Them The Live Site",ds:"one ask at a time",kw:"reveal send link proof"},
  {id:"telemetry",ic:"📡",tt:"They Saw It — Read The Reaction",ds:"route by what they did",kw:"reaction buy signal hot warm"},
  {g:"Closing The Deal"},
  {id:"close",ic:"✅",tt:"They Like It — Proceed + Invoice",ds:"the micro-yes ladder",kw:"close proceed invoice company name scope deposit ladder pay payment domain yes lock in interested wants it ready"},
  {id:"meet",ic:"📞",tt:"They Want To Meet / Call",ds:"hot signal, Google Meet",kw:"call meet google video"},
  {id:"followup",ic:"⏳",tt:"Went Quiet After Seeing It",ds:"7-day decay = urgency",kw:"followup follow up nurture pressure quiet chase chasing nudge went dark cold ghosted no reply"},
  {g:"Objections & Questions"},
  {id:"price",ic:"💸",tt:"Price Pushback / Cheaper Guy",ds:"the SEO proof, hold $590",kw:"objection price cheaper freelancer seo rank expensive discount too pricey costly budget afford negotiate haggle wix diy"},
  {id:"faq",ic:"💬",tt:"Common Questions",ds:"answer, then redirect",kw:"faq included hosting own seo how long pay payment deposit email domain revisions whats included question"},
  {id:"timewaster",ic:"🚩",tt:"Smells Like A Time-Waster",ds:"the tells + warm eject",kw:"time waster eject haggle"}
];

var NODES={
  newlead:{title:"New Lead — What To Open With",tag:null,label:"pending sample",
    do:"Don't lead with a form-wall, that's the cheap-guy move. Open human, lead with what THEY get (a real site, live, before they pay), then get them talking. Option A is the strongest open: dream outcome + free + before-you-pay in one breath. All four end on the same single ask.",
    readClient:"If they opened with a specific question (price, time), answer that ONE line first, then ask the business question. Don't ignore what they asked just to run your script.",
    intake:INTAKE,
    scripts:[
      {n:"Option A — outcome + risk reversal (default)",t:"hey! we'll build your site *live*, free, before you pay a cent.\nwhat's your business + what do you do?"},
      {n:"Option B — real, see it",t:"hey! we build *real* sites for SG businesses.\nwe'll build yours *live* so you can actually see it.\nwhat's your business + what do you do?"},
      {n:"Option C — value first",t:"happy to help 🙌\nquickest way: your business name + what you do,\nand we'll build you a *real* site to look at. sound good?"},

  reveal:{title:"Send Them The Live Site",tag:{x:"cool"},label:"sample sent",
    do:"Never call it a sample or preview, it's their real, live site. Send ONE ask at a time. Msg 1 = the reveal. Msg 2 (after they open) = the proof + ownership. Msg 3 = reaction only. Price and the call come AFTER they react warm, never bundled with the reveal. Only edit the «link».",

  telemetry:{title:"They Saw It — Read The Reaction",tag:null,label:"sample sent",
    do:"Don't ask \"how urgent is this?\" READ it. The first 1-2 replies set the temperature. A TWEAK REQUEST is the #1 buy signal (they're decorating a house they've moved into) → send to close, NOT price. Only an actual price haggle goes to price. When unsure, default to WARM. Cold is a PATTERN (2+ tells), never one slow reply. HOT = close in the same conversation today, warmth's half-life is hours.",
    readClient:"*🔥 HOT, close TODAY*\n\"wah nice\" / \"looks good\" / ANY tweak (change colour, add logo, put my number) / asks about their own stuff (is this my domain, got the WhatsApp button, can i get the email) / \"how much?\" AFTER praising / forwards it / fast multi-message replies.\n\n*🌤 WARM, one soft ask now then cadence*\n\"ok thanks will look\" / \"noted\" / 👍 then quiet / \"looks ok\" / a genuine \"check with my partner\".\n\n*🧊 COLD or SUSPECT, qualify first*\nhaggles BEFORE complimenting / won't give one input after 2 asks PAIRED with a hard tell / ghosts then only haggles / agency-recon (what stack, can i get admin, source files).\nSilence on assets alone is NOT cold, busy owners are just slow to dig out a logo.",
    scripts:[],

  close_ladder:{title:"The Close, Walk Them Up The Ladder",tag:{x:"hot"},label:"closed — invoice",

      {n:"Step 1 — they gave a name, you secure it (we-buy-it = the leverage)",t:"*[name].com* it is 🙌\n\nwe'll grab + set it up for you, that gets us rolling\n\nyou're *live in 5 days*"},

      {n:"Step 3 — the close, as logistics (ask company name)",t:"perfect 🙌\n\nwhat's the *company name* to put on the invoice?\n\nget that to me + you're *live in 5 days*"},
      {n:"Step 3 alt — if Julian needs more than the name",t:"🙌 last thing then we're rolling:\n• *company name* for the invoice\n• who to address it to\n\nJulian sends it over + we start your *5-day* build"},
      {n:"Step 4 — ping Julian (internal, NOT the client)",t:"closed 🎉 «business»\ndomain: «name».com\ninvoice to: «company name»\nthey're in, live in 5 days"}],
    next:[{l:"Got The Company Name → Win The Next One",to:"newlead"},{l:"They Hesitated → Handle It",to:"close_wobble"},{l:"They Asked Something",to:"close_asks"}],

  close_wobble:{title:"The Close, They Hesitated Or Objected",tag:{x:"warm"},label:"closed — invoice",

      {n:"Value stack (only if they ask what they get)",t:"all in for *$590*:\n• ~4 pages, *mobile-optimised*\n• *SEO-optimised* (you show up on google)\n• contact form to your email + WhatsApp button\n• *1yr* free hosting + domain + email\n• *3 rounds* of revisions\n\n*live in 5 days*"},

      {n:"“send me a proper quote / proposal”",t:"yep can do 🙂 it's *$590* all in, 4 pages, mobile, contact form, 1yr hosting + domain + email, 3 rounds of changes\n\ni'll get Julian to send you a proper quotation 👍 what's the company name to put on it?"},

  price:{title:"Price Pushback / Cheaper Guy",tag:{x:"warm"},label:"follow up",
    do:"HOLD *$590*, never match, never unbundle. Send the proof ALONE first so the number lands. Only if they keep pushing, send the \"who runs it\" line. Human voice, lowercase, contractions. Perfect grammar IS the bot tell. The −$100 is Julian's call only.",

    img:"seo-proof.webp", imgcap:"Real client, Google Search Console. 6.25k clicks, 405k impressions, climbing. Send this with Msg 1.",

  meet:{title:"They Want To Meet / Call",tag:{x:"hot"},label:"sample sent",
    do:"Buying intent in SG, say yes fast. Default to a Google Meet (keeps the energy, no stranger meeting a stranger). Offer 2 concrete slots, not \"when works?\", it books about twice as fast. Show the live site + the SEO proof, then close on the spot.",

    scripts:[{t:"yeah let's do it 🙂\nquick google meet, we'll walk you through your *live* site.\n2 slots: *today 5pm* or *tmrw 11am*, which works?"}],
    next:[{l:"On The Call → Close",to:"close"},{l:"No-Show → Follow Up",to:"followup"}]},
  followup:{title:"Went Quiet After Seeing It",tag:{x:"cool"},label:"follow up",
    do:"The expiring live site is ALWAYS the reason to message, NEVER \"just checking in\" (needy + invisible to a busy owner). Every touch points at their real, live, soon-to-vanish website. Max 3 touches, then PARK. Days are guidance, not rules. A hot lead that praised then went quiet same day gets ONE same-evening nudge first (warmth's half-life is hours). Any reply re-warms the clock → drop the cadence, re-read the temperature, re-enter the close. Never apologise for following up, you're holding a live asset FOR them.",
    readClient:"Hot-but-stalled-today → same-evening nudge, then Day 2 priority.\nWarm → Day 2 / Day 4 / Day 6-7, then park. Never two touches in one day.\nCold → skip the Day 4 touch.",
    scripts:[
      {n:"Same evening (hot, praised then quiet, ~3-4 hrs later)",t:"loved that you liked it 🙂\n\nwant me to get it locked onto your domain tonight so it's yours?"},
      {n:"Day 2 — re-open with a tweak invite (tweak = buy signal)",t:"your site's still *live* 🙂\n\nhad a look? anything you'd tweak before we lock it in?"},
      {n:"Day 4 — soft scarcity (skip if clearly cold)",t:"still holding your site live for you 👍\n\nwant us to get it onto your own domain this week?"},
      {n:"Day 6/7 — LAST CALL (highest-converting, ends on the decision)",t:"heads up, we're taking your site down tomorrow 🙏\n\nwant us to keep it + make it yours, or should we let it go?"},
      {n:"If they resurface weeks later (site already gone)",t:"happy to spin it back up for you 🙂"},
      {n:"“need to check with my partner / boss”",t:"makes sense 🙂 easiest way, send them the *live link*, way better than describing it\n\nwe'll keep your site up so they can see the real thing. just shout when you've spoken 👍"}],
    next:[{l:"Replies → Re-Read Temperature",to:"telemetry"},{l:"Warms Back Up → Close",to:"close"},{l:"No Reply After Day 7 → Park",to:"park"}]},

  timewaster:{title:"Smells Like A Time-Waster",tag:{x:"dead"},label:"time waster",

var sidescroll=document.getElementById("sidescroll"),detail=document.getElementById("detail");
var curScripts=[],curId=null,listScroll=0,navStack=[];

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function waFmt(s){
  var e=esc(s);
  e=e.replace(/\*([^*\n]+)\*/g,"<b>$1</b>");
  e=e.replace(/«([^»]+)»/g,'<span class="fill">$1</span>');
  return e;
}

function fnorm(s){return (s||"").toLowerCase().replace(/[^a-z0-9 ]+/g," ").replace(/\s+/g," ").trim();}
function flev(a,b){var m=a.length,n=b.length;if(Math.abs(m-n)>2)return 9;var dp=[],i,j;for(j=0;j<=n;j++)dp[j]=j;for(i=1;i<=m;i++){var prev=dp[0];dp[0]=i;for(j=1;j<=n;j++){var tmp=dp[j];dp[j]=Math.min(dp[j]+1,dp[j-1]+1,prev+(a.charCodeAt(i-1)===b.charCodeAt(j-1)?0:1));prev=tmp;}}return dp[n];}
function fsub(q,w){var i=0,j=0;for(;j<w.length&&i<q.length;j++)if(q.charCodeAt(i)===w.charCodeAt(j))i++;return i===q.length;}
function ftok(tok,hayStr,words){
  if(hayStr.indexOf(tok)!==-1)return true;
  if(tok.length<3)return false;
  for(var k=0;k<words.length;k++){var w=words[k];if(!w)continue;
    if(w.indexOf(tok)===0)return true;
    if(tok.length>=4&&fsub(tok,w))return true;
    if(flev(tok,w)<=(tok.length<=5?1:2))return true;}
  return false;
}
function fmatch(f,hayStr,words){
  var toks=f.split(" ");
  for(var t=0;t<toks.length;t++){if(toks[t]&&!ftok(toks[t],hayStr,words))return false;}
  return true;
}
function renderSidebar(filter){
  var f=fnorm(filter),h="",shown=0,pending="";
  for(var i=0;i<MENU.length;i++){
    var m=MENU[i];
    if(m.g){pending='<div class="grouplabel">'+esc(m.g)+'<span class="gline"></span></div>';continue;}
    var hayStr=fnorm(m.tt+" "+m.ds+" "+(m.kw||"")),words=hayStr.split(" ");
    if(f&&!fmatch(f,hayStr,words))continue;
    if(pending){h+=pending;pending="";}
    h+='<button class="srow'+(m.id===curId?" active":"")+'" data-go="'+m.id+'"><div class="ic">'+m.ic+'</div>'+
       '<div class="tx"><div class="tt">'+esc(m.tt)+'</div><div class="ds">'+esc(m.ds)+'</div></div></button>';
    shown++;
  }
  if(!shown)h='<div class="noresult">No situation matches that.<br>Try another word.</div>';
  sidescroll.innerHTML=h;
}

function render(id){
  var n=NODES[id];if(!n)return;
  detail.classList.remove("welcomeview");
  curId=id;curScripts=(n.scripts||[]).map(function(s){return s.t;});
  var h='<div class="inner rf-fade-in">';
  h+='<div class="nodehd">'+esc(n.title)+'</div>';
  h+='<div class="metarow">';
  if(n.tag){var map={hot:["tag-hot","🔥 HOT"],warm:["tag-warm","WARM"],cool:["tag-cool","COOL"],dead:["tag-dead","HANDLE WITH CARE"]},t=map[n.tag.x];h+='<span class="nodetag '+t[0]+'">'+t[1]+'</span>';}
  if(n.label){h+='<span class="labelpill"><span class="dot" style="background:'+(LABELCOLOR[n.label]||"#9ca3af")+'"></span>Label: '+esc(n.label)+'</span>';}
  h+='</div>';
  h+='<div class="doblk"><div><div class="lab">Do this</div><div class="tx">'+waFmt(n.do)+'</div></div></div>';
  if(n.intake){
    h+='<div class="intakecard"><div class="lab">What To Gather (For A Smooth Start)</div><ul>';
    for(var k=0;k<n.intake.length;k++)h+='<li><span class="ck">'+TICK+'</span><span>'+waFmt(n.intake[k])+'</span></li>';
    h+='</ul></div>';
  }
  if(n.img){h+='<img class="proofimg" src="'+n.img+'" alt="proof"/>';if(n.imgcap)h+='<div class="proofcap">'+esc(n.imgcap)+'</div>';}
  if(n.scripts&&n.scripts.length)h+='<div class="sectlbl">What To Say</div>';
  for(var i=0;i<(n.scripts||[]).length;i++){
    var s=n.scripts[i];
    if(s.n)h+='<div class="msgnum">'+esc(s.n)+'</div>';
    h+='<div class="scriptcard"><div class="scripthd"><span class="lbl">Tap to copy → paste in WhatsApp</span>'+
       '<button class="copybtn" data-act="copy" data-i="'+i+'">'+COPYICON+'Copy</button></div>'+
       '<div class="scriptbody">'+waFmt(s.t)+'</div></div>';
  }
  if(n.asset){var As=Array.isArray(n.asset)?n.asset:[{src:n.asset,cap:"Save it once, then send it on WhatsApp."}];h+='<div class="asset"><div class="ahd">📎 Send when they ask what they get</div><div class="assetgrid">';for(var a=0;a<As.length;a++)h+='<div class="assetcol"><img src="'+As[a].src+'" alt="included"/><div class="acap">'+esc(As[a].cap)+'</div></div>';h+='</div></div>';}
  if(n.next&&n.next.length){
    h+='<div class="nextlbl">Then What Happened?</div><div class="nexts">';
    for(var j=0;j<n.next.length;j++)h+='<button class="nextbtn" data-go="'+n.next[j].to+'"><span>'+esc(n.next[j].l)+'</span>'+ARROW+'</button>';
    h+='</div>';
  }
  if(n.pending)h+='<div class="note">⚠️ '+esc(n.pending)+'</div>';
  else if(id==="reveal"||id==="hassite")h+='<div class="note">Highlighted bits like <span class="fill">link</span> are the only things you edit before sending.</div>';
  if(n.readClient)h+='<div class="rcard"><div class="lab">Read The Client</div><div class="tx">'+waFmt(n.readClient)+'</div></div>';
  h+='</div>';
  detail.innerHTML=h;detail.scrollTop=0;
  setActive(id);window.scrollTo(0,0);
}

function go(id){
  if(!NODES[id])return;
  if(!document.body.classList.contains("viewing")){listScroll=window.scrollY;navStack=[];}
  navStack.push(id);
  document.body.classList.add("viewing");
  render(id);
}

function setActive(id){var rows=sidescroll.querySelectorAll(".srow");for(var i=0;i<rows.length;i++)rows[i].classList.toggle("active",rows[i].getAttribute("data-go")===id);}

function back(){navStack.pop();if(navStack.length){render(navStack[navStack.length-1]);}else{document.body.classList.remove("viewing");window.scrollTo(0,listScroll);}}

function doCopy(i,btn){
  var raw=curScripts[i];if(raw==null)return;
  var done=function(){btn.classList.add("ok");btn.innerHTML="✓ Copied";toast("Copied — paste it in WhatsApp");setTimeout(function(){btn.classList.remove("ok");btn.innerHTML=COPYICON+"Copy";},1400);};
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(raw).then(done,function(){fallback(raw,done);});else fallback(raw,done);
}
function fallback(t,cb){var ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);cb();}

var toastT;
function toast(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove("show");},1700);}

document.addEventListener("click",function(e){
  var t=e.target.closest?e.target.closest("[data-go],[data-act]"):null;
  if(!t)return;
  if(t.hasAttribute("data-go")){go(t.getAttribute("data-go"));return;}
  var act=t.getAttribute("data-act");
  if(act==="back")back();
  else if(act==="copy")doCopy(parseInt(t.getAttribute("data-i"),10),t);
});

var searchEl=document.getElementById("search"),searchPill=document.getElementById("searchpill"),clearBtn=document.getElementById("clearsearch");
function syncClear(){searchPill.classList.toggle("has-text",searchEl.value.length>0);}
searchEl.addEventListener("input",function(){renderSidebar(searchEl.value);syncClear();});
searchEl.addEventListener("focus",function(){searchPill.classList.add("foc");});
searchEl.addEventListener("blur",function(){searchPill.classList.remove("foc");});
searchEl.addEventListener("keydown",function(e){if(e.key==="Escape"&&searchEl.value){searchEl.value="";renderSidebar("");syncClear();}});
clearBtn.addEventListener("click",function(){searchEl.value="";renderSidebar("");syncClear();searchEl.focus();});

renderSidebar("");
renderWelcome();
</script>
</body>
</html>
