<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#ffffff" />
<title>Reputifly · Closer Playbook</title>
<link rel="icon" href="favicon.png" />
<link rel="apple-touch-icon" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --color-canvas:#f7f8fa;--color-surface:#ffffff;--color-surface-2:#f3f4f6;--color-surface-3:#eceef1;
  --color-ink:#0a0a0a;--color-ink-2:#3f4754;--color-muted:#6b7280;--color-faint:#9ca3af;
  --color-line:#e8eaed;--color-line-2:#dfe2e7;
  --color-primary:#007aff;--color-primary-hover:#0a6fe0;--color-primary-active:#0563cc;--color-primary-soft:#e9f2ff;--color-on-primary:#ffffff;
  --color-success:#34c759;--color-warn:#ff9500;--color-danger:#ff3b30;
  --radius-pill:9999px;--radius-lg:20px;--radius-md:14px;--radius-sm:12px;--radius-xs:9px;
  --shadow-xs:0 1px 2px rgba(16,24,40,.04);--shadow-sm:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-md:0 4px 12px rgba(16,24,40,.08),0 2px 4px rgba(16,24,40,.04);--shadow-lg:0 12px 32px rgba(16,24,40,.12),0 4px 8px rgba(16,24,40,.06);
  --shadow-focus:0 0 0 3px rgba(0,122,255,.28);--ease:cubic-bezier(0.25,0.8,0.25,1);
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
html,body{margin:0;height:100%;}
html{background:var(--color-canvas);color:var(--color-ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-feature-settings:"cv02","cv03","cv04","cv11"}
body{margin:0;font-size:14px;line-height:1.5;letter-spacing:-0.006em;color:var(--color-ink);background:var(--color-canvas);overflow:hidden}
*{box-sizing:border-box}
::selection{background:rgba(0,122,255,.16)}
h1,h2,h3,h4{letter-spacing:-0.02em;font-weight:700;margin:0}
button{font-family:inherit}
:focus{outline:none}
button:focus-visible,[tabindex]:focus-visible{box-shadow:var(--shadow-focus);border-radius:var(--radius-xs)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 20px;border-radius:var(--radius-pill);border:1px solid transparent;font-size:14px;font-weight:600;letter-spacing:-0.01em;cursor:pointer;user-select:none;white-space:nowrap;transition:background-color .18s var(--ease),transform .12s var(--ease)}
.btn:active{transform:translateY(0.5px) scale(0.99)}
.btn--primary{background:var(--color-primary);color:var(--color-on-primary);box-shadow:var(--shadow-xs)}
.btn--primary:hover{background:var(--color-primary-hover)}
@keyframes rf-pop-in{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes rf-fade-in{from{opacity:0}to{opacity:1}}
.rf-fade-in{animation:rf-fade-in .2s var(--ease)}
@media (prefers-reduced-motion:reduce){.rf-fade-in{animation:none}}

/* app shell: header fixed, panes scroll = header always stuck */
.app{height:100dvh;display:flex;flex-direction:column;background:var(--color-canvas)}
.topbar{flex-shrink:0;height:64px;display:flex;align-items:center;gap:14px;padding:0 22px;background:#fff;border-bottom:1px solid var(--color-line);z-index:30}
.topbar .logo{height:25px;width:auto;display:block}
.hback{display:none;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:transparent;border:none;cursor:pointer;color:var(--color-ink);flex-shrink:0;margin-left:-8px;transition:background-color .14s var(--ease)}
.hback:hover{background:var(--color-surface-2)}.hback:active{background:var(--color-surface-3)}
.topbar .sep{width:1px;height:22px;background:var(--color-line-2)}
.topbar .title{font-size:15px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap}
.redpill{margin-left:auto;display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 16px;border-radius:var(--radius-pill);background:#ffe9e7;color:#c0271c;border:none;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background-color .15s var(--ease)}
.redpill:hover{background:#ffdcd8}
.bodyrow{flex:1;display:flex;min-height:0}

/* sidebar */
.sidebar{width:362px;flex-shrink:0;border-right:1px solid var(--color-line);background:#fff;display:flex;flex-direction:column;min-height:0}
.searchwrap{padding:16px 16px 10px}
.search-pill{display:flex;align-items:center;gap:10px;width:100%;height:44px;padding:0 15px;background:var(--color-surface-2);border:1.5px solid transparent;border-radius:var(--radius-pill);transition:background-color .16s var(--ease),border-color .16s var(--ease)}
.search-pill.foc{background:#fff;border-color:var(--color-primary)}
.search-pill input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-size:15px;color:var(--color-ink);font-weight:500}
.search-pill input::placeholder{color:var(--color-faint);font-weight:400}
.clearbtn{display:none;flex-shrink:0;width:20px;height:20px;padding:0;border:none;border-radius:50%;background:var(--color-line-2);color:#fff;cursor:pointer;align-items:center;justify-content:center;transition:background-color .12s var(--ease)}
.clearbtn:hover{background:var(--color-faint)}
.clearbtn svg{width:11px;height:11px;display:block}
.search-pill.has-text .clearbtn{display:flex}
.sidescroll{flex:1;overflow-y:auto;padding:6px 14px 32px}
.grouplabel{font-size:13px;font-weight:800;letter-spacing:-0.01em;color:var(--color-ink);margin:22px 8px 9px;display:flex;align-items:center;gap:9px}
.grouplabel:first-child{margin-top:8px}
.grouplabel .gline{flex:1;height:1px;background:var(--color-line)}
.srow{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:12px 13px;border-radius:var(--radius-md);background:transparent;border:1.5px solid transparent;cursor:pointer;transition:background-color .12s var(--ease),border-color .12s var(--ease);margin-bottom:3px}
.srow:hover{background:var(--color-surface-2)}
.srow.active{background:var(--color-primary-soft);border-color:#bcdcff}
.srow .ic{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--color-surface-2);transition:background-color .12s var(--ease)}
.srow.active .ic{background:#fff}
.srow .tx{flex:1;min-width:0}
.srow .tt{font-size:14.5px;font-weight:600;letter-spacing:-0.015em;color:var(--color-ink);line-height:1.25}
.srow.active .tt{color:var(--color-primary-active)}
.srow .ds{font-size:12px;color:var(--color-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.noresult{padding:34px 12px;text-align:center;color:var(--color-faint);font-size:13.5px;line-height:1.5}

/* detail */
.detail{flex:1;min-width:0;overflow-y:auto;padding:34px 44px 80px}
.detail .inner{max-width:720px;margin:0 auto}
.backbtn{display:none}
.detail.welcomeview{display:flex;align-items:center;justify-content:center;padding-top:34px;padding-bottom:34px}
.welcome{max-width:460px;margin:0 auto;text-align:center}
.welcome .wlogo{height:38px;margin-bottom:24px;opacity:.92}
.welcome h2{font-size:23px;font-weight:800;margin-bottom:10px;letter-spacing:-0.025em}
.welcome p{color:var(--color-muted);font-size:15px;line-height:1.65}
.nodehd{font-size:27px;font-weight:800;letter-spacing:-0.025em;line-height:1.18;margin:0 0 12px}
.metarow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.nodetag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;padding:5px 12px;border-radius:var(--radius-pill);letter-spacing:.01em}
.tag-hot{background:#ffe9e7;color:#c0271c}.tag-warm{background:#fff1de;color:#9a5a00}.tag-cool{background:#e9f2ff;color:var(--color-primary-active)}.tag-dead{background:#f0f1f3;color:#6b7280}
.labelpill{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;padding:5px 12px 5px 10px;border-radius:var(--radius-pill);background:var(--color-surface-2);color:var(--color-ink-2)}
.labelpill .dot{width:9px;height:9px;border-radius:50%}
.doblk{display:flex;gap:12px;padding:16px 18px;background:var(--color-primary-soft);border:1px solid #cfe3ff;border-radius:var(--radius-md);margin-bottom:18px}
.doblk .lab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-primary-active);margin-bottom:5px}
.doblk .tx{font-size:14.5px;color:var(--color-ink);line-height:1.6;white-space:pre-wrap}
.doblk .tx b{font-weight:700}
.rcard{padding:15px 17px;background:#fff8ec;border:1px solid #ffe2b0;border-radius:var(--radius-md);margin-top:28px;margin-bottom:10px}
.rcard .lab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#9a5a00;margin-bottom:7px}
.rcard .tx{font-size:13.5px;color:#5c4a2b;line-height:1.6;white-space:pre-wrap}
.rcard .tx b{font-weight:800;font-size:15px;color:#7a4a12}
.intakecard{border:1px solid var(--color-line);border-radius:var(--radius-md);background:#fff;padding:16px 18px;margin-bottom:18px;box-shadow:var(--shadow-xs)}
.intakecard .lab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-muted);margin-bottom:11px}
.intakecard ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
.intakecard li{display:flex;align-items:flex-start;gap:11px;font-size:14px;line-height:20px;color:var(--color-ink)}
.intakecard li .ck{width:20px;height:20px;border-radius:50%;background:#e9f7ee;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:0}
.intakecard li>span:last-child{padding-top:0}
.intakecard li b{font-weight:700}
.proofimg{width:100%;border:1px solid var(--color-line);border-radius:var(--radius-md);margin-bottom:8px;box-shadow:var(--shadow-sm);display:block}
.proofcap{font-size:12px;color:var(--color-muted);margin:0 2px 18px}
.sectlbl{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-muted);margin:22px 2px 11px}
.msgnum{font-size:13.5px;font-weight:700;color:var(--color-primary-active);margin:0 2px 8px;letter-spacing:-0.01em}
.scriptcard{border:1px solid var(--color-line);border-radius:var(--radius-md);overflow:hidden;margin-bottom:14px;background:#fff;box-shadow:var(--shadow-xs)}
.scripthd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;background:var(--color-surface-2);border-bottom:1px solid var(--color-line)}
.scripthd .lbl{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--color-muted)}
.scriptbody{padding:16px;font-size:15px;line-height:1.6;color:var(--color-ink);white-space:pre-wrap}
.scriptbody b{font-weight:700}
.sitbar{display:flex;gap:7px;align-items:flex-start;padding:9px 14px 10px;background:#fff8ec;border-bottom:1px solid #ffe2b0;font-size:11.5px;font-weight:600;color:#9a5a00;line-height:1.45}
.sitbar .sicon{flex-shrink:0;font-size:12px;line-height:1.3}.sitbar>span:last-child{white-space:pre-line}
.combo{border:1.5px solid #bcdcff;border-radius:var(--radius-md);padding:11px 12px 3px;margin-bottom:14px;background:#f4f9ff}
.combohd{font-size:12px;font-weight:800;letter-spacing:.01em;color:var(--color-primary-active);margin:1px 2px 11px;display:flex;align-items:center;gap:6px}
.copybtn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:var(--radius-pill);background:var(--color-primary);color:#fff;border:none;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background-color .15s var(--ease),transform .12s var(--ease)}
.copybtn:hover{background:var(--color-primary-hover)}.copybtn:active{transform:scale(.97)}
.copybtn.ok{background:var(--color-success)}
.fill{background:#fff4c2;border-radius:4px;padding:0 4px;font-weight:600;color:#8a6d00}
.asset{border:1px solid var(--color-line);border-radius:var(--radius-md);background:#fff;padding:14px;margin-bottom:14px;box-shadow:var(--shadow-xs)}
.asset .ahd{font-size:12px;font-weight:700;color:var(--color-ink-2);margin-bottom:11px;display:flex;align-items:center;gap:7px}
.asset .assetgrid{display:flex;gap:14px}
.asset .assetcol{flex:1;min-width:0}
.asset .assetcol img{width:100%;border-radius:10px;border:1px solid var(--color-line);display:block;box-shadow:var(--shadow-sm)}
.asset .acap{font-size:12px;color:var(--color-muted);margin-top:9px;line-height:1.5}
.nextlbl{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-muted);margin:26px 2px 11px}
.nexts{display:flex;flex-direction:column;gap:9px}
.nextbtn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;padding:14px 16px;border:1.5px solid var(--color-line-2);border-radius:var(--radius-md);background:#fff;font-size:14px;font-weight:600;color:var(--color-ink);cursor:pointer;transition:background-color .13s var(--ease),border-color .13s var(--ease),transform .12s var(--ease)}
.nextbtn:hover{background:var(--color-surface-2);border-color:var(--color-primary)}
.nextbtn:active{transform:scale(.995)}
.nextbtn .arw{color:var(--color-primary);flex-shrink:0}
.note{font-size:12.5px;color:var(--color-muted);margin-top:18px;padding:12px 14px;background:var(--color-surface-2);border-radius:var(--radius-sm);line-height:1.55}

.scrim{position:fixed;inset:0;z-index:60;background:rgba(10,12,16,.42);display:flex;align-items:center;justify-content:center;padding:16px;animation:rf-fade-in .18s var(--ease)}
@media(max-width:560px){.scrim{align-items:flex-end;padding:0}}
.sheet{width:100%;max-width:540px;background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);padding:10px 22px 28px;animation:rf-fade-in .2s var(--ease)}
@media(max-width:560px){.sheet{border-radius:20px 20px 0 0}}
.sheet .grab{width:38px;height:4px;border-radius:9999px;background:var(--color-line-2);margin:8px auto 16px}
.sheet h2{font-size:18px;font-weight:800;margin-bottom:4px}
.sheet .sh-sub{font-size:13px;color:var(--color-muted);margin-bottom:16px}
.rl{display:flex;gap:12px;padding:13px 0;border-top:1px solid var(--color-line)}
.rl .n{width:25px;height:25px;border-radius:8px;background:var(--color-danger);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rl .t{font-size:14px;line-height:1.5}.rl .t b{font-weight:700}
.rl .t .fill{font-weight:700}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(8px);z-index:80;background:var(--color-ink);color:#fff;font-size:13.5px;font-weight:600;padding:12px 20px;border-radius:var(--radius-pill);box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s var(--ease),transform .2s var(--ease)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:860px){
  .bodyrow{display:block;overflow-y:auto}
  .app{height:auto;min-height:100dvh}
  body{overflow:auto}
  .topbar{position:sticky;top:0;padding:0 16px;gap:10px}
  .topbar .logo{transform:translateY(0.5px)}
  body.viewing .hback{margin-left:-16px;transform:translateY(-1.5px)}
  .sidebar{width:100%;border-right:none}
  .sidescroll{overflow:visible}
  .detail{display:none;padding:20px 16px 60px;overflow:visible}
  .detail.welcomeview{display:none}
  .detail .inner{max-width:100%}
  body.viewing .sidebar{display:none}
  body.viewing .detail{display:block}
  .backbtn{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px 0 10px;border-radius:var(--radius-pill);background:var(--color-surface-2);color:var(--color-ink-2);font-size:13px;font-weight:600;border:none;cursor:pointer;margin-bottom:16px}
  .topbar .title,.topbar .sep{display:none}
  body.viewing .topbar .hback{display:inline-flex}
  .asset .assetgrid{flex-direction:column;gap:18px}
}

/* Tagging Convention */
.tg-lead{display:flex;gap:12px;align-items:flex-start;padding:14px 16px;background:#e7f8f6;border:1px solid #b7e7e2;border-radius:var(--radius-md);margin-bottom:20px}
.tg-lead .ti{font-size:17px;line-height:1.3;flex-shrink:0}
.tg-lead .tt{font-size:14px;line-height:1.55;color:#0c5f59}
.tg-lead .tt b{font-weight:800;color:#0a4d48}
.tg-step{border:1px solid var(--color-line);border-radius:var(--radius-md);background:#fff;box-shadow:var(--shadow-xs);padding:15px 16px 16px;margin-bottom:12px}
.tg-when{display:flex;align-items:flex-start;gap:11px;font-size:15px;font-weight:700;letter-spacing:-0.015em;color:var(--color-ink);line-height:1.4}
.tg-num{width:26px;height:26px;border-radius:50%;background:var(--color-ink);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tg-sub{font-weight:500;color:var(--color-muted);font-size:12.5px;display:block;margin-top:3px}
.tg-body{padding-left:37px;margin-top:11px;display:flex;flex-direction:column;gap:9px}
.tg-chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.tg-chip{display:inline-flex;align-items:center;gap:9px;padding:8px 15px 8px 12px;border-radius:var(--radius-pill);font-weight:700;font-size:14px;color:var(--color-ink);background:#fff;background:color-mix(in srgb, var(--tgc) 9%, #fff);border:1.5px solid var(--color-line-2);border-color:color-mix(in srgb, var(--tgc) 34%, #fff);box-shadow:var(--shadow-xs)}
.tg-chip .tg-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;background:var(--tgc)}
.tg-swaptxt{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--color-muted);font-weight:600}
.tg-swaptxt .tg-rm{text-decoration:line-through;text-decoration-color:#c4c8ce}
.tg-arw{color:var(--color-faint)}
.tg-note{font-size:12.5px;color:var(--color-muted);line-height:1.5}
.tg-note b{font-weight:700;color:var(--color-ink-2)}
.tg-why{font-size:12.5px;color:var(--color-muted);line-height:1.55;border-left:2px solid var(--color-line-2);padding:2px 0 2px 11px}
.tg-why .wl{display:block;font-size:9.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--color-faint);margin-bottom:3px}
.tg-lognote{display:inline-flex;align-items:center;gap:8px;margin-top:3px;padding:9px 14px;background:#f4f8ff;border:1px solid #cfe1fb;border-radius:var(--radius-pill);font-size:12.5px;font-weight:700;color:#1a73e8;text-decoration:none;width:max-content;max-width:100%;transition:background-color .14s var(--ease)}
.tg-lognote:hover{background:#e8f1fe}
.tg-lognote .lga{font-weight:800;font-size:14px}
.tg-doc{border:1.5px solid #cfe3ff;background:#f4f9ff;border-radius:var(--radius-md);padding:15px 16px;margin:22px 0 8px}
.tg-doc .dh{font-size:12.5px;font-weight:800;color:var(--color-primary-active);display:flex;align-items:center;gap:7px;margin-bottom:8px}
.tg-doc .dt{font-size:13.5px;color:var(--color-ink);line-height:1.6;margin-bottom:13px}
.tg-doc .dt b{font-weight:700}
.tg-doc .drow{display:flex;flex-wrap:wrap;gap:9px}
.tg-doclink{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 16px;border-radius:var(--radius-pill);background:var(--color-primary);color:#fff;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;transition:background-color .15s var(--ease)}
.tg-doclink:hover{background:var(--color-primary-hover)}
.tg-foot{margin-top:24px;display:flex;flex-direction:column;gap:11px}
.tg-frule{display:flex;gap:11px;align-items:flex-start;font-size:14px;line-height:1.5}
.tg-frule .fi{color:var(--color-success);font-weight:900;flex-shrink:0}
.tg-frule b{font-weight:700}

free year hosting extra year sweeten close today confirm today stall stalling end month no date deadline urgency expiry cheaper price cut deal maintenance 240 120"}, {"id": "meet", "ic": "📞", "tt": "They Want To Meet / Call", "ds": "hot signal, Google Meet", "kw": "call meet google video"}, {"id": "followup", "ic": "⏳", "tt": "Went Quiet After Seeing It", "ds": "7-day decay = urgency", "kw": "followup follow up nurture pressure quiet chase chasing nudge went dark cold ghosted no reply partner boss spouse group chat joint call takedown taken down preview storage confirm"}, {"g": "Objections & Questions"}, {"id": "price", "ic": "💸", "tt": "Price Pushback / Cheaper Guy", "ds": "the SEO proof, hold $590", "kw": "objection price cheaper freelancer seo rank expensive discount too pricey costly budget afford negotiate haggle wix diy"}, {"id": "faq", "ic": "💬", "tt": "Common Questions", "ds": "answer, then redirect", "kw": "faq included hosting own seo how long pay payment deposit email domain revisions whats included question"}, {"id": "timewaster", "ic": "🚩", "tt": "Smells Like A Time-Waster", "ds": "the tells + warm eject", "kw": "time waster eject haggle"}];

var NODES={"tagging": {"title": "Tagging Convention", "kind": "tagging", "do": "Tag EVERY lead the moment they reply, no exceptions. Your phone can't save contacts, so the tags ARE how we track who's who and what stage they're at. Update the tag every time the stage changes.", "lead": "Every lead gets the <b>Lead</b> tag the moment they reply. No exceptions.", "steps": [{"w": "They reply, or send their info (business, logo, or site)", "add": [["Lead", "#1AA7A0"], ["Pending Sample", "#EFB32F"]], "why": "Lead is your saved contact now (your phone can't save it) and it stays on the whole way. Pending Sample means you still owe them the live build."}, {"w": "You send them the sample", "swap": [["Pending Sample", "#EFB32F"], ["Sent Sample", "#AC8673"]], "why": "The ball is in their court now, you're waiting on their reaction.", "log": "if they react well"}, {"w": "No info after you follow up twice", "add": [["Dead Lead", "#24353F"]], "why": "Two nudges with no info means they're not serious. Tagging Dead keeps your live list clean.", "note": "Then <b>archive</b> the chat."}, {"w": "They book a meeting or call", "add": [["Meeting Booked", "#1FD365"]], "why": "A booked call is real intent, this flags who to prep for.", "log": true}, {"w": "They look likely to buy", "sub": "from the meeting, or they said they want it even without one", "add": [["WARM", "#791F39"]], "why": "Likely buyers are your most valuable leads, WARM is who you chase hardest.", "log": true}, {"w": "Deposit paid", "add": [["WON", "#FE8A8B"]], "why": "Deposit paid means it's locked, not just talk."}], "doctext": "For <b>WARM</b>, <b>Meeting Booked</b>, and <b>Sent Sample</b> (if they react well): jot their <b>number + key info</b> in the tracker doc. No format, just keep it updated. This is how we see the leads that actually matter.", "docurl": "https://docs.google.com/document/d/10j826xTjXoXd4m9N1mhuOjSb0JGnhwBGk8jRkP3SnOg/edit?tab=t.0", "foot": ["Tag every lead <b>Lead</b> plus its current stage.", "Keep following up until they buy or go Dead."]}, "newlead": {"title": "New Lead: What To Open With", "tag": null, "label": "pending sample", "intake": ["*Business name + what they do* (the one must-have)", "A site whose *look* they like (highest leverage, builds it to their taste)", "Their *logo*, if any (no stress if not)", "Current website or socials (we reuse their logo + photos)", "Location (confirm Singapore)", "Do they *sell + checkout* online? (catches the e-commerce out-ramp early)"], "do": "SPEED RULE: an FB ad lead is hot for minutes, not hours. Answer in under 10 min, never let a qualified lead sit overnight. Can't build right now? Fire silent#1 to hold them warm, don't go dark.\n\nDon't lead with a form-wall, that's the cheap-guy move. Open human, lead with what THEY get: a real site, live, before they pay. Then get them talking. If they cold-open with \"how much?\", answer that one line first, then still steer to building it live.", "readClient": "If they opened with a specific question (price, time), answer that ONE line first, then ask the business question. Don't ignore what they asked just to run your script.", "scripts": [{"n": "Default opener, outcome + risk reversal", "t": "hey! we'll build your site *live*, free, before you pay a cent.\nwhat's your business + what do you do?"}, {"n": "They opened with \"how much?\"", "t": "hey 🙂 it's *$590* for a full site\npages, mobile, contact form, 1yr hosting + domain + email\neasiest is we just build *yours* live so you see it first\nwhat's your business + what do you do?", "sit": "only when they cold-open with a price question before anything else"}], "next": [{"l": "They Replied → Get Their Info", "to": "gotinfo"}, {"l": "They Went Quiet", "to": "silent"}]}, "gotinfo": {"title": "They Replied: Get Their Info", "tag": null, "label": "pending sample", "do": "the ONLY goal of this phase is to get their custom website BUILT and live. every message here serves that. (internally we call it a sample. to the lead that word does not exist, and neither does \"free\" or \"preview\". to them it is their custom website, always.)\n\nyou cannot build a website for \"service\". you need the actual TRADE: landscaping, plumbing, curtains, aircon, interior design. \"we are in service line\" is UNBUILDABLE. that makes them STUCK, not dead. vague on its own is never a time-waster tell, most owners are just typing between jobs. go get the trade, don't tag them dead.\n\nget the trade from what they ALREADY sent first. sent their site? the trade is on it, go read it. never ask a man for what his own website already tells you.\n\nread what they just sent FIRST, then only chase what's still *missing* — *never re-ask what they already gave.* (the bug: lead sends their site, we reply \"send your site + logo\" — looks like a bot, kills it.)\n\nall you need to build is ONE of two things: their *website link* if they've got a site, or their *logo + what they do* if they don't. never demand both. no brief, no making them pick example links.\n\nnever bring up price, pages or hosting YOURSELF. if they ask, answer in ONE line off the faq and come straight back to the trade. dodging a straight price question reads as a scam.\n\nthe buttons are starting points, not scripts — read their actual reply and freestyle off it. this is where you smell a time-waster: haggling before seeing anything, or fishing about how you work, one note and let them go.", "scripts": [{"n": "They have a website — get the link", "t": "send me your website link and i'll take a look. we'll sharpen the design + set it up to actually get found on google", "sit": "they have a site — just get the link (you reuse their logo + photos off it, so don't also ask for a logo). already sent the link? don't re-ask, just say you're on it. (got nice work in their industry? you can add a line: \"by the way here's some work we're doing in your industry 👇 «link»\".)"}, {"n": "No website — get the logo", "t": "nice — i'll build it from scratch. got a logo? drop it here and i'll build around it, no stress if you don't", "sit": "no site yet. they usually already said what they do at the opener, so ONLY ask for the logo. add \"and one line, what do you do?\" only if you genuinely still don't know"}, {"n": "They want a shop / checkout — qualify first", "t": "quick one so i build the right thing — do people actually pay + check out *on* the site itself? or do you just show your products and they pay elsewhere?", "sit": "they mention selling / a shop / paying online. checkout ON the site = not the $590 build, flag Julian. show products / pay elsewhere = normal build, carry on. don't re-ask what they sell if they said it"}, {"n": "Smells like a time-waster — don't chase", "t": "all good, no pressure. i'll leave it here — message me if you want the site built and i'll sort it", "sit": "needs 2+ tells (haggling before seeing anything / recon on how you work / wants on-site checkout). one line, door open, move on. nothing's built yet so don't mention a live site"}, {"t": "what trade are you in exactly? like landscaping, plumbing, aircon, interior design\njust so i know what i'm looking at before i start", "c": "", "sit": "They gave you something you cannot build: \"service line\", \"services\", \"we do a bit of everything\", or just a company name. You must be able to say their trade out loud before anything gets built.\n\nKeep the examples in the message. People answer 10x faster when they can pick one instead of describing themselves.\n\nA broad umbrella is still vague: \"renovation\", \"construction\", \"engineering\". Ask which part of it they actually do.\n\nASK DIRECTLY. Don't dance around it, don't soften it, don't chat. No trade = no build = nothing happens.\n\nNO ANSWER DESPITE REPEATED ATTEMPTS = HARD TIME-WASTER. A real owner tells you what he does in five seconds, it's the easiest question he'll ever be asked. Someone who keeps dodging it while still asking you about price, ownership or how you work is doing recon, not buying. Tag Dead Lead, archive, move on. (Vague ONCE is just a distracted owner. Vague repeatedly AFTER being asked straight is the tell.)\n\nDon't quote, don't talk pages, don't scope. If they ask price, answer it straight off the faq in one line, then come back to the trade."}], "next": [{"l": "Got Their Logo / Link → Build It", "to": "building"}, {"l": "They Sell + Checkout Online", "to": "store"}, {"l": "Smells Like A Time-Waster", "to": "timewaster"}]}, "silent": {"title": "They're Not Replying", "tag": {"x": "cool"}, "label": "follow up", "do": "One nudge only. Still nothing, mark follow up and move on. Don't chase a ghost.", "readClient": "Read-then-quiet or never-opened, treat the same. One nudge either way, then park.", "scripts": [{"n": "Direct nudge (mass-send to non-repliers)", "t": "Hi! Please send me your brand name and logo/website (if you have), so I can create a *custom website* for you to see. Much appreciated 🙏🏻"}, {"n": "They replied but vague (e.g. \"cosmetic business\")", "t": "nice 🙌 to make it look like *your* brand, not a generic template\njust drop your *brand name + logo*\nor even a site you like the look of\nwe'll have your *live* version up shortly", "sit": "only when they gave a reply but it's too vague to build from"}], "next": [{"l": "They Replied", "to": "gotinfo"}, {"l": "Still Nothing → Nurture", "to": "followup"}]}, "store": {"title": "They Want A Shop / Checkout", "tag": {"x": "warm"}, "label": "follow up", "do": "A real on-site cart/checkout is NOT the $590 product. Catch it early, don't quote, don't scope. Confirm it's genuine checkout ON the site, then flag Julian. Products that link OUT to an external checkout (e.g. HitPay) are still a normal $590 site, build those as usual.", "readClient": "\"Showcase my products\" with no checkout is still a normal $590 site. Products linking OUT to an external checkout like HitPay are also still a normal $590 site. Only a real cart/payment ON the site itself is the out-ramp. Don't out-ramp a catalogue or a HitPay link.", "scripts": [{"t": "quick one so i build the right thing — do people actually pay + check out *on* the site itself? or do you just show your products and they pay elsewhere?"}], "next": [{"l": "Real On-Site Checkout → Flag Julian", "to": "newlead"}, {"l": "Catalogue / Pay Elsewhere → Get Their Info + Build", "to": "gotinfo"}]}, "building": {"title": "It's Building", "tag": null, "label": "pending sample", "do": "you build nothing, the system does. drop one holding line so there's no dead air, then wait for the live link. don't over-explain, just keep them warm.", "scripts": [{"t": "building your site now, gonna make it beautiful, will send you the live link shortly\nstay tuned you will be amazed 💪🏻"}], "next": [{"l": "It's Live → Send It", "to": "reveal"}]}, "reveal": {"title": "Send Them The Live Site", "tag": {"x": "cool"}, "label": "sample sent", "do": "it's their real live site, never call it a sample. send BOTH messages together: the link, then the question. no price, no expiry here, that comes after they react. only edit the «link».", "readClient": "fire back fast and excited? go straight to close. open it and say nothing? not a no, just busy. don't fill the silence, let the follow-up do the work.", "scripts": [{"n": "Message 1, send the link", "t": "made your site, it's live 👉\n«link»"}, {"n": "Message 2, send right after", "t": "what do you think? anything you'd tweak, i'll sort it"}], "next": [{"l": "Read How They React", "to": "telemetry"}], "combo": "Send both messages, one right after the other"}, "telemetry": {"title": "They Saw It: Read The Reaction", "tag": null, "label": "sample sent", "do": "don't ask 'how urgent is this?', read it. the first 1 to 2 replies set the temperature. a tweak request is the #1 buy signal, they're decorating a house they've moved into, send to close, not price. only a real price haggle goes to price. unsure? default warm. cold is a pattern (2+ tells), never one slow reply. hot means close in the same convo today, warmth's half-life is hours. warm and cold-silent both press the nurture button; only a hard 2+ tell pattern is a time-waster.", "readClient": "*🔥 HOT, close TODAY*\n\"wah nice\" / \"looks good\" / ANY tweak (change colour, add logo, put my number) / asks about their own stuff (is this my domain, got the whatsapp button, can i get the email) / \"how much?\" AFTER praising / forwards it / fast multi-message replies.\n\n*🌤 WARM, one soft ask now then cadence*\n\"ok thanks will look\" / \"noted\" / 👍 then quiet / \"looks ok\" / a genuine \"check with my partner\".\n\n*🧊 COLD or SUSPECT, qualify first*\nhaggles BEFORE complimenting / won't give one input after 2 asks paired with a hard tell / ghosts then only haggles / agency recon (what stack, can i get admin, source files).\nsilence on assets alone is NOT cold, busy owners are just slow to dig out a logo.", "scripts": [], "next": [{"l": "🧭 The Decision Tree", "to": "tree"}, {"l": "Loves It / Wants A Tweak → Close", "to": "close"}, {"l": "Pushes On Price (Real Haggle)", "to": "price"}, {"l": "Neutral Question (No Praise Yet)", "to": "faq"}, {"l": "Wants To Call Or Meet", "to": "meet"}, {"l": "Warm, Quiet, Or Checking With Someone", "to": "followup"}, {"l": "Haggling Pattern (2+ Tells)", "to": "timewaster"}]}, "close": {"title": "They Like It: Proceed + Invoice", "tag": {"x": "hot"}, "label": "closed, invoice", "do": "⭐ *say the price BEFORE you ask for the invoice.* never \"shall i send you the invoice?\" on its own — the price, what's included, and the deposit go in the SAME message. read 🧭 The Decision Tree below if unsure.\n\nthey're warm 🙂 don't dump everything on them.\npick what's happening below and you'll get the right lines.\ncore idea: small yeses, not one big ask.\nthe *company name* + the *deposit* are the actual close. you never invoice, Julian does.", "readClient": "clear yes? go straight to the ladder, get the *company name*, don't re-sell.\nthey wobbled? open \"they hesitated\".\nthe deposit is what locks the slot, not the invoice. drive to that.\nnever offer the −$100 to save it, that's Julian's call only.", "scripts": [], "next": [{"l": "🧭 The Decision Tree", "to": "tree"}, {"l": "▶ Walk Them Up The Ladder (The Close)", "to": "close_ladder"}, {"l": "They Hesitated Or Objected", "to": "close_wobble"}, {"l": "They Asked A Question (Pay, Feature, Quote)", "to": "close_asks"}, {"l": "Wants A Call Or Meet", "to": "meet"}, {"l": "Turns Into A Haggle", "to": "price"}]}, "close_ladder": {"title": "The Close, Walk Them Up The Ladder", "tag": {"x": "hot"}, "label": "closed, invoice", "do": "a tweak = the buy signal, NOT free work. acknowledge it (do NOT build it yet), then lock the deal:\n1. lock the domain (or confirm the one they have)\n2. get the *company name* → Julian invoices (70% deposit starts the 5-day build)\n3. ping Julian\nskip rungs on a clear yes, don't re-sell a sold deal.", "readClient": "the deposit locks the slot, not the invoice. keep moving till it's in.\nskip the value stack on a clear yes.\nanchor *$590* once, in writing, before the word invoice lands.", "scripts": [{"n": "They sent a tweak → lock the domain (default)", "t": "easy change 👍\nlet's lock your domain so it's yours.\n*yourbiz.com*, or you got a name in mind?"}, {"n": "They already have a domain → get the company name", "t": "easy change 👍🏻\nshall we get started with the project then?\nlet me know the company name to invoice to"}, {"n": "They gave a domain name → confirm + company name + start", "t": "*«name».com* it is then\nlet me know your company name, will invoice you then secure the domain\nand we will officially start the project"}, {"n": "Ping Julian (internal, NOT the client)", "t": "closed 🎉 «business»\ndomain: «name».com\ninvoice to: «company name»\nthey're in, live in 5 days", "sit": "internal message to Julian only, never send to the client"}], "next": [{"l": "Got The Deposit → Win The Next One", "to": "newlead"}, {"l": "They Hesitated → Handle It", "to": "close_wobble"}, {"l": "They Asked Something", "to": "close_asks"}]}, "close_wobble": {"title": "The Close, They Hesitated Or Objected", "tag": {"x": "warm"}, "label": "closed, invoice", "do": "they like it but stalled. don't push.\n\nanswer the exact blocker, lean on value plus the fact they've already SEEN their real site. if they still defer, drop them into the follow-up cadence, the decaying site does the chasing. \"let me think\" comes first, diagnose the real blocker before anything else.", "readClient": "One value rung, not five. Diagnose before you sell. If they grind price before valuing anything, that's the time-waster tell. Never offer the discount, that's Julian's call only.", "scripts": [{"n": "\"let me think\" (keep-alive + find the real blocker)", "t": "totally fair 👍\nyour live site stays up a few more days so you won't lose it.\nquick one, is it the timing or something about the site itself?"}, {"n": "\"maybe next month\" (hold it with a small deposit)", "t": "no rush 👍\ntoday's *$590* is locked in for you.\na small *deposit* pencils your slot so it's ready whenever you start.\nwant me to hold it that way?"}, {"n": "\"what if i pay and don't like it?\"", "t": "that's the whole point of doing it this way 🙂\nyou've seen your site *live* before paying a cent.\nplus *3 full rounds* of changes after, we don't stop till it's how you want it."}, {"n": "Value stack (only if they ask what they get)", "t": "all in for *$590*:\nup to 8 pages, mobile-optimised\nSEO set up so you show on google\ncontact form to your phone + whatsapp button\n1yr free hosting, domain + email\n3 rounds of revisions\nlive in 5 days"}, {"n": "Dream outcome (emotional / visual buyer)", "t": "in 5 days when someone googles you, *this* is what they see 🙂\nlooks like a real, established business."}], "asset": [{"src": "whats-included-fullseo.png", "cap": "The full $590 package. Save it once, send on WhatsApp."}], "next": [{"l": "Warmed Up → Back To The Ladder", "to": "close_ladder"}, {"l": "Still Deferring → Follow-Up Cadence", "to": "followup"}, {"l": "Turns Into A Haggle", "to": "price"}]}, "close_asks": {"title": "The Close, They Asked A Question", "tag": null, "label": "closed, invoice", "do": "a logistics question mid-close.\n\nanswer it in one clean line, then steer straight back to locking it in. lead with the deposit, it's what holds the slot.", "readClient": "Answer the fact in one line, don't open a whole new conversation. Then bring it back to locking the slot. Cart or checkout ON the site is a different build, flag Julian.", "scripts": [{"n": "\"how / when do i pay?\"", "t": "easy 🙂 i send the invoice.\n*70% deposit* kicks off the build, *30%* when it's live and you're happy.\nthat deposit's what locks your 5-day slot. want me to send it over?"}, {"n": "\"send me a proper quote / proposal\"", "t": "yep 🙂 i'll get a proper quotation over.\nit's *$590* all in, everything spelled out so your team can circulate it.\nwhat's the *company name* to put on it, and who do i address it to?"}, {"n": "\"can you add [a feature]?\" (booking, gallery, map, reviews)", "t": "yeah we can usually work that in 🙂\ntell me exactly what you're picturing.\nsmall stuff's included, anything bigger we'll price fair. let's lock your main site first 👍", "sit": "FEATURES ONLY (booking, gallery, map, reviews). A PAGE is never \"small stuff\" — page count is locked at scope and an extra page is a paid add-on. If they ask for a PAGE here, use the faq page rows, do not say \"we can work that in\"."}, {"n": "Cart + checkout on the site (hard scope, flag Julian)", "t": "ahh cart + checkout on the site is a different build 👍\nthe *$590* is a full lead-gen site, not a store.\ni'll get you the right plan for that separately.\nwant me to lock your main site first?", "sit": "only when they want real checkout ON the site (not just products linking out to HitPay). Flag Julian, he qualifies real ecommerce himself."}], "next": [{"l": "Answered → Back To The Ladder", "to": "close_ladder"}, {"l": "Back To The Close", "to": "close"}]}, "meet": {"title": "They Want To Meet / Call", "tag": {"x": "hot"}, "label": "sample sent", "do": "buying intent in SG, say yes fast. default a google meet, keeps the energy. offer 2 concrete slots not \"when works?\", it books about twice as fast, and add a text fallback so a wifi hiccup never kills it. show the live site + SEO proof, then close on the spot. once a slot's booked, secure it before the call.", "readClient": "A meet ask is hot, don't cool it with admin. Swap in your real free windows for the two slots. Offer text as an easy fallback. A booked call keeps the current label (ball's with them to show up); a no-show flips to follow up.", "scripts": [{"n": "They ask to meet at THEIR office", "sit": "*USE WHEN they ask you to come down / meet in person.*\n\nDon't say \"too far\" — that makes them the problem.\nFrame the google meet as the better option (it is):\n\n•  get their whole team + ours on, no travel\n•  share screen and walk the live site together\n•  you can read off your notes live\n\n→  Then offer 2 concrete slots (see the script below).", "t": "honestly a google meet works way better for this\ni can get our whole team on + we can share screen and go through exact changes with you"}, {"n": "“where's your office?”", "sit": "*USE WHEN they ask where you're based.*\n\nSay it plainly. Never hide it, never dodge — a straight answer builds more trust than a vague one.\n\nThen steer straight back to booking the google meet.", "t": "we have a virtual office based in woodlands"}, {"n": "Say yes, 2 slots + text fallback", "t": "yeah let's do it 🙂\nquick call, i'll walk you through your *live* site + show the SEO side, then we get it going.\n*today 5pm* or *tmrw 11am*? or if easier we just sort it here over text 👍"}], "next": [{"l": "On The Call → Close", "to": "close"}, {"l": "No-Show → Follow Up", "to": "followup"}]}, "followup": {"title": "Went Quiet After Seeing It", "tag": {"x": "cool"}, "label": "follow up", "do": "point every touch at their real live site, never 'just checking in'. read what they DID and pick the matching line. don't presume they loved it, if they never praised it use the neutral nudge. *NEVER park a lead just for going quiet.* Slow is not dead — real closes here have taken 14 and 25 days. THE CADENCE: D+1, D+3, D+6 (wind-down), D+10, then monthly forever. Only ever archive on an explicit no. any reply re-warms them, drop the cadence and re-read the temperature. INTERNAL: hold a preview 7 to 10 days, frame the wind-down as a warm heads-up, never a threat. the final takedown notice is the LAST touch before you park them, it names a date but always offers more time.\n\n*INVOICE OUT, NO MONEY IS A DIFFERENT SITUATION.* The deal is already won — chase, never sweeten. If they say \"will pay today\" and there is no screenshot by the next morning, chase that morning. Every promised payment date goes in the Watchlist the minute they say it.", "readClient": "saw it then silent, use the neutral nudge, do NOT presume praise. praised it then went quiet, use the 'glad you liked it' line. deferring to a partner, send the live link, then offer a group chat, then a joint call if it repeats.", "scripts": [{"n": "They went quiet, neutral nudge (default)", "t": "did you get a look at your site? 🙂\nwhat do you reckon? anything you'd tweak, i'll sort it"}, {"n": "A date THEY gave you has arrived", "sit": "*USE WHEN a date the lead named has arrived — or just passed.*\n\nCovers both:\n•  a promise — \"i'll get back to you Monday\"\n•  a timeline — \"end month\" · \"once I'm back Thursday\"\n\n⚠️  *SWAP IN THEIR ACTUAL WORDS.* Never send this with the wrong date in it —\n      quoting a date they never said makes you look like you weren't listening.\n\nExamples:\n•  \"you mentioned end of the month — any updates?\"\n•  \"you mentioned you'd check with your partner by monday — any updates?\"\n\nEvery time a lead names a date → write it in the Watchlist that minute.\n\n→  Still no firm date after this? Go to *They're Stalling: Unstick It*.", "t": "hi you mentioned [their exact words] — any updates?"}, {"n": "Last call, gentle wind-down (day 7 to 10)", "t": "just a heads up, i'll be winding your live preview down soon 🙂\ndidn't want it to disappear on you.\nwant me to keep it up + get it onto your domain? no rush either way"}, {"n": "They praised it then went quiet", "sit": "only if they actually said something positive first", "t": "glad you liked it 🙂\nwant me to lock it onto your domain so it's yours?\njust say the go-ahead 👍"}, {"n": "They're checking with a partner / boss", "t": "makes sense 🙂\nsend them the live link, way better than describing it.\ni'll hold your site + today's price. when are you seeing them?"}, {"n": "Loop the partner in (group chat, try this before a call)", "sit": "when they say they need to check with a partner, boss or spouse", "t": "perhaps you could create a group chat, so we're all on the same page over here 🙂\nand i can explain the key points"}, {"n": "Partner keeps stalling, offer a joint call (flushes fake stalls)", "sit": "when the partner deferral repeats or smells like a stall", "t": "happy to jump on a quick call with you both 🙂\ni'll walk you both through the live site.\nwhat works for the two of you?"}, {"n": "Final takedown notice (last touch before you park them)", "sit": "only when a live preview is actually up, and only after the gentle wind-down", "t": "hey there, take note that the live preview will be taken down tomorrow to save storage.\nlet me know if you need more time, or if you're able to confirm the project\n\nit's only $590 + we already designed a full preview for you to see 👍🏻🙏🏻"}], "next": [{"l": "Still Stalling → Unstick It", "to": "lever"}, {"l": "Replies → Re-Read Temperature", "to": "telemetry"}, {"l": "Warms Back Up → Close", "to": "close"}, {"l": "No Reply After Day 7 → Park", "to": "park"}]}, "price": {"title": "Price Pushback / Cheaper Guy", "tag": {"x": "warm"}, "label": "follow up", "img": "seo-proof.webp", "imgcap": "Real client, Google Search Console. 6.25k clicks, 405k impressions, climbing. Send this with Msg 1.", "do": "HOLD *$590*, never match, never unbundle. Lead with the proof as a plain fact, not an apology. The SEO/ranking attack is situational: only swing it when they're actually haggling or care about ranking, not by default. If they keep grinding, the \"who runs it\" line, then go quiet and flag Julian. Human voice, lowercase, contractions. Perfect grammar is the bot tell. The −$100 is Julian's call only.", "readClient": "\"Can you do better on price?\" is usually a reflex, not a wall. Re-anchor on proof once. If they grind a second time, stop selling, go quiet, flag Julian. Grinding before valuing anything is the time-waster tell.", "scripts": [{"n": "Message 1, the proof (send with the screenshot)", "t": "here's the difference, we actually *rank* you 👇\none client's pulling *6,000 visits a month* off google.\nask the cheaper guys to show their SEO proof. most can't 🙂", "sit": "only if their current site's genuinely weak + they're complaining about it (or they're haggling / care about ranking)"}, {"n": "Message 2, only if they keep pushing", "t": "you're not buying a page.\nyou're buying the people who *run + rank* it.\nhappy to keep it at *$590* 👍"}, {"n": "“my nephew / Wix can do it cheaper” (DIY)", "t": "for sure you could 🙂\nbut a diy or template site won't *rank* on google, so no leads.\nwe build yours to get found, and run it all for you.\nwant customers finding you? you know who to go with. *$590*", "sit": "only when they raise a cheaper DIY/Wix option and ranking or leads actually matter to them"}], "next": [{"l": "Cleared, They're Warming → Close", "to": "close"}, {"l": "🎁 Offer The Free Year", "to": "lever"}, {"l": "Only Wants Cheaper → Flag Julian", "to": "timewaster"}, {"l": "Went Quiet", "to": "followup"}]}, "lever": {"title": "They're Stalling: Unstick It", "tag": {"x": "warm"}, "label": "warm", "do": "*The lead has gone soft. Pick the reason below — the fix is different for each.*\n\n⚠️ If they went quiet and NEVER said yes → that's not this card.\nUse *Went Quiet After Seeing It* instead. The preview wind-down lives there.\n\n*THE ONE LEVER:* one extra year of hosting. That is the only thing you may ever add to a deal.\nThe $590 NEVER moves. No cash discounts, ever — that's Julian's call alone.\n\n• Always attach a reason (\"i'm locking in the next batch of projects\"). Without one it reads desperate.\n• Never extend it. If they can't confirm today, drop it and go back to normal follow-up.\n• One per deal. Never stacked. Never after the invoice is out.\n• Log every use in the daily digest.\n\n*Hosting price:* say $240/year, first year free.\nIf they say our ad says $120 → then it's $120. No argument. Never volunteer $120.", "scripts": [{"n": "They're keen — but never officially confirmed", "sit": "*USE WHEN — all 3 are true:*\n\n1.  They've shown they want it\n     \"ok can\" · \"mostly all good\" · \"yes end month\"\n\n2.  But they have NOT given the official go-ahead\n     no company name · no invoice out · nothing locked in\n\n3.  Any date they gave is vague\n     \"end month\" · \"next week\" · \"after our meeting\"\n\n⛔  NOT if they're still asking questions\n      → too early. Answer, then ask for the company name.\n\n⛔  NOT if the invoice is already sent\n      → then you chase. You never sweeten.", "t": "if we can confirm today i can include an extra year of hosting free\ni'm locking in the next batch of projects this week"}, {"n": "“we're not ready yet” / “need to get our things together”", "sit": "*USE WHEN the delay is about being READY, not money:*\n\n•  \"we need to put our things together\"\n•  \"we don't have the photos yet\"\n•  \"we're relocating\" / \"after our event\"\n•  \"once we sort out X\"\n\nThey think they must be fully prepared before starting. This removes that.\n\n⚠️  If they reply *\"what is the deposit?\"* → that's a straight buying signal.\n      Get the company name and invoice immediately.", "t": "could we confirm the start of the project first? just need the deposit to confirm\nno rush on the info — you can send it over whenever you're ready"}, {"n": "They ask for a discount / mention a cheaper guy", "sit": "*USE WHEN they ask for money off directly:*\n\n•  \"can you do cheaper\"\n•  \"any discount\"\n•  \"my budget is X\"\n•  \"someone quoted me less\"\n\nNever counter with cash. Redirect to the lever ONCE, then stop talking.\n\n⛔  If they keep grinding after this → flag Julian.\n      Do not negotiate further. Do not invent anything.", "t": "the $590 is fixed sorry\nwhat i can do is an extra year of hosting free if we confirm today"}, {"n": "Invoice is out — but no money yet", "sit": "*USE WHEN the invoice is sent and they've gone quiet on payment.*\n\n⛔  NEVER offer the lever or anything else here.\n      The deal is already won. Sweetening now teaches them that waiting gets them more.\n\nJust chase — politely, specifically, repeatedly.\n\n✅  Ask for a same-day settle\n✅  Give them the reference number so there's nothing left to work out", "t": "could you settle it today?\nbtw pls put the ref as [number]"}], "next": [{"l": "They Confirmed → Close + Invoice", "to": "close"}, {"l": "Quiet, Never Said Yes → Went Quiet", "to": "followup"}, {"l": "Still Grinding On Price", "to": "price"}, {"l": "🧭 The Decision Tree", "to": "tree"}]}, "faq": {"title": "Common Questions", "tag": null, "label": "", "do": "Answer the fact in ONE short line, then steer straight back to the site. Never just answer and wait. Keep their current stage label. De-emmed, human, lowercase. If nothing is built yet, the steer is the TRADE, not the site.\n\nPAGE CAP: 8 is a CEILING, not an entitlement. Always say \"up to 8 pages\". NEVER say \"8 pages included\", \"you get 8 pages\", or \"our package includes 8 pages\" — that turns a cap into something they are owed. The page count is scoped by US from their actual services (home, about, contact + one per main service) and is LOCKED once scoped. That formula is YOURS, never the client's — never tell a client \"a page for each main service\", they will decide what counts. NEVER invite them to save or bank unused pages for later. There is no page bank. An extra page after scoping is a paid add-on and is NOT part of the 3 rounds. Fewer pages NEVER means a lower price.\n\nHOSTING: say $240/year, first year free. If the lead says our ad or graphic says $120, then it is $120 — no argument, no explanation, do not defend the difference. Those are the only two numbers that exist and you NEVER volunteer $120. Hosting and maintenance are ONE thing — never describe it as just servers, it is us running and supporting the site. ⛔ There is no cash discount. The $590 never moves and that is Julian's call alone. The ONLY thing you may add to a deal is an extra year of hosting — see the Free-Year Lever card for exactly when.\n\nSEO GUARANTEE: never answer a guarantee question with a leading yes. Your FIRST words answer the GUARANTEE, not the seo. Never claim or agree to a guarantee, a ranking, page 1, number 1, a timeframe or a lead count — you may only use those words to REFUSE. Never estimate months, traffic or leads. Past proof is fine (another client's real google numbers already happened, that is the price node's job). The line is TENSE: what a past client GOT = allowed, what this lead WILL GET = never. Only ever claim the BASIC seo setup inside the $590.\n\nUPTIME: this is the ONE guarantee you are allowed to give — 99.9% uptime, monthly. It is the exception to the rule above, and it is the ONLY exception. Say the number plainly, do not hedge it. But the compensation is ALWAYS free hosting time, never money: 7 days free hosting if we fall under 99.9% in a month, 15 days under 99%, 30 days under 95%. NEVER quote a dollar refund. NEVER agree to cover lost sales, lost bookings, lost customers, lost data or lost business — the free hosting credit is the ONLY thing we ever owe, and that is the whole point of having a number. Scheduled maintenance, their expired domain, and anything on their side or a third party's side do not count as downtime. If a client claims a loss, asks for cash, or disputes our uptime figure → do not negotiate, flag Julian.", "scripts": [{"n": "“How much is hosting?”", "t": "$240/year, first year is free\nour servers are in singapore so the speed is very fast"}, {"n": "“what's the uptime guarantee?”", "t": "we guarantee 99.9% uptime and monitor the servers 24/7\nour servers are in singapore so it's fast and stable", "sit": "Say the number, then stop. Do NOT volunteer the compensation — that is the NEXT script, and only if they ask. Never add \"basically never goes down\", never promise it will never go down, never give an example of a past outage."}, {"n": "“what if you don't hit 99.9%?”", "t": "if we fall below it in a month we add free hosting time to your account\nyou don't have to chase us for it, we track it", "sit": "⛔ THE GUARDRAIL. The compensation is FREE HOSTING TIME. Never a dollar figure, never a refund, never cash. NEVER agree that you will cover lost sales, lost bookings, lost customers or lost business — that is the one answer that can actually cost Julian money. If they push for money, quote a loss, or say \"what about the sales i lost\" → do NOT negotiate, do NOT apologise with a number, flag Julian. You may also say the exact days: 7 days free hosting if we're under 99.9%, 15 if under 99%, 30 if under 95%. Do not invent any other number."}, {"n": "“Do I own it?”", "t": "yes, you own the full website once the build is finished\nwe're the ones running it and doing the work on it, hosting included", "sit": "Ownership and operator in one breath. \"Run\" is the verb. If you compress this to \"we're basically just the admin\" you have just described the competitor and thrown away the whole moat."}, {"n": "“How long does it take?”", "t": "it takes around 5 days to complete as long as you can provide your revision comments on time"}, {"n": "“What's included?” (send the graphic above + this)", "t": "here is the package, let me know if you have any questions", "img": "whats-included-fullseo.png"}, {"n": "“are you legit / is this a scam?”", "t": "we work with many big companies, check our acra, review and portfolio"}, {"n": "“is it one-time or monthly? any hidden fees?”", "t": "$590 for the website, $240/year for hosting and $16/year for domain, no fees if you already own your domain name or hosting"}, {"n": "“who maintains it / changes later?”", "t": "we will help you make text and images changes. it is wordpress infrastructure so it is extremely easy"}, {"n": "“can my staff get email too? how many?”", "t": "you can get as many domain email addresses (yourname@domain.com) as you want with a combined limit of 40gb"}, {"n": "“can i see more examples / your portfolio?”", "t": "Sure you can checkout reputifly.com/portfolio if you'd like"}, {"n": "“I already have my own hosting / domain”", "t": "yep, still *$590* — same price whether you've got your own or not\nfirst year's included free either way.\nif you already have your own domain or hosting, you keep it and just skip our yearly renewal on that side. everything else is exactly the same"}, {"n": "“How many pages do I get?”", "t": "we work out the pages from your services, so it fits what you actually do\nusually home, about, contact and your main ones\n\ndid you get a look at the site we built you?", "sit": "8 is OUR ceiling, not their package. Do NOT volunteer a number here — this lead never asked for one. Never say \"8 pages included\" or \"you get 8 pages\". Never invite them to save pages for later, there is no page bank.\n\nNOTHING BUILT YET? Do NOT end with \"did you get a look at the site we built you?\" — there is no site. Steer to the trade instead: \"what's your trade exactly? plumbing, aircon, curtains? we'll build you a real one so you can see it\""}, {"n": "“Does it include a landing page?”", "t": "yes we design your home page to be the landing page to convert leads"}, {"n": "“Does it include my Google reviews?”", "t": "we pull in your actual google reviews it automatically updates"}, {"t": "8 is the most we build, it's not a fixed number\nwe scope your page count off your services\n\ndid you get a look at the site we built you?", "c": "", "sit": "The repair line for when the cap has already been mis-sold as an entitlement (Farhan: \"our package includes 8 full pages\"). Correct it early and calmly, say it once, then back to the site. If they already paid, or 8 was promised in writing, do NOT fix it yourself, flag Julian.\n\nNOTHING BUILT YET? Do NOT end with \"did you get a look at the site we built you?\" — there is no site. Steer to the trade instead: \"what's your trade exactly? plumbing, aircon, curtains? we'll build you a real one so you can see it\""}, {"t": "can't guarantee rankings, that part is google's call\nwhat's included is the basic seo setup, we help your site get found on google\n\ndid you get a look at the site we built you?", "c": "", "sit": "THE MAIN ONE. Your FIRST words answer the guarantee, not the seo. On WhatsApp two short lines send as two messages — if the reassuring half goes first and the refusal never lands, you have said yes. Refusal first, every time.\n\nNever open with \"yes\". Never say \"seo is included\" bare, always \"basic seo setup\". Never estimate months, traffic or leads.\n\nNOTHING BUILT YET? Do NOT end with \"did you get a look at the site we built you?\" — there is no site. Steer to the trade instead: \"what's your trade exactly? plumbing, aircon, curtains? we'll build you a real one so you can see it\""}, {"t": "page 1 isn't something anyone can guarantee, us or anyone else\nwhat we control is the setup, we build the site so google can read it and find your business", "c": "", "sit": "The harder version. Never say yes, never say maybe, never say \"we usually get people there\". Say nobody can, then hand them the thing we actually control."}], "next": [{"l": "Back To Their Reaction", "to": "telemetry"}, {"l": "No Trade Yet → Get Their Info", "to": "gotinfo"}, {"l": "They're Ready → Close", "to": "close"}]}, "timewaster": {"title": "Smells Like A Time-Waster", "tag": {"x": "dead"}, "label": "time waster", "do": "Tell them apart on BEHAVIOUR, not vibes. Need 2+ tells before writing anyone off. A false-positive on a real buyer costs $590, a false-negative on a waster costs minutes, so bias toward KEEPING them. The decaying live site is the perfect free filter: a real buyer claims it, a waster lets it die. Real-but-cheap gets #1 (the value proof) NEVER the discount. \"Won't give an input after 2 asks\" is NOT a tell on its own (busy SG owners are genuinely slow), it only counts paired with a hard tell.", "readClient": "*🚩 Tells, need 2+ (at least one HARD)*\nHARD = haggles before engaging the site / agency-recon (admin, source files, what platform, can i self-host) / moves goalposts every answer / \"send me another version free\".\nSOFT (only with a hard tell) = won't give one input after 2 asks / ghosts then only haggles.\n\n*✅ REAL but slow, keep going*\nreplies in bursts but ENGAGES the site / gives real inputs even if slow / \"check with partner\" with specifics / asks ownership questions / apologises for being slow (wasters never do).", "scripts": [{"n": "Real-but-cheap (grinds price but wants it), value proof, never discount", "t": "the *$590* already bakes in a year of hosting + domain + business email 🙂\nrivals bill that yearly on top, so it's earning its keep before you spend a cent more"}, {"n": "Confirmed time-waster (2+ tells), ONE warm exit, then let it decay", "t": "no worries 🙂\nwe'll leave your site up a few days in case you change your mind 👍"}], "next": [{"l": "Real-But-Cheap → Value Proof", "to": "close"}, {"l": "Confirmed Waster → Warm Exit + Park", "to": "park"}]}, "park": {"title": "Parked: Let It Go", "tag": {"x": "de the invoice?&rdquo; Then send the invoice, 70/30.</div></div></div><div class=\"dt-or\">or</div><div><div class=\"dt-drop\"></div><span class=\"dt-chip dt-chip-no\">No / Unsure / Others Involved</span><div class=\"dt-card dt-teal\"><div class=\"dt-t\">The 5-Minute Call</div><div class=\"dt-s\">&ldquo;perfect, let&rsquo;s have a quick 5 min call, i need to clarify some info about your business&rdquo; Then close on the call.</div><div class=\"dt-s2\">The tells: &ldquo;before we get everyone involved&rdquo; &middot; &ldquo;let me check with my partner&rdquo; &middot; wants a formal quote &middot; hedges instead of answering</div></div></div></div><div class=\"dt-exc\">&#9889; The only exception: he is begging to pay from the start. Then you may skip the confirmation and go straight to the invoice, the price still goes in that same message.</div><div class=\"dt-rule\">&#9940; Never Ask For The Invoice Before The Price Is Said</div></div>", "scripts": [{"t": "the total price for the project is *$590*, we just require a *70% deposit* which is *$413*\nthose changes are extremely easy, don't worry\n\nshall we start the project?", "c": "", "sit": "Message 1. Price + confirmation in ONE message. Send it the moment he says he likes it or wants changes."}, {"t": "perfect, what's the company name to put on the invoice?", "c": "", "sit": "Message 2. Only after a clean yes. Then send the invoice, 70/30."}, {"t": "perfect, let's have a quick 5 min call, i need to clarify some info about your business. when are you free today?", "c": "", "sit": "When he can't say yes alone (partner, boss, committee) or he hedges. Small ask, big signal: 5 minutes is easy to agree to, but showing up means he's buying."}], "next": [{"l": "Send The Live Site", "to": "reveal"}, {"l": "Read Their Reaction", "to": "telemetry"}, {"l": "They're Ready → Close", "to": "close"}]}};

var sidescroll=document.getElementById("sidescroll"),detail=document.getElementById("detail");
var curScripts=[],curId=null,listScroll=0,navStack=[],_suppressHash=false;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function waFmt(s){
  var e=esc(s);
  e=e.replace(/\*([^*\n]+)\*/g,"<b>$1</b>");
  e=e.replace(/«([^»]+)»/g,'<span class="fill">$1</span>');
  return e;
}

function fnorm(s){return (s||"").toLowerCase().replace(/[^a-z0-9 ]+/g," ").replace(/\s+/g," ").trim();}
function flev(a,b){var m=a.length,n=b.length;if(Math.abs(m-n)>2)return 9;var dp=[],i,j;for(j=0;j<=n;j++)dp[j]=j;for(i=1;i<=m;i++){var prev=dp[0];dp[0]=i;for(j=1;j<=n;j++){var tmp=dp[j];dp[j]=Math.min(dp[j]+1,dp[j-1]+1,prev+(a.charCodeAt(i-1)===b.charCodeAt(j-1)?0:1));prev=tmp;}}return dp[n];}
function fsub(q,w){var i=0,j=0;for(;j<w.length&&i<q.length;j++)if(q.charCodeAt(i)===w.charCodeAt(j))i++;return i===q.length;}
function ftok(tok,hayStr,words){
  if(hayStr.indexOf(tok)!==-1)return true;
  if(tok.length<3)return false;
  for(var k=0;k<words.length;k++){var w=words[k];if(!w)continue;
    if(w.indexOf(tok)===0)return true;
    if(tok.length>=4&&fsub(tok,w))return true;
    if(flev(tok,w)<=(tok.length<=5?1:2))return true;}
  return false;
}
function fmatch(f,hayStr,words){
  var toks=f.split(" ");
  for(var t=0;t<toks.length;t++){if(toks[t]&&!ftok(toks[t],hayStr,words))return false;}
  return true;
}
function renderSidebar(filter){
  var f=fnorm(filter),h="",shown=0,pending="";
  for(var i=0;i<MENU.length;i++){
    var m=MENU[i];
    if(m.g){pending='<div class="grouplabel">'+esc(m.g)+'<span class="gline"></span></div>';continue;}
    var hayStr=fnorm(m.tt+" "+m.ds+" "+(m.kw||"")),words=hayStr.split(" ");
    if(f&&!fmatch(f,hayStr,words))continue;
    if(pending){h+=pending;pending="";}
    h+='<button class="srow'+(m.id===curId?" active":"")+'" data-go="'+m.id+'"><div class="ic">'+m.ic+'</div>'+
       '<div class="tx"><div class="tt">'+esc(m.tt)+'</div><div class="ds">'+esc(m.ds)+'</div></div></button>';
    shown++;
  }
  if(!shown)h='<div class="noresult">No situation matches that.<br>Try another word.</div>';
  sidescroll.innerHTML=h;
}

function renderWelcome(){
  detail.classList.add("welcomeview");
  detail.innerHTML='<div class="welcome rf-fade-in"><img class="wlogo" src="reputifly-logo.png" alt="Reputifly"/>'+
    '<h2>Closer Playbook</h2><p>Pick the situation you’re in on the left. You’ll get exactly what to do and a copy-paste message for WhatsApp. Tap <b>Copy</b>, paste, send.</p></div>';
}

  detail.classList.remove("welcomeview");
  curId=id;curScripts=(n.scripts||[]).map(function(s){return s.t;});
  var h='<div class="inner rf-fade-in">';
  h+='<div class="nodehd">'+esc(n.title)+'</div>';
  h+='<div class="metarow">';
  if(n.tag){var map={hot:["tag-hot","🔥 HOT"],warm:["tag-warm","WARM"],cool:["tag-cool","COOL"],dead:["tag-dead","HANDLE WITH CARE"]},t=map[n.tag.x];h+='<span class="nodetag '+t[0]+'">'+t[1]+'</span>';}
  if(n.label){h+='<span class="labelpill"><span class="dot" style="background:'+(LABELCOLOR[n.label]||"#9ca3af")+'"></span>Label: '+esc(n.label)+'</span>';}
  h+='</div>';
  h+='<div class="doblk"><div><div class="lab">Do this</div><div class="tx">'+waFmt(n.do)+'</div></div></div>';
  if(n.intake){
    h+='<div class="intakecard"><div class="lab">What To Gather (For A Smooth Start)</div><ul>';
    for(var k=0;k<n.intake.length;k++)h+='<li><span class="ck">'+TICK+'</span><span>'+waFmt(n.intake[k])+'</span></li>';
    h+='</ul></div>';
  }
  if(n.img){h+='<img class="proofimg" src="'+n.img+'" alt="proof"/>';if(n.imgcap)h+='<div class="proofcap">'+esc(n.imgcap)+'</div>';}
  if(n.treeHtml){h+=n.treeHtml;} if(n.scripts&&n.scripts.length)h+='<div class="sectlbl">What To Say</div>';
  if(n.combo)h+='<div class="combo"><div class="combohd">🔗 '+esc(n.combo)+'</div>';
  for(var i=0;i<(n.scripts||[]).length;i++){
    var s=n.scripts[i];
    if(s.n)h+='<div class="msgnum">'+esc(s.n)+'</div>';
    if(s.img)h+='<img class="proofimg" src="'+esc(s.img)+'" alt="included"/>';
    h+='<div class="scriptcard"><div class="scripthd"><span class="lbl">Tap to copy → paste in WhatsApp</span>'+
       '<button class="copybtn" data-act="copy" data-i="'+i+'">'+COPYICON+'Copy</button></div>'+
       (s.sit?'<div class="sitbar"><span class="sicon">📍</span><span>'+waFmt(s.sit)+'</span></div>':'')+
       '<div class="scriptbody">'+waFmt(s.t)+'</div></div>';
  }
  if(n.combo)h+='</div>';
  if(n.asset){var As=Array.isArray(n.asset)?n.asset:[{src:n.asset,cap:"Save it once, then send it on WhatsApp."}];h+='<div class="asset"><div class="ahd">📎 Send when they ask what they get</div><div class="assetgrid">';for(var a=0;a<As.length;a++)h+='<div class="assetcol"><img src="'+As[a].src+'" alt="included"/><div class="acap">'+esc(As[a].cap)+'</div></div>';h+='</div></div>';}
  if(n.next&&n.next.length){
    h+='<div class="nextlbl">Then What Happened?</div><div class="nexts">';
    for(var j=0;j<n.next.length;j++)h+='<button class="nextbtn" data-go="'+n.next[j].to+'"><span>'+esc(n.next[j].l)+'</span>'+ARROW+'</button>';
    h+='</div>';
  }
  if(n.pending)h+='<div class="note">⚠️ '+esc(n.pending)+'</div>';
  else if(id==="reveal"||id==="hassite")h+='<div class="note">Highlighted bits like <span class="fill">link</span> are the only things you edit before sending.</div>';
  if(n.readClient)h+='<div class="rcard"><div class="lab">Read The Client</div><div class="tx">'+waFmt(n.readClient)+'</div></div>';
  h+='</div>';
  detail.innerHTML=h;detail.scrollTop=0;
  setActive(id);window.scrollTo(0,0);
}

function tgChip(name,color){return '<span class="tg-chip" style="--tgc:'+color+'"><span class="tg-dot"></span>'+esc(name)+'</span>';}
function renderTagging(id,n){
  curId=id;curScripts=[];detail.classList.remove("welcomeview");
  var h='<div class="inner rf-fade-in">';
  h+='<div class="nodehd">'+esc(n.title)+'</div>';
  h+='<div class="doblk"><div><div class="lab">Do this</div><div class="tx">'+waFmt(n.do)+'</div></div></div>';
  h+='<div class="tg-lead"><span class="ti">\uD83D\uDCCC</span><span class="tt">'+n.lead+'</span></div>';
  for(var i=0;i<n.steps.length;i++){
    var st=n.steps[i];
    h+='<div class="tg-step"><div class="tg-when"><span class="tg-num">'+(i+1)+'</span><span>'+esc(st.w)+(st.sub?'<span class="tg-sub">'+esc(st.sub)+'</span>':'')+'</span></div><div class="tg-body">';
    if(st.swap){
      h+='<div class="tg-swaptxt"><span class="tg-rm">'+esc(st.swap[0][0])+'</span><span class="tg-arw">\u2192</span><span>swap to</span></div>';
      h+='<div class="tg-chips">'+tgChip(st.swap[1][0],st.swap[1][1])+'</div>';
    }else{
      var cs='';for(var c=0;c<st.add.length;c++)cs+=tgChip(st.add[c][0],st.add[c][1]);
      h+='<div class="tg-chips">'+cs+'</div>';
    }
    if(st.why)h+='<div class="tg-why"><span class="wl">Why this tag</span>'+esc(st.why)+'</div>';
    if(st.note)h+='<div class="tg-note">'+st.note+'</div>';
    if(st.log){var cnd=(typeof st.log==="string")?" · "+esc(st.log):"";h+='<a class="tg-lognote" href="'+n.docurl+'" target="_blank" rel="noopener">📄 note it in the tracker doc'+cnd+' <span class="lga">→</span></a>';}
    h+='</div></div>';
  }
  h+='<div class="tg-doc"><div class="dh">\uD83D\uDCC7 The tracker doc \u2014 log the ones that matter</div><div class="dt">'+n.doctext+'</div><div class="drow"><a class="tg-doclink" href="'+n.docurl+'" target="_blank" rel="noopener">Open the tracker doc \u2197</a><button class="copybtn" data-act="copyurl" data-url="'+n.docurl+'">'+COPYICON+'Copy link</button></div></div>';
  h+='<div class="tg-foot">';
  for(var f=0;f<n.foot.length;f++)h+='<div class="tg-frule"><span class="fi">\u2713</span><span>'+n.foot[f]+'</span></div>';
  h+='</div></div>';
  detail.innerHTML=h;detail.scrollTop=0;setActive(id);window.scrollTo(0,0);
}
function copyUrl(u,btn){var o=btn.innerHTML;var done=function(){btn.classList.add("ok");btn.innerHTML="\u2713 Copied";toast("Doc link copied");setTimeout(function(){btn.classList.remove("ok");btn.innerHTML=o;},1400);};if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(u).then(done,function(){fallback(u,done);});else fallback(u,done);}
function go(id){
  if(!NODES[id])return;
  if(!document.body.classList.contains("viewing")){listScroll=window.scrollY;navStack=[];}
  navStack.push(id);
  document.body.classList.add("viewing");
  render(id);
  if(location.hash.slice(1)!==id){_suppressHash=true;location.hash=id;}
}

function setActive(id){var rows=sidescroll.querySelectorAll(".srow");for(var i=0;i<rows.length;i++)rows[i].classList.toggle("active",rows[i].getAttribute("data-go")===id);}

function back(){navStack.pop();if(navStack.length){var pid=navStack[navStack.length-1];render(pid);if(location.hash.slice(1)!==pid){_suppressHash=true;location.hash=pid;}}else{document.body.classList.remove("viewing");if(location.hash){_suppressHash=true;location.hash="";}window.scrollTo(0,listScroll);}}

function doCopy(i,btn){
  var raw=curScripts[i];if(raw==null)return;
  var done=function(){btn.classList.add("ok");btn.innerHTML="✓ Copied";toast("Copied, paste it in WhatsApp");setTimeout(function(){btn.classList.remove("ok");btn.innerHTML=COPYICON+"Copy";},1400);};
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(raw).then(done,function(){fallback(raw,done);});else fallback(raw,done);
}
function fallback(t,cb){var ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);cb();}

var toastT;
function toast(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove("show");},1700);}

document.addEventListener("click",function(e){
  var t=e.target.closest?e.target.closest("[data-go],[data-act]"):null;
  if(!t)return;
  if(t.hasAttribute("data-go")){go(t.getAttribute("data-go"));return;}
  var act=t.getAttribute("data-act");
  if(act==="back")back();
  else if(act==="copy")doCopy(parseInt(t.getAttribute("data-i"),10),t);
  else if(act==="copyurl")copyUrl(t.getAttribute("data-url"),t);
});

var searchEl=document.getElementById("search"),searchPill=document.getElementById("searchpill"),clearBtn=document.getElementById("clearsearch");
function syncClear(){searchPill.classList.toggle("has-text",searchEl.value.length>0);}
searchEl.addEventListener("input",function(){renderSidebar(searchEl.value);syncClear();});
searchEl.addEventListener("focus",function(){searchPill.classList.add("foc");});
searchEl.addEventListener("blur",function(){searchPill.classList.remove("foc");});
searchEl.addEventListener("keydown",function(e){if(e.key==="Escape"&&searchEl.value){searchEl.value="";renderSidebar("");syncClear();}});
clearBtn.addEventListener("click",function(){searchEl.value="";renderSidebar("");syncClear();searchEl.focus();});

function applyHash(){var id=(location.hash||"").replace(/^#/,"");if(id&&NODES[id]){if(!(document.body.classList.contains("viewing")&&curId===id))go(id);}else if(document.body.classList.contains("viewing")){document.body.classList.remove("viewing");navStack=[];renderWelcome();setActive(null);window.scrollTo(0,0);}}
window.addEventListener("hashchange",function(){if(_suppressHash){_suppressHash=false;return;}applyHash();});
renderSidebar("");
renderWelcome();
if(location.hash&&NODES[location.hash.slice(1)])go(location.hash.slice(1));
