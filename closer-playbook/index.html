<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#ffffff" />
<title>Reputifly · Closer Playbook</title>
<link rel="icon" href="favicon.png" />
<link rel="apple-touch-icon" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --color-canvas:#f7f8fa;--color-surface:#ffffff;--color-surface-2:#f3f4f6;--color-surface-3:#eceef1;
  --color-ink:#0a0a0a;--color-ink-2:#3f4754;--color-muted:#6b7280;--color-faint:#9ca3af;
  --color-line:#e8eaed;--color-line-2:#dfe2e7;
  --color-primary:#007aff;--color-primary-hover:#0a6fe0;--color-primary-active:#0563cc;--color-primary-soft:#e9f2ff;--color-on-primary:#ffffff;
  --color-success:#34c759;--color-warn:#ff9500;--color-danger:#ff3b30;
  --radius-pill:9999px;--radius-lg:20px;--radius-md:14px;--radius-sm:12px;--radius-xs:9px;
  --shadow-xs:0 1px 2px rgba(16,24,40,.04);--shadow-sm:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-md:0 4px 12px rgba(16,24,40,.08),0 2px 4px rgba(16,24,40,.04);--shadow-lg:0 12px 32px rgba(16,24,40,.12),0 4px 8px rgba(16,24,40,.06);
  --shadow-focus:0 0 0 3px rgba(0,122,255,.28);--ease:cubic-bezier(0.25,0.8,0.25,1);
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
html,body{margin:0;height:100%;}
html{background:var(--color-canvas);color:var(--color-ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-feature-settings:"cv02","cv03","cv04","cv11"}
body{margin:0;font-size:14px;line-height:1.5;letter-spacing:-0.006em;color:var(--color-ink);background:var(--color-canvas);overflow:hidden}
*{box-sizing:border-box}
::selection{background:rgba(0,122,255,.16)}
h1,h2,h3,h4{letter-spacing:-0.02em;font-weight:700;margin:0}
button{font-family:inherit}
:focus{outline:none}
button:focus-visible,[tabindex]:focus-visible{box-shadow:var(--shadow-focus);border-radius:var(--radius-xs)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 20px;border-radius:var(--radius-pill);border:1px solid transparent;font-size:14px;font-weight:600;letter-spacing:-0.01em;cursor:pointer;user-select:none;white-space:nowrap;transition:background-color .18s var(--ease),transform .12s var(--ease)}
.btn:active{transform:translateY(0.5px) scale(0.99)}
.btn--primary{background:var(--color-primary);color:var(--color-on-primary);box-shadow:var(--shadow-xs)}
.btn--primary:hover{background:var(--color-primary-hover)}
@keyframes rf-pop-in{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes rf-fade-in{from{opacity:0}to{opacity:1}}
.rf-fade-in{animation:rf-fade-in .2s var(--ease)}
@media (prefers-reduced-motion:reduce){.rf-fade-in{animation:none}}

/* app shell: header fixed, panes scroll = header always stuck */
.app{height:100dvh;display:flex;flex-direction:column;background:var(--color-canvas)}
.topbar{flex-shrink:0;height:64px;display:flex;align-items:center;gap:14px;padding:0 22px;background:#fff;border-bottom:1px solid var(--color-line);z-index:30}
.topbar .logo{height:25px;width:auto;display:block}
.hback{display:none;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;background:transparent;border:none;cursor:pointer;color:var(--color-ink);flex-shrink:0;margin-left:-8px;transition:background-color .14s var(--ease)}
.hback:hover{background:var(--color-surface-2)}.hback:active{background:var(--color-surface-3)}
.topbar .sep{width:1px;height:22px;background:var(--color-line-2)}
.topbar .title{font-size:15px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap}
.redpill{margin-left:auto;display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 16px;border-radius:var(--radius-pill);background:#ffe9e7;color:#c0271c;border:none;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background-color .15s var(--ease)}
.redpill:hover{background:#ffdcd8}
.bodyrow{flex:1;display:flex;min-height:0}

/* sidebar */
.sidebar{width:362px;flex-shrink:0;border-right:1px solid var(--color-line);background:#fff;display:flex;flex-direction:column;min-height:0}
.searchwrap{padding:16px 16px 10px}
.search-pill{display:flex;align-items:center;gap:10px;width:100%;height:44px;padding:0 15px;background:var(--color-surface-2);border:1.5px solid transparent;border-radius:var(--radius-pill);transition:background-color .16s var(--ease),border-color .16s var(--ease)}
.search-pill.foc{background:#fff;border-color:var(--color-primary)}
.search-pill input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-size:15px;color:var(--color-ink);font-weight:500}
.search-pill input::placeholder{color:var(--color-faint);font-weight:400}
.clearbtn{display:none;flex-shrink:0;width:20px;height:20px;padding:0;border:none;border-radius:50%;background:var(--color-line-2);color:#fff;cursor:pointer;align-items:center;justify-content:center;transition:background-color .12s var(--ease)}
.clearbtn:hover{background:var(--color-faint)}
.clearbtn svg{width:11px;height:11px;display:block}
.search-pill.has-text .clearbtn{display:flex}
.sidescroll{flex:1;overflow-y:auto;padding:6px 14px 32px}
.grouplabel{font-size:13px;font-weight:800;letter-spacing:-0.01em;color:var(--color-ink);margin:22px 8px 9px;display:flex;align-items:center;gap:9px}
.grouplabel:first-child{margin-top:8px}
.grouplabel .gline{flex:1;height:1px;background:var(--color-line)}
.srow{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:12px 13px;border-radius:var(--radius-md);background:transparent;border:1.5px solid transparent;cursor:pointer;transition:background-color .12s var(--ease),border-color .12s var(--ease);margin-bottom:3px}
.srow:hover{background:var(--color-surface-2)}
.srow.active{background:var(--color-primary-soft);border-color:#bcdcff}
.srow .ic{width:38px;height:38px;border-radius:11px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:19px;background:var(--color-surface-2);transition:background-color .12s var(--ease)}
.srow.active .ic{background:#fff}
.srow .tx{flex:1;min-width:0}
.srow .tt{font-size:14.5px;font-weight:600;letter-spacing:-0.015em;color:var(--color-ink);line-height:1.25}
.srow.active .tt{color:var(--color-primary-active)}
.srow .ds{font-size:12px;color:var(--color-muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.noresult{padding:34px 12px;text-align:center;color:var(--color-faint);font-size:13.5px;line-height:1.5}

/* detail */
.detail{flex:1;min-width:0;overflow-y:auto;padding:34px 44px 80px}
.detail .inner{max-width:720px;margin:0 auto}
.backbtn{display:none}
.detail.welcomeview{display:flex;align-items:center;justify-content:center;padding-top:34px;padding-bottom:34px}
.welcome{max-width:460px;margin:0 auto;text-align:center}
.welcome .wlogo{height:38px;margin-bottom:24px;opacity:.92}
.welcome h2{font-size:23px;font-weight:800;margin-bottom:10px;letter-spacing:-0.025em}
.welcome p{color:var(--color-muted);font-size:15px;line-height:1.65}
.nodehd{font-size:27px;font-weight:800;letter-spacing:-0.025em;line-height:1.18;margin:0 0 12px}
.metarow{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px}
.nodetag{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;padding:5px 12px;border-radius:var(--radius-pill);letter-spacing:.01em}
.tag-hot{background:#ffe9e7;color:#c0271c}.tag-warm{background:#fff1de;color:#9a5a00}.tag-cool{background:#e9f2ff;color:var(--color-primary-active)}.tag-dead{background:#f0f1f3;color:#6b7280}
.labelpill{display:inline-flex;align-items:center;gap:7px;font-size:11.5px;font-weight:700;padding:5px 12px 5px 10px;border-radius:var(--radius-pill);background:var(--color-surface-2);color:var(--color-ink-2)}
.labelpill .dot{width:9px;height:9px;border-radius:50%}
.doblk{display:flex;gap:12px;padding:16px 18px;background:var(--color-primary-soft);border:1px solid #cfe3ff;border-radius:var(--radius-md);margin-bottom:18px}
.doblk .lab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-primary-active);margin-bottom:5px}
.doblk .tx{font-size:14.5px;color:var(--color-ink);line-height:1.6;white-space:pre-wrap}
.doblk .tx b{font-weight:700}
.rcard{padding:15px 17px;background:#fff8ec;border:1px solid #ffe2b0;border-radius:var(--radius-md);margin-top:28px;margin-bottom:10px}
.rcard .lab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#9a5a00;margin-bottom:7px}
.rcard .tx{font-size:13.5px;color:#5c4a2b;line-height:1.6;white-space:pre-wrap}
.rcard .tx b{font-weight:800;font-size:15px;color:#7a4a12}
.intakecard{border:1px solid var(--color-line);border-radius:var(--radius-md);background:#fff;padding:16px 18px;margin-bottom:18px;box-shadow:var(--shadow-xs)}
.intakecard .lab{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-muted);margin-bottom:11px}
.intakecard ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px}
.intakecard li{display:flex;align-items:flex-start;gap:11px;font-size:14px;line-height:20px;color:var(--color-ink)}
.intakecard li .ck{width:20px;height:20px;border-radius:50%;background:#e9f7ee;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:0}
.intakecard li>span:last-child{padding-top:0}
.intakecard li b{font-weight:700}
.proofimg{width:100%;border:1px solid var(--color-line);border-radius:var(--radius-md);margin-bottom:8px;box-shadow:var(--shadow-sm);display:block}
.proofcap{font-size:12px;color:var(--color-muted);margin:0 2px 18px}
.sectlbl{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-muted);margin:22px 2px 11px}
.msgnum{font-size:13.5px;font-weight:700;color:var(--color-primary-active);margin:0 2px 8px;letter-spacing:-0.01em}
.scriptcard{border:1px solid var(--color-line);border-radius:var(--radius-md);overflow:hidden;margin-bottom:14px;background:#fff;box-shadow:var(--shadow-xs)}
.scripthd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;background:var(--color-surface-2);border-bottom:1px solid var(--color-line)}
.scripthd .lbl{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--color-muted)}
.scriptbody{padding:16px;font-size:15px;line-height:1.6;color:var(--color-ink);white-space:pre-wrap}
.scriptbody b{font-weight:700}
.sitbar{display:flex;gap:7px;align-items:flex-start;padding:9px 14px 10px;background:#fff8ec;border-bottom:1px solid #ffe2b0;font-size:11.5px;font-weight:600;color:#9a5a00;line-height:1.45}
.sitbar .sicon{flex-shrink:0;font-size:12px;line-height:1.3}
.combo{border:1.5px solid #bcdcff;border-radius:var(--radius-md);padding:11px 12px 3px;margin-bottom:14px;background:#f4f9ff}
.combohd{font-size:12px;font-weight:800;letter-spacing:.01em;color:var(--color-primary-active);margin:1px 2px 11px;display:flex;align-items:center;gap:6px}
.copybtn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 14px;border-radius:var(--radius-pill);background:var(--color-primary);color:#fff;border:none;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background-color .15s var(--ease),transform .12s var(--ease)}
.copybtn:hover{background:var(--color-primary-hover)}.copybtn:active{transform:scale(.97)}
.copybtn.ok{background:var(--color-success)}
.fill{background:#fff4c2;border-radius:4px;padding:0 4px;font-weight:600;color:#8a6d00}
.asset{border:1px solid var(--color-line);border-radius:var(--radius-md);background:#fff;padding:14px;margin-bottom:14px;box-shadow:var(--shadow-xs)}
.asset .ahd{font-size:12px;font-weight:700;color:var(--color-ink-2);margin-bottom:11px;display:flex;align-items:center;gap:7px}
.asset .assetgrid{display:flex;gap:14px}
.asset .assetcol{flex:1;min-width:0}
.asset .assetcol img{width:100%;border-radius:10px;border:1px solid var(--color-line);display:block;box-shadow:var(--shadow-sm)}
.asset .acap{font-size:12px;color:var(--color-muted);margin-top:9px;line-height:1.5}
.nextlbl{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-muted);margin:26px 2px 11px}
.nexts{display:flex;flex-direction:column;gap:9px}
.nextbtn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;padding:14px 16px;border:1.5px solid var(--color-line-2);border-radius:var(--radius-md);background:#fff;font-size:14px;font-weight:600;color:var(--color-ink);cursor:pointer;transition:background-color .13s var(--ease),border-color .13s var(--ease),transform .12s var(--ease)}
.nextbtn:hover{background:var(--color-surface-2);border-color:var(--color-primary)}
.nextbtn:active{transform:scale(.995)}
.nextbtn .arw{color:var(--color-primary);flex-shrink:0}
.note{font-size:12.5px;color:var(--color-muted);margin-top:18px;padding:12px 14px;background:var(--color-surface-2);border-radius:var(--radius-sm);line-height:1.55}

.scrim{position:fixed;inset:0;z-index:60;background:rgba(10,12,16,.42);display:flex;align-items:center;justify-content:center;padding:16px;animation:rf-fade-in .18s var(--ease)}
@media(max-width:560px){.scrim{align-items:flex-end;padding:0}}
.sheet{width:100%;max-width:540px;background:#fff;border-radius:20px;box-shadow:var(--shadow-lg);padding:10px 22px 28px;animation:rf-fade-in .2s var(--ease)}
@media(max-width:560px){.sheet{border-radius:20px 20px 0 0}}
.sheet .grab{width:38px;height:4px;border-radius:9999px;background:var(--color-line-2);margin:8px auto 16px}
.sheet h2{font-size:18px;font-weight:800;margin-bottom:4px}
.sheet .sh-sub{font-size:13px;color:var(--color-muted);margin-bottom:16px}
.rl{display:flex;gap:12px;padding:13px 0;border-top:1px solid var(--color-line)}
.rl .n{width:25px;height:25px;border-radius:8px;background:var(--color-danger);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rl .t{font-size:14px;line-height:1.5}.rl .t b{font-weight:700}
.rl .t .fill{font-weight:700}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(8px);z-index:80;background:var(--color-ink);color:#fff;font-size:13.5px;font-weight:600;padding:12px 20px;border-radius:var(--radius-pill);box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s var(--ease),transform .2s var(--ease)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:860px){
  .bodyrow{display:block;overflow-y:auto}
  .app{height:auto;min-height:100dvh}
  body{overflow:auto}
  .topbar{position:sticky;top:0;padding:0 16px;gap:10px}
  .topbar .logo{transform:translateY(0.5px)}
  body.viewing .hback{margin-left:-16px;transform:translateY(-1.5px)}
  .sidebar{width:100%;border-right:none}
  .sidescroll{overflow:visible}
  .detail{display:none;padding:20px 16px 60px;overflow:visible}
  .detail.welcomeview{display:none}
  .detail .inner{max-width:100%}
  body.viewing .sidebar{display:none}
  body.viewing .detail{display:block}
  .backbtn{display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px 0 10px;border-radius:var(--radius-pill);background:var(--color-surface-2);color:var(--color-ink-2);font-size:13px;font-weight:600;border:none;cursor:pointer;margin-bottom:16px}
  .topbar .title,.topbar .sep{display:none}
  body.viewing .topbar .hback{display:inline-flex}
  .asset .assetgrid{flex-direction:column;gap:18px}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <button class="hback" data-act="back" aria-label="Back to situations"><svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    <img class="logo" src="reputifly-logo.png" alt="Reputifly" />
    <div class="sep"></div>
    <div class="title">Closer Playbook</div>
  </div>
  <div class="bodyrow">
    <aside class="sidebar">
      <div class="searchwrap">
        <div class="search-pill" id="searchpill">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#9ca3af" stroke-width="2"/><path d="M20 20l-3-3" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/></svg>
          <input id="search" type="text" placeholder="Search a situation…" autocomplete="off" />

        </div>
      </div>
      <div class="sidescroll" id="sidescroll"></div>
    </aside>
    <main class="detail" id="detail"></main>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
var ARROW='<svg class="arw" width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var COPYICON='<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 012-2h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';

var LABELCOLOR={"pending sample":"#ff9500","sample sent":"#007aff","follow up":"#ff9500","closed, invoice":"#34c759","time waster":"#ff3b30","closed, building":"#34c759","upsell":"#ff9500"};

var INTAKE=[

var NODES={"newlead": {"title": "New Lead: What To Open With", "tag": null, "label": "pending sample", "intake": ["*Business name + what they do* (the one must-have)", "A site whose *look* they like (highest leverage, builds it to their taste)", "Their *logo*, if any (no stress if not)", "Current website or socials (we reuse their logo + photos)", "Location (confirm Singapore)", "Do they *sell + checkout* online? (catches the e-commerce out-ramp early)"], "do": "SPEED RULE: an FB ad lead is hot for minutes, not hours. Answer in under 10 min, never let a qualified lead sit overnight. Can't build right now? Fire silent#1 to hold them warm, don't go dark.\n\nDon't lead with a form-wall, that's the cheap-guy move. Open human, lead with what THEY get: a real site, live, before they pay. Then get them talking. If they cold-open with \"how much?\", answer that one line first, then still steer to building it live.", "readClient": "If they opened with a specific question (price, time), answer that ONE line first, then ask the business question. Don't ignore what they asked just to run your script.", "scripts": [{"n": "Default opener, outcome + risk reversal", "t": "hey! we'll build your site *live*, free, before you pay a cent.\nwhat's your business + what do you do?"}, {"n": "They opened with \"how much?\"", "t": "hey 🙂 it's *$590* for a full site\npages, mobile, contact form, 1yr hosting + domain + email\neasiest is we just build *yours* live so you see it first\nwhat's your business + what do you do?", "sit": "only when they cold-open with a price question before anything else"}], "next": [{"l": "They Replied → Get Their Info", "to": "gotinfo"}, {"l": "They Went Quiet", "to": "silent"}]}, "gotinfo": {"title": "They Replied: Get Their Info", "tag": null, "label": "pending sample", "do": "read what they just sent FIRST, then only chase what's still *missing* — *never re-ask what they already gave.* sent their site? don't ask for it again. told you what they do? don't ask ag  *on* the site itself? or do you just show your products and they pay elsewhere?"}], "next": [{"l": "Real On-Site Checkout → Flag Julian", "to": "newlead"}, {"l": "Catalogue / Pay Elsewhere → Get Their Info + Build", "to": "gotinfo"}]}, "building": {"title": "It's Building", "tag": null, "label": "pending sample", "do": "you build nothing, the system does. drop one holding line so there's no dead air, then wait for the live link. don't over-explain, just keep them warm.", "scripts": [{"t": "building your site now, gonna make it beautiful, will send you the live link shortly\nstay tuned you will be amazed 💪🏻"}], "next": [{"l": "It's Live → Send It", "to": "reveal"}]}, "reveal": {"title": "Send Them The Live Site", "tag": {"x": "cool"}, "label": "sample sent", "do": "it's their real live site, never call it a sample. send BOTH messages together: the link, then the question. no price, no expiry here, that comes after they react. only edit the «link».", "readClient": "fire back fast and excited? go straight to close. open it and say nothing? not a no, just busy. don't fill the silence, let the follow-up do the work.", "scripts": [{"n": "Message 1, send the link", "t": "made your site, it's live 👉\n«link»"}, {"n": "Message 2, send right after", "t": "what do you think? anything you'd tweak, i'll sort it"}], "next": [{"l": "Read How They React", "to": "telemetry"}], "combo": "Send both messages, one right after the other"}, "telemetry": {"title": "They Saw It: Read The Reaction", "tag": null, "label": "sample sent", "do": "don't ask 'how urgent is this?', read it. the first 1 to 2 replies set the temperature. a tweak request is the #1 buy signal, they're decorating a house they've moved into, send to close, not price. only a real price haggle goes to price. unsure? default warm. cold is a pattern (2+ tells), never one slow reply. hot means close in the same convo today, warmth's half-life is hours. warm and cold-silent both press the nurture button; only a hard 2+ tell pattern is a time-waster.", "readClient": "*🔥 HOT, close TODAY*\n\"wah nice\" / \"looks good\" / ANY tweak (change colour, add logo, put my number) / asks about their own stuff (is this my domain, got the whatsapp button, can i get the email) / \"how much?\" AFTER praising / forwards it / fast multi-message replies.\n\n*🌤 WARM, one soft ask now then cadence*\n\"ok thanks will look\" / \"noted\" / 👍 then quiet / \"looks ok\" / a genuine \"check with my partner\".\n\n*🧊 COLD or SUSPECT, qualify first*\nhaggles BEFORE complimenting / won't give one input after 2 asks paired with a hard tell / ghosts then only haggles / agency recon (what stack, can i get admin, source files).\nsilence on assets alone is NOT cold, busy owners are just slow to dig out a logo.", "scripts": [], "next": [{"l": "Loves It / Wants A Tweak → Close", "to": "close"}, {"l": "Pushes On Price (Real Haggle)", "to": "price"}, {"l": "Neutral Question (No Praise Yet)", "to": "faq"}, {"l": "Wants To Call Or Meet", "to": "meet"}, {"l": "Warm, Quiet, Or Checking With Someone", "to": "followup"}, {"l": "Haggling Pattern (2+ Tells)", "to": "timewaster"}]}, "close": {"title": "They Like It: Proceed + Invoice", "tag": {"x": "hot"}, "label": "closed, invoice", "do": "they're warm 🙂 don't dump everything on them.\npick what's happening below and you'll get the right lines.\ncore idea: small yeses, not one big ask.\nthe *company name* + the *deposit* are the actual close. you never invoice, Julian does.", "readClient": "clear yes? go straight to the ladder, get the *company name*, don't re-sell.\nthey wobbled? open \"they hesitated\".\nthe deposit is what locks the slot, not the invoice. drive to that.\nnever offer the −$100 to save it, that's Julian's call only.", "scripts": [], "next": [{"l": "▶ Walk Them Up The Ladder (The Close)", "to": "close_ladder"}, {"l": "They Hesitated Or Objected", "to": "close_wobble"}, {"l": "They Asked A Question (Pay, Feature, Quote)", "to": "close_asks"}, {"l": "Wants A Call Or Meet", "to": "meet"}, {"l": "Turns Into A Haggle", "to": "price"}]}, "close_ladder": {"title": "The Close, Walk Them Up The Ladder", "tag": {"x": "hot"}, "label": "closed, invoice", "do": "a tweak = the buy signal, NOT free work. acknowledge it (do NOT build it yet), then lock the deal:\n1. lock the domain (or confirm the one they have)\n2. get the *company name* → Julian invoices (70% deposit starts the 5-day build)\n3. ping Julian\nskip rungs on a clear yes, don't re-sell a sold deal.", "readClient": "the deposit locks the slot, not the invoice. keep moving till it's in.\nskip the value stack on a clear yes.\nanchor *$590* once, in writing, before the word invoice lands.", "scripts": [{"n": "They sent a tweak → lock the domain (default)", "t": "easy change 👍\nlet's lock your domain so it's yours.\n*yourbiz.com*, or you got a name in mind?"}, {"n": "They already have a domain → get the company name", "t": "easy change 👍🏻\nshall we get started with the project then?\nlet me know the company name to invoice to"}, {"n": "They gave a domain name → confirm + company name + start", "t": "*«name».com* it is then\nlet me know your company name, will invoice you then secure the domain\nand we will officially start the project"}, {"n": "Ping Julian (internal, NOT the client)", "t": "closed 🎉 «business»\ndomain: «name».com\ninvoice to: «company name»\nthey're in, live in 5 days", "sit": "internal message to Julian only, never send to the client"}], "next": [{"l": "Got The Deposit → Win The Next One", "to": "newlead"}, {"l": "They Hesitated → Handle It", "to": "close_wobble"}, {"l": "They Asked Something", "to": "close_asks"}]}, "close_wobble": {"title": "The Close, They Hesitated Or Objected", "tag": {"x": "warm"}, "label": "closed, invoice", "do": "they like it but stalled. don't push.\n\nanswer the exact blocker, lean on value plus the fact they've already SEEN their real site. if they still defer, drop them into the follow-up cadence, the decaying site does the chasing. \"let me think\" comes first, diagnose the real blocker before anything else.", "readClient": "One value rung, not five. Diagnose before you sell. If they grind price before valuing anything, that's the time-waster tell. Never offer the discount, that's Julian's call only.", "scripts": [{"n": "\"let me think\" (keep-alive + find the real blocker)", "t": "totally fair 👍\nyour live site stays up a few more days so you won't lose it.\nquick one, is it the timing or something about the site itself?"}, {"n": "\"maybe next month\" (hold it with a small deposit)", "t": "no rush 👍\ntoday's *$590* is locked in for you.\na small *deposit* pencils your slot so it's ready whenever you start.\nwant me to hold it that way?"}, {"n": "\"what if i pay and don't like it?\"", "t": "that's the whole point of doing it this way 🙂\nyou've seen your site *live* before paying a cent.\nplus *3 full rounds* of changes after, we don't stop till it's how you want it."}, {"n": "Value stack (only if they ask what they get)", "t": "all in for *$590*:\n4 pages, mobile-optimised\nSEO set up so you show on google\ncontact form to your phone + whatsapp button\n1yr free hosting, domain + email\n3 rounds of revisions\nlive in 5 days"}, {"n": "Dream outcome (emotional / visual buyer)", "t": "in 5 days when someone googles you, *this* is what they see 🙂\nlooks like a real, established business."}], "asset": [{"src": "whats-included.png", "cap": "Default: Basic SEO"}, {"src": "whats-included-fullseo.png", "cap": "Lever: Full SEO, pull when SEO's the hook"}], "next": [{"l": "Warmed Up → Back To The Ladder", "to": "close_ladder"}, {"l": "Still Deferring → Follow-Up Cadence", "to": "followup"}, {"l": "Turns Into A Haggle", "to": "price"}]}, "close_asks": {"title": "The Close, They Asked A Question", "tag": null, "label": "closed, invoice", "do": "a logistics question mid-close.\n\nanswer it in one clean line, then steer straight back to locking it in. lead with the deposit, it's what holds the slot.", "readClient": "Answer the fact in one line, don't open a whole new conversation. Then bring it back to locking the slot. Cart or checkout ON the site is a different build, flag Julian.", "scripts": [{"n": "\"how / when do i pay?\"", "t": "easy 🙂 i send the invoice.\n*70% deposit* kicks off the build, *30%* when it's live and you're happy.\nthat deposit's what locks your 5-day slot. want me to send it over?"}, {"n": "\"send me a proper quote / proposal\"", "t": "yep 🙂 i'll get a proper quotation over.\nit's *$590* all in, everything spelled out so your team can circulate it.\nwhat's the *company name* to put on it, and who do i address it to?"}, {"n": "\"can you add [a feature]?\" (booking, gallery, map, reviews)", "t": "yeah we can usually work that in 🙂\ntell me exactly what you're picturing.\nsmall stuff's included, anything bigger we'll price fair. let's lock your main site first 👍"}, {"n": "Cart + checkout on the site (hard scope, flag Julian)", "t": "ahh cart + checkout on the site is a different build 👍\nthe *$590* is a full lead-gen site, not a store.\ni'll get you the right plan for that separately.\nwant me to lock your main site first?", "sit": "only when they want real checkout ON the site (not just products linking out to HitPay). Flag Julian, he qualifies real ecommerce himself."}], "next": [{"l": "Answered → Back To The Ladder", "to": "close_ladder"}, {"l": "Back To The Close", "to": "close"}]}, "meet": {"title": "They Want To Meet / Call", "tag": {"x": "hot"}, "label": "sample sent", "do": "buying intent in SG, say yes fast. default a google meet, keeps the energy. offer 2 concrete slots not \"when works?\", it books about twice as fast, and add a text fallback so a wifi hiccup never kills it. show the live site + SEO proof, then close on the spot. once a slot's booked, secure it before the call.", "readClient": "A meet ask is hot, don't cool it with admin. Swap in your real free windows for the two slots. Offer text as an easy fallback. A booked call keeps the current label (ball's with them to show up); a no-show flips to follow up.", "scripts": [{"n": "Say yes, 2 slots + text fallback", "t": "yeah let's do it 🙂\nquick call, i'll walk you through your *live* site + show the SEO side, then we get it going.\n*today 5pm* or *tmrw 11am*? or if easier we just sort it here over text 👍"}, {"n": "Meeting booked, secure it before the call", "t": "locked in for «slot» 👍\ni'll hold your live site + today's price till then.\nif you already love it we can skip ahead, want me to send the invoice now so we hit the ground running?", "sit": "only after a slot's actually booked and they've clearly warmed on the site"}], "next": [{"l": "On The Call → Close", "to": "close"}, {"l": "No-Show → Follow Up", "to": "followup"}]}, "followup": {"title": "Went Quiet After Seeing It", "tag": {"x": "cool"}, "label": "follow up", "do": "point every touch at their real live site, never 'just checking in'. read what they DID and pick the matching line. don't presume they loved it, if they never praised it use the neutral nudge. max 3 touches over about a week then park. any reply re-warms them, drop the cadence and re-read the temperature. INTERNAL: hold a preview 7 to 10 days, frame the wind-down as a warm heads-up, never a threat. the final takedown notice is the LAST touch before you park them, it names a date but always offers more time.", "readClient": "saw it then silent, use the neutral nudge, do NOT presume praise. praised it then went quiet, use the 'glad you liked it' line. deferring to a partner, send the live link, then offer a group chat, then a joint call if it repeats.", "scripts": [{"n": "They went quiet, neutral nudge (default)", "t": "did you get a look at your site? 🙂\nwhat do you reckon? anything you'd tweak, i'll sort it"}, {"n": "Last call, gentle wind-down (day 7 to 10)", "t": "just a heads up, i'll be winding your live preview down soon 🙂\ndidn't want it to disappear on you.\nwant me to keep it up + get it onto your domain? no rush either way"}, {"n": "They praised it then went quiet", "sit": "only if they actually said something positive first", "t": "glad you liked it 🙂\nwant me to lock it onto your domain so it's yours?\njust say the go-ahead 👍"}, {"n": "They're checking with a partner / boss", "t": "makes sense 🙂\nsend them the live link, way better than describing it.\ni'll hold your site + today's price. when are you seeing them?"}, {"n": "Loop the partner in (group chat, try this before a call)", "sit": "when they say they need to check with a partner, boss or spouse", "t": "perhaps you could create a group chat, so we're all on the same page over here 🙂\nand i can explain the key points"}, {"n": "Partner keeps stalling, offer a joint call (flushes fake stalls)", "sit": "when the partner deferral repeats or smells like a stall", "t": "happy to jump on a quick call with you both 🙂\ni'll walk you both through the live site.\nwhat works for the two of you?"}, {"n": "Final takedown notice (last touch before you park them)", "sit": "only when a live preview is actually up, and only after the gentle wind-down", "t": "hey there, take note that the live preview will be taken down tomorrow to save storage.\nlet me know if you need more time, or if you're able to confirm the project\n\nit's only $590 + we already designed a full preview for you to see 👍🏻🙏🏻"}], "next": [{"l": "Replies → Re-Read Temperature", "to": "telemetry"}, {"l": "Warms Back Up → Close", "to": "close"}, {"l": "No Reply After Day 7 → Park", "to": "park"}]}, "price": {"title": "Price Pushback / Cheaper Guy", "tag": {"x": "warm"}, "label": "follow up", "img": "seo-proof.webp", "imgcap": "Real client, Google Search Console. 6.25k clicks, 405k impressions, climbing. Send this with Msg 1.", "do": "HOLD *$590*, never match, never unbundle. Lead with the proof as a plain fact, not an apology. The SEO/ranking attack is situational: only swing it when they're actually haggling or care about ranking, not by default. If they keep grinding, the \"who runs it\" line, then go quiet and flag Julian. Human voice, lowercase, contractions. Perfect grammar is the bot tell. The −$100 is Julian's call only.", "readClient": "\"Can you do better on price?\" is usually a reflex, not a wall. Re-anchor on proof once. If they grind a second time, stop selling, go quiet, flag Julian. Grinding before valuing anything is the time-waster tell.", "scripts": [{"n": "Message 1, the proof (send with the screenshot)", "t": "here's the difference, we actually *rank* you 👇\none client's pulling *6,000 visits a month* off google.\nask the cheaper guys to show their SEO proof. most can't 🙂", "sit": "only if their current site's genuinely weak + they're complaining about it (or they're haggling / care about ranking)"}, {"n": "Message 2, only if they keep pushing", "t": "you're not buying a page.\nyou're buying the people who *run + rank* it.\nhappy to keep it at *$590* 👍"}, {"n": "“my nephew / Wix can do it cheaper” (DIY)", "t": "for sure you could 🙂\nbut a diy or template site won't *rank* on google, so no leads.\nwe build yours to get found, and run it all for you.\nwant customers finding you? you know who to go with. *$590*", "sit": "only when they raise a cheaper DIY/Wix option and ranking or leads actually matter to them"}], "next": [{"l": "Cleared, They're Warming → Close", "to": "close"}, {"l": "Only Wants Cheaper → Flag Julian", "to": "timewaster"}, {"l": "Went Quiet", "to": "followup"}]}, "faq": {"title": "Common Questions", "tag": null, "label": "", "do": "Answer the fact in ONE short line, then steer straight back to the site. Never just answer and wait. Keep their current stage label. De-emmed, human, lowercase. HOSTING LEVER: $240/yr is the number you quote. For a price-sensitive client you can offer $120/yr to sweeten, read the client, default $240.", "scripts": [{"n": "“How much is hosting?”", "t": "first year's *free*, then *$240*/yr, no monthly fees\ndid you get a look at the site we built you? 👍"}, {"n": "“Do I r own or not 🙂\nfirst year's included free either way.\nif you already have your own domain or hosting, you keep it and just skip our yearly renewal on that side. everything else is exactly the same"}, {"n": "“How many pages do I get?”", "t": "up to *8 pages* 🙂\nno pressure to use all of them — we build what your business actually needs, not filler"}], "asset": [{"src": "whats-included.png", "cap": "Default: Basic SEO"}, {"src": "whats-included-fullseo.png", "cap": "Lever: Full SEO, pull when SEO's the hook"}], "next": [{"l": "Back To Their Reaction", "to": "telemetry"}, {"l": "They're Ready → Close", "to": "close"}]}, "timewaster": {"title": "Smells Like A Time-Waster", "tag": {"x": "dead"}, "label": "time waster", "do": "Tell them apart on BEHAVIOUR, not vibes. Need 2+ tells before writing anyone off. A false-positive on a real buyer costs $590, a false-negative on a waster costs minutes, so bias toward KEEPING them. The decaying live site is the perfect free filter: a real buyer claims it, a waster lets it die. Real-but-cheap gets #1 (the value proof) NEVER the discount. \"Won't give an input after 2 asks\" is NOT a tell on its own (busy SG owners are genuinely slow), it only counts paired with a hard tell.", "readClient": "*🚩 Tells, need 2+ (at least one HARD)*\nHARD = haggles before engaging the site / agency-recon (admin, source files, what platform, can i self-host) / moves goalposts every answer / \"send me another version free\".\nSOFT (only with a hard tell) = won't give one input after 2 asks / ghosts then only haggles.\n\n*✅ REAL but slow, keep going*\nreplies in bursts but ENGAGES the site / gives real inputs even if slow / \"check with partner\" with specifics / asks ownership questions / apologises for being slow (wasters never do).", "scripts": [{"n": "Real-but-cheap (grinds price but wants it), value proof, never discount", "t": "the *$590* already bakes in a year of hosting + domain + business email 🙂\nrivals bill that yearly on top, so it's earning its keep before you spend a cent more"}, {"n": "Confirmed time-waster (2+ tells), ONE warm exit, then let it decay", "t": "no worries 🙂\nwe'll leave your site up a few days in case you change your mind 👍"}], "next": [{"l": "Real-But-Cheap → Value Proof", "to": "close"}, {"l": "Confirmed Waster → Warm Exit + Park", "to": "park"}]}, "park": {"title": "Parked: Let It Go", "tag": {"x": "dead"}, "label": "", "do": "No reply after the last call, or a confirmed time-waster. Let it go. The live site decays on its own (nothing to delete, no final message needed). Don't chase, don't discount to save it. If they ever resurface, you can spin it back up. Move your energy to the next lead.", "scripts": [{"n": "Only if they resurface later", "t": "happy to spin it back up for you 🙂"}], "next": [{"l": "Back To Start", "to": "newlead"}]}};

var sidescroll=document.getElementById("sidescroll"),detail=document.getElementById("detail");
var curScripts=[],curId=null,listScroll=0,navStack=[];

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function waFmt(s){
  var e=esc(s);
  e=e.replace(/\*([^*\n]+)\*/g,"<b>$1</b>");
  e=e.replace(/«([^»]+)»/g,'<span class="fill">$1</span>');
  return e;
}

function fnorm(s){return (s||"").toLowerCase().replace(/[^a-z0-9 ]+/g," ").replace(/\s+/g," ").trim();}
function flev(a,b){var m=a.length,n=b.length;if(Math.abs(m-n)>2)return 9;var dp=[],i,j;for(j=0;j<=n;j++)dp[j]=j;for(i=1;i<=m;i++){var prev=dp[0];dp[0]=i;for(j=1;j<=n;j++){var tmp=dp[j];dp[j]=Math.min(dp[j]+1,dp[j-1]+1,prev+(a.charCodeAt(i-1)===b.charCodeAt(j-1)?0:1));prev=tmp;}}return dp[n];}
function fsub(q,w){var i=0,j=0;for(;j<w.length&&i<q.length;j++)if(q.charCodeAt(i)===w.charCodeAt(j))i++;return i===q.length;}
function ftok(tok,hayStr,words){
  if(hayStr.indexOf(tok)!==-1)return true;
  if(tok.length<3)return false;
  for(var k=0;k<words.length;k++){var w=words[k];if(!w)continue;
    if(w.indexOf(tok)===0)return true;
    if(tok.length>=4&&fsub(tok,w))return true;
    if(flev(tok,w)<=(tok.length<=5?1:2))return true;}
  return false;
}
function fmatch(f,hayStr,words){
  var toks=f.split(" ");
  for(var t=0;t<toks.length;t++){if(toks[t]&&!ftok(toks[t],hayStr,words))return false;}
  return true;
}
function renderSidebar(filter){
  var f=fnorm(filter),h="",shown=0,pending="";
  for(var i=0;i<MENU.length;i++){
    var m=MENU[i];
    if(m.g){pending='<div class="grouplabel">'+esc(m.g)+'<span class="gline"></span></div>';continue;}
    var hayStr=fnorm(m.tt+" "+m.ds+" "+(m.kw||"")),words=hayStr.split(" ");
    if(f&&!fmatch(f,hayStr,words))continue;
    if(pending){h+=pending;pending="";}
    h+='<button class="srow'+(m.id===curId?" active":"")+'" data-go="'+m.id+'"><div class="ic">'+m.ic+'</div>'+
       '<div class="tx"><div class="tt">'+esc(m.tt)+'</div><div class="ds">'+esc(m.ds)+'</div></div></button>';
    shown++;
  }
  if(!shown)h='<div class="noresult">No situation matches that.<br>Try another word.</div>';
  sidescroll.innerHTML=h;
}

function renderWelcome(){
  detail.classList.add("welcomeview");
  detail.innerHTML='<div class="welcome rf-fade-in"><img class="wlogo" src="reputifly-logo.png" alt="Reputifly"/>'+
    '<h2>Closer Playbook</h2><p>Pick the situation you’re in on the left. You’ll get exactly what to do and a copy-paste message for WhatsApp. Tap <b>Copy</b>, paste, send.</p></div>';
}

function render(id){
  var n=NODES[id];if(!n)return;
  detail.classList.remove("welcomeview");
  curId=id;curScripts=(n.scripts||[]).map(function(s){return s.t;});
  var h='<div class="inner rf-fade-in">';
  h+='<div class="nodehd">'+esc(n.title)+'</div>';
  h+='<div class="metarow">';
  if(n.tag){var map={hot:["tag-hot","🔥 HOT"],warm:["tag-warm","WARM"],cool:["tag-cool","COOL"],dead:["tag-dead","HANDLE WITH CARE"]},t=map[n.tag.x];h+='<span class="nodetag '+t[0]+'">'+t[1]+'</span>';}
  if(n.label){h+='<span class="labelpill"><span class="dot" style="background:'+(LABELCOLOR[n.label]||"#9ca3af")+'"></span>Label: '+esc(n.label)+'</span>';}
  h+='</div>';
  h+='<div class="doblk"><div><div class="lab">Do this</div><div class="tx">'+waFmt(n.do)+'</div></div></div>';
  if(n.intake){
    h+='<div class="intakecard"><div class="lab">What To Gather (For A Smooth Start)</div><ul>';
    for(var k=0;k<n.intake.length;k++)h+='<li><span class="ck">'+TICK+'</span><span>'+waFmt(n.intake[k])+'</span></li>';
    h+='</ul></div>';
  }
  if(n.img){h+='<img class="proofimg" src="'+n.img+'" alt="proof"/>';if(n.imgcap)h+='<div class="proofcap">'+esc(n.imgcap)+'</div>';}
  if(n.scripts&&n.scripts.length)h+='<div class="sectlbl">What To Say</div>';
  if(n.combo)h+='<div class="combo"><div class="combohd">🔗 '+esc(n.combo)+'</div>';
  for(var i=0;i<(n.scripts||[]).length;i++){
    var s=n.scripts[i];
    if(s.n)h+='<div class="msgnum">'+esc(s.n)+'</div>';
    h+='<div class="scriptcard"><div class="scripthd"><span class="lbl">Tap to copy → paste in WhatsApp</span>'+
       '<button class="copybtn" data-act="copy" data-i="'+i+'">'+COPYICON+'Copy</button></div>'+
       (s.sit?'<div class="sitbar"><span class="sicon">📍</span><span>'+esc(s.sit)+'</span></div>':'')+
       '<div class="scriptbody">'+waFmt(s.t)+'</div></div>';
  }
  if(n.combo)h+='</div>';
  if(n.asset){var As=Array.isArray(n.asset)?n.asset:[{src:n.asset,cap:"Save it once, then send it on WhatsApp."}];h+='<div class="asset"><div class="ahd">📎 Send when they ask what they get</div><div class="assetgrid">';for(var a=0;a<As.length;a++)h+='<div class="assetcol"><img src="'+As[a].src+'" alt="included"/><div class="acap">'+esc(As[a].cap)+'</div></div>';h+='</div></div>';}
  if(n.next&&n.next.length){
    h+='<div class="nextlbl">Then What Happened?</div><div class="nexts">';
    for(var j=0;j<n.next.length;j++)h+='<button class="nextbtn" data-go="'+n.next[j].to+'"><span>'+esc(n.next[j].l)+'</span>'+ARROW+'</button>';
    h+='</div>';
  }
  if(n.pending)h+='<div class="note">⚠️ '+esc(n.pending)+'</div>';
  else if(id==="reveal"||id==="hassite")h+='<div class="note">Highlighted bits like <span class="fill">link</span> are the only things you edit before sending.</div>';
  if(n.readClient)h+='<div class="rcard"><div class="lab">Read The Client</div><div class="tx">'+waFmt(n.readClient)+'</div></div>';
  h+='</div>';
  detail.innerHTML=h;detail.scrollTop=0;
  setActive(id);window.scrollTo(0,0);
}

function go(id){
  if(!NODES[id])return;
  if(!document.body.classList.contains("viewing")){listScroll=window.scrollY;navStack=[];}
  navStack.push(id);
  document.body.classList.add("viewing");
  render(id);
}

function setActive(id){var rows=sidescroll.querySelectorAll(".srow");for(var i=0;i<rows.length;i++)rows[i].classList.toggle("active",rows[i].getAttribute("data-go")===id);}

function back(){navStack.pop();if(navStack.length){render(navStack[navStack.length-1]);}else{document.body.classList.remove("viewing");window.scrollTo(0,listScroll);}}

function doCopy(i,btn){
  var raw=curScripts[i];if(raw==null)return;
  var done=function(){btn.classList.add("ok");btn.innerHTML="✓ Copied";toast("Copied, paste it in WhatsApp");setTimeout(function(){btn.classList.remove("ok");btn.innerHTML=COPYICON+"Copy";},1400);};
  if(navigator.clipboard&&navigator.clipboard.writeText)navigator.clipboard.writeText(raw).then(done,function(){fallback(raw,done);});else fallback(raw,done);
}
function fallback(t,cb){var ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);cb();}

var toastT;
function toast(msg){var el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove("show");},1700);}

document.addEventListener("click",function(e){
  var t=e.target.closest?e.target.closest("[data-go],[data-act]"):null;
  if(!t)return;
  if(t.hasAttribute("data-go")){go(t.getAttribute("data-go"));return;}
  var act=t.getAttribute("data-act");
  if(act==="back")back();
  else if(act==="copy")doCopy(parseInt(t.getAttribute("data-i"),10),t);
});

var searchEl=document.getElementById("search"),searchPill=document.getElementById("searchpill"),clearBtn=document.getElementById("clearsearch");
function syncClear(){searchPill.classList.toggle("has-text",searchEl.value.length>0);}
searchEl.addEventListener("input",function(){renderSidebar(searchEl.value);syncClear();});
searchEl.addEventListener("focus",function(){searchPill.classList.add("foc");});
searchEl.addEventListener("blur",function(){searchPill.classList.remove("foc");});
searchEl.addEventListener("keydown",function(e){if(e.key==="Escape"&&searchEl.value){searchEl.value="";renderSidebar("");syncClear();}});
clearBtn.addEventListener("click",function(){searchEl.value="";renderSidebar("");syncClear();searchEl.focus();});

renderSidebar("");
renderWelcome();
</script>
</body>
</html>
