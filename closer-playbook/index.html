<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<meta name="color-scheme" content="light" />
<meta name="theme-color" content="#ffffff" />
<title>Reputifly · Closer Playbook</title>
<link rel="icon" href="favicon.png" />
<link rel="apple-touch-icon" href="favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
:root{
  --color-canvas:#f7f8fa;--color-surface:#ffffff;--color-surface-2:#f3f4f6;--color-surface-3:#eceef1;
  --color-ink:#0a0a0a;--color-ink-2:#3f4754;--color-muted:#6b7280;--color-faint:#9ca3af;
  --color-line:#e8eaed;--color-line-2:#dfe2e7;
  --color-primary:#007aff;--color-primary-hover:#0a6fe0;--color-primary-active:#0563cc;--color-primary-soft:#e9f2ff;--color-on-primary:#ffffff;
  --color-success:#34c759;--color-warn:#ff9500;--color-danger:#ff3b30;--color-danger-hover:#e11d0f;
  --radius-pill:9999px;--radius-lg:20px;--radius-md:14px;--radius-sm:12px;--radius-xs:9px;
  --shadow-xs:0 1px 2px rgba(16,24,40,.04);--shadow-sm:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-md:0 4px 12px rgba(16,24,40,.08),0 2px 4px rgba(16,24,40,.04);--shadow-lg:0 12px 32px rgba(16,24,40,.12),0 4px 8px rgba(16,24,40,.06);
  --shadow-focus:0 0 0 3px rgba(0,122,255,.28);--ease:cubic-bezier(0.25,0.8,0.25,1);
  --font-sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
html,body{margin:0;min-height:100vh;min-height:100dvh}
html{background:var(--color-canvas);color:var(--color-ink);font-family:var(--font-sans);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-feature-settings:"cv02","cv03","cv04","cv11"}
body{margin:0;font-size:14px;line-height:1.5;letter-spacing:-0.006em;color:var(--color-ink);background:var(--color-canvas);overflow-x:hidden}
*{box-sizing:border-box}
::selection{background:rgba(0,122,255,.16)}
h1,h2,h3,h4{letter-spacing:-0.02em;font-weight:700;margin:0}
button{font-family:inherit}
:focus{outline:none}
button:focus-visible,[tabindex]:focus-visible,input:focus-visible{box-shadow:var(--shadow-focus);border-radius:var(--radius-xs)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:0 20px;border-radius:var(--radius-pill);border:1px solid transparent;font-size:14px;font-weight:600;letter-spacing:-0.01em;cursor:pointer;user-select:none;white-space:nowrap;transition:background-color .18s var(--ease),border-color .18s var(--ease),color .18s var(--ease),transform .12s var(--ease),box-shadow .18s var(--ease)}
.btn:active{transform:translateY(0.5px) scale(0.99)}
.btn--primary{background:var(--color-primary);color:var(--color-on-primary);box-shadow:var(--shadow-xs)}
.btn--primary:hover{background:var(--color-primary-hover)}
@keyframes rf-pop-in{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes rf-fade-in{from{opacity:0}to{opacity:1}}
.rf-pop-in{animation:rf-pop-in .22s var(--ease)}
.rf-fade-in{animation:rf-fade-in .2s var(--ease)}
@media (prefers-reduced-motion:reduce){.rf-pop-in,.rf-fade-in{animation:none}}

/* shell */
.app{max-width:1140px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--color-canvas)}
.topbar{position:sticky;top:0;z-index:30;height:62px;display:flex;align-items:center;gap:13px;padding:0 18px;background:rgba(255,255,255,.9);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--color-line)}
.topbar .logo{height:25px;width:auto;display:block}
.topbar .sep{width:1px;height:22px;background:var(--color-line-2);flex-shrink:0}
.topbar .title{font-size:15px;font-weight:700;letter-spacing:-0.02em;white-space:nowrap}
.topbar .title .sm{color:var(--color-muted);font-weight:500}
.redpill{margin-left:auto;display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:var(--radius-pill);background:#ffe9e7;color:#c0271c;border:none;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background-color .15s var(--ease)}
.redpill:hover{background:#ffdcd8}
.bodyrow{flex:1;display:flex;min-height:0}

/* sidebar */
.sidebar{width:344px;flex-shrink:0;border-right:1px solid var(--color-line);background:var(--color-surface);display:flex;flex-direction:column}
.searchwrap{padding:14px 14px 8px;position:sticky;top:0;background:var(--color-surface);z-index:2}
.search-pill{display:flex;align-items:center;gap:9px;width:100%;height:42px;padding:0 14px;background:var(--color-surface-2);border:1px solid transparent;border-radius:var(--radius-pill);transition:background-color .18s var(--ease),border-color .18s var(--ease),box-shadow .18s var(--ease)}
.search-pill.foc{background:var(--color-surface);border-color:var(--color-primary);box-shadow:var(--shadow-focus)}
.search-pill input{flex:1;min-width:0;border:none;outline:none;background:transparent;font-size:16px;color:var(--color-ink)}
.search-pill input::placeholder{color:var(--color-faint)}
.sidescroll{flex:1;overflow-y:auto;padding:4px 12px 28px}
.grouplabel{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--color-faint);margin:16px 6px 7px}
.grouplabel:first-child{margin-top:6px}
.srow{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:11px 12px;border-radius:var(--radius-md);background:transparent;border:1px solid transparent;cursor:pointer;transition:background-color .12s var(--ease),border-color .12s var(--ease);margin-bottom:2px}
.srow:hover{background:var(--color-surface-2)}
.srow.active{background:var(--color-primary-soft);border-color:#cfe3ff}
.srow .ic{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--color-surface-2)}
.srow.active .ic{background:#fff}
.srow .tx{flex:1;min-width:0}
.srow .tt{font-size:13.5px;font-weight:600;letter-spacing:-0.01em;color:var(--color-ink)}
.srow.active .tt{color:var(--color-primary-active)}
.srow .ds{font-size:11.5px;color:var(--color-muted);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.noresult{padding:30px 12px;text-align:center;color:var(--color-faint);font-size:13px}

/* detail */
.detail{flex:1;min-width:0;overflow-y:auto;padding:26px 30px 60px}
.detail .inner{max-width:600px}
.backbtn{display:none}
.welcome{max-width:440px;margin:6vh auto 0;text-align:center}
.welcome .wlogo{height:34px;margin-bottom:20px;opacity:.9}
.welcome h2{font-size:20px;font-weight:800;margin-bottom:8px}
.welcome p{color:var(--color-muted);font-size:14px;line-height:1.6}
.nodehd{font-size:22px;font-weight:800;letter-spacing:-0.02em;line-height:1.22;margin:0 0 5px}
.nodetag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:3px 11px;border-radius:var(--radius-pill);margin-bottom:14px}
.tag-hot{background:#ffe9e7;color:#c0271c}.tag-warm{background:#fff1de;color:#9a5a00}.tag-cool{background:#e9f2ff;color:var(--color-primary-active)}.tag-dead{background:#f0f1f3;color:#6b7280}
.doblk{display:flex;gap:10px;padding:14px 15px;background:var(--color-primary-soft);border:1px solid #d4e6ff;border-radius:var(--radius-md);margin-bottom:16px}
.doblk .lab{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--color-primary-active);margin-bottom:3px}
.doblk .tx{font-size:13.5px;color:var(--color-ink);line-height:1.55}
.proofimg{width:100%;border:1px solid var(--color-line);border-radius:var(--radius-md);margin-bottom:14px;box-shadow:var(--shadow-sm);display:block}
.proofcap{font-size:11.5px;color:var(--color-muted);margin:-8px 2px 16px}
.scriptcard{border:1px solid var(--color-line);border-radius:var(--radius-md);overflow:hidden;margin-bottom:12px;background:var(--color-surface)}
.scripthd{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 13px;background:var(--color-surface-2);border-bottom:1px solid var(--color-line)}
.scripthd .lbl{font-size:11px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--color-muted)}
.scriptbody{padding:15px;font-size:14.5px;line-height:1.62;color:var(--color-ink);white-space:pre-wrap}
.copybtn{display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 13px;border-radius:var(--radius-pill);background:var(--color-primary);color:#fff;border:none;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background-color .15s var(--ease),transform .12s var(--ease)}
.copybtn:hover{background:var(--color-primary-hover)}.copybtn:active{transform:scale(.97)}
.copybtn.ok{background:var(--color-success)}
.fill{background:#fff4c2;border-radius:4px;padding:0 3px;font-weight:600;color:#8a6d00}
.msgnum{font-size:11px;font-weight:700;color:var(--color-primary-active);margin:6px 2px 7px}
.nextlbl{font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--color-muted);margin:20px 2px 9px}
.nexts{display:flex;flex-direction:column;gap:8px}
.nextbtn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;padding:12px 14px;border:1px solid var(--color-line-2);border-radius:var(--radius-md);background:var(--color-surface);font-size:13.5px;font-weight:600;color:var(--color-ink);cursor:pointer;transition:background-color .13s var(--ease),border-color .13s var(--ease)}
.nextbtn:hover{background:var(--color-surface-2);border-color:var(--color-primary)}
.nextbtn .arw{color:var(--color-primary);flex-shrink:0}
.note{font-size:12px;color:var(--color-muted);margin-top:16px;padding:11px 13px;background:var(--color-surface-2);border-radius:var(--radius-sm);line-height:1.5}

/* red lines sheet */
.scrim{position:fixed;inset:0;z-index:60;background:rgba(10,12,16,.42);display:flex;align-items:center;justify-content:center;padding:16px;animation:rf-fade-in .18s var(--ease)}
@media(max-width:560px){.scrim{align-items:flex-end;padding:0}}
.sheet{width:100%;max-width:520px;background:var(--color-surface);border-radius:20px;box-shadow:var(--shadow-lg);padding:8px 20px 26px;animation:rf-pop-in .24s var(--ease)}
@media(max-width:560px){.sheet{border-radius:20px 20px 0 0}}
.sheet .grab{width:38px;height:4px;border-radius:9999px;background:var(--color-line-2);margin:8px auto 14px}
.sheet h2{font-size:17px;font-weight:800;margin-bottom:3px}
.sheet .sh-sub{font-size:12.5px;color:var(--color-muted);margin-bottom:16px}
.rl{display:flex;gap:11px;padding:11px 0;border-top:1px solid var(--color-line)}
.rl .n{width:24px;height:24px;border-radius:7px;background:var(--color-danger);color:#fff;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.rl .t{font-size:13.5px;line-height:1.45}.rl .t b{font-weight:700}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);z-index:80;background:var(--color-ink);color:#fff;font-size:13px;font-weight:600;padding:11px 18px;border-radius:var(--radius-pill);box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:opacity .2s var(--ease),transform .2s var(--ease)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* mobile: single column, list <-> detail */
@media(max-width:860px){
  .bodyrow{display:block}
  .sidebar{width:100%;border-right:none}
  .detail{display:none;padding:18px 16px 50px}
  .detail .inner{max-width:100%}
  body.viewing .sidebar{display:none}
  body.viewing .detail{display:block}
  .backbtn{display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 13px 0 9px;border-radius:var(--radius-pill);background:var(--color-surface-2);color:var(--color-ink-2);font-size:13px;font-weight:600;border:none;cursor:pointer;margin-bottom:15px}
  .topbar .title{display:none}
  .topbar .sep{display:none}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <img class="logo" src="reputifly-logo.png" alt="Reputifly" />
    <div class="sep"></div>
    <div class="title">Closer Playbook</div>
    <button class="redpill" data-act="redlines">⛔ Red Lines</button>
  </div>
  <div class="bodyrow">
    <aside class="sidebar">
      <div class="searchwrap">
        <div class="search-pill" id="searchpill">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#9ca3af" stroke-width="2"/><path d="M20 20l-3-3" stroke="#9ca3af" stroke-width="2" stroke-linecap="round"/></svg>
          <input id="search" type="text" placeholder="Search a situation…" autocomplete="off" />
        </div>
      </div>
      <div class="sidescroll" id="sidescroll"></div>
    </aside>
    <main class="detail" id="detail"></main>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
var ARROW = '<svg class="arw" width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
var COPYICON = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="11" height="11" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 012-2h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';

var MENU = [
  {g:"A New Lead Just Messaged"},
  {id:"newlead", ic:"👋", tt:"New Lead — What To Open With", ds:"3 openers, pick one", kw:"first message hello inquiry start"},
  {id:"gotinfo", ic:"🧭", tt:"They Told Me Their Business", ds:"now figure out the build", kw:"category fork"},
  {id:"silent", ic:"🌑", tt:"They're Not Replying", ds:"one nudge only", kw:"ghost no reply quiet"},
  {g:"Figuring Out What To Build"},
  {id:"hassite", ic:"🔁", tt:"They Have A Website", ds:"redesign — get URL + keep/kill", kw:"redesign existing site url"},
  {id:"nosite", ic:"✨", tt:"No Website Yet", ds:"new build — 3 quick asks", kw:"new build scratch logo"},
  {id:"store", ic:"🛒", tt:"They Want A Shop / Checkout", ds:"out-ramp — never $590", kw:"ecommerce store woocommerce products"},
  {g:"Sending The Live Site"},
  {id:"building", ic:"⚙️", tt:"It's Building", ds:"kill the dead air", kw:"holding wait"},
  {id:"reveal", ic:"🚀", tt:"Send Them The Live Site", ds:"reveal + proof + the ask", kw:"sample preview send link reveal"},
  {id:"telemetry", ic:"📡", tt:"They Saw It — Read The Reaction", ds:"hot / warm / cool", kw:"reaction urgent buy signal"},
  {g:"Closing The Deal"},
  {id:"close", ic:"✅", tt:"Close It — Proceed + Invoice", ds:"proceed → scope-lock → invoice", kw:"close proceed deposit invoice scope"},
  {id:"meet", ic:"📞", tt:"They Want To Meet / Call", ds:"hot signal → Google Meet", kw:"call meet video google meet"},
  {id:"followup", ic:"⏳", tt:"Went Quiet After Seeing It", ds:"7-day decay = the urgency", kw:"follow up nurture pressure quiet"},
  {g:"Objections & Questions"},
  {id:"price", ic:"💸", tt:"Price Pushback / Cheaper Guy", ds:"the SEO lever — hold $590", kw:"objection price cheaper freelancer seo rank"},
  {id:"faq", ic:"💬", tt:"Common Questions", ds:"what's included, SEO, hosting…", kw:"faq included hosting own seo ai how long"},
  {id:"whois", ic:"🧑", tt:"“Who Are You / Where's Julian?”", ds:"team-member line", kw:"who are you julian team"},
  {id:"timewaster", ic:"🚩", tt:"Smells Like A Time-Waster", ds:"the tells + the warm eject", kw:"time waster eject haggle"},
];

var NODES = {
  newlead:{title:"New Lead — What To Open With",tag:null,
    do:"Don't lead with a form-wall — that's what the cheap guys do. Open like a human, get them talking, and tell them we'll build something REAL. Pick the opener that fits — all three get them to tell you their business.",
    scripts:[
      {n:"Option A — warm + human (default)",t:"hey! thanks for reaching out 🙂 we build proper websites for SG businesses — and we'll actually build yours live so you can see the real thing, not just talk about it. quick one to start: what's your business + what do you do?"},
      {n:"Option B — straight to the value",t:"hey! happy to help 🙌 easiest way — tell us your business name + what you do, and we'll build you a real homepage you can actually look at. sound good?"},
      {n:"Option C — if they want specifics",t:`thanks for reaching out! to build you something real, drop us:
1) business name
2) what you do
3) do you already have a website?
and we'll get started`}],
    next:[{l:"They told me their business → figure out the build",to:"gotinfo"},{l:"They went quiet",to:"silent"}]},
  gotinfo:{title:"They Told Me Their Business",tag:null,
    do:"Now the one fork that decides everything: do they already have a website, or not? (And catch a store BEFORE we build anything.)",
    scripts:[],
    next:[{l:"They HAVE a website → redesign",to:"hassite"},{l:"NO website → new build",to:"nosite"},{l:"They sell products / want checkout",to:"store"},{l:"Smells like a time-waster",to:"timewaster"}]},
  silent:{title:"They're Not Replying",tag:{x:"cool"},
    do:"One nudge only. If still nothing, mark them follow-up and move on — don't chase a ghost.",
    scripts:[{t:"still keen on that free homepage? 🙂 just need your business name + what you do and we'll build it for you"}],
    next:[{l:"They reply",to:"gotinfo"},{l:"Nothing → nurture later",to:"followup"}]},
  hassite:{title:"They Have A Website (Redesign)",tag:null,
    do:"Collect only what makes the build easy: their current site link (we reuse their logo + images from it) + what to keep vs change. Show a same-industry example if we have one — if not, use the fallback.",
    scripts:[
      {n:"If we HAVE a same-industry example to show",t:"awesome — drop us your current site link? and tell us what you'd want to keep vs change. we'll rebuild it way sharper. here's one we did recently for another «their industry» so you get the vibe 👇"},
      {n:"If we DON'T have one to show",t:"awesome — drop us your current site link? and tell us what you'd want to keep vs change, and we'll rebuild it way sharper. give us a bit and we'll send you the live version to look at 👍"}],
    next:[{l:"Got the link + brief → build it",to:"building"},{l:"Won't give the link after 2 asks",to:"timewaster"}]},
  nosite:{title:"No Website (New Build)",tag:null,
    do:"Collect only what makes the build easy. Three asks — logo, what they do, and the look they like. Keep it tight.",
    scripts:[{t:`easy, we'll build it from scratch. 3 quick things:
1) your logo, if you have one (no stress if not)
2) one line on what makes you different
3) a website or two whose design you like — so we build it to your taste`}],
    next:[{l:"Got their inputs → build it",to:"building"},{l:"Won't give one input after 2 asks",to:"timewaster"}]},
  store:{title:"They Want A Shop / Checkout",tag:{x:"warm"},
    do:"A store is NOT the $590 product. Catch it early, don't quote, capture what they sell, and flag Julian for the right plan.",
    scripts:[{t:"ahh if people actually buy + checkout on the site, that's a different build to a normal site — let us get you the right plan for that 👍 what are you selling, and roughly how many products?"}],
    next:[{l:"Captured → flag Julian, back to start",to:"newlead"}]},
  building:{title:"It's Building",tag:null,
    do:"You build NOTHING — the system builds it. Send a holding line so there's no dead air, then wait for the live link.",
    scripts:[{t:"on it — we're building your homepage now, we'll send you the live link in a bit 🚀"}],
    next:[{l:"It's live → send it",to:"reveal"}]},
  reveal:{title:"Send Them The Live Site",tag:{x:"cool"},
    do:"Never call it a “sample/preview” — it's their real, live site. Msg 1 = the reveal. Msg 2 (after they open) = the proof. Msg 3 = reaction + a soft proceed. Msg 4 = offer a call. Frame it as the starting point — the full build is even better.",
    scripts:[
      {n:"Message 1 — the reveal",t:`your site's done — it's live right now 👉 «link»

      {n:"Message 2 — after they open it (the proof)",t:"try this — fill in your own contact form on the site and watch the enquiry land on a phone in 10 seconds. it's real, and it's yours"},
      {n:"Message 3 — their reaction + soft proceed",t:"what do you think? 🙂 this is just the starting point — the full build is even sharper and we make it exactly how you want. shall we get it set up properly on your own domain? it's $590 all in (1 year hosting + domain included)"},
      {n:"Message 4 — offer a quick call",t:"happy to hop on a quick google meet to walk you through it + answer anything — when works for you?"}],
    next:[{l:"Read how they react",to:"telemetry"}]},
  telemetry:{title:"Read The Reaction",tag:null,
    do:"Don't ask “how urgent are you?” — READ it. How they react to the live site is the strongest buy-signal there is. Tap what they did:",
    scripts:[],
    next:[
      {l:"🔥 Opened fast / filled the form / “can you change X” → HOT",to:"close"},
      {l:"🙂 Likes it but pushes on price / a cheaper guy → WARM",to:"price"},
      {l:"📞 “can we call / meet?” → HOT (SG signal)",to:"meet"},
      {l:"🌫️ Opened but quiet / didn't open → COOL",to:"followup"},
      {l:"🚩 Haggling before valuing it → time-waster",to:"timewaster"}]},
  close:{title:"Close It — Proceed + Invoice",tag:{x:"hot"},
    do:"This is where we close — so ask them to proceed directly, don't be shy. The scope-lock both protects us AND reads as “we're starting.” Then hand off: WE don't invoice, Julian sends it himself so the terms stay clean. Your job ends at “yes.”",
    scripts:[
      {n:"Step 1 — the direct proceed ask",t:"so — shall we make it official and get it live on your own domain? 🙂"},

var RED_LINES = [
  "<b>$590 is the price.</b> Never quote anything else.",
  "<b>50% deposit floor.</b> Never take less to lock a build (70% is the default ask).",
  "<b>Scope-lock every time:</b> 4 pages · mobile · contact form · 1yr hosting+domain+email · 3 revisions. Beyond that = a paid add-on.",
  "<b>No discounts.</b> The −$100 lever is Julian's call only — flag him, don't offer it.",
  "<b>Julian sends the invoice + handles payment.</b> Your job is to get them to “yes” — money flows through Julian only.",
];

var sidescroll = document.getElementById("sidescroll");
var detail = document.getElementById("detail");
var curScripts = [];
var curId = null;

function esc(s){ return String(s).split("&").join("&amp;").split("<").join("&lt;").split(">").join("&gt;"); }
function fillify(s){ return esc(s).replace(/«([^»]+)»/g, function(m,g){ return '<span class="fill">'+g+'</span>'; }); }

function renderSidebar(filter){
  var f = (filter||"").trim().toLowerCase();
  var h = ""; var shown = 0; var pending = "";
  for(var i=0;i<MENU.length;i++){
    var m = MENU[i];
    if(m.g){ if(pending){ h += pending; } pending = '<div class="grouplabel">'+esc(m.g)+'</div>'; continue; }
    var hay = (m.tt+" "+m.ds+" "+(m.kw||"")).toLowerCase();
    if(f && hay.indexOf(f)===-1) continue;
    if(pending){ h += pending; pending=""; }
    var active = (m.id===curId) ? " active" : "";
    h += '<button class="srow'+active+'" data-go="'+m.id+'"><div class="ic">'+m.ic+'</div>'+
         '<div class="tx"><div class="tt">'+esc(m.tt)+'</div><div class="ds">'+esc(m.ds)+'</div></div></button>';
    shown++;
  }
  if(!shown) h = '<div class="noresult">No situation matches that.<br>Try another word.</div>';
  sidescroll.innerHTML = h;
}

function renderWelcome(){
  detail.innerHTML = '<div class="welcome rf-fade-in"><img class="wlogo" src="reputifly-logo.png" alt="Reputifly"/>'+
    '<h2>Closer Playbook</h2><p>Pick the situation you’re in on the left — you’ll get exactly what to do and a copy-paste message for WhatsApp. Tap <b>Copy</b>, paste, send.</p></div>';
}

function selectNode(id){
  var n = NODES[id];
  if(!n){ return; }
  curId = id;
  curScripts = (n.scripts||[]).map(function(s){ return s.t; });
  var h = '<div class="inner rf-fade-in">';
  h += '<button class="backbtn" data-act="back">'+'<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>All situations</button>';
  h += '<div class="nodehd">'+esc(n.title)+'</div>';
  if(n.tag){ var map={hot:["tag-hot","🔥 HOT"],warm:["tag-warm","WARM"],cool:["tag-cool","COOL"],dead:["tag-dead","HANDLE WITH CARE"]}; var t=map[n.tag.x]; h+='<span class="nodetag '+t[0]+'">'+t[1]+'</span>'; }
  h += '<div class="doblk"><div><div class="lab">Do this</div><div class="tx">'+esc(n.do)+'</div></div></div>';
  if(n.img){ h += '<img class="proofimg" src="'+n.img+'" alt="proof"/>'; if(n.imgcap) h += '<div class="proofcap">'+esc(n.imgcap)+'</div>'; }
  for(var i=0;i<(n.scripts||[]).length;i++){
    var s = n.scripts[i];
    if(s.n) h += '<div class="msgnum">'+esc(s.n)+'</div>';
    h += '<div class="scriptcard"><div class="scripthd"><span class="lbl">Tap to copy → paste in WhatsApp</span>'+
         '<button class="copybtn" data-act="copy" data-i="'+i+'">'+COPYICON+'Copy</button>'+
         '</div><div class="scriptbody">'+fillify(s.t)+'</div></div>';
  }
  if(n.next&&n.next.length){
    h += '<div class="nextlbl">Then what happened?</div><div class="nexts">';
    for(var j=0;j<n.next.length;j++){
      h += '<button class="nextbtn" data-go="'+n.next[j].to+'"><span>'+esc(n.next[j].l)+'</span>'+ARROW+'</button>';
    }
    h += '</div>';
  }
  if(n.pending) h += '<div class="note">⚠️ '+esc(n.pending)+'</div>';
  else if(id==="reveal"||id==="hassite") h += '<div class="note">Highlighted bits like <span class="fill">link</span> are the only things you edit before sending.</div>';
  h += '</div>';
  detail.innerHTML = h;
  detail.scrollTop = 0;
  document.body.classList.add("viewing");
  renderSidebar(document.getElementById("search").value);
}

function back(){ document.body.classList.remove("viewing"); }

function doCopy(i, btn){
  var raw = curScripts[i]; if(raw==null) return;
  var done=function(){ btn.classList.add("ok"); btn.innerHTML='✓ Copied'; toast("Copied — paste it in WhatsApp"); setTimeout(function(){ btn.classList.remove("ok"); btn.innerHTML=COPYICON+'Copy'; },1400); };
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(raw).then(done, function(){ fallback(raw,done); }); } else fallback(raw,done);
}
function fallback(t,cb){ var ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); cb(); }

var toastT;
function toast(msg){ var el=document.getElementById("toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){ el.classList.remove("show"); },1700); }

function openRedLines(){
  var s=document.createElement("div"); s.className="scrim";
  var h='<div class="sheet"><div class="grab"></div><h2>⛔ The 5 Red Lines</h2><div class="sh-sub">These never bend — they are on page 1 for a reason.</div>';
  for(var i=0;i<RED_LINES.length;i++){ h+='<div class="rl"><div class="n">'+(i+1)+'</div><div class="t">'+RED_LINES[i]+'</div></div>'; }
  h+='<div style="margin-top:18px"><button class="btn btn--primary" data-act="closesheet" style="width:100%">Got it</button></div></div>';
  s.innerHTML=h;
  s.addEventListener("click", function(e){ if(e.target===s || (e.target.getAttribute && e.target.getAttribute("data-act")==="closesheet")) s.remove(); });
  document.body.appendChild(s);
}

document.addEventListener("click", function(e){
  var t = e.target.closest ? e.target.closest("[data-go],[data-act]") : null;
  if(!t) return;
  if(t.hasAttribute("data-go")){ selectNode(t.getAttribute("data-go")); return; }
  var act = t.getAttribute("data-act");
  if(act==="back") back();
  else if(act==="redlines") openRedLines();
  else if(act==="copy") doCopy(parseInt(t.getAttribute("data-i"),10), t);
});

var searchEl = document.getElementById("search");
var searchPill = document.getElementById("searchpill");
searchEl.addEventListener("input", function(){ renderSidebar(searchEl.value); });
searchEl.addEventListener("focus", function(){ searchPill.classList.add("foc"); });
searchEl.addEventListener("blur", function(){ searchPill.classList.remove("foc"); });

renderSidebar("");
renderWelcome();
</script>
