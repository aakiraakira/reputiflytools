      issueDate: issueDate.toISOString().slice(0, 10),
      client, items,
      subtotal, total: subtotal,
      createdAt: { seconds: Math.floor(issueDate.getTime() / 1000) }
    }];
  };
  state.invoices.set(...sampleI('i1', 1,
    { name: 'Harbourfront Studio', address: '88 Telok Blangah Road', postal: 'Singapore 098654' },
    [{ description: 'Annual website maintenance', qty: 12, rate: 180, amount: 2160 }],
    10
  ));
  state.invoices.set(...sampleI('i2', 2,
    { name: 'Lighthouse Dental', attn: 'Dr Tan' },
    [{ description: 'Brand identity refresh', subtitle: 'Logo, palette, typography system', qty: 1, rate: 1800, amount: 1800 }],
    2
  ));

  state.loading.initial = false;
  initDraft();
  render();
  showToast('Dev mode active — data is in-memory only', 'info');
}

// REGION: counters / atomic numbering ───────────────────────────────
async function convertQuotationToInvoice(quotationId, paymentDate) {
  const uid = state.user.uid;
  if (DEV_MODE) {
    // synthesize in-memory
    const quote = state.quotations.get(quotationId);
    if (!quote) throw new Error('Quotation not found');
    if (quote.status === 'converted') throw new Error('Already converted');
    const next = (state.counters.invoice?.value || 0) + 1;
    const displayNumber = formatNumber(next, 'INV-', 4);
    const newId = 'i' + Math.random().toString(36).slice(2, 9);
    // Transfer the share token so old QINV- links keep working.
    const shareToken = quote.shareToken || generateShareToken();
    state.invoices.set(newId, {
      id: newId, version: 1, number: next, displayNumber,
      issueDate: paymentDate,
      client: { ...quote.client },
      items: [...quote.items.map(i => ({ ...i }))],
      subtotal: quote.subtotal, total: quote.total,
      terms: quote.terms || null,
      sourceQuotationId: quotationId,
      sourceQuotationNumber: quote.displayNumber,
      shareToken,
      status: 'paid',
      createdAt: { seconds: Math.floor(Date.now() / 1000) }
    });
    state.counters.invoice = { ...state.counters.invoice, value: next };
    state.quotations.set(quotationId, { ...quote, status: 'converted', convertedToInvoiceId: newId, shareToken });
    render();
    // Re-permute numbers by payment date so the just-converted invoice
    // lands in the right chronological slot, not necessarily at the top.
    try { await renumberInvoicesByPaymentDate(); } catch (e) { /* swallow */ }
    const finalDev = state.invoices.get(newId);
    return { invoiceId: newId, displayNumber: finalDev?.displayNumber || displayNumber };
  }
  const result = await runTransaction(db, async (txn) => {
    const counterRef = doc(db, `users/${uid}/counters/invoice`);
    const counterSnap = await txn.get(counterRef);
    if (!counterSnap.exists()) throw new Error('Counter not initialised');
    const quoteRef = doc(db, `users/${uid}/quotations/${quotationId}`);
    const quoteSnap = await txn.get(quoteRef);
    if (!quoteSnap.exists()) throw new Error('Quotation not found');
    const quote = quoteSnap.data();
    if (quote.status === 'converted') throw new Error('Already converted');

    const cur = counterSnap.data();
    const next = cur.value + 1;
    const displayNumber = formatNumber(next, cur.prefix || 'INV-', cur.padding || 4);

    // Transfer the share token. If the source quotation predates the
    // share-link feature, mint a new token and back-fill it onto the
    // quotation as well.
    const shareToken = quote.shareToken || generateShareToken();

    const invoiceRef = doc(collection(db, `users/${uid}/invoices`));
    const auditRef = doc(collection(invoiceRef, 'audit'));

    const invoiceData = {
      version: 1, number: next, displayNumber,
      issueDate: paymentDate,
      client: { ...quote.client },
      items: [...quote.items],
      subtotal: quote.subtotal, total: quote.total,
      terms: quote.terms || null,
      sourceQuotationId: quotationId,
      sourceQuotationNumber: quote.displayNumber,
      shareToken,
      status: 'paid',
      createdAt: serverTimestamp()
    };
    txn.set(invoiceRef, invoiceData);
    txn.update(counterRef, {
      value: next, lastIssuedAt: serverTimestamp(),
      lastInvoiceId: invoiceRef.id, updatedAt: serverTimestamp()
    });
    txn.update(quoteRef, {
      status: 'converted', convertedToInvoiceId: invoiceRef.id,
      shareToken,
      convertedAt: serverTimestamp(), updatedAt: serverTimestamp()
    });
    txn.set(auditRef, {
      ts: serverTimestamp(), actor: uid, event: 'created',
      after: { number: next, status: 'paid' }
    });
    return { invoiceId: invoiceRef.id, displayNumber, shareToken, invoiceData };
  });

  // Re-point the public mirror at the new invoice. Old QINV- links
  // continue to resolve here and now show the INV- invoice.
  upsertShareDoc(result.shareToken, buildSharePayload({
    ...result.invoiceData,
    displayNumber: result.displayNumber
  }, 'invoice'));

  // Re-permute the existing pool of numbers by payment date so the
  // newly converted invoice slots into the right chronological position.
  // If its paymentDate is the latest, nothing changes; if it predates
  // already-paid invoices, those shift up and this one drops in below.
  try { await renumberInvoicesByPaymentDate(); } catch (e) { console.warn('[renumber] post-convert renumber failed', e); }

  // Read back the final displayNumber from local state (which the
  // snapshot listener / our optimistic batch has refreshed) so the
  // toast we show the user matches what they'll see in the list.
  const final = state.invoices.get(result.invoiceId);
  const finalDisplay = final?.displayNumber || result.displayNumber;

  return { invoiceId: result.invoiceId, displayNumber: finalDisplay };
}

async function setCounterValue(name, value) {
  if (DEV_MODE) {
    state.counters[name] = { ...state.counters[name], value };
    render(); return;
  }
  const uid = state.user.uid;
  const ref = doc(db, `users/${uid}/counters/${name}`);
  await setDoc(ref, {
    value: value,
    prefix: name === 'invoice' ? 'INV-' : 'QINV-',
    padding: name === 'invoice' ? 4 : 3,
    updatedAt: serverTimestamp()
  }, { merge: true });
}

// REGION: payment-date-driven renumbering ───────────────────────────
// The accountant reads bank-statement deposit dates top-down; invoice
// numbers should mirror that exact order. Whenever a payment date
// shifts (or a new payment lands), we re-permute the existing pool of
// invoice numbers across all invoices ordered by issueDate ascending —
// the oldest payment keeps the lowest number, the newest payment ends
// up with the highest number. The counter itself stays untouched
// (forward-only), so future invoices keep getting fresh numbers.
function invoicePaymentSortKey(inv) {
  // Sort key: (issueDate, createdAt). issueDate is the payment date
  // (a yyyy-mm-dd string, lexicographically chronological). createdAt
  // breaks ties between two payments received on the same day — the
  // earlier-converted one keeps the lower number, which is what feels
  // right: it was the first one the user marked paid that day.
  const date = inv.issueDate || '';
  let createdSec = 0;
  if (inv.createdAt) {
    if (typeof inv.createdAt.seconds === 'number') createdSec = inv.createdAt.seconds;
    else if (typeof inv.createdAt.toMillis === 'function') createdSec = inv.createdAt.toMillis() / 1000;
    else if (inv.createdAt instanceof Date) createdSec = inv.createdAt.getTime() / 1000;
  }
  return { date, createdSec };
}

function detectInvoiceOrderingMismatch() {
  // Returns true if the current set of invoices is NOT already sorted
  // by payment date — i.e. clicking "Re-sequence" would actually move
  // numbers. Cheap O(n log n) check used to render a soft hint in the
  // numbering panel.
  const invs = Array.from(state.invoices.values());
  if (invs.length < 2) return false;
  const sorted = [...invs].sort((a, b) => {
    const A = invoicePaymentSortKey(a);
    const B = invoicePaymentSortKey(b);
    if (A.date !== B.date) return A.date.localeCompare(B.date);
    return A.createdSec - B.createdSec;
  });
  const pool = invs.map(i => i.number || 0).sort((a, b) => a - b);
  for (let i = 0; i < sorted.length; i++) {
    if ((sorted[i].number || 0) !== pool[i]) return true;
  }
  return false;
}

async function renumberInvoicesByPaymentDate() {
  const invs = Array.from(state.invoices.values());
  if (invs.length < 2) return { changed: 0 };

  // Order by payment date asc (oldest = lowest number)
  const sorted = [...invs].sort((a, b) => {
    const A = invoicePaymentSortKey(a);
    const B = invoicePaymentSortKey(b);
    if (A.date !== B.date) return A.date.localeCompare(B.date);
    return A.createdSec - B.createdSec;
  });

  // The pool of available numbers = the numbers currently in use.
  // Re-permute them across the sorted list — no new numbers minted,
  // no numbers retired, the counter is never touched.
  const pool = invs.map(i => i.number).filter(n => typeof n === 'number').sort((a, b) => a - b);
  if (pool.length !== sorted.length) return { changed: 0 };

  const counterMeta = state.counters.invoice || {};
  const prefix  = counterMeta.prefix  || 'INV-';
  const padding = counterMeta.padding || 4;

  const updates = [];
  for (let i = 0; i < sorted.length; i++) {
    const inv = sorted[i];
    const newNumber = pool[i];
    if (inv.number === newNumber) continue;
    updates.push({
      id: inv.id,
      newNumber,
      newDisplay: formatNumber(newNumber, prefix, padding)
    });
  }
  if (updates.length === 0) return { changed: 0 };

  if (DEV_MODE) {
    for (const u of updates) {
      const cur = state.invoices.get(u.id);
      if (cur) state.invoices.set(u.id, { ...cur, number: u.newNumber, displayNumber: u.newDisplay });
    }
    render();
    return { changed: updates.length };
  }

  const uid = state.user.uid;
  // Single batch = atomic on the server, so number-swaps (where two
  // invoices trade numbers) never leave the dataset with a duplicate
  // mid-flight from any reader's perspective.
  const batch = writeBatch(db);
  for (const u of updates) {
    batch.update(doc(db, `users/${uid}/invoices/${u.id}`), {
      number: u.newNumber,
      displayNumber: u.newDisplay,
      updatedAt: serverTimestamp()
    });
  }
  await batch.commit();

  // Re-publish the public share mirror for each renumbered invoice so
  // anyone holding a share link sees the new INV- number on the page.
  for (const u of updates) {
    const inv = state.invoices.get(u.id);
    if (inv && inv.shareToken) {
      try {
        upsertShareDoc(inv.shareToken, buildSharePayload(
          { ...inv, number: u.newNumber, displayNumber: u.newDisplay },
          'invoice'
        ));
      } catch (e) { /* best-effort; do not fail the renumber */ }
    }
  }

  return { changed: updates.length };
}

async function updateInvoicePaymentDate(id, newDate) {
  const cur = state.invoices.get(id);
  if (!cur) throw new Error('Invoice not found');
  if (!newDate) throw new Error('Payment date is required');
  if (cur.issueDate === newDate) return { changed: false };

  if (DEV_MODE) {
    state.invoices.set(id, { ...cur, issueDate: newDate });
    await renumberInvoicesByPaymentDate();
    return { changed: true };
  }

  const uid = state.user.uid;
  await updateDoc(doc(db, `users/${uid}/invoices/${id}`), {
    issueDate: newDate,
    updatedAt: serverTimestamp()
  });
  // Audit the date change so the trail still shows who moved what.
  try {
    await addDoc(collection(db, `users/${uid}/invoices/${id}/audit`), {
      ts: serverTimestamp(), actor: uid, event: 'payment-date-changed',
      before: { issueDate: cur.issueDate || null },
      after:  { issueDate: newDate }
    });
  } catch (e) { /* audit is best-effort */ }
  // Refresh the public share mirror with the new date.
  if (cur.shareToken) {
    try {
      upsertShareDoc(cur.shareToken, buildSharePayload({ ...cur, issueDate: newDate }, 'invoice'));
    } catch (e) { /* best-effort */ }
  }
  await renumberInvoicesByPaymentDate();
  return { changed: true };
}

async function nextQuotationNumber() {
  const uid = state.user.uid;
  if (DEV_MODE) {
    const next = (state.counters.quotation?.value || 0) + 1;
    state.counters.quotation = { ...state.counters.quotation, value: next };
    return { number: next, displayNumber: formatNumber(next, 'QINV-', 3) };
  }
  return await runTransaction(db, async (txn) => {
    const ref = doc(db, `users/${uid}/counters/quotation`);
    const s = await txn.get(ref);
    if (!s.exists()) throw new Error('Quotation counter not initialised');
    const cur = s.data();
    const next = cur.value + 1;
    txn.update(ref, { value: next, updatedAt: serverTimestamp() });
    return { number: next, displayNumber: formatNumber(next, cur.prefix || 'QINV-', cur.padding || 3) };
  });
}

// REGION: share-links ───────────────────────────────────────────────
// Every saved quotation / invoice carries an unguessable 8-char token. A
// public mirror at `shares/{token}` lets clients view + download without
// auth. The token is permanent: when QINV-005 → INV-0042 conversion
// happens, the same token re-points at the new invoice, so any link
// already shared with a client keeps working.
function generateShareToken() {
  // Token-only URL ⇒ this string IS the access secret. Use crypto-grade
  // randomness (not Math.random). 16 base36 chars ≈ 82 bits of entropy
  // ≈ 4.7×10^24 possibilities. Brute-force enumeration is computationally
  // infeasible even ignoring Firestore's rate limiting. The displayNumber
  // is *not* embedded in the URL — clients can't increment it to find
  // other invoices because there's nothing to increment.
  // We oversample (32 bytes) and reject mod-bias to keep entropy clean.
  const bytes = new Uint8Array(32);
  (typeof crypto !== 'undefined' ? crypto : window.crypto).getRandomValues(bytes);
  let out = '';
  for (let i = 0; i < bytes.length && out.length < 16; i++) {
    // 252 = 36 * 7 — accept bytes < 252 to avoid modulo bias.
    if (bytes[i] < 252) out += (bytes[i] % 36).toString(36);
  }
  // In the astronomically unlikely event we still have fewer than 16
  // chars, keep going with Math.random as a fallback.
  while (out.length < 16) out += Math.floor(Math.random() * 36).toString(36);
  return out.slice(0, 16);
}

function buildShareUrl(_displayNumber, token) {
  // URL contains ONLY the unguessable token — no invoice number, no
  // sequential identifier, nothing enumerable. The invoice number is
  // displayed prominently inside the rendered page, so the link still
  // looks formal once opened.
  const origin = location.origin;
  const dirPath = location.pathname.replace(/[^/]*$/, '');
  return `${origin}${dirPath}view.html?i=${token}`;
}

function buildSharePayload(d, type) {
  const settings = state.settings || DEFAULT_SETTINGS;
  const company = settings.company || {};
  return {
    type,                                // 'quotation' | 'invoice'
    status: d.status || (type === 'invoice' ? 'paid' : 'draft'),
    displayNumber: d.displayNumber || '',
    issueDate: d.issueDate || '',
    client: {
      name:    (d.client && d.client.name)    || '',
      attn:    (d.client && d.client.attn)    || '',
      address: (d.client && d.client.address) || '',
      postal:  (d.client && d.client.postal)  || '',
      email:   (d.client && d.client.email)   || ''
    },
    items: (d.items || []).map(i => ({
      description: i.description || '',
      subtitle:    i.subtitle    || '',
      qty:         Number(i.qty)    || 0,
      rate:        Number(i.rate)   || 0,
      amount:      Number(i.amount) || 0
    })),
    subtotal: Number(d.subtotal) || 0,
    total:    Number(d.total)    || 0,
    terms: d.terms ? {
      title:    d.terms.title    || '',
      subtitle: d.terms.subtitle || '',
      sections: (d.terms.sections || []).map(s => ({
        heading: s.heading || '',
        body:    s.body    || ''
      }))
    } : null,
    optional: d.optional ? { ...d.optional } : null,
    company: {
      name:    company.name    || '',
      uen:     company.uen     || '',
      address: company.address || '',
      email:   company.email   || ''
    },
    ownerUid: ALLOWED_UID,
    updatedAt: serverTimestamp()
  };
}

async function upsertShareDoc(token, payload) {
  if (DEV_MODE || !token) return;
  try {
    await setDoc(doc(db, 'shares', token), payload, { merge: true });
  } catch (e) {
    // Non-fatal — the source-of-truth doc is saved, only the public mirror
    // failed. Surface to console so we can spot rule problems.
    console.warn('[share] upsert failed for', token, e);
  }
}

async function deleteShareDoc(token) {
  if (DEV_MODE || !token) return;
  try {
    await deleteDoc(doc(db, 'shares', token));
  } catch (e) {
    console.warn('[share] delete failed for', token, e);
  }
}

// REGION: quotations-store ──────────────────────────────────────────
async function saveQuotation(data, existingId) {
  const uid = state.user.uid;
  // Carry-forward the existing token (edits) or mint a new one (creates).
  const existing = existingId ? state.quotations.get(existingId) : null;
  const shareToken = (data.shareToken)
    || (existing && existing.shareToken)
    || generateShareToken();

  const payload = {
    ...data,
    shareToken,
    searchBlob: buildSearchBlob(data),
    updatedAt: DEV_MODE ? { seconds: Math.floor(Date.now()/1000) } : serverTimestamp()
  };

  if (DEV_MODE) {
    if (existingId) {
      const cur = state.quotations.get(existingId) || {};
      state.quotations.set(existingId, { ...cur, ...payload, id: existingId });
      render();
      return existingId;
    } else {
      const id = 'q' + Math.random().toString(36).slice(2, 9);
      const { number, displayNumber } = await nextQuotationNumber();
      state.quotations.set(id, {
        id, version: 1, number, displayNumber,
        status: data.status || 'draft',
        ...payload,
        createdAt: { seconds: Math.floor(Date.now()/1000) }
      });
      render();
      return id;
    }
  }

  let docId;
  let docForShare;
  if (existingId) {
    await updateDoc(doc(db, `users/${uid}/quotations/${existingId}`), payload);
    docId = existingId;
    docForShare = { ...(existing || {}), ...payload, id: existingId };
  } else {
    const { number, displayNumber } = await nextQuotationNumber();
    const newDoc = {
      version: 1, number, displayNumber,
      status: data.status || 'draft',
      ...payload,
      createdAt: serverTimestamp()
    };
    const ref = await addDoc(collection(db, `users/${uid}/quotations`), newDoc);
    docId = ref.id;
    docForShare = { ...newDoc, id: docId, displayNumber };
  }

  // Mirror to public share collection (fire-and-forget, never blocks save).
  upsertShareDoc(shareToken, buildSharePayload(docForShare, 'quotation'));
  return docId;
}

async function deleteQuotation(id) {
  await requireRecentAuth();
  // Snapshot the deleted draft's number BEFORE removal so we can renumber.
  const target = state.quotations.get(id);
  const numToDelete = target?.number;
  const shareToken = target?.shareToken;

  if (DEV_MODE) {
    state.quotations.delete(id);
    if (numToDelete) maybeReclaimDraftNumber(numToDelete);
    render();
    return;
  }
  await deleteDoc(doc(db, `users/${state.user.uid}/quotations/${id}`));
  // Drop the public mirror so the share link returns "not found".
  if (shareToken) deleteShareDoc(shareToken);
  if (numToDelete) await maybeReclaimDraftNumber(numToDelete);
}

// If the deleted draft held the highest QINV- number, decrement the counter so
// the next-issued draft re-uses that number (no gaps in the sequential audit
// trail). If it was older / mid-sequence, leave the gap (renumbering existing
// drafts mid-stream would invalidate any PDFs already shared with clients).
async function maybeReclaimDraftNumber(deletedNumber) {
  const cur = state.counters.quotation?.value || 0;
  if (deletedNumber !== cur) return;             // not the most recent — leave the gap
  // Walk down the counter to the highest still-existing number, so chains of
  // recent deletes free all freshly-vacated numbers.
  const remaining = new Set(Array.from(state.quotations.values()).map(q => q.number));
  let next = cur - 1;
  while (next > 0 && !remaining.has(next)) next--;
  await setCounterValue('quotation', next);
}

async function updateQuotation(id, patch) {
  if (DEV_MODE) {
    const cur = state.quotations.get(id) || {};
    const next = { ...cur, ...patch };
    next.searchBlob = buildSearchBlob(next);
    state.quotations.set(id, next); render(); return;
  }
  const payload = { ...patch, updatedAt: serverTimestamp() };
  const cur = state.quotations.get(id) || {};
  if (patch.client || patch.items || patch.total) {
    payload.searchBlob = buildSearchBlob({ ...cur, ...patch });
  }
  await updateDoc(doc(db, `users/${state.user.uid}/quotations/${id}`), payload);
  // Refresh the public mirror with the latest data (token unchanged).
  if (cur.shareToken) {
    upsertShareDoc(cur.shareToken, buildSharePayload({ ...cur, ...patch }, 'quotation'));
  }
}

// REGION: invoices-store ────────────────────────────────────────────
async function updateInvoiceClient(id, patch) {
  // Only client + items editable
  const cur = state.invoices.get(id) || {};
  const payload = { ...patch };
  payload.searchBlob = buildSearchBlob({ ...cur, ...patch });
  if (DEV_MODE) {
    state.invoices.set(id, { ...cur, ...payload }); render(); return;
  }
  payload.updatedAt = serverTimestamp();
  await updateDoc(doc(db, `users/${state.user.uid}/invoices/${id}`), payload);
  // Revision log
  await addDoc(collection(db, `users/${state.user.uid}/invoices/${id}/revisions`), {
    ts: serverTimestamp(), actor: state.user.uid, after: payload
  });
  // Refresh the public share mirror with the latest invoice content.
  if (cur.shareToken) {
    upsertShareDoc(cur.shareToken, buildSharePayload({ ...cur, ...patch }, 'invoice'));
  }
}

async function voidInvoice(id, reason) {
  await requireRecentAuth();
  const cur = state.invoices.get(id) || {};
  if (DEV_MODE) {
    state.invoices.set(id, { ...cur, status: 'void', voidReason: reason }); render(); return;
  }
  await updateDoc(doc(db, `users/${state.user.uid}/invoices/${id}`), {
    status: 'void', voidReason: reason, updatedAt: serverTimestamp()
  });
  await addDoc(collection(db, `users/${state.user.uid}/invoices/${id}/audit`), {
    ts: serverTimestamp(), actor: state.user.uid, event: 'voided', reason
  });
  // Reflect the voided state on the public share viewer (it shows a
  // translucent "VOIDED" overlay rather than disappearing — clients should
  // know an invoice they were sent has been retracted).
  if (cur.shareToken) {
    upsertShareDoc(cur.shareToken, buildSharePayload({ ...cur, status: 'void' }, 'invoice'));
  }
}

// REGION: settings-store ────────────────────────────────────────────
async function saveSettings(patch) {
  state.settings = { ...state.settings, ...patch };
  render();
  if (DEV_MODE) return;
  await setDoc(doc(db, `users/${state.user.uid}/settings/default`), state.settings, { merge: true });
}

// REGION: search + pagination ───────────────────────────────────────
function searchTokens(s) {
  return s.trim().toLowerCase().split(/\s+/).filter(Boolean);
}

function filterDocs(docMap, q) {
  const tokens = searchTokens(q);
  const arr = Array.from(docMap.values());
  if (!tokens.length) return arr;
  return arr.filter(d => {
    let blob = d.searchBlob || buildSearchBlob(d);
    // Cross-reference lookup at search time:
    //   • Quotation → converted invoice's displayNumber (so typing
    //     "INV-0042" on the Drafts tab surfaces the source QINV).
    //   • Invoice → already covered by sourceQuotationNumber being
    //     in the persisted searchBlob via buildSearchBlob.
    if (d.convertedToInvoiceId) {
      const inv = state.invoices.get(d.convertedToInvoiceId);
      if (inv && inv.displayNumber) blob += ' ' + String(inv.displayNumber).toLowerCase();
    }
    return tokens.every(t => blob.includes(t));
  });
}

function paginate(arr, page) {
  const visible = page * PAGE_SIZE;
  return { items: arr.slice(0, visible), total: arr.length, hasMore: arr.length > visible };
}

// REGION: tabs-router ───────────────────────────────────────────────
const ROUTES = {
  creation: 'view-creation',
  quotations: 'view-quotations',
  invoices: 'view-invoices',
  library: 'view-library',
  advanced: 'view-advanced'
};

function setRoute(route) {
  // Close any open drawer / sheet when changing routes — avoids stale overlays.
  if (state.drawer && state.drawer.open) closeDrawer();
  closeBottomSheet();

  state.route = route;
  Object.entries(ROUTES).forEach(([k, id]) => {
    document.getElementById(id).hidden = (k !== route);
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.route === route));
  document.querySelectorAll('.tab-dropdown-item').forEach(b => b.classList.toggle('active', b.dataset.route === route));
  document.getElementById('tab-dropdown-label').textContent =
    { creation: 'Create', quotations: 'Drafts', invoices: 'Paid', library: 'Library', advanced: 'Advanced' }[route];
  document.getElementById('tab-dropdown').classList.remove('open');
  render();
}

document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => setRoute(b.dataset.route)));
document.querySelectorAll('.tab-dropdown-item').forEach(b => b.addEventListener('click', () => setRoute(b.dataset.route)));
document.getElementById('tab-dropdown-trigger').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('tab-dropdown').classList.toggle('open');
});
document.addEventListener('click', () => document.getElementById('tab-dropdown').classList.remove('open'));

// REGION: creation-tab ──────────────────────────────────────────────
function initDraft() {
  state.draft = createBlankDraft('quotation');
}

function createBlankDraft(mode = 'quotation') {
  const s = state.settings || DEFAULT_SETTINGS;
  return {
    mode, // 'quotation' | 'invoice'
    issueDate: todayIso(),
    paymentDate: todayIso(),
    client: { name: '', attn: '', address: '', postal: '', email: '' },
    items: [{ description: '', subtitle: '', qty: 1, rate: 0, amount: 0 }],
    notes: '',
    optional: { ...(s.optionalFieldDefaults || DEFAULT_OPTIONAL) },
    includeTerms: false,
    terms: JSON.parse(JSON.stringify(s.defaultTerms || DEFAULT_TERMS))
  };
}

function recomputeTotals(d) {
  d.items.forEach(i => {
    const q = Number(i.qty) || 0; const r = Number(i.rate) || 0;
    i.amount = +(q * r).toFixed(2);
  });
  d.subtotal = +d.items.reduce((s, i) => s + i.amount, 0).toFixed(2);
  d.total = d.subtotal;
  return d;
}

function renderCreationTab() {
  const host = document.getElementById('creation-wrap');
  if (!state.draft) initDraft();
  const d = state.draft;
  if (!d) { host.textContent = ''; return; }
  // Creation tab always creates DRAFTS — paid invoices are created exclusively
  // by clicking "Mark as paid" from the Drafts tab.
  d.mode = 'quotation';
  recomputeTotals(d);

  const s = state.settings || DEFAULT_SETTINGS;
  const nextQ = (state.counters.quotation?.value || 0) + 1;
  const displayNumber = formatNumber(nextQ, 'QINV-', 3);

  // Mobile uses the form-based editor (intuitive touch UI), desktop uses the
  // WYSIWYG editor that matches the printed page 1:1.
  if (window.innerWidth <= 760) {
    renderCreationTabMobile(d, s, displayNumber, false);
    return;

  host.innerHTML = '';

  // ── Editor intro ────────────────────────────────────────────────

      <div class="total-row grand"><span class="label">Total</span><span class="value" data-totals="total">${escapeHtml(fmtMoney(d.total))}</span></div>

    </div>

// Lightweight in-place totals refresh — used by item input handlers so the user
// doesn't lose caret/focus while typing.
function refreshTotalsDom(d) {
  const sub = document.querySelector('[data-totals="subtotal"]');
  const tot = document.querySelector('[data-totals="total"]');
  const pay = document.querySelector('[data-pay-amount]');
  const stickyTotal = document.querySelector('[data-summary-total]');
  if (sub) sub.textContent = fmtMoney(d.subtotal);
  if (tot) tot.textContent = fmtMoney(d.total);
  if (pay) pay.textContent = fmtMoney(d.total);
  if (stickyTotal) stickyTotal.textContent = fmtMoney(d.total);
}

function buildBilledToBlock(d) {
  const block = document.createElement('div');
  block.className = 'party-block';

  const lines = [
    { key: 'attn', placeholder: 'Attn: First Last', prefix: 'Attn: ', optKey: 'client.attn' },
    { key: 'address', placeholder: '123 Sample Street, #04-56', optKey: 'client.address' },
    { key: 'postal', placeholder: 'Singapore 123456', optKey: 'client.postal' },
    { key: 'email', placeholder: 'client@email.com', optKey: 'client.email' }
  ];

  block.innerHTML = `
    <span class="label-pill">Billed to</span>
    <div class="party-name ce" contenteditable="true" data-empty="${!d.client.name}" data-placeholder="Client name…">${escapeHtml(d.client.name || '')}</div>
    <div class="party-detail" id="billed-detail"></div>
    <div class="add-field-host" id="billed-add"><button class="btn dashed sm">+ Add field</button><div class="add-field-pop"></div></div>
  `;

  // Wire client.name editor
  const nameEl = block.querySelector('.party-name');
  nameEl.addEventListener('input', () => {
    nameEl.dataset.empty = !nameEl.textContent.trim();
  });
  nameEl.addEventListener('blur', () => {
    d.client.name = nameEl.textContent.trim();
    nameEl.dataset.empty = !d.client.name;
  });

  const detail = block.querySelector('#billed-detail');
  lines.forEach(line => {
    if (!d.optional[line.optKey]) return; // hidden
    const span = document.createElement('span');
    span.className = 'line optional-line';
    const val = d.client[line.key] || '';
    span.innerHTML = `<button class="opt-x" title="Remove">×</button><span class="ce" contenteditable="true" data-empty="${!val}" data-placeholder="${escapeHtml(line.placeholder)}">${escapeHtml(val)}</span>`;
    const ce = span.querySelector('.ce');
    ce.addEventListener('input', () => {
      ce.dataset.empty = !ce.textContent.trim();
    });
    ce.addEventListener('blur', () => {
      d.client[line.key] = ce.textContent.trim();
      ce.dataset.empty = !d.client[line.key];
    });
    span.querySelector('.opt-x').addEventListener('click', () => {
      d.optional[line.optKey] = false; render();
    });
    detail.appendChild(span);
  });

  // Add-field popover for billed-to
  const addHost = block.querySelector('#billed-add');
  const pop = addHost.querySelector('.add-field-pop');
  const addBtn = addHost.querySelector('button');
  const hidden = lines.filter(l => !d.optional[l.optKey]);
  if (hidden.length === 0) {
    addBtn.style.display = 'none';
  } else {
    pop.innerHTML = '';
    hidden.forEach(line => {
      const b = document.createElement('button'); b.textContent = `Add ${line.key}`;
      b.addEventListener('click', () => { d.optional[line.optKey] = true; render(); });
      pop.appendChild(b);
    });
    addBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      addHost.classList.toggle('open');
    });
    document.addEventListener('click', () => addHost.classList.remove('open'), { once: true });
  }

  return block;
}

}

async function handleSave(downloadAfter, shareAfter = false) {
  const d = state.draft;
  if (!d.client.name) { showToast('Client name is required', 'warn'); return; }
  recomputeTotals(d);

  // Strip transient UI flags from items before persisting
  const cleanItems = d.items.map(i => {
    const { showSubtitle, ...rest } = i;
    return rest;
  });

  const baseDoc = {
    issueDate: d.issueDate,
    status: 'draft',
    client: { ...d.client },
    items: cleanItems,
    subtotal: d.subtotal,
    total: d.total,
    notes: d.notes || '',
    terms: d.includeTerms ? d.terms : null,
    optional: { ...d.optional }
  };

  const saveBtn = document.getElementById('save-draft');
  const pdfBtn = document.getElementById('save-and-pdf');
  const shareBtn = document.getElementById('save-and-share');
  if (saveBtn) saveBtn.disabled = true;
  if (pdfBtn) pdfBtn.disabled = true;
  if (shareBtn) shareBtn.disabled = true;

  try {
    const id = await saveQuotation(baseDoc);
    const saved = state.quotations.get(id)
      || Array.from(state.quotations.values()).find(q => q.id === id);
    showToast(`${saved?.displayNumber || 'Draft'} saved`);
    if (downloadAfter && saved) {
      await downloadPdf(saved, d.includeTerms ? 'invoice-with-terms' : 'invoice');
    }
    if (shareAfter && saved && saved.shareToken) {
      try {
        const url = buildShareUrl(saved.displayNumber, saved.shareToken);
        await navigator.clipboard.writeText(url);
        showToast('Share link copied — paste it to your client');
      } catch (clipErr) {
        console.warn('[share] clipboard write failed', clipErr);
        showToast('Saved, but clipboard blocked — open from Drafts to copy', 'warn');
      }
    }
    initDraft();
    render();
  } catch (e) {
    console.error(e);
    showToast(e.message || 'Save failed', 'error');
  } finally {
    if (saveBtn) saveBtn.disabled = false;
    if (pdfBtn) pdfBtn.disabled = false;
    if (shareBtn) shareBtn.disabled = false;
  }
}

// REGION: invoice-numbering-panel ───────────────────────────────────
function renderInvoiceNumbering() {
  const host = document.getElementById('invoice-numbering-panel');
  if (!host) return;
  const invCur = state.counters.invoice?.value ?? 0;
  const issuedCount = state.invoices.size;
  const nextDisplay = formatNumber(invCur + 1, 'INV-', 4);
  const lastDisplay = invCur > 0 ? formatNumber(invCur, 'INV-', 4) : null;
  const outOfOrder = detectInvoiceOrderingMismatch();

  host.innerHTML = `
    <div class="ip-info">
      <span class="ip-label">Next invoice number</span>
      <span class="ip-value">${escapeHtml(nextDisplay)}</span>
      ${lastDisplay
        ? `<span class="ip-meta">Last: <strong>${escapeHtml(lastDisplay)}</strong> · ${issuedCount} on record</span>`
        : `<span class="ip-meta">No invoices issued yet</span>`}
    </div>
    <div class="ip-edit">
      <input type="number" min="1" id="ip-next-input" value="${invCur + 1}">
      <button class="btn" id="ip-save">Update</button>
    </div>
    ${issuedCount > 1 ? `
      <div class="ip-resequence" style="grid-column: 1 / -1; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--hairline);">
        <button class="btn sm ${outOfOrder ? 'primary' : ''}" id="ip-resequence">Re-sequence by payment date</button>
        <span style="font-size: 11.5px; color: ${outOfOrder ? 'var(--danger, #B91C1C)' : 'var(--ink-muted)'};">
          ${outOfOrder
            ? 'Numbers are not in payment-date order — click to align with the bank statement.'
            : 'Already aligned with payment dates.'}
        </span>
      </div>
    ` : ''}
  `;

  host.querySelector('#ip-save').addEventListener('click', async () => {
    const val = Number(host.querySelector('#ip-next-input').value) || 1;
    if (val < 1) { showToast('Number must be at least 1', 'warn'); return; }
    if (val === invCur + 1) { showToast('No change'); return; }

    const proceed = async () => {
      try {
        await setCounterValue('invoice', val - 1);
        showToast(`Next invoice will be ${formatNumber(val, 'INV-', 4)}`);
      } catch (e) {
        showToast(e.message || 'Update failed', 'error');
      }
    };

    if (issuedCount > 0) {
      openModal({
        title: 'Change invoice numbering?',
        body: `You have already issued ${issuedCount} invoice(s). Changing the counter could break the sequential audit trail. Type CHANGE to confirm.`,
        okLabel: 'Change', danger: true, requireText: 'CHANGE',
        onOk: async () => { await requireRecentAuth(); await proceed(); }
      });
    } else {
      await proceed();
    }
  });

  const resequenceBtn = host.querySelector('#ip-resequence');
  if (resequenceBtn) {
    resequenceBtn.addEventListener('click', async () => {
      resequenceBtn.disabled = true;
      try {
        const { changed } = await renumberInvoicesByPaymentDate();
        if (changed > 0) {
          showToast(`Re-sequenced ${changed} invoice${changed === 1 ? '' : 's'} by payment date`);
        } else {
          showToast('Already in payment-date order');
        }
      } catch (e) {
        showToast(e.message || 'Re-sequence failed', 'error');
      } finally {
        resequenceBtn.disabled = false;
      }
    });
  }
}

// REGION: list-render ───────────────────────────────────────────────
function renderList(kind) {
  const host = document.getElementById(`${kind}-list`);
  const search = state.search[kind];
  const arr = filterDocs(state[kind], search);
  // Paid invoices: order by payment date (latest at top), then by
  // number so two payments on the same day stay in their assigned
  // chronological slot. This mirrors what an accountant reads off the
  // bank statement top-down.
  // Drafts: stick with number desc — most-recent draft on top.
  if (kind === 'invoices') {
    arr.sort((a, b) => {
      const dateA = a.issueDate || '';
      const dateB = b.issueDate || '';
      if (dateA !== dateB) return dateB.localeCompare(dateA);
      return (b.number || 0) - (a.number || 0);
    });
  } else {
    arr.sort((a, b) => (b.number || 0) - (a.number || 0));
  }
  const { items, total, hasMore } = paginate(arr, state.page[kind]);

  document.getElementById(`${kind}-count`).textContent =
    total === 0 ? 'No records' : `${total} record${total === 1 ? '' : 's'}`;

  host.innerHTML = '';

  if (total === 0) {
    const empty = document.createElement('div'); empty.className = 'empty';
    empty.innerHTML = `<div class="empty-title">${search ? 'No matches' : 'Nothing here yet'}</div>${search ? 'Try a different search term.' : 'Create one from the Creation tab.'}`;
    host.appendChild(empty);
    return;
  }

  // Header — "Payment Made" on the Paid Invoices tab makes it obvious
  // that the date column reflects when the money landed (not when the
  // draft was first issued). Quotations keep the "Issued" label.
  const dateColLabel = kind === 'invoices' ? 'Payment Made' : 'Issued';
  const head = document.createElement('div'); head.className = 'list-head';
  head.innerHTML = `<span>Number</span><span>Client</span><span>${dateColLabel}</span><span>Total</span><span>Status</span><span></span>`;
  host.appendChild(head);

  items.forEach(d => host.appendChild(buildListRow(kind, d, search)));

  if (hasMore) {
    const lm = document.createElement('div'); lm.className = 'load-more';
    lm.innerHTML = `Showing ${items.length} of ${total} <button class="btn sm" id="load-more-${kind}">Load more</button>`;
    host.appendChild(lm);
    lm.querySelector('button').addEventListener('click', () => {
      state.page[kind] = (state.page[kind] || 1) + 1;
      renderList(kind);
    });
  }
}

function buildListRow(kind, d, search) {
  const row = document.createElement('div');
  row.className = `list-row ${d.status === 'void' ? 'void' : ''}`;
  row.dataset.id = d.id;

  const client = d.client || {};
  const tokens = searchTokens(search);
  let matchSnippet = '';
  if (tokens.length && d.items?.length) {
    for (const item of d.items) {
      const text = `${item.description || ''} ${item.subtitle || ''}`;
      const lower = text.toLowerCase();
      if (tokens.some(t => lower.includes(t)) && !tokens.every(t => (client.name || '').toLowerCase().includes(t))) {
        let highlighted = escapeHtml(item.description || '');
        tokens.forEach(t => {
          const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
          highlighted = highlighted.replace(re, '<mark>$1</mark>');
        });
        matchSnippet = highlighted;
        break;
      }
    }
  }

  // Cross-reference line under the doc number — bridges the QINV ↔ INV
  // gap when reconciling against bank statements.
  //   • Paid invoices show the source quotation:        "from QINV-005"
  //   • Converted quotations show where they went:      "→ INV-0042"
  // Voided invoices keep the cross-ref so the trail is still visible.
  let crossRefHtml = '';
  if (kind === 'invoices' && d.sourceQuotationNumber) {
    crossRefHtml = `<span class="list-cell-xref" title="Reference your client paid against">from ${escapeHtml(d.sourceQuotationNumber)}</span>`;
  } else if (kind === 'quotations' && d.status === 'converted' && d.convertedToInvoiceId) {
    const inv = state.invoices.get(d.convertedToInvoiceId);
    if (inv && inv.displayNumber) {
      crossRefHtml = `<span class="list-cell-xref" title="Paid as this invoice">→ ${escapeHtml(inv.displayNumber)}</span>`;
    }
  }

  row.innerHTML = `
    <div class="list-cell-num">
      <span>${escapeHtml(d.displayNumber || '—')}</span>
      ${crossRefHtml}
    </div>
    <div class="list-cell-client">
      <span class="client-name">${escapeHtml(client.name || '—')}</span>
      ${client.attn ? `<span class="client-meta">${escapeHtml(client.attn)}</span>` : ''}
      ${matchSnippet ? `<span class="client-match">${matchSnippet}</span>` : ''}
    </div>
    <div class="list-cell-date">${escapeHtml(fmtDate(d.issueDate))}</div>
    <div class="list-cell-num-r">${escapeHtml(fmtMoney(d.total))}</div>
    <div class="list-cell-status"><span class="status-pill ${d.status || 'draft'}"><span class="dot"></span>${escapeHtml(d.status || 'draft')}</span></div>
    <div class="list-cell-actions">
      <button class="icon-btn" title="More" aria-label="More">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>
  `;

  row.addEventListener('click', (e) => {
    if (e.target.closest('.list-cell-actions')) return;
    openDrawer(kind === 'quotations' ? 'quotation' : 'invoice', d.id);
  });
  row.querySelector('.list-cell-actions button').addEventListener('click', (e) => {
    e.stopPropagation();
    openRowMenu(e.currentTarget, kind, d);
  });
  return row;
}

function openRowMenu(anchor, kind, d) {
  const items = [];
  items.push({ label: 'Open', fn: () => openDrawer(kind === 'quotations' ? 'quotation' : 'invoice', d.id) });
  items.push({ label: 'Download PDF', fn: () => downloadPdf(d, d.terms ? 'invoice-with-terms' : 'invoice') });
  items.push({ label: 'Copy share link', fn: () => handleCopyShareLink(d, kind) });
  if (kind === 'quotations') {
    if (d.status !== 'converted') {
      items.push({ label: 'Mark as paid…', fn: () => promptConvert(d) });
    }
    items.push({ label: 'Delete', fn: () => promptDelete(d), danger: true });
  } else {
    if (d.status !== 'void') {
      items.push({ label: 'Void invoice…', fn: () => promptVoid(d), danger: true });
    }
  }

  if (window.innerWidth <= 760) {
    openBottomSheet(items, d.displayNumber || 'Actions');
  } else {
    openRowPopover(anchor, items);
  }
}

function openRowPopover(anchor, items) {
  const rect = anchor.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.style.cssText = `position: fixed; top: ${rect.bottom + 6}px; right: ${window.innerWidth - rect.right}px;
    background: var(--surface); border-radius: var(--r-md); box-shadow: var(--shadow-pop); padding: 6px; z-index: 250; min-width: 180px;`;
  items.forEach(it => {
    const b = document.createElement('button');
    b.style.cssText = `display: block; width: 100%; text-align: left; font: inherit; font-size: 13px;
      padding: 8px 12px; border: 0; border-radius: var(--r-sm); background: transparent; cursor: pointer;
      color: ${it.danger ? 'var(--danger)' : 'var(--ink)'};`;
    b.textContent = it.label;
    b.addEventListener('mouseenter', () => b.style.background = 'var(--surface-soft)');
    b.addEventListener('mouseleave', () => b.style.background = 'transparent');
    b.addEventListener('click', () => { if (pop.parentNode) pop.parentNode.removeChild(pop); it.fn(); });
    pop.appendChild(b);
  });
  document.body.appendChild(pop);
  setTimeout(() => {
    document.addEventListener('click', () => { if (pop.parentNode) pop.parentNode.removeChild(pop); }, { once: true });
  }, 10);
}

function openBottomSheet(items, title) {
  const sheet = document.getElementById('bottom-sheet');
  const scrim = document.getElementById('bottom-sheet-scrim');
  sheet.innerHTML = '';
  if (title) {
    const t = document.createElement('div');
    t.style.cssText = 'font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-muted); padding: 4px 12px 8px;';
    t.textContent = title;
    sheet.appendChild(t);
  }
  items.forEach(it => {
    const b = document.createElement('button');
    if (it.danger) b.classList.add('danger');
    b.textContent = it.label;
    b.addEventListener('click', () => { closeBottomSheet(); it.fn(); });
    sheet.appendChild(b);
  });
  // Cancel
  const cancel = document.createElement('button');
  cancel.textContent = 'Cancel';
  cancel.style.cssText = 'color: var(--ink-muted); margin-top: 4px; border-top: 1px solid var(--hairline);';
  cancel.addEventListener('click', closeBottomSheet);
  sheet.appendChild(cancel);

  scrim.classList.add('open');
  sheet.classList.add('mounted');
  // small delay so transform animates
  requestAnimationFrame(() => sheet.classList.add('open'));
  sheet.setAttribute('aria-hidden', 'false');
  scrim.addEventListener('click', closeBottomSheet, { once: true });
}

function closeBottomSheet() {
  const sheet = document.getElementById('bottom-sheet');
  const scrim = document.getElementById('bottom-sheet-scrim');
  sheet.classList.remove('open');
  scrim.classList.remove('open');
  sheet.setAttribute('aria-hidden', 'true');
  setTimeout(() => sheet.classList.remove('mounted'), 260);
}

function promptDelete(d) {
  openModal({
    title: `Delete ${d.displayNumber}?`,

}

// REGION: drawer-editor ─────────────────────────────────────────────
function openDrawer(kind, id) {
  state.drawer = { open: true, kind, id };
  renderDrawer();
  const drawer = document.getElementById('drawer');
  const scrim = document.getElementById('drawer-scrim');
  drawer.classList.add('open');
  scrim.classList.add('open');
  drawer.setAttribute('aria-hidden', 'false');
}
function closeDrawer() {
  state.drawer = { open: false, kind: null, id: null, showEmpty: false };
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-scrim').classList.remove('open');
  document.getElementById('drawer').setAttribute('aria-hidden', 'true');
}
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-scrim').addEventListener('click', closeDrawer);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

function renderDrawer() {
  if (!state.drawer.open) return;
  const { kind, id } = state.drawer;
  const map = kind === 'quotation' ? state.quotations : state.invoices;
  const d = map.get(id);
  if (!d) { closeDrawer(); return; }

  document.getElementById('drawer-title').innerHTML = `
    <span class="invoice-number-pill">${escapeHtml(d.displayNumber)}</span>
    <span style="font-weight: 500; color: var(--ink-muted); font-size: 13px;">${kind === 'quotation' ? 'Draft invoice' : 'Paid invoice'}</span>
  `;

  const body = document.getElementById('drawer-body');
  body.innerHTML = '';

  // ── CLIENT ────────────────────────────────────────────────────
  // Header row with the "Show empty" toggle (default: hide empties for cleaner view)
  if (state.drawer.showEmpty === undefined) state.drawer.showEmpty = false;
  const clientHead = document.createElement('div');
  clientHead.style.cssText = 'display:flex; justify-content:space-between; align-items:center; margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--hairline);';
  clientHead.innerHTML = `
    <span style="font-size:11px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-muted);">Client</span>
    <label style="display:flex; gap:6px; align-items:center; font-size:12px; color:var(--ink-muted); cursor:pointer; user-select:none;">
      <input type="checkbox" id="drawer-show-empty" ${state.drawer.showEmpty ? 'checked' : ''} style="accent-color:var(--ink); cursor:pointer;">
      Show empty
    </label>
  `;
  body.appendChild(clientHead);
  clientHead.querySelector('#drawer-show-empty').addEventListener('change', e => {
    state.drawer.showEmpty = e.target.checked;
    renderDrawer();
  });

  const grid = document.createElement('div'); grid.className = 'form-grid';
  const fields = [
    { key: 'name', label: 'Name', full: true, required: true },
    { key: 'attn', label: 'Attention to' },
    { key: 'email', label: 'Email' },
    { key: 'address', label: 'Address', full: true },
    { key: 'postal', label: 'Postal' }
  ];
  let hiddenCount = 0;
  fields.forEach(f => {
    const value = d.client?.[f.key] || '';
    // Hide empty optional fields when "Show empty" is off (always show name)
    if (!state.drawer.showEmpty && !value && !f.required) { hiddenCount++; return; }
    const row = document.createElement('div');
    row.className = 'form-row' + (f.full ? ' full' : '');
    row.innerHTML = `
      <label class="field-label">${escapeHtml(f.label)}${f.required ? ' *' : ''}</label>
      <input class="input" data-key="${f.key}" value="${escapeHtml(value)}" placeholder="${escapeHtml(f.label)}">
    `;
    grid.appendChild(row);
  });
  body.appendChild(grid);

  if (hiddenCount > 0) {
    const showAll = document.createElement('button');
    showAll.className = 'btn dashed sm';
    showAll.style.cssText = 'margin-top: 10px; font-size: 11.5px;';
    showAll.textContent = `+ ${hiddenCount} empty field${hiddenCount === 1 ? '' : 's'} hidden`;
    showAll.addEventListener('click', () => { state.drawer.showEmpty = true; renderDrawer(); });
    body.appendChild(showAll);
  }

  // ── META ─────────────────────────────────────────────────────
  // Drafts: "Issue date" — when the QINV- quotation was first written.
  // Paid invoices: "Payment date" — when the money actually landed.
  //   Editing it triggers a re-sequence so this invoice's INV- number
  //   slides into the correct chronological slot. A void invoice still
  //   shows the date but locks it (the void is the final state).
  if (kind === 'quotation') {
    const sec2 = document.createElement('div'); sec2.className = 'section-title'; sec2.textContent = 'Issue date';
    body.appendChild(sec2);
    const meta = document.createElement('div'); meta.className = 'form-grid';
    meta.innerHTML = `
      <div class="form-row full">
        <input class="input" type="date" id="meta-issue" value="${escapeHtml(d.issueDate)}">
      </div>
    `;
    body.appendChild(meta);
  } else if (kind === 'invoice') {
    const locked = d.status === 'void';
    const sec2 = document.createElement('div'); sec2.className = 'section-title'; sec2.textContent = 'Payment date';
    body.appendChild(sec2);
    const meta = document.createElement('div'); meta.className = 'form-grid';
    meta.innerHTML = `
      <div class="form-row full">
        <input class="input" type="date" id="meta-payment-date" value="${escapeHtml(d.issueDate || '')}" ${locked ? 'disabled' : ''}>
        <div class="field-help" style="font-size: 11.5px; color: var(--ink-muted); margin-top: 6px;">
          ${locked
            ? 'Voided invoices keep their original payment date.'
            : 'When you change this, INV- numbers re-sequence so the latest payment date is the highest number.'}
        </div>
      </div>
    `;
    body.appendChild(meta);
  }

  // ITEMS
  const sec3 = document.createElement('div'); sec3.className = 'section-title'; sec3.textContent = 'Line items';
  body.appendChild(sec3);
  const itemsHost = document.createElement('div'); itemsHost.className = 'drawer-items'; itemsHost.id = 'drawer-items';
  body.appendChild(itemsHost);

  const editableItems = JSON.parse(JSON.stringify(d.items || []));
  function renderItems() {
    itemsHost.innerHTML = '';
    editableItems.forEach((it, idx) => {
      const r = document.createElement('div'); r.className = 'drawer-item';
      r.innerHTML = `
        <input class="input item-desc-input" placeholder="Description" data-k="description" value="${escapeHtml(it.description || '')}">
        <input class="input" type="number" min="0" step="0.01" data-k="qty" value="${it.qty}">
        <input class="input" type="number" min="0" step="0.01" data-k="rate" value="${it.rate}">
        <input class="input" disabled value="${escapeHtml(fmtMoney((Number(it.qty)||0)*(Number(it.rate)||0)))}">
        <button class="icon-btn" title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      `;
      r.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('input', () => {
          const k = inp.dataset.k;
          if (!k) return;
          if (k === 'qty' || k === 'rate') it[k] = Number(inp.value) || 0;
          else it[k] = inp.value;
          // recompute amount only
          r.children[3].value = fmtMoney((Number(it.qty)||0) * (Number(it.rate)||0));
        });
      });
      r.querySelector('button.icon-btn').addEventListener('click', () => {
        if (editableItems.length === 1) { showToast('Need at least one item', 'warn'); return; }
        editableItems.splice(idx, 1); renderItems();
      });
      itemsHost.appendChild(r);
    });
  }
  renderItems();
  const addBtn = document.createElement('button');
  addBtn.className = 'btn dashed sm'; addBtn.textContent = '+ Add line item';
  addBtn.style.alignSelf = 'flex-start'; addBtn.style.marginTop = '6px';
  addBtn.addEventListener('click', () => {
    editableItems.push({ description: '', qty: 1, rate: 0, amount: 0 }); renderItems();
  });
  body.appendChild(addBtn);

  // FOOT
  const foot = document.getElementById('drawer-foot');
  foot.innerHTML = '';
  const left = document.createElement('div'); left.className = 'actions';
  if (kind === 'quotation' && d.status !== 'converted') {
    const conv = document.createElement('button'); conv.className = 'btn'; conv.textContent = 'Mark as paid';
    conv.addEventListener('click', () => promptConvert(d));
    left.appendChild(conv);
    const del = document.createElement('button'); del.className = 'btn danger'; del.textContent = 'Delete';
    del.addEventListener('click', () => promptDelete(d));
    left.appendChild(del);
  }
  if (kind === 'invoice' && d.status !== 'void') {
    const v = document.createElement('button'); v.className = 'btn danger'; v.textContent = 'Void';
    v.addEventListener('click', () => promptVoid(d));
    left.appendChild(v);
  }

  const right = document.createElement('div'); right.className = 'actions';
  const shareBtn = document.createElement('button'); shareBtn.className = 'btn'; shareBtn.textContent = 'Copy share link';
  shareBtn.addEventListener('click', () => handleCopyShareLink(d, kind));
  const pdfBtn = document.createElement('button'); pdfBtn.className = 'btn'; pdfBtn.textContent = 'Download PDF';
  pdfBtn.addEventListener('click', () => downloadPdf(d, d.terms ? 'invoice-with-terms' : 'invoice'));
  const saveBtn = document.createElement('button'); saveBtn.className = 'btn primary'; saveBtn.textContent = 'Save changes';
  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true;
    try {
      // Collect client fields
      const client = {};
      body.querySelectorAll('[data-key]').forEach(i => client[i.dataset.key] = i.value.trim());
      if (!client.name) { showToast('Name is required', 'warn'); saveBtn.disabled = false; return; }

      // Items
      const items = editableItems.filter(i => i.description || i.qty || i.rate).map(i => ({
        description: i.description || '',
        subtitle: i.subtitle || '',
        qty: Number(i.qty) || 0,
        rate: Number(i.rate) || 0,
        amount: +((Number(i.qty)||0) * (Number(i.rate)||0)).toFixed(2)
      }));
      const subtotal = +items.reduce((s, i) => s + i.amount, 0).toFixed(2);

      const patch = { client, items, subtotal, total: subtotal };
      if (kind === 'quotation') {
        const statusEl = document.getElementById('meta-status');
        const issueEl = document.getElementById('meta-issue');
        if (statusEl) patch.status = statusEl.value;
        if (issueEl) patch.issueDate = issueEl.value;
        await updateQuotation(d.id, patch);
      } else {
        // Paid invoice: client/items go through the standard updater.
        // A payment-date change is a separate write because it also
        // triggers a renumber across every existing invoice.
        await updateInvoiceClient(d.id, patch);
        const dateEl = document.getElementById('meta-payment-date');
        if (dateEl && dateEl.value && dateEl.value !== d.issueDate && d.status !== 'void') {
          await updateInvoicePaymentDate(d.id, dateEl.value);
        }
      }
      showToast('Saved');
      closeDrawer();
    } catch (e) {
      showToast(e.message || 'Save failed', 'error');
    } finally {
      saveBtn.disabled = false;
    }
  });
  right.appendChild(shareBtn);
  right.appendChild(pdfBtn);
  right.appendChild(saveBtn);

  foot.appendChild(left);
  foot.appendChild(right);
}

// REGION: pdf-render ────────────────────────────────────────────────
function pdfFilename(docData) {
  const num = (docData.displayNumber || 'INVOICE').replace(/\s+/g, '');
  const clientRaw = (docData.client?.name || '').toString();
  const client = clientRaw
    .replace(/[^\w\s-]/g, '')      // strip punctuation
    .trim()
    .replace(/\s+/g, '-')          // spaces → dashes
    .toUpperCase()
    .slice(0, 32);
  return client ? `${num}-${client}` : num;
}

// Pre-fetch every <img> in the rendered tree and inline it as a data URL
// so html2canvas can paint logo + PayNow QR reliably. Without this, the
// PDF sometimes ships with empty image rectangles when the asset URL is
// relative or the image hasn't fully loaded by the time html2canvas
// snapshots the DOM. Same-origin assets like assets/reputifly-logo-light.png
// are CORS-clean and convert in milliseconds.
async function inlineImagesAsDataUrls(rootEl) {
  const imgs = Array.from(rootEl.querySelectorAll('img'));
  await Promise.all(imgs.map(async (img) => {
    const src = img.getAttribute('src');
    if (!src || src.startsWith('data:')) return;
    try {
      const resp = await fetch(src);
      if (!resp.ok) return;
      const blob = await resp.blob();
      const dataUrl = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onloadend = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(blob);
      });
      img.setAttribute('src', dataUrl);
      // Wait for the new src to fully decode before continuing.
      await new Promise(r => {
        if (img.complete && img.naturalWidth) r();
        else { img.addEventListener('load', r, { once: true }); img.addEventListener('error', r, { once: true }); }
      });
    } catch (e) {
      console.warn('[pdf] image inline failed for', src, e);
    }
  }));
}

// Inject html2canvas into an iframe's window so it runs in that
// document's context (instead of the parent's). This is the cure for
// the parent-window-innerWidth offset bug where html2canvas centres
// the captured element using the parent's viewport width regardless
// of the actual iframe size.
async function loadH2CIntoFrame(iframe) {
  if (iframe.contentWindow.html2canvas) return iframe.contentWindow.html2canvas;
  return new Promise((resolve, reject) => {
    const idoc = iframe.contentDocument;
    const s = idoc.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload = () => resolve(iframe.contentWindow.html2canvas);
    s.onerror = () => reject(new Error('html2canvas failed to load in iframe'));
    idoc.head.appendChild(s);
  });
}

async function downloadPdf(docData, variant /* 'invoice' | 'invoice-with-terms' */) {
  try { await document.fonts.ready; } catch {}
  const tpl = document.querySelector(`#tpl-${variant}`);
  if (!tpl) { showToast('PDF template missing', 'error'); return; }

  let waited = 0;
  while (typeof html2pdf === 'undefined' && waited < 5000) {
    await new Promise(r => setTimeout(r, 100)); waited += 100;
  }
  if (typeof html2pdf === 'undefined') {
    showToast('PDF library failed to load — please refresh and try again', 'error');
    return;
  }

  const filename = pdfFilename(docData);
  showToast('Generating PDF…');

  // Render the bound template in the print-iframe.
  const clone = tpl.content.cloneNode(true);
  const root = document.createElement('div');
  root.appendChild(clone);
  bindPdfData(root, docData, variant);
  const html = buildIframeHtml(root.innerHTML, docData, filename);

  const iframe = document.getElementById('print-iframe');
  if (!iframe) { showToast('Print iframe missing', 'error'); return; }
  const idoc = iframe.contentDocument || iframe.contentWindow.document;
  idoc.open(); idoc.write(html); idoc.close();

  await new Promise(resolve => {
    if (idoc.readyState === 'complete') return resolve();
    iframe.addEventListener('load', resolve, { once: true });
    setTimeout(resolve, 800);
  });
  try { await idoc.fonts.ready; } catch {}
  await new Promise(r => requestAnimationFrame(() => setTimeout(r, 100)));

  try {
    await inlineImagesAsDataUrls(idoc.body);

    // Load html2canvas IN the iframe so it runs with the iframe's
    // contentWindow as the rendering context — no parent-window
    // innerWidth contamination, no centred offset.
    const h2c = await loadH2CIntoFrame(iframe);

    const pages = Array.from(idoc.querySelectorAll('.page'));
    if (!pages.length) throw new Error('No .page elements rendered');

    // Capture each .page to a canvas via the iframe's html2canvas.
    const canvases = [];
    for (const pageEl of pages) {
      const canvas = await h2c(pageEl, {
        scale: 3,                  // 3× for crisp sub-pixel text rendering
        useCORS: true,
        backgroundColor: '#ffffff',
        letterRendering: true,
        scrollX: 0, scrollY: 0,
        windowWidth: 794,
        windowHeight: pageEl.scrollHeight
      });
      canvases.push(canvas);
    }

    // Build the PDF from the canvases. We use html2pdf's chained API
    // just to access the bundled jsPDF — `.toPdf()` returns the worker
    // with a `pdf` instance we can add images to directly.
    const worker = html2pdf().set({
      margin: 0,
      filename: filename + '.pdf',
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true }
    }).from(document.createElement('div'));  // dummy "from" so toPdf works
    await worker.toPdf();
    const pdf = await worker.get('pdf');
    // Clear the dummy first page
    pdf.deletePage(1);
    canvases.forEach((canvas, i) => {
      pdf.addPage('a4', 'portrait');
      // PNG keeps text crisp (no JPEG ringing around dark glyphs); the
      // larger file is the right trade-off for an invoice PDF.
      pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297, undefined, 'SLOW');
    });
    pdf.save(filename + '.pdf');

    showToast('PDF downloaded');
  } catch (e) {
    console.error('[pdf] generation failed', e);
    showToast(e.message || 'PDF generation failed', 'error');
  }
}

function bindPdfData(root, d, variant) {
  const settings = state.settings || DEFAULT_SETTINGS;
  const s = settings.company || {};
  const isInvoice = (d.displayNumber || '').startsWith('INV-');

  // Smart address split: roughly first half / second half by comma boundary
  const addrParts = (s.address || '').split(',').map(p => p.trim()).filter(Boolean);
  const splitAt = Math.ceil(addrParts.length / 2);
  const addr1 = addrParts.slice(0, splitAt).join(', ');
  const addr2 = addrParts.slice(splitAt).join(', ');

  const data = {
    'logo': settings.logoBase64 || 'assets/reputifly-logo-light.png',
    'qr': settings.paynowQrBase64 || 'assets/paynow-qr.jpeg',
    'docTitle': 'Invoice',
    'displayNumber': d.displayNumber || '',
    'dateLabel': 'Issued',
    'issueDate': fmtDate(d.issueDate),
    'company.name': s.name || '',
    'company.uenLine': s.uen ? `UEN ${s.uen}` : '',
    'company.address1': addr1,
    'company.address2': addr2,
    'company.email': s.email || '',
    'client.name': d.client?.name || '',
    'client.attn': d.client?.attn ? `Attn: ${d.client.attn}` : '',
    'client.address': d.client?.address || '',
    'client.postal': d.client?.postal || '',
    'client.email': d.client?.email || '',
    'subtotal': fmtMoney(d.subtotal),
    'total': fmtMoney(d.total),
    'payAmount': fmtMoney(d.total),
    'payPayee': s.name || '',
    'payUen': s.uen || '',
    'payRef': d.displayNumber || '',
    'payNote': 'Scan the QR with your banking app, or transfer via PayNow / FAST quoting the reference above.',
    'footerThanks': 'Thank you for your business.',
    'footerContact': variant === 'invoice-with-terms' ? 'Continued on next page →' : `Questions? ${s.email || ''}`,
    'footerWordmark': variant === 'invoice-with-terms' ? 'REPUTIFLY · 1 / 2' : (s.name || 'REPUTIFLY').split(' ')[0].toUpperCase(),
    'termsRef': `${d.displayNumber} · ${fmtDate(d.issueDate)}`,
    'termsTitle': d.terms?.title || (settings.defaultTerms?.title || DEFAULT_TERMS.title),
    'termsSubtitle': d.terms?.subtitle || (settings.defaultTerms?.subtitle || DEFAULT_TERMS.subtitle),
    'footerThanks2': 'Thank you for your business.',
    'footerContact2': `Questions? ${s.email || ''}`
  };

  // Bind text nodes
  root.querySelectorAll('[data-bind]').forEach(el => {
    const key = el.getAttribute('data-bind');
    if (key === 'logo' || key === 'qr') {
      el.setAttribute('src', data[key] || '');
      return;
    }
    if (key === 'items') {
      // build item rows
      el.innerHTML = '';
      (d.items || []).forEach(item => {
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
          <div class="item-desc">
            ${escapeHtml(item.description || '')}
            ${item.subtitle ? `<small>${escapeHtml(item.subtitle)}</small>` : ''}
          </div>
          <div class="item-num muted">${item.qty}</div>
          <div class="item-num">${escapeHtml(fmtMoney(item.rate))}</div>
          <div class="item-num">${escapeHtml(fmtMoney(item.amount))}</div>
        `;
        el.appendChild(row);
      });
      return;
    }
    if (key === 'termsSections') {
      el.innerHTML = '';
      const sections = d.terms?.sections || (settings.defaultTerms?.sections) || DEFAULT_TERMS.sections;
      sections.forEach((sec, i) => {
        const sd = document.createElement('div');
        sd.className = 'terms-section';
        const paras = (sec.body || '').split(/\n\n+/).map(p => `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`).join('');
        sd.innerHTML = `
          <div class="head">
            <span class="num">${String(i + 1).padStart(2, '0')}</span>
            <h3>${escapeHtml(sec.heading || '')}</h3>
          </div>
          ${paras}
        `;
        el.appendChild(sd);
      });
      return;
    }
    el.textContent = data[key] != null ? data[key] : '';
  });

  // Strip empty optional fields
  const optMap = (d.optional && Object.keys(d.optional).length) ? d.optional : (settings.optionalFieldDefaults || DEFAULT_OPTIONAL);
  root.querySelectorAll('[data-optional]').forEach(el => {
    const key = el.getAttribute('data-optional');
    const visible = optMap[key];
    let textOk = true;
    if (el.hasAttribute('data-bind')) {
      const v = el.textContent.trim();
      if (!v || v === 'Attn:') textOk = false;
    }
    if (visible === false || !textOk) el.remove();
  });
}

function buildIframeHtml(innerHtml, d, filename) {
  // Inline the same CSS as the standalone templates so the iframe document
  // is byte-identical-class to the standalone invoice templates. NO auto-
  // print snippet — every download now goes through html2pdf for a real
  // .pdf save. This iframe HTML is used as a render surface for html2pdf
  // and as a passive preview when opened in a tab.
  const css = INVOICE_CSS;
  const title = filename || (d.displayNumber || 'Invoice');
  // Render reset for the iframe document:
  //   • Force body width 794px and block layout so html2canvas captures
  //     from (0,0) without flex-centering offset.
  //   • Drop font-variant-numeric: tabular-nums everywhere — html2canvas
  //     rasterises tabular figures with the WIDEST digit's width, which
  //     pads narrow chars like "1" and "-" with visible gaps. Without
  //     this, "QINV-001" renders as "QINV- 001" and "202531855M" as
  //     "202531 855M" in the PDF only. Proportional digits look
  //     identical to the on-screen original.
  const renderReset = `
    html, body { background: #ffffff !important; }
    html { width: 794px !important; }
    body { width: 794px !important; max-width: 794px !important;
           padding: 0 !important; margin: 0 !important;
           display: block !important; gap: 0 !important;
           justify-content: flex-start !important;
           align-items: flex-start !important; }
    .page { box-shadow: none !important; border-radius: 0 !important;
            margin: 0 !important; width: 794px !important;
            min-width: 794px !important; max-width: 794px !important; }
    *, *::before, *::after { font-variant-numeric: normal !important; }
  `;
  return `<!DOCTYPE html><html><head><meta charset="utf-8">
    <title>${escapeHtml(title)}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>${css}</style>
    <style>${renderReset}</style></head><body>${innerHtml}</body></html>`;
}
