<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reputifly Accounting</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/reputifly-favicon.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/reputifly-favicon.png">
<link rel="shortcut icon" type="image/png" href="assets/reputifly-favicon.png">
<link rel="apple-touch-icon" href="assets/reputifly-favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<!-- html2pdf bundles html2canvas + jsPDF; loaded once and used by downloadPdf
     to produce a real .pdf download (instead of the browser's print dialog). -->
<script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js" defer></script>
<style>
/* ═══════════════════════════════════════════════════════════════════
   DESIGN TOKENS  ·  identical ramp to the printed invoice templates
   ═══════════════════════════════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:           #0A0A0A;
  --ink-soft:      #2B2B2B;
  --ink-muted:     #6B6B6B;
  --ink-faint:     #9E9E9E;
  --hairline:      #ECECEC;
  --hairline-strong: #DEDEDE;
  --surface:       #FFFFFF;
  --surface-soft:  #F6F6F6;
  --surface-card:  #F4F4F4;
  --paid:          #10B981;
  --due:           #F59E0B;
  --danger:        #EF4444;
  --info:          #3B82F6;

  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 24px;
  --pill: 999px;

  --shadow-page: 0 30px 80px -28px rgba(0,0,0,0.22),
                 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-card: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
  --shadow-pop:  0 24px 48px -16px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
}

html, body {
  background: #E8E8E8;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: var(--ink);
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════════════════════════════
   SHARED PRIMITIVES — match the invoice template language
   ═══════════════════════════════════════════════════════════════════ */
.label-pill {
  display: inline-block;
  align-self: flex-start;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  background: var(--surface-soft);
  padding: 6px 11px;
  border-radius: var(--pill);
}

.invoice-number-pill {
  display: inline-block;
  background: var(--ink);
  color: white;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 7px 14px;
  border-radius: var(--pill);
  font-variant-numeric: tabular-nums;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 6px 11px;
  border-radius: var(--pill);
  background: white;
  color: var(--ink-soft);
  border: 1px solid var(--hairline-strong);
  white-space: nowrap;
}
.status-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ink-faint);
}
.status-pill.draft   .dot { background: var(--ink-faint); }
.status-pill.sent    { color: #92400E; background: #FEF3C7; border-color: rgba(245,158,11,0.35); }
.status-pill.sent    .dot { background: var(--due); box-shadow: 0 0 0 3px rgba(245,158,11,0.18); }
.status-pill.accepted    { color: #065F46; background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.35); }
.status-pill.accepted    .dot { background: var(--paid); }
.status-pill.converted   { background: var(--ink); color: white; border-color: var(--ink); }
.status-pill.converted   .dot { background: white; }
.status-pill.cancelled   { color: var(--ink-muted); text-decoration: line-through; }
.status-pill.paid    { color: #065F46; background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.35); }
.status-pill.paid    .dot { background: var(--paid); box-shadow: 0 0 0 3px rgba(16,185,129,0.18); }
.status-pill.void    { color: var(--danger); border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.06); }
.status-pill.void    .dot { background: var(--danger); }

/* Inputs */
.input, .textarea, .select {
  width: 100%;
  font: inherit;
  font-size: 14px;
  color: var(--ink);
  background: var(--surface);
  border: 1px solid var(--hairline-strong);
  border-radius: var(--r-md);
  padding: 10px 12px;
  outline: none;
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.input:focus, .textarea:focus, .select:focus {
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(10,10,10,0.06);
}
.textarea { resize: vertical; min-height: 80px; line-height: 1.55; }
.input.compact { padding: 8px 10px; font-size: 13.5px; }
.input::placeholder, .textarea::placeholder { color: var(--ink-faint); }

/* iOS Safari hardens its own min-content width on <input type="date">
   which makes the field overflow narrow containers. Reset the native
   appearance, allow shrinking, and align the inner value/picker so the
   field renders identically to text inputs on every platform. */
input[type="date"].input,
input[type="date"] {
  -webkit-appearance: none;
  appearance: none;
  min-width: 0;
  max-width: 100%;
  width: 100%;
  display: block;
  box-sizing: border-box;
  font-family: inherit;
  line-height: 1.4;
}
input[type="date"]::-webkit-date-and-time-value {
  text-align: left;
  min-width: 0;
  white-space: nowrap;
}
input[type="date"]::-webkit-calendar-picker-indicator {
  margin-left: auto;
  cursor: pointer;
  opacity: 0.55;
  transition: opacity 120ms ease;
}
input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
/* iOS bug: empty date inputs render with text-align: right and a
   placeholder-style overlay that pushes layout. Force LTR + left align. */
input[type="date"]::-webkit-datetime-edit { text-align: left; }

.field-label {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 6px;
  display: block;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
  padding: 10px 16px;
  border-radius: var(--pill);
  border: 1px solid var(--hairline-strong);
  background: white;
  color: var(--ink);
  cursor: pointer;
  transition: background 120ms ease, border-color 120ms ease, transform 80ms ease, color 120ms ease;
  white-space: nowrap;
}
.btn:hover { background: var(--surface-soft); }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn.primary {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}
.btn.primary:hover { background: #1f1f1f; }

.btn.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--ink-muted);
}
.btn.ghost:hover { color: var(--ink); background: var(--surface-soft); }

.btn.danger {
  background: white;
  border-color: rgba(239,68,68,0.4);
  color: var(--danger);
}
.btn.danger:hover { background: rgba(239,68,68,0.06); }

.btn.dashed {
  background: transparent;
  border: 1px dashed var(--hairline-strong);
  color: var(--ink-muted);
  font-weight: 500;
}
.btn.dashed:hover { color: var(--ink); border-color: var(--ink-muted); }

.btn.sm { padding: 6px 12px; font-size: 12px; }

.icon-btn {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--pill);
  border: 1px solid transparent;
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
}
.icon-btn:hover { background: var(--surface-soft); color: var(--ink); }
.icon-btn svg { width: 16px; height: 16px; }

/* ═══════════════════════════════════════════════════════════════════
   AUTH SCREEN
   ═══════════════════════════════════════════════════════════════════ */
.auth-screen {
  position: fixed; inset: 0;
  background: #E8E8E8;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  z-index: 1000;
}
.auth-card {
  width: 100%;
  max-width: 360px;
  background: var(--surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-page);
  padding: 36px 32px 32px;
  display: flex; flex-direction: column; align-items: center; gap: 24px;
}
.auth-card .auth-logo {
  height: 36px; width: auto;
}
.auth-card h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
  text-align: center;
}
.auth-card .auth-sub {
  font-size: 13px;
  color: var(--ink-muted);
  text-align: center;
  margin-top: -16px;
}
.auth-form {
  width: 100%;
  display: flex; flex-direction: column; gap: 12px;
}
.auth-form .input { font-size: 14px; }
.auth-form .btn { width: 100%; padding: 12px 16px; font-size: 14px; }
.auth-error {
  font-size: 12.5px;
  color: var(--danger);
  background: rgba(239,68,68,0.06);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: var(--r-sm);
  padding: 9px 12px;
  text-align: center;
  font-weight: 500;
}
.auth-foot {
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 700;
}
.auth-link {
  font-size: 12.5px;
  color: var(--ink-muted);
  text-align: center;
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: var(--hairline-strong);
  text-underline-offset: 3px;
}
.auth-link:hover { color: var(--ink); }

/* ═══════════════════════════════════════════════════════════════════
   APP CHROME — top bar + tabs
   ═══════════════════════════════════════════════════════════════════ */
.app { min-height: 100vh; display: flex; flex-direction: column; }
.app[hidden] { display: none; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--hairline);
  padding: 14px 28px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 24px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.topbar-brand img { height: 28px; }
.topbar-brand .product {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
  border-left: 1px solid var(--hairline-strong);
  padding-left: 12px;
}

.tabs {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px;
  background: var(--surface-soft);
  border-radius: var(--pill);
}
.tab-btn {
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
  padding: 8px 18px;
  border-radius: var(--pill);
  border: 0;
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: background 140ms ease, color 140ms ease;
}
.tab-btn:hover { color: var(--ink); }
.tab-btn.active { background: var(--ink); color: white; }

.user-menu { justify-self: end; display: flex; align-items: center; gap: 12px; }
.user-email {
  font-size: 12.5px;
  color: var(--ink-muted);
  font-weight: 500;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Mobile tab dropdown */
.tab-dropdown {
  position: relative;
  display: none;
  width: 100%;
  max-width: 320px;
}
.tab-dropdown-trigger {
  width: 100%;
  font: inherit;
  font-size: 14px;
  font-weight: 600;
  background: var(--surface-soft);
  border: 1px solid var(--hairline-strong);
  border-radius: var(--pill);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  color: var(--ink);
  cursor: pointer;
}
.tab-dropdown-menu {
  position: absolute;
  top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-pop);
  padding: 6px;
  z-index: 60;
  display: none;
}
.tab-dropdown.open .tab-dropdown-menu { display: block; }
.tab-dropdown-item {
  width: 100%;
  text-align: left;
  font: inherit;
  font-size: 14px;
  font-weight: 500;
  background: transparent;
  border: 0;
  padding: 10px 12px;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--ink);
}
.tab-dropdown-item:hover { background: var(--surface-soft); }
.tab-dropdown-item.active { background: var(--ink); color: white; font-weight: 600; }

/* ═══════════════════════════════════════════════════════════════════
   MAIN LAYOUT
   ═══════════════════════════════════════════════════════════════════ */
.main {
  flex: 1;
  padding: 36px 21px 80px;  /* 25% less horizontal padding */
  display: flex;
  justify-content: center;
}
.view { width: 100%; max-width: 980px; }
.view[hidden] { display: none; }

.view-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
}
.view-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--ink);
  line-height: 1.1;
}
.view-sub {
  font-size: 13px;
  color: var(--ink-muted);
  margin-top: 6px;
  font-weight: 500;
}

.toolbar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

/* Inline numbering panel on the Invoices tab */
.invoice-numbering-panel {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--r-lg);
  padding: 14px 18px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.invoice-numbering-panel .ip-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.invoice-numbering-panel .ip-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint);
}
.invoice-numbering-panel .ip-value {
  font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.015em;
  font-variant-numeric: tabular-nums;
}
.invoice-numbering-panel .ip-meta { font-size: 12px; color: var(--ink-muted); }
.invoice-numbering-panel .ip-edit {
  display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
.invoice-numbering-panel .ip-edit input {
  width: 88px;
  font: inherit; font-size: 14px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  border: 1px solid var(--hairline-strong);
  border-radius: var(--r-sm);
  padding: 8px 12px;
  outline: none;
  color: var(--ink);
}
.invoice-numbering-panel .ip-edit input:focus { border-color: var(--ink); }
@media (max-width: 760px) {
  .invoice-numbering-panel {
    padding: 12px 14px;
    gap: 12px;
  }
  /* Stack vertically with header row + justified controls below */
  .invoice-numbering-panel .ip-info { flex: 1 1 100%; }
  .invoice-numbering-panel .ip-meta { display: none; }     /* drop the "2 on record" sub-line for cleaner mobile */
  .invoice-numbering-panel .ip-edit {
    flex: 1 1 100%;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .invoice-numbering-panel .ip-edit input { width: 100%; }
  .invoice-numbering-panel .ip-edit .btn { padding: 9px 18px; }
}
.search-input {
  flex: 1;
  min-width: 220px;
  position: relative;
}
.search-input input {
  width: 100%;
  font: inherit;
  font-size: 13.5px;
  background: var(--surface);
  border: 1px solid var(--hairline-strong);
  border-radius: var(--pill);
  padding: 10px 14px 10px 38px;
  color: var(--ink);
  outline: none;
}
.search-input input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(10,10,10,0.04); }
.search-input::before {
  content: ''; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239E9E9E' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m21 21-4.3-4.3'/></svg>") no-repeat center/contain;
}

/* List card */
.list-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}
.list-row {
  display: grid;
  grid-template-columns: 110px 1fr 130px 130px 110px 60px;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--hairline);
  cursor: pointer;
  transition: background 100ms ease;
}
.list-row:last-child { border-bottom: 0; }
.list-row:hover { background: var(--surface-soft); }
.list-row.void { opacity: 0.6; }

.list-head {
  display: grid;
  grid-template-columns: 110px 1fr 130px 130px 110px 60px;
  gap: 16px;
  padding: 12px 20px;
  background: var(--surface-soft);
  border-bottom: 1px solid var(--hairline-strong);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.list-head > span:nth-child(n+3) { text-align: right; }

.list-cell-num {
  font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13.5px;
  display: flex; flex-direction: column; gap: 2px; min-width: 0;
}
.list-cell-num .list-cell-xref {
  font-size: 11px; font-weight: 500; color: var(--ink-muted);
  letter-spacing: 0; line-height: 1.2; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.list-cell-client { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.list-cell-client .client-name { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-cell-client .client-meta { font-size: 12px; color: var(--ink-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-cell-client .client-match { font-size: 11px; color: var(--ink-muted); }
.list-cell-client .client-match mark { background: rgba(245,158,11,0.25); color: var(--ink); padding: 0 2px; border-radius: 2px; }
.list-cell-num-r { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; font-size: 14px; }
.list-cell-date { text-align: right; font-variant-numeric: tabular-nums; font-size: 12.5px; color: var(--ink-muted); font-weight: 500; }
.list-cell-status { display: flex; justify-content: flex-end; }
.list-cell-actions { display: flex; justify-content: flex-end; }

.empty {
  padding: 60px 24px;
  text-align: center;
  color: var(--ink-muted);
  font-size: 14px;
}
.empty .empty-title { color: var(--ink); font-weight: 700; font-size: 16px; margin-bottom: 4px; }

.load-more {
  text-align: center;
  padding: 16px;
  background: var(--surface-soft);
  border-top: 1px solid var(--hairline);
  font-size: 12.5px;
  color: var(--ink-muted);
}
.load-more button { margin-left: 12px; }

/* ═══════════════════════════════════════════════════════════════════
   CREATION TAB — WYSIWYG editor
   ═══════════════════════════════════════════════════════════════════ */
.creation-wrap {
  width: 100%;
  max-width: 880px;
  margin: 0 auto;
}

.creation-intro {
  margin-bottom: 16px;
  padding: 0 4px;
}
.creation-intro-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.creation-intro-num {
  display: inline-block;
  background: var(--ink);
  color: white;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 3px 9px;
  border-radius: var(--pill);
  margin-left: 4px;
  font-variant-numeric: tabular-nums;
  vertical-align: 1px;
}
.creation-intro-sub {
  margin-top: 4px;
  font-size: 12.5px;
  color: var(--ink-muted);
  font-weight: 500;
}

.mode-toggle {
  display: inline-flex;
  align-items: center;
  padding: 4px;
  background: var(--surface-soft);
  border-radius: var(--pill);
  margin-bottom: 16px;
  position: relative;
}
.mode-toggle button {
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  background: transparent;
  border: 0;
  padding: 8px 22px;
  border-radius: var(--pill);
  color: var(--ink-muted);
  cursor: pointer;
  transition: color 140ms ease;
  position: relative;
  z-index: 2;
}
.mode-toggle button.active { color: white; }
.mode-toggle .mode-indicator {
  position: absolute;
  top: 4px; bottom: 4px;
  background: var(--ink);
  border-radius: var(--pill);
  transition: left 200ms cubic-bezier(0.4, 0, 0.2, 1), width 200ms cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
}

.payment-date-inline {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-left: 16px;
  margin-bottom: 16px;
  padding: 6px 12px;
  background: var(--surface-soft);
  border-radius: var(--pill);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-soft);
}
.payment-date-inline input {
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  border: 0;
  background: transparent;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  outline: none;
  width: 130px;
  cursor: pointer;
}

/* WYSIWYG page mirrors the printed page identically */
.editor-page {
  width: 100%;
  background: var(--surface);
  padding: 14mm 10.5mm;        /* 25% less horizontal padding */
  border-radius: 10px;
  box-shadow: var(--shadow-page);
  position: relative;
  display: flex;
  flex-direction: column;
}

.editor-page .header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding-bottom: 24px; border-bottom: 1px solid var(--hairline);
}
.editor-page .brand-col { display: flex; flex-direction: column; gap: 18px; }
.editor-page .brand-logo { height: 42px; width: auto; display: block; }
.editor-page .meta-col { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 14px; }

.editor-page .doc-title {
  font-size: 44px; font-weight: 800;
  letter-spacing: -0.045em; line-height: 1; color: var(--ink);
}
.editor-page .doc-num-pill {
  display: inline-block; background: var(--ink); color: white;
  font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
  padding: 7px 14px; border-radius: var(--pill);
  font-variant-numeric: tabular-nums;
}
.editor-page .dates {
  display: flex; flex-direction: column; gap: 5px; font-size: 12.5px; font-variant-numeric: tabular-nums;
}
.editor-page .dates .row { display: flex; justify-content: flex-end; gap: 10px; align-items: center; }
.editor-page .dates .label { color: var(--ink-faint); font-weight: 500; min-width: 50px; text-align: right; }
.editor-page .dates input {
  font: inherit; border: 0; background: transparent; outline: none; text-align: right;
  font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 600; font-size: 12.5px; width: 130px;
}
.editor-page .dates input:focus { background: var(--surface-soft); border-radius: 4px; }

.editor-page .parties { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 28px; }
.editor-page .party-block { display: flex; flex-direction: column; gap: 10px; }
.editor-page .party-name {
  font-size: 17px; font-weight: 700; letter-spacing: -0.015em; color: var(--ink); line-height: 1.3;
}
.editor-page .party-detail { font-size: 12.5px; color: var(--ink-muted); line-height: 1.65; font-weight: 500; }
.editor-page .party-detail .line { display: block; }

/* Editable text */
.ce {
  outline: none;
  cursor: text;
  border-radius: 4px;
  padding: 1px 3px;
  margin: -1px -3px;
  transition: background 100ms ease;
}
.ce:hover { background: rgba(245,158,11,0.08); }
.ce:focus { background: rgba(10,10,10,0.04); }
.ce[data-empty="true"]::before {
  content: attr(data-placeholder);
  color: var(--ink-faint);
  font-weight: 400;
}

.optional-line {
  position: relative;
  display: block;
}
.optional-line .opt-x {
  position: absolute;
  left: -22px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--ink-faint);
  color: white;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  border: 0;
  opacity: 0;
  transition: opacity 100ms ease;
}
.optional-line:hover .opt-x { display: flex; opacity: 1; }
.optional-line .opt-x:hover { background: var(--danger); }

/* Items table — matches the invoice template */
.editor-page .items { margin-top: 30px; }
.editor-page .items-head {
  display: grid; grid-template-columns: 1fr 70px 120px 140px 28px;
  border-bottom: 1px solid var(--hairline-strong);
}
.editor-page .items-head > span {
  padding: 14px 14px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted);
}
.editor-page .items-head > span:nth-child(1) { padding-left: 4px; }
.editor-page .items-head > span:nth-child(n+2):not(:last-child) { text-align: right; }
.editor-page .items-head > span:nth-child(4) { padding-right: 4px; }

.editor-page .item-row {
  display: grid; grid-template-columns: 1fr 70px 120px 140px 28px;
  border-bottom: 1px solid var(--hairline);
  align-items: center;
}
.editor-page .item-row > div { padding: 16px 14px; }
.editor-page .item-row > .item-desc { padding-left: 4px; }
.editor-page .item-row > .item-num { padding-right: 4px; }
.editor-page .item-row > .item-num:not(:nth-last-child(2)) { padding-right: 14px; }

.editor-page .item-desc { font-size: 14.5px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
.editor-page .item-desc .item-sub {
  display: block;
  margin-top: 3px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-muted);
  letter-spacing: 0;
}
.editor-page .item-num {
  font-size: 14px; font-variant-numeric: tabular-nums; text-align: right;
  color: var(--ink); font-weight: 500;
}
.editor-page .item-num.muted { color: var(--ink-muted); }
.editor-page .item-num input {
  font: inherit; font-size: 14px; font-variant-numeric: tabular-nums;
  background: transparent; border: 0; outline: none; text-align: right;
  width: 100%; color: inherit; font-weight: inherit;
}
.editor-page .item-num input:focus { background: rgba(10,10,10,0.04); border-radius: 4px; }
.editor-page .item-row .row-trash {
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.editor-page .item-row .row-trash button {
  border: 0; background: transparent; padding: 4px;
  color: var(--ink-faint); cursor: pointer;
  opacity: 0; transition: opacity 100ms ease, color 120ms ease;
  border-radius: 4px;
}
.editor-page .item-row:hover .row-trash button { opacity: 1; }
.editor-page .item-row .row-trash button:hover { color: var(--danger); background: rgba(239,68,68,0.08); }

.editor-page .add-item-row {
  border: 1px dashed var(--hairline-strong);
  border-radius: var(--r-md);
  padding: 12px;
  margin-top: 12px;
  text-align: center;
  color: var(--ink-muted);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  background: transparent;
  width: 100%;
  transition: border-color 120ms ease, color 120ms ease;
}
.editor-page .add-item-row:hover { color: var(--ink); border-color: var(--ink-muted); }

.editor-page .totals { display: flex; justify-content: flex-end; margin-top: 18px; }
.editor-page .totals-inner { width: 320px; }
.editor-page .total-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 9px 4px; font-size: 13px; font-variant-numeric: tabular-nums;
}
.editor-page .total-row .label { color: var(--ink-muted); font-weight: 500; }
.editor-page .total-row .value { color: var(--ink); font-weight: 600; }
.editor-page .total-row.grand { margin-top: 8px; padding: 18px 4px 6px; border-top: 1px solid var(--hairline-strong); }
.editor-page .total-row.grand .label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft);
}
.editor-page .total-row.grand .value { font-size: 26px; font-weight: 800; letter-spacing: -0.025em; color: var(--ink); }

.editor-page .payment {
  display: flex; flex-direction: row; gap: 28px;
  background: #F2F2F2; border-radius: var(--r-xl);
  padding: 28px; margin-top: 28px; align-items: center;
}
.editor-page .qr-wrap {
  flex: 0 0 168px;
  width: 168px; height: 168px; background: white; border-radius: var(--r-md); padding: 10px;
  box-shadow: 0 0 0 1px var(--hairline-strong), 0 6px 18px -10px rgba(0,0,0,0.12);
  display: flex; align-items: center; justify-content: center;
}
.editor-page .qr-wrap img { width: 100%; height: 100%; display: block; object-fit: contain; }
.editor-page .payment-info { flex: 1 1 auto; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
.editor-page .payment-info .label-pill { background: white; }
.editor-page .pay-amount {
  font-size: 32px; font-weight: 800; letter-spacing: -0.03em; color: var(--ink);
  margin-top: 14px; line-height: 1; font-variant-numeric: tabular-nums;
}
.editor-page .pay-payee { font-size: 17px; font-weight: 700; letter-spacing: -0.015em; color: var(--ink); margin-top: 8px; }
.editor-page .pay-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px 32px;
  margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.07);
}
.editor-page .pay-field { display: flex; flex-direction: column; gap: 2px; font-variant-numeric: tabular-nums; }
.editor-page .pay-field .k { font-size: 9.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); }
.editor-page .pay-field .v { font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: -0.005em; }
.editor-page .pay-note { margin-top: 14px; font-size: 11.5px; color: var(--ink-muted); line-height: 1.55; font-weight: 500; }

.editor-page .foot {
  margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--hairline);
  display: flex; justify-content: space-between; align-items: flex-end;
}
.editor-page .thanks { font-size: 14px; color: var(--ink); font-weight: 700; letter-spacing: -0.015em; }
.editor-page .thanks small {
  display: block; font-size: 11.5px; color: var(--ink-muted); font-weight: 500;
  letter-spacing: 0; margin-top: 3px;
}
.editor-page .wordmark { font-size: 9.5px; font-weight: 700; letter-spacing: 0.32em; color: var(--ink-faint); text-transform: uppercase; }

/* Sticky bottom action bar */
.creation-actions {
  position: sticky;
  bottom: 0;
  margin-top: 24px;
  padding: 16px 20px;
  background: rgba(255,255,255,0.94);
  backdrop-filter: saturate(140%) blur(10px);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  z-index: 10;
}
.creation-actions .summary {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-muted);
}
.creation-actions .summary strong {
  color: var(--ink);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  margin-left: 8px;
}
.creation-actions .actions { display: flex; gap: 10px; }

/* Add-field popover */
.add-field-host { position: relative; display: inline-block; }
.add-field-pop {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 200px;
  background: var(--surface);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-pop);
  padding: 6px;
  z-index: 30;
  display: none;
}
.add-field-host.open .add-field-pop { display: block; }
.add-field-pop button {
  width: 100%;
  text-align: left;
  font: inherit;
  font-size: 13px;
  background: transparent;
  border: 0;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--ink);
}
.add-field-pop button:hover { background: var(--surface-soft); }
.add-field-pop .empty-mini { font-size: 12px; color: var(--ink-faint); padding: 8px 10px; }

/* ═══════════════════════════════════════════════════════════════════
   DRAWER
   ═══════════════════════════════════════════════════════════════════ */
.drawer-scrim {
  position: fixed; inset: 0;
  background: rgba(10,10,10,0.4);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms ease;
}
.drawer-scrim.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  top: 0; right: 0;
  height: 100vh;
  width: 600px;
  max-width: 100vw;
  background: var(--surface);
  z-index: 110;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: -24px 0 64px -24px rgba(0,0,0,0.18);
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--hairline);
}
.drawer-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
}
.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.drawer-foot {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 14px 20px;
  border-top: 1px solid var(--hairline);
  background: var(--surface-soft);
  flex-wrap: wrap;
}
.drawer-foot .actions { display: flex; gap: 8px; flex-wrap: wrap; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-row { display: flex; flex-direction: column; gap: 6px; }
.form-row.full { grid-column: 1 / -1; }

.section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin: 22px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--hairline);
}
.section-title:first-child { margin-top: 0; }

.drawer-items {
  display: flex; flex-direction: column; gap: 10px;
}
.drawer-item {
  background: var(--surface-soft);
  border-radius: var(--r-md);
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 60px 100px 100px 28px;
  gap: 8px;
  align-items: start;
}
.drawer-item .input { font-size: 13px; padding: 8px 10px; background: white; }

/* ═══════════════════════════════════════════════════════════════════
   ADVANCED TAB
   ═══════════════════════════════════════════════════════════════════ */
.advanced-stack { display: flex; flex-direction: column; gap: 18px; }
.adv-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  padding: 24px 26px;
}
.adv-card h2 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin-bottom: 4px;
}
.adv-card .adv-card-sub {
  font-size: 12.5px;
  color: var(--ink-muted);
  margin-bottom: 18px;
}

.adv-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.adv-row.three { grid-template-columns: 1fr 1fr 1fr; }

.upload-zone {
  position: relative;
  border: 1px dashed var(--hairline-strong);
  border-radius: var(--r-md);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: border-color 120ms ease, background 120ms ease;
}
.upload-zone:hover { border-color: var(--ink-muted); background: var(--surface-soft); }
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}
.upload-preview {
  width: 64px; height: 64px;
  background: white;
  border: 1px solid var(--hairline);
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.upload-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
.upload-info { display: flex; flex-direction: column; gap: 2px; }
.upload-info .upload-title { font-size: 13.5px; font-weight: 600; }
.upload-info .upload-meta { font-size: 11.5px; color: var(--ink-muted); }

/* Default terms editor */
.terms-editor { display: flex; flex-direction: column; gap: 12px; }
.terms-section-card {
  background: var(--surface-soft);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 36px 1fr auto auto;
  gap: 10px;
  align-items: start;
  border: 1px solid var(--hairline);
}
.terms-section-card .num-rail {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  font-variant-numeric: tabular-nums;
  padding-top: 12px;
  text-align: center;
}
.terms-section-card .body-col { display: flex; flex-direction: column; gap: 8px; }
.terms-section-card .heading-input { font-weight: 600; }
.terms-section-card .body-input { min-height: 60px; font-size: 13px; }
.terms-section-card .reorder-col,
.terms-section-card .delete-col {
  display: flex; flex-direction: column; gap: 4px;
  padding-top: 8px;
}

.json-area {
  font-family: 'SF Mono', Monaco, Consolas, 'Liberation Mono', monospace;
  font-size: 12px;
  background: var(--surface-soft);
  border-radius: var(--r-sm);
  padding: 12px;
  color: var(--ink-soft);
  border: 1px solid var(--hairline);
  white-space: pre-wrap;
  max-height: 300px;
  overflow: auto;
}

/* ═══════════════════════════════════════════════════════════════════
   MOBILE CREATION FORM
   ═══════════════════════════════════════════════════════════════════ */
.m-edit-head {
  display: flex; flex-direction: column; gap: 12px;
  margin-bottom: 14px;
}
.m-edit-head-row {
  display: flex; align-items: center; gap: 10px;
}
.m-edit-doctitle {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.m-card {
  background: var(--surface);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-card);
  padding: 14px;
  margin-bottom: 12px;
}
.m-card-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--hairline);
}
.m-items {
  display: flex; flex-direction: column; gap: 12px;
}
.m-item-card {
  background: var(--surface-soft);
  border-radius: var(--r-md);
  padding: 12px;
}
.m-item-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.m-item-num {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.m-item-numbers {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  margin-top: 10px;
}
.m-item-numbers .input { font-size: 14px; padding: 9px 10px; }
.m-totals {
  display: flex; flex-direction: column; gap: 8px;
}
.m-totals-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  color: var(--ink-soft);
}
.m-totals-row.grand {
  margin-top: 6px;
  padding-top: 14px;
  border-top: 1px solid var(--hairline-strong);
  font-size: 18px;
  font-weight: 800;
  color: var(--ink);
}
.m-totals-row.grand span:last-child { font-size: 22px; letter-spacing: -0.02em; }

/* ═══════════════════════════════════════════════════════════════════
   BOTTOM SHEET (mobile row-actions)
   ═══════════════════════════════════════════════════════════════════ */
.bottom-sheet-scrim {
  position: fixed; inset: 0;
  background: rgba(10,10,10,0.5);
  z-index: 250;
  display: none;
  opacity: 0;
  transition: opacity 200ms ease;
}
.bottom-sheet-scrim.open { display: block; opacity: 1; }
.bottom-sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--surface);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  z-index: 260;
  padding: 14px 14px 24px;
  transform: translateY(100%);
  transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 -16px 40px -12px rgba(0,0,0,0.18);
  flex-direction: column; gap: 4px;
  display: none;
}
.bottom-sheet.mounted { display: flex; }
.bottom-sheet.open { transform: translateY(0); }
.bottom-sheet::before {
  content: '';
  align-self: center;
  width: 36px; height: 4px;
  background: var(--hairline-strong);
  border-radius: var(--pill);
  margin-bottom: 10px;
}
.bottom-sheet button {
  font: inherit;
  font-size: 15px;
  font-weight: 500;
  background: transparent;
  border: 0;
  padding: 14px 12px;
  border-radius: var(--r-md);
  text-align: left;
  cursor: pointer;
  color: var(--ink);
}
.bottom-sheet button:hover { background: var(--surface-soft); }
.bottom-sheet button.danger { color: var(--danger); }

/* ═══════════════════════════════════════════════════════════════════
   TOASTS
   ═══════════════════════════════════════════════════════════════════ */
.toasts {
  position: fixed;
  left: 50%; bottom: 24px;
  transform: translateX(-50%);
  display: flex; flex-direction: column-reverse; gap: 8px;
  z-index: 1000;
  pointer-events: none;
}
.toast {
  background: var(--ink);
  color: white;
  border-radius: var(--r-md);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  max-width: 380px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 12px 32px -8px rgba(0,0,0,0.4);
  animation: toast-in 200ms ease;
  pointer-events: auto;
}
.toast::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--paid);
  flex-shrink: 0;
}
.toast.error::before { background: var(--danger); }
.toast.warn::before { background: var(--due); }
.toast.info::before { background: var(--info); }
.toast.leaving { animation: toast-out 200ms ease forwards; }
@keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes toast-out { to { transform: translateY(20px); opacity: 0; } }

/* Modal */
.modal-scrim {
  position: fixed; inset: 0;
  background: rgba(10,10,10,0.45);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200;
  padding: 24px;
}
.modal-scrim.open { display: flex; }
.modal-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 26px;
  max-width: 480px;
  width: 100%;
  max-height: calc(100vh - 48px);
  overflow-y: auto;
  box-shadow: var(--shadow-pop);
  animation: modal-in 180ms ease;
  /* Hide the scrollbar but keep the area scrollable */
  scrollbar-width: none;       /* Firefox */
  -ms-overflow-style: none;    /* IE/legacy Edge */
}
.modal-card::-webkit-scrollbar { display: none; }
.drawer-body {
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.drawer-body::-webkit-scrollbar { display: none; }
@keyframes modal-in { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-card h3 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.015em;
  margin-bottom: 6px;
}
.modal-card p {
  font-size: 13.5px;
  color: var(--ink-muted);
  margin-bottom: 18px;
  line-height: 1.55;
}
.modal-card .modal-actions {
  display: flex; gap: 10px; justify-content: flex-end;
  flex-wrap: wrap;
}
.modal-card .input { margin-bottom: 14px; }

/* ═══════════════════════════════════════════════════════════════════
   PDF STAGE — hidden iframe target
   ═══════════════════════════════════════════════════════════════════ */
#pdf-stage { display: none; }
#print-iframe {
  /* Sized to exactly one A4 width in CSS pixels (210mm at 96dpi).
     A 0×0 iframe was causing the .page to layout off-canvas; mm
     units were causing rendering artefacts. Plain px is the most
     predictable for html2canvas. */
  position: fixed; left: -10000px; top: 0;
  width: 794px; height: 1123px; border: 0;
  visibility: hidden;
}

/* Loading skeleton */
.skeleton {
  background: linear-gradient(90deg, #f0f0f0 0%, #e0e0e0 50%, #f0f0f0 100%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 4px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ═══════════════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════════════ */
@media (max-width: 760px) {
  .topbar {
    grid-template-columns: 1fr auto;
    padding: 12px 14px;
    gap: 10px;
    grid-template-areas: "brand user" "tabs tabs";
  }
  .topbar-brand { grid-area: brand; }
  .user-menu { grid-area: user; }
  .topbar-brand .product { display: none; }
  .user-email { display: none; }

  /* Mobile uses the dropdown — pills wrap awkwardly with 5 tabs */
  .tabs { display: none; }
  .tab-dropdown { display: block; grid-area: tabs; max-width: none; }

  .main { padding: 20px 16px 80px; }
  .view-title { font-size: 22px; }

  .editor-page { padding: 6mm; border-radius: 10px; overflow: hidden; }
  .editor-page .header { gap: 12px; }
  .editor-page .brand-col { min-width: 0; }
  .editor-page .meta-col { min-width: 0; flex-shrink: 0; }
  .editor-page .brand-logo { height: 32px; }
  .editor-page .doc-title { font-size: 24px; }
  .editor-page .parties { grid-template-columns: 1fr; gap: 24px; }
  .editor-page .items { overflow-x: auto; margin-left: -6px; margin-right: -6px; padding: 0 6px; }
  .editor-page .items-head, .editor-page .item-row {
    grid-template-columns: minmax(0, 1fr) 40px 60px 76px 22px;
    font-size: 11.5px;
  }
  .editor-page .items-head > span,
  .editor-page .item-row > div { padding: 10px 6px; }
  .editor-page .item-row > .item-desc { padding-left: 2px; }
  .editor-page .item-row > .item-num { padding-right: 2px; }
  .editor-page .item-num { font-size: 11.5px; min-width: 0; }
  .editor-page .item-num input { font-size: 11.5px; padding: 0; min-width: 0; width: 100%; }
  .editor-page .item-desc { font-size: 12.5px; min-width: 0; }
  .editor-page .item-desc .item-desc-main { word-break: break-word; }
  /* Stack vertically on mobile (.payment is flex-row by default — switch
     to column so the QR sits above the info on narrow screens). */
  .editor-page .payment { flex-direction: column; }
  .editor-page .qr-wrap { flex: 0 0 140px; width: 140px; height: 140px; margin: 0 auto; }
  .editor-page .pay-amount { font-size: 26px; }
  .editor-page .total-row.grand .value { font-size: 20px; }

  .list-row, .list-head {
    grid-template-columns: 88px 1fr 90px 32px;
    gap: 8px;
    padding: 12px 14px;
    font-size: 12px;
  }
  .list-cell-num .list-cell-xref { font-size: 10px; }
  .list-head > span:nth-child(3),
  .list-head > span:nth-child(5),
  .list-row > .list-cell-date,
  .list-row > .list-cell-status { display: none; }

  .drawer { width: 100vw; }
  .form-grid { grid-template-columns: 1fr; }

  .drawer-item {
    grid-template-columns: 1fr 1fr 1fr 28px;
    gap: 8px;
  }
  .drawer-item > .item-desc-input { grid-column: 1 / -1; }

  .drawer-foot { padding: 12px 14px; gap: 8px; }
  .drawer-foot .actions .btn { font-size: 12px; padding: 8px 12px; }

  .adv-row, .adv-row.three { grid-template-columns: 1fr; }
  .terms-section-card { grid-template-columns: 28px 1fr 28px 28px; padding: 12px; gap: 8px; }
  .terms-section-card .num-rail { font-size: 9.5px; padding-top: 10px; }

  .creation-actions { padding: 12px 14px; gap: 8px; }
  .creation-actions .summary { font-size: 12px; flex-basis: 100%; text-align: center; }
  .creation-actions .actions { flex-basis: 100%; justify-content: stretch; }
  .creation-actions .actions .btn { flex: 1; padding: 10px 12px; font-size: 12.5px; }

  /* ─── iOS auto-zoom fix ──────────────────────────────────────────
     iOS Safari zooms the page when the user taps an input whose
     computed font-size is < 16px. We bump every focusable text input
     to exactly 16px on mobile to suppress that zoom. The visual size
     is still tight thanks to the explicit padding overrides below. */
  input[type="text"],
  input[type="email"],
  input[type="password"],
  input[type="number"],
  input[type="search"],
  input[type="tel"],
  input[type="url"],
  input[type="date"],
  input:not([type]),
  textarea,
  select,
  [contenteditable="true"] {
    font-size: 16px !important;     /* hard override — must beat all other rules */
  }

  /* Tighten the bumped inputs back to a comfortable visual height with
     padding alone (so they don't feel oversized just because we said 16px). */
  .input, .textarea, .select { padding: 11px 12px; }
  .input.compact { padding: 9px 11px; }
  .m-card { padding: 16px; }
  .m-card .form-row + .form-row { margin-top: 12px; }
  .m-item-numbers { gap: 10px; }
  .m-item-numbers .input { padding: 10px 10px; }

  /* Bigger tap targets — iOS HIG recommends ≥ 44 px height */
  .btn { min-height: 42px; padding: 11px 18px; }
  .btn.sm { min-height: 36px; padding: 8px 14px; }
  .icon-btn { min-width: 38px; min-height: 38px; }

  /* Compact toolbars/lists shouldn't swell because of the 16px bump */
  .search-input input { padding: 11px 14px 11px 38px; }
  .invoice-numbering-panel .ip-edit input { padding: 10px 12px; }
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function fmtMoney(n) {
  const v = Number(n) || 0;
  return 'S$' + v.toLocaleString('en-SG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const day = String(d.getDate()).padStart(2, '0');
  const month = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return `${day} ${month} ${d.getFullYear()}`;
}

function todayIso() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function padNum(n, padding) {
  return String(n).padStart(padding, '0');
}
function formatNumber(n, prefix, padding) {
  return `${prefix}${padNum(n, padding)}`;
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function buildSearchBlob(d) {
  const items = (d.items || []).map(i => `${i.description || ''} ${i.subtitle || ''}`).join(' ');
  // Cross-reference search: paid invoices remember their source quotation
  // number (sourceQuotationNumber) so typing "QINV-005" on the Paid tab
  // surfaces the invoice that came from it. The reverse (Drafts tab
  // matching INV-####) is handled at row-render time because the
  // converted invoice's displayNumber lives on a separate doc.
  return [
    d.displayNumber, d.sourceQuotationNumber,
    d.client?.name, d.client?.attn, d.client?.email,
    items, fmtMoney(d.total), d.issueDate, d.status
  ].filter(Boolean).join(' ').toLowerCase();
}

function showToast(msg, kind = 'success') {

  const el = document.createElement('div');

  el.textContent = msg;
  host.appendChild(el);
  // cap at 3
  while (host.children.length > 3) host.removeChild(host.firstChild);
  setTimeout(() => {
    el.classList.add('leaving');
    setTimeout(() => el.remove(), 220);
  }, 3500);
}

// Shared "Copy share link" handler — used by row menus, drawer footer, and
// the editor sticky bar. If the doc has no token yet (legacy or freshly
// migrated), one is lazy-minted and back-filled onto the source doc + the
// public mirror. Token-based URL only — never reveals the invoice number.
async function handleCopyShareLink(d, kind /* 'quotations' | 'invoices' | 'quotation' | 'invoice' */) {
  if (!d) return;
  if (DEV_MODE) {
    showToast('Share links require live Firestore (not dev mode)', 'warn');
    return;
  }
  try {
    let token = d.shareToken;
    let displayNumber = d.displayNumber;
    if (!token) {
      // Lazy-mint for legacy docs that predate the share feature.
      token = generateShareToken();
      const isQuotation = (kind === 'quotations' || kind === 'quotation');
      const sourcePath = isQuotation
        ? `users/${state.user.uid}/quotations/${d.id}`
        : `users/${state.user.uid}/invoices/${d.id}`;
      await updateDoc(doc(db, sourcePath), { shareToken: token, updatedAt: serverTimestamp() });
      await upsertShareDoc(token, buildSharePayload({ ...d, shareToken: token }, isQuotation ? 'quotation' : 'invoice'));
    }
    const url = buildShareUrl(displayNumber, token);
    await navigator.clipboard.writeText(url);
    showToast('Share link copied — paste it to your client');
  } catch (e) {
    console.error('[share] copy failed', e);

// REGION: modal helper ──────────────────────────────────────────────
function openModal({ title, body, okLabel = 'Confirm', cancelLabel = 'Cancel', danger = false, requireText, onOk }) {
  const scrim = document.getElementById('modal-scrim');
  const card = document.getElementById('modal-card');
  card.innerHTML = '';

  const h = document.createElement('h3'); h.textContent = title; card.appendChild(h);
  const p = document.createElement('p'); p.textContent = body; card.appendChild(p);

  let confirmInput;
  if (requireText) {
    confirmInput = document.createElement('input');
    confirmInput.className = 'input';
    confirmInput.placeholder = `Type "${requireText}" to confirm`;
    card.appendChild(confirmInput);
  }

  const actions = document.createElement('div'); actions.className = 'modal-actions';
  const cancel = document.createElement('button'); cancel.className = 'btn'; cancel.textContent = cancelLabel;
  const ok = document.createElement('button'); ok.className = `btn ${danger ? 'danger' : 'primary'}`; ok.textContent = okLabel;
  actions.appendChild(cancel); actions.appendChild(ok);
  card.appendChild(actions);

  const close = () => { scrim.classList.remove('open'); };
  cancel.addEventListener('click', close);
  ok.addEventListener('click', async () => {
    if (requireText && confirmInput.value !== requireText) {
      showToast(`Please type "${requireText}" exactly to confirm.`, 'warn');
      return;
    }
    ok.disabled = true;
    try { await onOk(); close(); } catch (e) {
      showToast(e?.message || 'Action failed', 'error');
      ok.disabled = false;
    }
  });
  scrim.addEventListener('click', (e) => { if (e.target === scrim) close(); }, { once: true });
  scrim.classList.add('open');
}

// Re-auth gate for sensitive actions
async function requireRecentAuth() {
  if (DEV_MODE) return true;
  const u = auth.currentUser;
  if (!u) throw new Error('Not signed in');
  const lastSignIn = u.metadata?.lastSignInTime ? new Date(u.metadata.lastSignInTime).getTime() : 0;
  if (Date.now() - lastSignIn < 5 * 60 * 1000) return true;

  return new Promise((resolve, reject) => {
    const scrim = document.getElementById('modal-scrim');
    const card = document.getElementById('modal-card');
    card.innerHTML = '';
    const h = document.createElement('h3'); h.textContent = 'Confirm your password';
    const p = document.createElement('p'); p.textContent = 'This is a sensitive action. Please re-enter your password to continue.';
    const inp = document.createElement('input'); inp.type = 'password'; inp.className = 'input'; inp.placeholder = 'Password';
    const actions = document.createElement('div'); actions.className = 'modal-actions';
    const cancel = document.createElement('button'); cancel.className = 'btn'; cancel.textContent = 'Cancel';
    const ok = document.createElement('button'); ok.className = 'btn primary'; ok.textContent = 'Confirm';
    actions.appendChild(cancel); actions.appendChild(ok);
    card.appendChild(h); card.appendChild(p); card.appendChild(inp); card.appendChild(actions);
    scrim.classList.add('open');

    const close = () => scrim.classList.remove('open');
    cancel.addEventListener('click', () => { close(); reject(new Error('Cancelled')); });
    ok.addEventListener('click', async () => {
      try {
        const cred = EmailAuthProvider.credential(u.email, inp.value);
        await reauthenticateWithCredential(u, cred);
        close(); resolve(true);
      } catch (e) {
        showToast('Re-authentication failed', 'error');
      }
    });
    inp.focus();
  });
}

  setTimeout(() => {
    if (!authResolved) {
      console.warn('[auth] state did not resolve within 5s — showing login');
      showAuthScreen();
    }
  }, 5000);
}

async function fetchAssetAsDataUrl(path) {
  try {
    const r = await fetch(path);
    const blob = await r.blob();
    return await new Promise((resolve) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.readAsDataURL(blob);
    });
  } catch (e) {
    return '';
  }
}

async function bootstrapData(uid) {
  state.loading.initial = true;
  // Settings doc
  const settingsRef = doc(db, `users/${uid}/settings/default`);
  const settingsSnap = await getDoc(settingsRef);
  if (!settingsSnap.exists()) {
    const seed = { ...DEFAULT_SETTINGS };
    seed.logoBase64 = await fetchAssetAsDataUrl('assets/reputifly-logo-light.png');
    seed.paynowQrBase64 = await fetchAssetAsDataUrl('assets/paynow-qr.jpeg');
    await setDoc(settingsRef, seed);
    state.settings = seed;
  } else {
    state.settings = { ...DEFAULT_SETTINGS, ...settingsSnap.data() };
    if (!state.settings.defaultTerms) state.settings.defaultTerms = DEFAULT_TERMS;
    if (!state.settings.optionalFieldDefaults) state.settings.optionalFieldDefaults = DEFAULT_OPTIONAL;
  }

  // Counters
  await ensureCounter(uid, 'invoice', 'INV-', 4);
  await ensureCounter(uid, 'quotation', 'QINV-', 3);

  // Live listeners
  listeners.push(onSnapshot(doc(db, `users/${uid}/counters/invoice`), (s) => {
    state.counters.invoice = s.data() || null; render();
  }));
  listeners.push(onSnapshot(doc(db, `users/${uid}/counters/quotation`), (s) => {
    state.counters.quotation = s.data() || null; render();
  }));
  listeners.push(onSnapshot(settingsRef, (s) => {
    if (s.exists()) {
      state.settings = { ...DEFAULT_SETTINGS, ...s.data() };
      if (!state.settings.defaultTerms) state.settings.defaultTerms = DEFAULT_TERMS;
      if (!state.settings.optionalFieldDefaults) state.settings.optionalFieldDefaults = DEFAULT_OPTIONAL;
      render();
    }
  }));

  // Quotations
  listeners.push(onSnapshot(
    query(collection(db, `users/${uid}/quotations`), orderBy('createdAt', 'desc')),
    (snap) => {
      state.quotations.clear();
      snap.forEach(d => state.quotations.set(d.id, { id: d.id, ...d.data() }));
      render();
    }
  ));

  // Invoices
  listeners.push(onSnapshot(
    query(collection(db, `users/${uid}/invoices`), orderBy('number', 'desc')),
    (snap) => {
      state.invoices.clear();
      snap.forEach(d => state.invoices.set(d.id, { id: d.id, ...d.data() }));
      render();
    }
  ));

  state.loading.initial = false;
  initDraft();
  render();
}

  if (!snap.exists()) {
    await setDoc(ref, {
      value: 0,
      prefix, padding,
      updatedAt: serverTimestamp()
    });
  }
}
