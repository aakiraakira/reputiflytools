      await voidInvoice(d.id, inp.value);

      showToast(`${d.displayNumber} voided`);
    } catch (e) {
      showToast(e.message || 'Failed', 'error');
      ok.disabled = false;
    }
  });
}

// REGION: drawer-editor ─────────────────────────────────────────────
function openDrawer(kind, id) {
  state.drawer = { open: true, kind, id };
  renderDrawer();
  const drawer = document.getElementById('drawer');
  const scrim = document.getElementById('drawer-scrim');
  drawer.classList.add('open');
  scrim.classList.add('open');
  drawer.setAttribute('aria-hidden', 'false');
}
function closeDrawer() {
  state.drawer = { open: false, kind: null, id: null, showEmpty: false };
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-scrim').classList.remove('open');
  document.getElementById('drawer').setAttribute('aria-hidden', 'true');
}
document.getElementById('drawer-close').addEventListener('click', closeDrawer);
document.getElementById('drawer-scrim').addEventListener('click', closeDrawer);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

function renderDrawer() {
  if (!state.drawer.open) return;
  const { kind, id } = state.drawer;
  const map = kind === 'quotation' ? state.quotations : state.invoices;
  const d = map.get(id);
  if (!d) { closeDrawer(); return; }

  document.getElementById('drawer-title').innerHTML = `
    <span class="invoice-number-pill">${escapeHtml(d.displayNumber)}</span>
    <span style="font-weight: 500; color: var(--ink-muted); font-size: 13px;">${kind === 'quotation' ? 'Draft invoice' : 'Paid invoice'}</span>
  `;

  const body = document.getElementById('drawer-body');
  body.innerHTML = '';

  // ── CLIENT ────────────────────────────────────────────────────
  // Header row with the "Show empty" toggle (default: hide empties for cleaner view)
  if (state.drawer.showEmpty === undefined) state.drawer.showEmpty = false;
  const clientHead = document.createElement('div');
  clientHead.style.cssText = 'display:flex; justify-content:space-between; align-items:center; margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--hairline);';
  clientHead.innerHTML = `
    <span style="font-size:11px; font-weight:700; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-muted);">Client</span>
    <label style="display:flex; gap:6px; align-items:center; font-size:12px; color:var(--ink-muted); cursor:pointer; user-select:none;">
      <input type="checkbox" id="drawer-show-empty" ${state.drawer.showEmpty ? 'checked' : ''} style="accent-color:var(--ink); cursor:pointer;">
      Show empty
    </label>
  `;
  body.appendChild(clientHead);
  clientHead.querySelector('#drawer-show-empty').addEventListener('change', e => {
    state.drawer.showEmpty = e.target.checked;
    renderDrawer();
  });

  const grid = document.createElement('div'); grid.className = 'form-grid';
  const fields = [
    { key: 'name', label: 'Name', full: true, required: true },
    { key: 'attn', label: 'Attention to' },
    { key: 'email', label: 'Email' },
    { key: 'address', label: 'Address', full: true },
    { key: 'postal', label: 'Postal' }
  ];
  let hiddenCount = 0;
  fields.forEach(f => {
    const value = d.client?.[f.key] || '';
    // Hide empty optional fields when "Show empty" is off (always show name)
    if (!state.drawer.showEmpty && !value && !f.required) { hiddenCount++; return; }
    const row = document.createElement('div');
    row.className = 'form-row' + (f.full ? ' full' : '');
    row.innerHTML = `
      <label class="field-label">${escapeHtml(f.label)}${f.required ? ' *' : ''}</label>
      <input class="input" data-key="${f.key}" value="${escapeHtml(value)}" placeholder="${escapeHtml(f.label)}">
    `;
    grid.appendChild(row);
  });
  body.appendChild(grid);

  if (hiddenCount > 0) {
    const showAll = document.createElement('button');
    showAll.className = 'btn dashed sm';
    showAll.style.cssText = 'margin-top: 10px; font-size: 11.5px;';
    showAll.textContent = `+ ${hiddenCount} empty field${hiddenCount === 1 ? '' : 's'} hidden`;
    showAll.addEventListener('click', () => { state.drawer.showEmpty = true; renderDrawer(); });
    body.appendChild(showAll);
  }

  // ── META (only for drafts — paid invoices are locked) ─────────
  if (kind === 'quotation') {
    const sec2 = document.createElement('div'); sec2.className = 'section-title'; sec2.textContent = 'Issue date';
    body.appendChild(sec2);
    const meta = document.createElement('div'); meta.className = 'form-grid';
    meta.innerHTML = `
      <div class="form-row full">
        <input class="input" type="date" id="meta-issue" value="${escapeHtml(d.issueDate)}">
      </div>
    `;
    body.appendChild(meta);
  }

  // ITEMS
  const sec3 = document.createElement('div'); sec3.className = 'section-title'; sec3.textContent = 'Line items';
  body.appendChild(sec3);
  const itemsHost = document.createElement('div'); itemsHost.className = 'drawer-items'; itemsHost.id = 'drawer-items';
  body.appendChild(itemsHost);

  const editableItems = JSON.parse(JSON.stringify(d.items || []));
  function renderItems() {
    itemsHost.innerHTML = '';
    editableItems.forEach((it, idx) => {
      const r = document.createElement('div'); r.className = 'drawer-item';
      r.innerHTML = `
        <input class="input item-desc-input" placeholder="Description" data-k="description" value="${escapeHtml(it.description || '')}">
        <input class="input" type="number" min="0" step="0.01" data-k="qty" value="${it.qty}">
        <input class="input" type="number" min="0" step="0.01" data-k="rate" value="${it.rate}">
        <input class="input" disabled value="${escapeHtml(fmtMoney((Number(it.qty)||0)*(Number(it.rate)||0)))}">
        <button class="icon-btn" title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      `;
      r.querySelectorAll('input').forEach(inp => {
        inp.addEventListener('input', () => {
          const k = inp.dataset.k;
          if (!k) return;
          if (k === 'qty' || k === 'rate') it[k] = Number(inp.value) || 0;
          else it[k] = inp.value;
          // recompute amount only
          r.children[3].value = fmtMoney((Number(it.qty)||0) * (Number(it.rate)||0));
        });
      });
      r.querySelector('button.icon-btn').addEventListener('click', () => {
        if (editableItems.length === 1) { showToast('Need at least one item', 'warn'); return; }
        editableItems.splice(idx, 1); renderItems();
      });
      itemsHost.appendChild(r);
    });
  }
  renderItems();
  const addBtn = document.createElement('button');
  addBtn.className = 'btn dashed sm'; addBtn.textContent = '+ Add line item';
  addBtn.style.alignSelf = 'flex-start'; addBtn.style.marginTop = '6px';
  addBtn.addEventListener('click', () => {
    editableItems.push({ description: '', qty: 1, rate: 0, amount: 0 }); renderItems();
  });
  body.appendChild(addBtn);

  // FOOT
  const foot = document.getElementById('drawer-foot');
  foot.innerHTML = '';
  const left = document.createElement('div'); left.className = 'actions';
  if (kind === 'quotation' && d.status !== 'converted') {
    const conv = document.createElement('button'); conv.className = 'btn'; conv.textContent = 'Mark as paid';
    conv.addEventListener('click', () => promptConvert(d));
    left.appendChild(conv);
    const del = document.createElement('button'); del.className = 'btn danger'; del.textContent = 'Delete';
    del.addEventListener('click', () => promptDelete(d));
    left.appendChild(del);
  }
  if (kind === 'invoice' && d.status !== 'void') {
    const v = document.createElement('button'); v.className = 'btn danger'; v.textContent = 'Void';
    v.addEventListener('click', () => promptVoid(d));
    left.appendChild(v);
  }

  const right = document.createElement('div'); right.className = 'actions';
  const pdfBtn = document.createElement('button'); pdfBtn.className = 'btn'; pdfBtn.textContent = 'Download PDF';
  pdfBtn.addEventListener('click', () => downloadPdf(d, d.terms ? 'invoice-with-terms' : 'invoice'));
  const saveBtn = document.createElement('button'); saveBtn.className = 'btn primary'; saveBtn.textContent = 'Save changes';
  saveBtn.addEventListener('click', async () => {
    saveBtn.disabled = true;
    try {
      // Collect client fields
      const client = {};
      body.querySelectorAll('[data-key]').forEach(i => client[i.dataset.key] = i.value.trim());
      if (!client.name) { showToast('Name is required', 'warn'); saveBtn.disabled = false; return; }

      // Items
      const items = editableItems.filter(i => i.description || i.qty || i.rate).map(i => ({
        description: i.description || '',
        subtitle: i.subtitle || '',
        qty: Number(i.qty) || 0,
        rate: Number(i.rate) || 0,
        amount: +((Number(i.qty)||0) * (Number(i.rate)||0)).toFixed(2)
      }));
      const subtotal = +items.reduce((s, i) => s + i.amount, 0).toFixed(2);

      const patch = { client, items, subtotal, total: subtotal };
      if (kind === 'quotation') {
        const statusEl = document.getElementById('meta-status');
        const issueEl = document.getElementById('meta-issue');
        if (statusEl) patch.status = statusEl.value;
        if (issueEl) patch.issueDate = issueEl.value;
        await updateQuotation(d.id, patch);
      } else {
        await updateInvoiceClient(d.id, patch);
      }
      showToast('Saved');
      closeDrawer();
    } catch (e) {
      showToast(e.message || 'Save failed', 'error');
    } finally {
      saveBtn.disabled = false;
    }
  });
  right.appendChild(pdfBtn);
  right.appendChild(saveBtn);

  foot.appendChild(left);
  foot.appendChild(right);
}

// REGION: pdf-render ────────────────────────────────────────────────
function pdfFilename(docData) {
  const num = (docData.displayNumber || 'INVOICE').replace(/\s+/g, '');
  const clientRaw = (docData.client?.name || '').toString();
  const client = clientRaw
    .replace(/[^\w\s-]/g, '')      // strip punctuation
    .trim()
    .replace(/\s+/g, '-')          // spaces → dashes
    .toUpperCase()
    .slice(0, 32);
  return client ? `${num}-${client}` : num;
}

async function downloadPdf(docData, variant /* 'invoice' | 'invoice-with-terms' */) {
  try { await document.fonts.ready; } catch {}
  const tpl = document.querySelector(`#tpl-${variant}`);
  if (!tpl) { showToast('PDF template missing', 'error'); return; }
  const clone = tpl.content.cloneNode(true);
  const root = document.createElement('div');
  root.appendChild(clone);

  bindPdfData(root, docData, variant);

  const filename = pdfFilename(docData);
  const html = buildIframeHtml(root.innerHTML, docData, filename);

  // Always render to the hidden iframe — useful for headless tests + parity check.
  const iframe = document.getElementById('print-iframe');
  if (iframe) {
    const idoc = iframe.contentDocument || iframe.contentWindow.document;
    idoc.open();
    idoc.write(html);
    idoc.close();
  }

  // Open in a new tab so the user gets a real print dialog and the document
  // title becomes the suggested PDF filename. Works on mobile too — the user
  // can use the browser's built-in "Save as PDF" / share-sheet flow.
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const w = window.open(url, '_blank');
  if (!w) {
    showToast('Pop-ups blocked — allow them to download', 'warn');
    URL.revokeObjectURL(url);
    return;
  }
  // Once the new tab loads, trigger its print dialog automatically.
  // Then revoke the blob URL once the user closes it.
  setTimeout(() => URL.revokeObjectURL(url), 60000);
  showToast('PDF opened — use Save as PDF in the print dialog');
}

function bindPdfData(root, d, variant) {
  const settings = state.settings || DEFAULT_SETTINGS;
  const s = settings.company || {};
  const isInvoice = (d.displayNumber || '').startsWith('INV-');

  // Smart address split: roughly first half / second half by comma boundary
  const addrParts = (s.address || '').split(',').map(p => p.trim()).filter(Boolean);
  const splitAt = Math.ceil(addrParts.length / 2);
  const addr1 = addrParts.slice(0, splitAt).join(', ');
  const addr2 = addrParts.slice(splitAt).join(', ');

  const data = {
    'logo': settings.logoBase64 || 'assets/reputifly-logo-light.png',
    'qr': settings.paynowQrBase64 || 'assets/paynow-qr.jpeg',
    'docTitle': 'Invoice',
    'displayNumber': d.displayNumber || '',
    'dateLabel': 'Issued',
    'issueDate': fmtDate(d.issueDate),
    'company.name': s.name || '',
    'company.uenLine': s.uen ? `UEN ${s.uen}` : '',
    'company.address1': addr1,
    'company.address2': addr2,
    'company.email': s.email || '',
    'client.name': d.client?.name || '',
    'client.attn': d.client?.attn ? `Attn: ${d.client.attn}` : '',
    'client.address': d.client?.address || '',
    'client.postal': d.client?.postal || '',
    'client.email': d.client?.email || '',
    'subtotal': fmtMoney(d.subtotal),
    'total': fmtMoney(d.total),
    'payAmount': fmtMoney(d.total),
    'payPayee': s.name || '',
    'payUen': s.uen || '',
    'payRef': d.displayNumber || '',
    'payNote': 'Scan the QR with your banking app, or transfer via PayNow / FAST quoting the reference above.',
    'footerThanks': 'Thank you for your business.',
    'footerContact': variant === 'invoice-with-terms' ? 'Continued on next page →' : `Questions? ${s.email || ''}`,
    'footerWordmark': variant === 'invoice-with-terms' ? 'REPUTIFLY · 1 / 2' : (s.name || 'REPUTIFLY').split(' ')[0].toUpperCase(),
    'termsRef': `${d.displayNumber} · ${fmtDate(d.issueDate)}`,
    'termsTitle': d.terms?.title || (settings.defaultTerms?.title || DEFAULT_TERMS.title),
    'termsSubtitle': d.terms?.subtitle || (settings.defaultTerms?.subtitle || DEFAULT_TERMS.subtitle),
    'footerThanks2': 'Thank you for your business.',
    'footerContact2': `Questions? ${s.email || ''}`
  };

  // Bind text nodes
  root.querySelectorAll('[data-bind]').forEach(el => {
    const key = el.getAttribute('data-bind');
    if (key === 'logo' || key === 'qr') {
      el.setAttribute('src', data[key] || '');
      return;
    }
    if (key === 'items') {
      // build item rows
      el.innerHTML = '';
      (d.items || []).forEach(item => {
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
          <div class="item-desc">
            ${escapeHtml(item.description || '')}
            ${item.subtitle ? `<small>${escapeHtml(item.subtitle)}</small>` : ''}
          </div>
          <div class="item-num muted">${item.qty}</div>
          <div class="item-num">${escapeHtml(fmtMoney(item.rate))}</div>
          <div class="item-num">${escapeHtml(fmtMoney(item.amount))}</div>
        `;
        el.appendChild(row);
      });
      return;
    }
    if (key === 'termsSections') {
      el.innerHTML = '';
      const sections = d.terms?.sections || (settings.defaultTerms?.sections) || DEFAULT_TERMS.sections;
      sections.forEach((sec, i) => {
        const sd = document.createElement('div');
        sd.className = 'terms-section';
        const paras = (sec.body || '').split(/\n\n+/).map(p => `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`).join('');
        sd.innerHTML = `
          <div class="head">
            <span class="num">${String(i + 1).padStart(2, '0')}</span>
            <h3>${escapeHtml(sec.heading || '')}</h3>
          </div>
          ${paras}
        `;
        el.appendChild(sd);
      });
      return;
    }
    el.textContent = data[key] != null ? data[key] : '';
  });

  // Strip empty optional fields
  const optMap = (d.optional && Object.keys(d.optional).length) ? d.optional : (settings.optionalFieldDefaults || DEFAULT_OPTIONAL);
  root.querySelectorAll('[data-optional]').forEach(el => {
    const key = el.getAttribute('data-optional');
    const visible = optMap[key];
    let textOk = true;
    if (el.hasAttribute('data-bind')) {
      const v = el.textContent.trim();
      if (!v || v === 'Attn:') textOk = false;
    }
    if (visible === false || !textOk) el.remove();
  });
}

function buildIframeHtml(innerHtml, d, filename) {
  // Inline the same CSS as the standalone templates so the iframe document
  // is byte-identical-class to the standalone invoice templates.
  const css = INVOICE_CSS;
  const title = filename || (d.displayNumber || 'Invoice');
  // The auto-print snippet runs once the page has loaded + fonts are ready,
  // so the user immediately gets the browser's Save-as-PDF dialog when this
  // HTML is opened in a fresh tab. The page's <title> becomes the default
  // filename suggestion.
  const autoPrint = `
    <script>
      (async function() {
        try { await document.fonts && document.fonts.ready; } catch(e){}
        // Wait one frame so layout is fully settled
        requestAnimationFrame(() => setTimeout(() => {
          try { window.focus(); window.print(); } catch(e){}
        }, 350));
      })();
    <\/script>`;
  return `<!DOCTYPE html><html><head><meta charset="utf-8">
    <title>${escapeHtml(title)}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>${css}</style></head><body>${innerHtml}${autoPrint}</body></html>`;
}

.total-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 4px; font-size: 13px; font-variant-numeric: tabular-nums; }
.total-row .label { color: var(--ink-muted); font-weight: 500; }
.total-row .value { color: var(--ink); font-weight: 600; }
.total-row.grand { margin-top: 8px; padding: 18px 4px 6px; border-top: 1px solid var(--hairline-strong); }
.total-row.grand .label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); }
.total-row.grand .value { font-size: 26px; font-weight: 800; letter-spacing: -0.025em; color: var(--ink); }
.payment { display: grid; grid-template-columns: 168px 1fr; gap: 28px; background: #F2F2F2; border-radius: var(--r-xl); padding: 24px 28px; margin-top: 28px; align-items: center; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03); }
.qr-wrap { width: 168px; height: 168px; background: white; border-radius: var(--r-md); padding: 10px; box-shadow: 0 0 0 1px var(--hairline-strong), 0 6px 18px -10px rgba(0,0,0,0.12); display: flex; align-items: center; justify-content: center; }
.qr-wrap svg, .qr-wrap img { width: 100%; height: 100%; display: block; object-fit: contain; }
.payment-info { display: flex; flex-direction: column; gap: 4px; }
.payment-info .label-pill { background: white; align-self: flex-start; }
.pay-amount { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; color: var(--ink); margin-top: 14px; line-height: 1; font-variant-numeric: tabular-nums; }
.pay-payee { font-size: 17px; font-weight: 700; letter-spacing: -0.015em; color: var(--ink); margin-top: 8px; }
.pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 32px; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.07); }
.pay-field { display: flex; flex-direction: column; gap: 2px; font-variant-numeric: tabular-nums; }
.pay-field .k { font-size: 9.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); }
.pay-field .v { font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: -0.005em; }
.pay-note { margin-top: 14px; font-size: 11.5px; color: var(--ink-muted); line-height: 1.55; font-weight: 500; }
.foot { margin-top: auto; padding-top: 22px; border-top: 1px solid var(--hairline); display: flex; justify-content: space-between; align-items: flex-end; }
.thanks { font-size: 14px; color: var(--ink); font-weight: 700; letter-spacing: -0.015em; }
.thanks small { display: block; font-size: 11.5px; color: var(--ink-muted); font-weight: 500; letter-spacing: 0; margin-top: 3px; }
.wordmark { font-size: 9.5px; font-weight: 700; letter-spacing: 0.32em; color: var(--ink-faint); text-transform: uppercase; }
.terms-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 24px; border-bottom: 1px solid var(--hairline); }
.terms-header .brand-logo { height: 30px; }
.terms-ref { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.terms-ref .ref-pill { display: inline-block; background: var(--surface-soft); color: var(--ink-muted); font-size: 9.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; padding: 6px 11px; border-radius: var(--pill); }
.terms-ref .ref-num { font-size: 12px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
.terms-intro { margin-top: 32px; display: flex; flex-direction: column; gap: 8px; }
.terms-title { font-size: 38px; font-weight: 800; letter-spacing: -0.04em; line-height: 1.05; color: var(--ink); }
.terms-subtitle { font-size: 13.5px; color: var(--ink-muted); font-weight: 500; line-height: 1.55; max-width: 520px; }
.terms-card { margin-top: 28px; background: var(--surface-soft); border-radius: var(--r-xl); padding: 28px 30px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03); display: flex; flex-direction: column; }
.terms-section { padding: 22px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
.terms-section:first-child { padding-top: 4px; }
.terms-section:last-child { padding-bottom: 4px; border-bottom: none; }
.terms-section .head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
.terms-section .num { font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
.terms-section h3 { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.015em; }
.terms-section p, .terms-section li { font-size: 13px; color: var(--ink-soft); line-height: 1.65; font-weight: 500; }
.terms-section p + p { margin-top: 8px; }
@media print { html, body { background: white; padding: 0; } body { padding: 0; gap: 0; } .page { box-shadow: none; border-radius: 0; width: 210mm; min-height: 297mm; } }
@page { size: A4; margin: 0; }
`;

// REGION: advanced-tab ──────────────────────────────────────────────
function renderAdvancedTab() {
  const host = document.getElementById('advanced-stack');
  if (state.route !== 'advanced') return;
  const s = state.settings || DEFAULT_SETTINGS;

  host.innerHTML = '';

  // ─── Brand & company info ───
  const brand = document.createElement('div'); brand.className = 'adv-card';
  brand.innerHTML = `
    <h2>Brand &amp; company</h2>
    <div class="adv-card-sub">Visible on every invoice (draft and paid).</div>
    <div class="adv-row" style="margin-bottom: 14px;">
      <div class="form-row">
        <label class="field-label">Company name</label>
        <input class="input" data-cf="name" value="${escapeHtml(s.company.name || '')}">
      </div>
      <div class="form-row">
        <label class="field-label">UEN</label>
        <input class="input" data-cf="uen" value="${escapeHtml(s.company.uen || '')}">
      </div>
    </div>
    <div class="adv-row" style="margin-bottom: 14px;">
      <div class="form-row">
        <label class="field-label">Address</label>
        <input class="input" data-cf="address" value="${escapeHtml(s.company.address || '')}">
      </div>
      <div class="form-row">
        <label class="field-label">Email</label>
        <input class="input" data-cf="email" value="${escapeHtml(s.company.email || '')}">
      </div>
    </div>
    <div class="adv-row">
      <label class="upload-zone">
        <input type="file" accept="image/png,image/jpeg" data-upload="logoBase64">
        <div class="upload-preview"><img src="${escapeHtml(s.logoBase64 || 'assets/reputifly-logo-light.png')}" alt="logo"></div>
        <div class="upload-info">
          <span class="upload-title">Logo</span>
          <span class="upload-meta">PNG or JPG · max 200 KB</span>
        </div>
      </label>
      <label class="upload-zone">
        <input type="file" accept="image/png,image/jpeg" data-upload="paynowQrBase64">
        <div class="upload-preview"><img src="${escapeHtml(s.paynowQrBase64 || 'assets/paynow-qr.jpeg')}" alt="QR"></div>
        <div class="upload-info">
          <span class="upload-title">PayNow QR</span>
          <span class="upload-meta">PNG or JPG · max 200 KB</span>
        </div>
      </label>
    </div>
    <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px;">
      <button class="btn primary" id="save-brand">Save brand</button>
    </div>
  `;
  host.appendChild(brand);

  brand.querySelectorAll('input[type="file"][data-upload]').forEach(input => {
    input.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      if (!['image/png', 'image/jpeg'].includes(file.type)) {
        showToast('Only PNG or JPEG accepted', 'error'); return;
      }
      if (file.size > 200 * 1024) {
        showToast('File too large (max 200 KB)', 'error'); return;
      }
      const reader = new FileReader();
      reader.onload = async () => {
        await saveSettings({ [input.dataset.upload]: reader.result });
        showToast('Asset uploaded');
      };
      reader.readAsDataURL(file);
    });
  });
  brand.querySelector('#save-brand').addEventListener('click', async () => {
    const company = { ...s.company };
    brand.querySelectorAll('[data-cf]').forEach(i => company[i.dataset.cf] = i.value.trim());
    await saveSettings({ company });
    showToast('Brand saved');
  });

  // ─── Default Terms editor ───
  const terms = document.createElement('div'); terms.className = 'adv-card';
  const t = s.defaultTerms || DEFAULT_TERMS;
  terms.innerHTML = `
    <h2>Default Terms</h2>
    <div class="adv-card-sub">Used as the second-page terms when "Include terms" is enabled.</div>
    <div class="adv-row" style="margin-bottom: 14px;">
      <div class="form-row">
        <label class="field-label">Title</label>
        <input class="input" id="terms-title" value="${escapeHtml(t.title || '')}">
      </div>
      <div class="form-row">
        <label class="field-label">Subtitle</label>
        <input class="input" id="terms-subtitle" value="${escapeHtml(t.subtitle || '')}">
      </div>
    </div>
    <div class="terms-editor" id="terms-editor"></div>
    <div style="display: flex; gap: 10px; justify-content: space-between; margin-top: 14px; flex-wrap: wrap;">
      <button class="btn dashed" id="add-section">+ Add section</button>
      <div style="display: flex; gap: 10px;">
        <button class="btn" id="preview-terms">Preview page 2</button>
        <button class="btn primary" id="save-terms">Save terms</button>
      </div>
    </div>
  `;
  host.appendChild(terms);

  const editor = terms.querySelector('#terms-editor');
  const sections = JSON.parse(JSON.stringify(t.sections || []));

  function renderTerms() {
    editor.innerHTML = '';
    sections.forEach((sec, idx) => {
      const card = document.createElement('div'); card.className = 'terms-section-card';
      card.draggable = true;
      card.innerHTML = `
        <div class="num-rail">${String(idx + 1).padStart(2, '0')}</div>
        <div class="body-col">
          <input class="input compact heading-input" placeholder="Heading" value="${escapeHtml(sec.heading || '')}">
          <textarea class="textarea body-input" placeholder="Body — split paragraphs with blank line">${escapeHtml(sec.body || '')}</textarea>
        </div>
        <div class="reorder-col">
          <button class="icon-btn up" title="Move up">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
          </button>
          <button class="icon-btn down" title="Move down">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
        </div>
        <div class="delete-col">
          <button class="icon-btn del" title="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          </button>
        </div>
      `;
      card.querySelector('.heading-input').addEventListener('input', (e) => sec.heading = e.target.value);
      card.querySelector('.body-input').addEventListener('input', (e) => sec.body = e.target.value);
      card.querySelector('.up').addEventListener('click', () => {
        if (idx === 0) return;
        [sections[idx - 1], sections[idx]] = [sections[idx], sections[idx - 1]];
        renderTerms();
      });
      card.querySelector('.down').addEventListener('click', () => {
        if (idx === sections.length - 1) return;
        [sections[idx + 1], sections[idx]] = [sections[idx], sections[idx + 1]];
        renderTerms();
      });
      card.querySelector('.del').addEventListener('click', () => {
        sections.splice(idx, 1); renderTerms();
      });
      // HTML5 DnD
      card.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', String(idx)); card.style.opacity = '0.5'; });
      card.addEventListener('dragend', () => { card.style.opacity = '1'; });
      card.addEventListener('dragover', (e) => e.preventDefault());
      card.addEventListener('drop', (e) => {
        e.preventDefault();
        const from = Number(e.dataTransfer.getData('text/plain'));
        if (from === idx) return;
        const [moved] = sections.splice(from, 1);
        sections.splice(idx, 0, moved);
        renderTerms();
      });
      editor.appendChild(card);
    });
  }
  renderTerms();

  terms.querySelector('#add-section').addEventListener('click', () => {
    sections.push({ heading: 'New Section', body: '' }); renderTerms();
  });
  terms.querySelector('#save-terms').addEventListener('click', async () => {
    const newTerms = {
      title: terms.querySelector('#terms-title').value,
      subtitle: terms.querySelector('#terms-subtitle').value,
      sections
    };
    await saveSettings({ defaultTerms: newTerms });
    showToast('Terms saved');
  });
  terms.querySelector('#preview-terms').addEventListener('click', () => {
    // Render the with-terms variant into a stand-alone HTML page and open in a new tab.
    const dummy = {
      displayNumber: 'PREVIEW',
      issueDate: todayIso(),
      client: { name: 'Preview Client', address: 'Preview Address', email: 'preview@example.com' },
      items: [{ description: 'Preview item', qty: 1, rate: 0, amount: 0 }],
      subtotal: 0, total: 0,
      terms: {
        title: terms.querySelector('#terms-title').value,
        subtitle: terms.querySelector('#terms-subtitle').value,
        sections
      }
    };
    const tpl = document.querySelector('#tpl-invoice-with-terms');
    if (!tpl) { showToast('Template missing', 'error'); return; }
    const clone = tpl.content.cloneNode(true);
    const root = document.createElement('div');
    root.appendChild(clone);
    bindPdfData(root, dummy, 'invoice-with-terms');
    const html = buildIframeHtml(root.innerHTML, dummy);
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const w = window.open(url, '_blank');
    if (!w) showToast('Pop-ups blocked — allow them to preview', 'warn');
    setTimeout(() => URL.revokeObjectURL(url), 60000);
  });

  // ─── Export data ───
  const exp = document.createElement('div'); exp.className = 'adv-card';
  exp.innerHTML = `
    <h2>Export &amp; backup</h2>
    <div class="adv-card-sub">Download a JSON snapshot of every collection in this account.</div>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
      <button class="btn primary" id="export-all">Export all data (JSON)</button>
    </div>
  `;
  host.appendChild(exp);
  exp.querySelector('#export-all').addEventListener('click', async () => {
    const dump = {
      exportedAt: new Date().toISOString(),
      settings: state.settings,
      counters: state.counters,
      quotations: Array.from(state.quotations.values()),
      invoices: Array.from(state.invoices.values())
    };
    const blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `reputifly-accounting-${todayIso()}.json`;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    showToast('Export downloaded');
  });

  // ─── Sign out / advanced ───
  const danger = document.createElement('div'); danger.className = 'adv-card';
  danger.innerHTML = `
    <h2>Account</h2>
    <div class="adv-card-sub">Signed in as <strong>${escapeHtml(state.user?.email || '—')}</strong>${DEV_MODE ? ' (DEV MODE)' : ''}.</div>
    <div style="display: flex; gap: 10px;">
      <button class="btn" id="signout-2">Sign out</button>
    </div>
  `;
  host.appendChild(danger);
  danger.querySelector('#signout-2').addEventListener('click', async () => {
    if (DEV_MODE) { location.reload(); return; }
    await signOut(auth);
  });
}

// REGION: search-input wiring ───────────────────────────────────────
const debouncedSearch = debounce((kind, val) => {
  state.search[kind] = val;
  state.page[kind] = 1;
  renderList(kind);
}, 120);

document.getElementById('search-quotations').addEventListener('input', (e) => debouncedSearch('quotations', e.target.value));
document.getElementById('search-invoices').addEventListener('input', (e) => debouncedSearch('invoices', e.target.value));

document.getElementById('new-quotation-btn').addEventListener('click', () => {
  initDraft();
  state.draft.mode = 'quotation';
  setRoute('creation');
});

document.getElementById('new-library-btn').addEventListener('click', () => promptLibraryEdit(null));

// REGION: master render ─────────────────────────────────────────────
function render() {
  // Render whichever view is active
  if (state.route === 'creation') {
    renderCreationTab();
  }
  if (state.route === 'quotations') {
    renderList('quotations');
  }
  if (state.route === 'invoices') {
    renderInvoiceNumbering();
    renderList('invoices');
  }
  if (state.route === 'library') {
    renderLibraryTab();
  }
  if (state.route === 'advanced') {
    renderAdvancedTab();
  }
  // Drawer is route-independent
  renderDrawer();
}

// REGION: library-tab ───────────────────────────────────────────────
async function saveLibraryItem(item) {
  const lib = (state.settings?.lineItemLibrary || []).slice();
  const idx = item.id ? lib.findIndex(l => l.id === item.id) : -1;
  if (idx >= 0) lib[idx] = item;
  else { item.id = 'lib-' + Math.random().toString(36).slice(2, 9); lib.push(item); }
  await saveSettings({ lineItemLibrary: lib });
}
async function deleteLibraryItem(id) {
  const lib = (state.settings?.lineItemLibrary || []).filter(l => l.id !== id);
  await saveSettings({ lineItemLibrary: lib });
}

function renderLibraryTab() {
  const host = document.getElementById('library-list');
  if (!host) return;
  const lib = state.settings?.lineItemLibrary || [];
  host.innerHTML = '';

  if (!lib.length) {
    const e = document.createElement('div');
    e.className = 'empty';
    e.innerHTML = `<div class="empty-title">No saved items yet</div>Click <strong>New item</strong> to save a reusable line item.`;
    host.appendChild(e);
  } else {
    const head = document.createElement('div');
    head.className = 'list-head';
    head.style.gridTemplateColumns = '1fr 80px 110px 110px 60px';
    head.innerHTML = `<span>Description</span><span>Qty</span><span>Rate</span><span>Amount</span><span></span>`;
    host.appendChild(head);

    lib.forEach(it => {
      const row = document.createElement('div');
      row.className = 'list-row';
      row.style.gridTemplateColumns = '1fr 80px 110px 110px 60px';
      const amount = (Number(it.qty) || 0) * (Number(it.rate) || 0);
      row.innerHTML = `
        <div class="list-cell-client">
          <span class="client-name">${escapeHtml(it.description || '')}</span>
          ${it.subtitle ? `<span class="client-meta">${escapeHtml(it.subtitle)}</span>` : ''}
        </div>
        <div class="list-cell-num-r">${escapeHtml(String(it.qty))}</div>
        <div class="list-cell-num-r">${escapeHtml(fmtMoney(it.rate))}</div>
        <div class="list-cell-num-r">${escapeHtml(fmtMoney(amount))}</div>
        <div class="list-cell-actions">
          <button class="icon-btn" title="More" aria-label="More">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
        </div>
      `;
      row.addEventListener('click', e => {
        if (e.target.closest('.list-cell-actions')) return;
        promptLibraryEdit(it);
      });
      row.querySelector('.list-cell-actions button').addEventListener('click', e => {
        e.stopPropagation();
        const items = [
          { label: 'Edit', fn: () => promptLibraryEdit(it) },
          { label: 'Add to current draft', fn: () => addLibraryItemToDraft(it) },
          { label: 'Delete', fn: () => promptLibraryDelete(it), danger: true }
        ];
        if (window.innerWidth <= 760) openBottomSheet(items, it.description);
        else openRowPopover(e.currentTarget, items);
      });
      host.appendChild(row);
    });
  }
}

function promptLibraryEdit(item) {
  const editing = item ? { ...item } : { description: '', subtitle: '', qty: 1, rate: 0 };
  const scrim = document.getElementById('modal-scrim');
  const card = document.getElementById('modal-card');
  card.innerHTML = '';
  const h = document.createElement('h3');
  h.textContent = item ? `Edit "${item.description || 'item'}"` : 'New library item';
  const p = document.createElement('p');
  p.textContent = 'Saved items can be added to any invoice draft with one tap.';
  card.appendChild(h); card.appendChild(p);

  const f = document.createElement('div'); f.className = 'form-grid';
  f.innerHTML = `
    <div class="form-row full"><label class="field-label">Description *</label><input class="input" data-k="description" value="${escapeHtml(editing.description || '')}"></div>
    <div class="form-row full"><label class="field-label">Subtitle (optional)</label><input class="input" data-k="subtitle" value="${escapeHtml(editing.subtitle || '')}"></div>
    <div class="form-row"><label class="field-label">Qty</label><input class="input" type="number" min="0" step="0.01" inputmode="decimal" data-k="qty" value="${editing.qty}"></div>
    <div class="form-row"><label class="field-label">Rate (S$)</label><input class="input" type="number" min="0" step="0.01" inputmode="decimal" data-k="rate" value="${editing.rate}"></div>
  `;
  card.appendChild(f);

  const actions = document.createElement('div'); actions.className = 'modal-actions';
  const cancel = document.createElement('button'); cancel.className = 'btn'; cancel.textContent = 'Cancel';
  const ok = document.createElement('button'); ok.className = 'btn primary'; ok.textContent = item ? 'Save' : 'Add to library';
  actions.appendChild(cancel); actions.appendChild(ok);
  card.appendChild(actions);
  scrim.classList.add('open');

  cancel.addEventListener('click', () => scrim.classList.remove('open'));
  ok.addEventListener('click', async () => {
    const data = item ? { id: item.id } : {};
    f.querySelectorAll('input[data-k]').forEach(i => {
      const k = i.dataset.k;
      data[k] = (k === 'qty' || k === 'rate') ? Number(i.value) || 0 : i.value.trim();
    });
    if (!data.description) { showToast('Description is required', 'warn'); return; }
    ok.disabled = true;
    try { await saveLibraryItem(data); scrim.classList.remove('open'); showToast('Saved'); }
    catch (e) { showToast(e.message || 'Save failed', 'error'); ok.disabled = false; }
  });
}

function promptLibraryDelete(item) {
  openModal({
    title: `Delete "${item.description}"?`,
    body: 'This removes the item from the library. Existing invoices that already used it stay unchanged.',
    okLabel: 'Delete', danger: true,
    onOk: async () => { await deleteLibraryItem(item.id); showToast('Deleted'); }
  });
}

function addLibraryItemToDraft(item) {
  if (!state.draft) initDraft();
  const d = state.draft;
  // If the only item is the empty placeholder, replace it; else append.
  const onlyEmpty = d.items.length === 1
    && !d.items[0].description && !d.items[0].subtitle
    && (Number(d.items[0].qty) || 0) === 1 && (Number(d.items[0].rate) || 0) === 0;
  const newItem = {
    description: item.description || '',
    subtitle: item.subtitle || '',
    qty: Number(item.qty) || 0,
    rate: Number(item.rate) || 0,
    amount: (Number(item.qty) || 0) * (Number(item.rate) || 0),
    showSubtitle: !!item.subtitle
  };
  if (onlyEmpty) d.items[0] = newItem; else d.items.push(newItem);
  recomputeTotals(d);
  setRoute('creation');
  showToast(`Added "${item.description}" to draft`);
}

// Initial route from hash
const hashRoute = location.hash.replace('#', '');
if (hashRoute && ROUTES[hashRoute]) setRoute(hashRoute);
else setRoute('creation');

// Re-render on viewport breakpoint changes so mobile/desktop switch is clean
let lastIsMobile = window.innerWidth <= 760;
window.addEventListener('resize', () => {
  const nowMobile = window.innerWidth <= 760;
  if (nowMobile !== lastIsMobile) {
    lastIsMobile = nowMobile;
    render();
  }
});

// Dev mode: auto-bootstrap on load
if (DEV_MODE) {
  bootstrapDev();
}

// Expose for verification harness
window.__reputifly = {
  setRoute, openDrawer, downloadPdf,
  getState: () => state,
  setDraftMode: (mode) => { state.draft.mode = mode; render(); },
  forceRender: () => render(),
  isDev: DEV_MODE,
  // Test-only direct paths so headless audits can drive deletion without
  // navigating modals.
  _test_delete: async (id) => { await deleteQuotation(id); }
};

</script>
</body>
</html>
