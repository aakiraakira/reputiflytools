<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reputifly Accounting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════════
   DESIGN TOKENS  ·  identical ramp to the printed invoice templates
   ═══════════════════════════════════════════════════════════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:           #0A0A0A;
  --ink-soft:      #2B2B2B;
  --ink-muted:     #6B6B6B;
  --ink-faint:     #9E9E9E;
  --hairline:      #ECECEC;
  --hairline-strong: #DEDEDE;
  --surface:       #FFFFFF;
  --surface-soft:  #F6F6F6;
  --surface-card:  #F4F4F4;
  --paid:          #10B981;
  --due:           #F59E0B;
  --danger:        #EF4444;
  --info:          #3B82F6;

  --r-sm: 8px;
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 24px;
  --pill: 999px;

  --shadow-page: 0 30px 80px -28px rgba(0,0,0,0.22),
                 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-card: 0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
  --shadow-pop:  0 24px 48px -16px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.06);
}

html, body {
  background: #E8E8E8;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: var(--ink);
  line-height: 1.5;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ═══════════════════════════════════════════════════════════════════
   SHARED PRIMITIVES — match the invoice template language
   ═══════════════════════════════════════════════════════════════════ */
.label-pill {
  display: inline-block;
  align-self: flex-start;
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  background: var(--surface-soft);
  padding: 6px 11px;
  border-radius: var(--pill);
}

.invoice-number-pill {
  display: inline-block;
  background: var(--ink);
  color: white;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.05em;
  padding: 7px 14px;
  border-radius: var(--pill);
  font-variant-numeric: tabular-nums;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 6px 11px;
  border-radius: var(--pill);
  background: white;
  color: var(--ink-soft);
  border: 1px solid var(--hairline-strong);
  white-space: nowrap;
}
.status-pill .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ink-faint);
}
.status-pill.draft   .dot { background: var(--ink-faint); }
.status-pill.sent    { color: #92400E; background: #FEF3C7; border-color: rgba(245,158,11,0.35); }
.status-pill.sent    .dot { background: var(--due); box-shadow: 0 0 0 3px rgba(245,158,11,0.18); }
.status-pill.accepted    { color: #065F46; background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.35); }
.status-pill.accepted    .dot { background: var(--paid); }
.status-pill.converted   { background: var(--ink); color: white; border-color: var(--ink); }
.status-pill.converted   .dot { background: white; }
.status-pill.cancelled   { color: var(--ink-muted); text-decoration: line-through; }
.status-pill.paid    { color: #065F46; background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.35); }
.status-pill.paid    .dot { background: var(--paid); box-shadow: 0 0 0 3px rgba(16,185,129,0.18); }
.status-pill.void    { color: var(--danger); border-color: rgba(239,68,68,0.35); background: rgba(239,68,68,0.06); }
.status-pill.void    .dot { background: var(--danger); }

/* Inputs */
.input, .textarea, .select {
  width: 100%;
  font: inherit;
  font-size: 14px;
  color: var(--ink);
  background: var(--surface);
  border: 1px solid var(--hairline-strong);
  border-radius: var(--r-md);
  padding: 10px 12px;
  outline: none;
  transition: border-color 120ms ease, box-shadow 120ms ease;
}
.input:focus, .textarea:focus, .select:focus {
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(10,10,10,0.06);
}
.textarea { resize: vertical; min-height: 80px; line-height: 1.55; }
.input.compact { padding: 8px 10px; font-size: 13.5px; }
.input::placeholder, .textarea::placeholder { color: var(--ink-faint); }

.field-label {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 6px;
  display: block;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
  padding: 10px 16px;
  border-radius: var(--pill);
  border: 1px solid var(--hairline-strong);
  background: white;
  color: var(--ink);
  cursor: pointer;
  transition: background 120ms ease, border-color 120ms ease, transform 80ms ease, color 120ms ease;
  white-space: nowrap;
}
.btn:hover { background: var(--surface-soft); }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn.primary {
  background: var(--ink);
  color: white;
  border-color: var(--ink);
}
.btn.primary:hover { background: #1f1f1f; }

.btn.ghost {
  background: transparent;
  border-color: transparent;
  color: var(--ink-muted);
}
.btn.ghost:hover { color: var(--ink); background: var(--surface-soft); }

.btn.danger {
  background: white;
  border-color: rgba(239,68,68,0.4);
  color: var(--danger);
}
.btn.danger:hover { background: rgba(239,68,68,0.06); }

.btn.dashed {
  background: transparent;
  border: 1px dashed var(--hairline-strong);
  color: var(--ink-muted);
  font-weight: 500;
}
.btn.dashed:hover { color: var(--ink); border-color: var(--ink-muted); }

.btn.sm { padding: 6px 12px; font-size: 12px; }

.icon-btn {
  width: 32px; height: 32px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--pill);
  border: 1px solid transparent;
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: background 120ms ease, color 120ms ease;
}
.icon-btn:hover { background: var(--surface-soft); color: var(--ink); }
.icon-btn svg { width: 16px; height: 16px; }

/* ═══════════════════════════════════════════════════════════════════
   AUTH SCREEN
   ═══════════════════════════════════════════════════════════════════ */
.auth-screen {
  position: fixed; inset: 0;
  background: #E8E8E8;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  z-index: 1000;
}
.auth-card {
  width: 100%;
  max-width: 360px;
  background: var(--surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-page);
  padding: 36px 32px 32px;
  display: flex; flex-direction: column; align-items: center; gap: 24px;
}
.auth-card .auth-logo {
  height: 36px; width: auto;
}
.auth-card h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
  text-align: center;
}
.auth-card .auth-sub {
  font-size: 13px;
  color: var(--ink-muted);
  text-align: center;
  margin-top: -16px;
}
.auth-form {
  width: 100%;
  display: flex; flex-direction: column; gap: 12px;
}
.auth-form .input { font-size: 14px; }
.auth-form .btn { width: 100%; padding: 12px 16px; font-size: 14px; }
.auth-error {
  font-size: 12.5px;
  color: var(--danger);
  background: rgba(239,68,68,0.06);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: var(--r-sm);
  padding: 9px 12px;
  text-align: center;
  font-weight: 500;
}
.auth-foot {
  font-size: 11px;
  color: var(--ink-faint);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  font-weight: 700;
}
.auth-link {
  font-size: 12.5px;
  color: var(--ink-muted);
  text-align: center;
  cursor: pointer;
  text-decoration: underline;
  text-decoration-color: var(--hairline-strong);
  text-underline-offset: 3px;
}
.auth-link:hover { color: var(--ink); }

/* ═══════════════════════════════════════════════════════════════════
   APP CHROME — top bar + tabs
   ═══════════════════════════════════════════════════════════════════ */
.app { min-height: 100vh; display: flex; flex-direction: column; }
.app[hidden] { display: none; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--hairline);
  padding: 14px 28px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 24px;
  position: sticky; top: 0; z-index: 50;
}
.topbar-brand { display: flex; align-items: center; gap: 12px; }
.topbar-brand img { height: 28px; }
.topbar-brand .product {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-faint);
  border-left: 1px solid var(--hairline-strong);
  padding-left: 12px;
}

.tabs {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px;
  background: var(--surface-soft);
  border-radius: var(--pill);
}
.tab-btn {
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.005em;
  padding: 8px 18px;
  border-radius: var(--pill);
  border: 0;
  background: transparent;
  color: var(--ink-muted);
  cursor: pointer;
  transition: background 140ms ease, color 140ms ease;
}
.tab-btn:hover { color: var(--ink); }
.tab-btn.active { background: var(--ink); color: white; }

.user-menu { justify-self: end; display: flex; align-items: center; gap: 12px; }
.user-email {
  font-size: 12.5px;
  color: var(--ink-muted);
  font-weight: 500;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Mobile tab dropdown */
.tab-dropdown {
  position: relative;
  display: none;
  width: 100%;
  max-width: 320px;
}
.tab-dropdown-trigger {
  width: 100%;
  font: inherit;
  font-size: 14px;
  font-weight: 600;
  background: var(--surface-soft);
  border: 1px solid var(--hairline-strong);
  border-radius: var(--pill);
  padding: 10px 16px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  color: var(--ink);
  cursor: pointer;
}
.tab-dropdown-menu {
  position: absolute;
  top: calc(100% + 6px); left: 0; right: 0;
  background: var(--surface);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-pop);
  padding: 6px;
  z-index: 60;
  display: none;
}
.tab-dropdown.open .tab-dropdown-menu { display: block; }
.tab-dropdown-item {
  width: 100%;
  text-align: left;
  font: inherit;
  font-size: 14px;
  font-weight: 500;
  background: transparent;
  border: 0;
  padding: 10px 12px;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--ink);
}
.tab-dropdown-item:hover { background: var(--surface-soft); }
.tab-dropdown-item.active { background: var(--ink); color: white; font-weight: 600; }

/* ═══════════════════════════════════════════════════════════════════
   MAIN LAYOUT
   ═══════════════════════════════════════════════════════════════════ */
.main {
  flex: 1;
  padding: 36px 21px 80px;  /* 25% less horizontal padding */
  display: flex;
  justify-content: center;
}
.view { width: 100%; max-width: 980px; }
.view[hidden] { display: none; }

.view-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 16px;
  margin-bottom: 20px;
}
.view-title {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--ink);
  line-height: 1.1;
}
.view-sub {
  font-size: 13px;
  color: var(--ink-muted);
  margin-top: 6px;
  font-weight: 500;
}

.toolbar {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

/* Inline numbering panel on the Invoices tab */
.invoice-numbering-panel {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  background: var(--surface);
  border: 1px solid var(--hairline);
  border-radius: var(--r-lg);
  padding: 14px 18px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.invoice-numbering-panel .ip-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.invoice-numbering-panel .ip-label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint);
}
.invoice-numbering-panel .ip-value {
  font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.015em;
  font-variant-numeric: tabular-nums;
}
.invoice-numbering-panel .ip-meta { font-size: 12px; color: var(--ink-muted); }
.invoice-numbering-panel .ip-edit {
  display: flex; gap: 8px; align-items: center; flex-shrink: 0;
}
.invoice-numbering-panel .ip-edit input {
  width: 88px;
  font: inherit; font-size: 14px; font-weight: 600;
  font-variant-numeric: tabular-nums;
  border: 1px solid var(--hairline-strong);
  border-radius: var(--r-sm);
  padding: 8px 12px;
  outline: none;
  color: var(--ink);
}
.invoice-numbering-panel .ip-edit input:focus { border-color: var(--ink); }
@media (max-width: 760px) {
  .invoice-numbering-panel {
    padding: 12px 14px;
    gap: 12px;
  }
  /* Stack vertically with header row + justified controls below */
  .invoice-numbering-panel .ip-info { flex: 1 1 100%; }
  .invoice-numbering-panel .ip-meta { display: none; }     /* drop the "2 on record" sub-line for cleaner mobile */
  .invoice-numbering-panel .ip-edit {
    flex: 1 1 100%;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
  }
  .invoice-numbering-panel .ip-edit input { width: 100%; }
  .invoice-numbering-panel .ip-edit .btn { padding: 9px 18px; }
}
.search-input {
  flex: 1;
  min-width: 220px;
  position: relative;
}
.search-input input {
  width: 100%;
  font: inherit;
  font-size: 13.5px;
  background: var(--surface);
  border: 1px solid var(--hairline-strong);
  border-radius: var(--pill);
  padding: 10px 14px 10px 38px;
  color: var(--ink);
  outline: none;
}
.search-input input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(10,10,10,0.04); }
.search-input::before {
  content: ''; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px;
  background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%239E9E9E' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'><circle cx='11' cy='11' r='7'/><path d='m21 21-4.3-4.3'/></svg>") no-repeat center/contain;
}

/* List card */
.list-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}
.list-row {
  display: grid;
  grid-template-columns: 110px 1fr 130px 130px 110px 60px;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--hairline);
  cursor: pointer;
  transition: background 100ms ease;
}
.list-row:last-child { border-bottom: 0; }
.list-row:hover { background: var(--surface-soft); }
.list-row.void { opacity: 0.6; }

.list-head {
  display: grid;
  grid-template-columns: 110px 1fr 130px 130px 110px 60px;
  gap: 16px;
  padding: 12px 20px;
  background: var(--surface-soft);
  border-bottom: 1px solid var(--hairline-strong);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-muted);
}
.list-head > span:nth-child(n+3) { text-align: right; }

.list-cell-num { font-variant-numeric: tabular-nums; font-weight: 600; font-size: 13.5px; }
.list-cell-client { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.list-cell-client .client-name { font-size: 14px; font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-cell-client .client-meta { font-size: 12px; color: var(--ink-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.list-cell-client .client-match { font-size: 11px; color: var(--ink-muted); }
.list-cell-client .client-match mark { background: rgba(245,158,11,0.25); color: var(--ink); padding: 0 2px; border-radius: 2px; }
.list-cell-num-r { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; font-size: 14px; }
.list-cell-date { text-align: right; font-variant-numeric: tabular-nums; font-size: 12.5px; color: var(--ink-muted); font-weight: 500; }
.list-cell-status { display: flex; justify-content: flex-end; }
.list-cell-actions { display: flex; justify-content: flex-end; }

.empty {
  padding: 60px 24px;
  text-align: center;
  color: var(--ink-muted);
  font-size: 14px;
}
.empty .empty-title { color: var(--ink); font-weight: 700; font-size: 16px; margin-bottom: 4px; }

.load-more {
  text-align: center;
  padding: 16px;
  background: var(--surface-soft);
  border-top: 1px solid var(--hairline);
  font-size: 12.5px;
  color: var(--ink-muted);
}
.load-more button { margin-left: 12px; }

/* ═══════════════════════════════════════════════════════════════════
   CREATION TAB — WYSIWYG editor
   ═══════════════════════════════════════════════════════════════════ */
.creation-wrap {
  width: 100%;
  max-width: 880px;
  margin: 0 auto;
}

.creation-intro {
  margin-bottom: 16px;
  padding: 0 4px;
}
.creation-intro-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.creation-intro-num {
  display: inline-block;
  background: var(--ink);
  color: white;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 3px 9px;
  border-radius: var(--pill);
  margin-left: 4px;
  font-variant-numeric: tabular-nums;
  vertical-align: 1px;
}
.creation-intro-sub {
  margin-top: 4px;
  font-size: 12.5px;
  color: var(--ink-muted);
  font-weight: 500;
}

.mode-toggle {
  display: inline-flex;
  align-items: center;
  padding: 4px;
  background: var(--surface-soft);
  border-radius: var(--pill);
  margin-bottom: 16px;
  position: relative;
}
.mode-toggle button {
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  background: transparent;
  border: 0;
  padding: 8px 22px;
  border-radius: var(--pill);
  color: var(--ink-muted);
  cursor: pointer;
  transition: color 140ms ease;
  position: relative;
  z-index: 2;
}
.mode-toggle button.active { color: white; }
.mode-toggle .mode-indicator {
  position: absolute;
  top: 4px; bottom: 4px;
  background: var(--ink);
  border-radius: var(--pill);
  transition: left 200ms cubic-bezier(0.4, 0, 0.2, 1), width 200ms cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 1;
}

.payment-date-inline {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-left: 16px;
  margin-bottom: 16px;
  padding: 6px 12px;
  background: var(--surface-soft);
  border-radius: var(--pill);
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-soft);
}
.payment-date-inline input {
  font: inherit;
  font-size: 13px;
  font-weight: 600;
  border: 0;
  background: transparent;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
  outline: none;
  width: 130px;
  cursor: pointer;
}

/* WYSIWYG page mirrors the printed page identically */
.editor-page {
  width: 100%;
  background: var(--surface);
  padding: 14mm 10.5mm;        /* 25% less horizontal padding */
  border-radius: 10px;
  box-shadow: var(--shadow-page);
  position: relative;
  display: flex;
  flex-direction: column;
}

.editor-page .header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding-bottom: 24px; border-bottom: 1px solid var(--hairline);
}
.editor-page .brand-col { display: flex; flex-direction: column; gap: 18px; }
.editor-page .brand-logo { height: 42px; width: auto; display: block; }
.editor-page .meta-col { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 14px; }

.editor-page .doc-title {
  font-size: 44px; font-weight: 800;
  letter-spacing: -0.045em; line-height: 1; color: var(--ink);
}
.editor-page .doc-num-pill {
  display: inline-block; background: var(--ink); color: white;
  font-size: 12px; font-weight: 600; letter-spacing: 0.05em;
  padding: 7px 14px; border-radius: var(--pill);
  font-variant-numeric: tabular-nums;
}
.editor-page .dates {
  display: flex; flex-direction: column; gap: 5px; font-size: 12.5px; font-variant-numeric: tabular-nums;
}
.editor-page .dates .row { display: flex; justify-content: flex-end; gap: 10px; align-items: center; }
.editor-page .dates .label { color: var(--ink-faint); font-weight: 500; min-width: 50px; text-align: right; }
.editor-page .dates input {
  font: inherit; border: 0; background: transparent; outline: none; text-align: right;
  font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 600; font-size: 12.5px; width: 130px;
}
.editor-page .dates input:focus { background: var(--surface-soft); border-radius: 4px; }

.editor-page .parties { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 28px; }
.editor-page .party-block { display: flex; flex-direction: column; gap: 10px; }
.editor-page .party-name {
  font-size: 17px; font-weight: 700; letter-spacing: -0.015em; color: var(--ink); line-height: 1.3;
}
.editor-page .party-detail { font-size: 12.5px; color: var(--ink-muted); line-height: 1.65; font-weight: 500; }
.editor-page .party-detail .line { display: block; }

/* Editable text */
.ce {
  outline: none;
  cursor: text;
  border-radius: 4px;
  padding: 1px 3px;
  margin: -1px -3px;
  transition: background 100ms ease;
}
.ce:hover { background: rgba(245,158,11,0.08); }
.ce:focus { background: rgba(10,10,10,0.04); }
.ce[data-empty="true"]::before {
  content: attr(data-placeholder);
  color: var(--ink-faint);
  font-weight: 400;
}

.optional-line {
  position: relative;
  display: block;
}
.optional-line .opt-x {
  position: absolute;
  left: -22px; top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--ink-faint);
  color: white;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  cursor: pointer;
  border: 0;
  opacity: 0;
  transition: opacity 100ms ease;
}
.optional-line:hover .opt-x { display: flex; opacity: 1; }
.optional-line .opt-x:hover { background: var(--danger); }

/* Items table — matches the invoice template */
.editor-page .items { margin-top: 30px; }
.editor-page .items-head {
  display: grid; grid-template-columns: 1fr 70px 120px 140px 28px;
  border-bottom: 1px solid var(--hairline-strong);
}
.editor-page .items-head > span {
  padding: 14px 14px;
  font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted);
}
.editor-page .items-head > span:nth-child(1) { padding-left: 4px; }
.editor-page .items-head > span:nth-child(n+2):not(:last-child) { text-align: right; }
.editor-page .items-head > span:nth-child(4) { padding-right: 4px; }

.editor-page .item-row {
  display: grid; grid-template-columns: 1fr 70px 120px 140px 28px;
  border-bottom: 1px solid var(--hairline);
  align-items: center;
}
.editor-page .item-row > div { padding: 16px 14px; }
.editor-page .item-row > .item-desc { padding-left: 4px; }
.editor-page .item-row > .item-num { padding-right: 4px; }
.editor-page .item-row > .item-num:not(:nth-last-child(2)) { padding-right: 14px; }

.editor-page .item-desc { font-size: 14.5px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
.editor-page .item-desc .item-sub {
  display: block;
  margin-top: 3px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-muted);
  letter-spacing: 0;
}
.editor-page .item-num {
  font-size: 14px; font-variant-numeric: tabular-nums; text-align: right;
  color: var(--ink); font-weight: 500;
}
.editor-page .item-num.muted { color: var(--ink-muted); }
.editor-page .item-num input {
  font: inherit; font-size: 14px; font-variant-numeric: tabular-nums;
  background: transparent; border: 0; outline: none; text-align: right;
  width: 100%; color: inherit; font-weight: inherit;
}
.editor-page .item-num input:focus { background: rgba(10,10,10,0.04); border-radius: 4px; }
.editor-page .item-row .row-trash {
  display: flex; align-items: center; justify-content: center;
  padding: 0;
}
.editor-page .item-row .row-trash button {
  border: 0; background: transparent; padding: 4px;
  color: var(--ink-faint); cursor: pointer;
  opacity: 0; transition: opacity 100ms ease, color 120ms ease;
  border-radius: 4px;
}
.editor-page .item-row:hover .row-trash button { opacity: 1; }
.editor-page .item-row .row-trash button:hover { color: var(--danger); background: rgba(239,68,68,0.08); }

.editor-page .add-item-row {
  border: 1px dashed var(--hairline-strong);
  border-radius: var(--r-md);
  padding: 12px;
  margin-top: 12px;
  text-align: center;
  color: var(--ink-muted);
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  background: transparent;
  width: 100%;
  transition: border-color 120ms ease, color 120ms ease;
}
.editor-page .add-item-row:hover { color: var(--ink); border-color: var(--ink-muted); }

.editor-page .totals { display: flex; justify-content: flex-end; margin-top: 18px; }
.editor-page .totals-inner { width: 320px; }
.editor-page .total-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 9px 4px; font-size: 13px; font-variant-numeric: tabular-nums;
}
.editor-page .total-row .label { color: var(--ink-muted); font-weight: 500; }
.editor-page .total-row .value { color: var(--ink); font-weight: 600; }
.editor-page .total-row.grand { margin-top: 8px; padding: 18px 4px 6px; border-top: 1px solid var(--hairline-strong); }
.editor-page .total-row.grand .label {
  font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft);
}
.editor-page .total-row.grand .value { font-size: 26px; font-weight: 800; letter-spacing: -0.025em; color: var(--ink); }

.editor-page .payment {
  display: grid; grid-template-columns: 168px 1fr; gap: 28px;
  background: #F2F2F2; border-radius: var(--r-xl);
  padding: 24px 28px; margin-top: 28px; align-items: center;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03);
}
.editor-page .qr-wrap {
  width: 168px; height: 168px; background: white; border-radius: var(--r-md); padding: 10px;
  box-shadow: 0 0 0 1px var(--hairline-strong), 0 6px 18px -10px rgba(0,0,0,0.12);
  display: flex; align-items: center; justify-content: center;
}
.editor-page .qr-wrap img { width: 100%; height: 100%; display: block; object-fit: contain; }
.editor-page .payment-info { display: flex; flex-direction: column; gap: 4px; }
.editor-page .payment-info .label-pill { background: white; }
.editor-page .pay-amount {
  font-size: 32px; font-weight: 800; letter-spacing: -0.03em; color: var(--ink);
  margin-top: 14px; line-height: 1; font-variant-numeric: tabular-nums;
}
.editor-page .pay-payee { font-size: 17px; font-weight: 700; letter-spacing: -0.015em; color: var(--ink); margin-top: 8px; }
.editor-page .pay-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 4px 32px;
  margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.07);
}
.editor-page .pay-field { display: flex; flex-direction: column; gap: 2px; font-variant-numeric: tabular-nums; }
.editor-page .pay-field .k { font-size: 9.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); }
.editor-page .pay-field .v { font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: -0.005em; }
.editor-page .pay-note { margin-top: 14px; font-size: 11.5px; color: var(--ink-muted); line-height: 1.55; font-weight: 500; }

.editor-page .foot {
  margin-top: 28px; padding-top: 22px; border-top: 1px solid var(--hairline);
  display: flex; justify-content: space-between; align-items: flex-end;
}
.editor-page .thanks { font-size: 14px; color: var(--ink); font-weight: 700; letter-spacing: -0.015em; }
.editor-page .thanks small {
  display: block; font-size: 11.5px; color: var(--ink-muted); font-weight: 500;
  letter-spacing: 0; margin-top: 3px;
}
.editor-page .wordmark { font-size: 9.5px; font-weight: 700; letter-spacing: 0.32em; color: var(--ink-faint); text-transform: uppercase; }

/* Sticky bottom action bar */
.creation-actions {
  position: sticky;
  bottom: 0;
  margin-top: 24px;
  padding: 16px 20px;
  background: rgba(255,255,255,0.94);
  backdrop-filter: saturate(140%) blur(10px);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  flex-wrap: wrap;
  z-index: 10;
}
.creation-actions .summary {
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-muted);
}
.creation-actions .summary strong {
  color: var(--ink);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  margin-left: 8px;
}
.creation-actions .actions { display: flex; gap: 10px; }

/* Add-field popover */
.add-field-host { position: relative; display: inline-block; }
.add-field-pop {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 200px;
  background: var(--surface);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-pop);
  padding: 6px;
  z-index: 30;
  display: none;
}
.add-field-host.open .add-field-pop { display: block; }
.add-field-pop button {
  width: 100%;
  text-align: left;
  font: inherit;
  font-size: 13px;
  background: transparent;
  border: 0;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  cursor: pointer;
  color: var(--ink);
}
.add-field-pop button:hover { background: var(--surface-soft); }
.add-field-pop .empty-mini { font-size: 12px; color: var(--ink-faint); padding: 8px 10px; }

/* ═══════════════════════════════════════════════════════════════════
   DRAWER
   ═══════════════════════════════════════════════════════════════════ */
.drawer-scrim {
  position: fixed; inset: 0;
  background: rgba(10,10,10,0.4);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms ease;
}
.drawer-scrim.open { opacity: 1; pointer-events: auto; }
.drawer {
  position: fixed;
  top: 0; right: 0;
  height: 100vh;
  width: 600px;
  max-width: 100vw;
  background: var(--surface);
  z-index: 110;
  display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: -24px 0 64px -24px rgba(0,0,0,0.18);
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--hairline);
}
.drawer-title {
  display: flex; align-items: center; gap: 10px;
  font-size: 15px; font-weight: 700; letter-spacing: -0.01em;
}
.drawer-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.drawer-foot {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px;
  padding: 14px 20px;
  border-top: 1px solid var(--hairline);
  background: var(--surface-soft);
  flex-wrap: wrap;
}
.drawer-foot .actions { display: flex; gap: 8px; flex-wrap: wrap; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-row { display: flex; flex-direction: column; gap: 6px; }
.form-row.full { grid-column: 1 / -1; }

.section-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin: 22px 0 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--hairline);
}
.section-title:first-child { margin-top: 0; }

.drawer-items {
  display: flex; flex-direction: column; gap: 10px;
}
.drawer-item {
  background: var(--surface-soft);
  border-radius: var(--r-md);
  padding: 12px;
  display: grid;
  grid-template-columns: 1fr 60px 100px 100px 28px;
  gap: 8px;
  align-items: start;
}
.drawer-item .input { font-size: 13px; padding: 8px 10px; background: white; }

/* ═══════════════════════════════════════════════════════════════════
   ADVANCED TAB
   ═══════════════════════════════════════════════════════════════════ */
.advanced-stack { display: flex; flex-direction: column; gap: 18px; }
.adv-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  padding: 24px 26px;
}
.adv-card h2 {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin-bottom: 4px;
}
.adv-card .adv-card-sub {
  font-size: 12.5px;
  color: var(--ink-muted);
  margin-bottom: 18px;
}

.adv-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.adv-row.three { grid-template-columns: 1fr 1fr 1fr; }

.upload-zone {
  position: relative;
  border: 1px dashed var(--hairline-strong);
  border-radius: var(--r-md);
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: border-color 120ms ease, background 120ms ease;
}
.upload-zone:hover { border-color: var(--ink-muted); background: var(--surface-soft); }
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer;
}
.upload-preview {
  width: 64px; height: 64px;
  background: white;
  border: 1px solid var(--hairline);
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.upload-preview img { max-width: 100%; max-height: 100%; object-fit: contain; }
.upload-info { display: flex; flex-direction: column; gap: 2px; }
.upload-info .upload-title { font-size: 13.5px; font-weight: 600; }
.upload-info .upload-meta { font-size: 11.5px; color: var(--ink-muted); }

/* Default terms editor */
.terms-editor { display: flex; flex-direction: column; gap: 12px; }
.terms-section-card {
  background: var(--surface-soft);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 36px 1fr auto auto;
  gap: 10px;
  align-items: start;
  border: 1px solid var(--hairline);
}
.terms-section-card .num-rail {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  font-variant-numeric: tabular-nums;
  padding-top: 12px;
  text-align: center;
}
.terms-section-card .body-col { display: flex; flex-direction: column; gap: 8px; }
.terms-section-card .heading-input { font-weight: 600; }
.terms-section-card .body-input { min-height: 60px; font-size: 13px; }
.terms-section-card .reorder-col,
.terms-section-card .delete-col {
  display: flex; flex-direction: column; gap: 4px;
  padding-top: 8px;
}

.json-area {
  font-family: 'SF Mono', Monaco, Consolas, 'Liberation Mono', monospace;
  font-size: 12px;
  background: var(--surface-soft);
  border-radius: var(--r-sm);
  padding: 12px;
  color: var(--ink-soft);
  border: 1px solid var(--hairline);
  white-space: pre-wrap;
  max-height: 300px;
  overflow: auto;
}

/* ═══════════════════════════════════════════════════════════════════
   MOBILE CREATION FORM
   ═══════════════════════════════════════════════════════════════════ */
.m-edit-head {
  display: flex; flex-direction: column; gap: 12px;
  margin-bottom: 14px;
}
.m-edit-head-row {
  display: flex; align-items: center; gap: 10px;
}
.m-edit-doctitle {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.m-card {
  background: var(--surface);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-card);
  padding: 14px;
  margin-bottom: 12px;
}
.m-card-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--hairline);
}
.m-items {
  display: flex; flex-direction: column; gap: 12px;
}
.m-item-card {
  background: var(--surface-soft);
  border-radius: var(--r-md);
  padding: 12px;
}
.m-item-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.m-item-num {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-faint);
}
.m-item-numbers {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-top: 10px;
}
.m-item-numbers .input { font-size: 14px; padding: 9px 10px; }
.m-totals {
  display: flex; flex-direction: column; gap: 8px;
}
.m-totals-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  color: var(--ink-soft);
}
.m-totals-row.grand {
  margin-top: 6px;
  padding-top: 14px;
  border-top: 1px solid var(--hairline-strong);
  font-size: 18px;
  font-weight: 800;
  color: var(--ink);
}
.m-totals-row.grand span:last-child { font-size: 22px; letter-spacing: -0.02em; }

/* ═══════════════════════════════════════════════════════════════════
   BOTTOM SHEET (mobile row-actions)
   ═══════════════════════════════════════════════════════════════════ */
.bottom-sheet-scrim {
  position: fixed; inset: 0;
  background: rgba(10,10,10,0.5);
  z-index: 250;
  display: none;
  opacity: 0;
  transition: opacity 200ms ease;
}
.bottom-sheet-scrim.open { display: block; opacity: 1; }
.bottom-sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  background: var(--surface);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  z-index: 260;
  padding: 14px 14px 24px;
  transform: translateY(100%);
  transition: transform 240ms cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 -16px 40px -12px rgba(0,0,0,0.18);
  flex-direction: column; gap: 4px;
  display: none;
}
.bottom-sheet.mounted { display: flex; }
.bottom-sheet.open { transform: translateY(0); }
.bottom-sheet::before {
  content: '';
  align-self: center;
  width: 36px; height: 4px;
  background: var(--hairline-strong);
  border-radius: var(--pill);
  margin-bottom: 10px;
}
.bottom-sheet button {
  font: inherit;
  font-size: 15px;
  font-weight: 500;
  background: transparent;
  border: 0;
  padding: 14px 12px;
  border-radius: var(--r-md);
  text-align: left;
  cursor: pointer;
  color: var(--ink);
}
.bottom-sheet button:hover { background: var(--surface-soft); }
.bottom-sheet button.danger { color: var(--danger); }

/* ═══════════════════════════════════════════════════════════════════
   TOASTS
   ═══════════════════════════════════════════════════════════════════ */
.toasts {
  position: fixed;
  left: 50%; bottom: 24px;
  transform: translateX(-50%);
  display: flex; flex-direction: column-reverse; gap: 8px;
  z-index: 1000;
  pointer-events: none;
}
.toast {
  background: var(--ink);
  color: white;
  border-radius: var(--r-md);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 500;
  max-width: 380px;
  display: flex; align-items: center; gap: 10px;
  box-shadow: 0 12px 32px -8px rgba(0,0,0,0.4);
  animation: toast-in 200ms ease;
  pointer-events: auto;
}
.toast::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--paid);
  flex-shrink: 0;
}
.toast.error::before { background: var(--danger); }
.toast.warn::before { background: var(--due); }
.toast.info::before { background: var(--info); }
.toast.leaving { animation: toast-out 200ms ease forwards; }
@keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes toast-out { to { transform: translateY(20px); opacity: 0; } }

/* Modal */
.modal-scrim {
  position: fixed; inset: 0;
  background: rgba(10,10,10,0.45);
  display: none;
  align-items: center; justify-content: center;
  z-index: 200;
  padding: 24px;
}
.modal-scrim.open { display: flex; }
.modal-card {
  background: var(--surface);
  border-radius: var(--r-lg);
  padding: 26px;
  max-width: 480px;
  width: 100%;
  max-height: calc(100vh - 48px);
  overflow-y: auto;
  box-shadow: var(--shadow-pop);
  animation: modal-in 180ms ease;
  /* Hide the scrollbar but keep the area scrollable */
  scrollbar-width: none;       /* Firefox */
  -ms-overflow-style: none;    /* IE/legacy Edge */
}
.modal-card::-webkit-scrollbar { display: none; }
.drawer-body {
  scrollbar-width: none;

function fmtMoney(n) {
  const v = Number(n) || 0;
  return 'S$' + v.toLocaleString('en-SG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const day = String(d.getDate()).padStart(2, '0');
  const month = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return `${day} ${month} ${d.getFullYear()}`;
}

function todayIso() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function padNum(n, padding) {
  return String(n).padStart(padding, '0');
}
function formatNumber(n, prefix, padding) {
  return `${prefix}${padNum(n, padding)}`;
}

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

function buildSearchBlob(d) {
  const items = (d.items || []).map(i => `${i.description || ''} ${i.subtitle || ''}`).join(' ');
  return [
    d.displayNumber, d.client?.name, d.client?.attn, d.client?.email,
    items, fmtMoney(d.total), d.issueDate, d.status
  ].filter(Boolean).join(' ').toLowerCase();
}

function showToast(msg, kind = 'success') {
  const host = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${kind}`;
  el.textContent = msg;
  host.appendChild(el);
  // cap at 3
  while (host.children.length > 3) host.removeChild(host.firstChild);
  setTimeout(() => {
    el.classList.add('leaving');
    setTimeout(() => el.remove(), 220);
  }, 3500);
}

// REGION: modal helper ──────────────────────────────────────────────
function openModal({ title, body, okLabel = 'Confirm', cancelLabel = 'Cancel', danger = false, requireText, onOk }) {
  const scrim = document.getElementById('modal-scrim');
  const card = document.getElementById('modal-card');
  card.innerHTML = '';

  const h = document.createElement('h3'); h.textContent = title; card.appendChild(h);
  const p = document.createElement('p'); p.textContent = body; card.appendChild(p);

  let confirmInput;
  if (requireText) {
    confirmInput = document.createElement('input');
    confirmInput.className = 'input';
    confirmInput.placeholder = `Type "${requireText}" to confirm`;
    card.appendChild(confirmInput);
  }

  const actions = document.createElement('div'); actions.className = 'modal-actions';
  const cancel = document.createElement('button'); cancel.className = 'btn'; cancel.textContent = cancelLabel;
  const ok = document.createElement('button'); ok.className = `btn ${danger ? 'danger' : 'primary'}`; ok.textContent = okLabel;
  actions.appendChild(cancel); actions.appendChild(ok);
  card.appendChild(actions);

  const close = () => { scrim.classList.remove('open'); };
  cancel.addEventListener('click', close);
  ok.addEventListener('click', async () => {
    if (requireText && confirmInput.value !== requireText) {
      showToast(`Please type "${requireText}" exactly to confirm.`, 'warn');
      return;
    }
    ok.disabled = true;
    try { await onOk(); close(); } catch (e) {
      showToast(e?.message || 'Action failed', 'error');
      ok.disabled = false;
    }
  });
  scrim.addEventListener('click', (e) => { if (e.target === scrim) close(); }, { once: true });
  scrim.classList.add('open');
}

// Re-auth gate for sensitive actions
async function requireRecentAuth() {
  if (DEV_MODE) return true;
  const u = auth.currentUser;
  if (!u) throw new Error('Not signed in');
  const lastSignIn = u.metadata?.lastSignInTime ? new Date(u.metadata.lastSignInTime).getTime() : 0;
  if (Date.now() - lastSignIn < 5 * 60 * 1000) return true;

  return new Promise((resolve, reject) => {
    const scrim = document.getElementById('modal-scrim');
    const card = document.getElementById('modal-card');
    card.innerHTML = '';
    const h = document.createElement('h3'); h.textContent = 'Confirm your password';
    const p = document.createElement('p'); p.textContent = 'This is a sensitive action. Please re-enter your password to continue.';
    const inp = document.createElement('input'); inp.type = 'password'; inp.className = 'input'; inp.placeholder = 'Password';
    const actions = document.createElement('div'); actions.className = 'modal-actions';
    const cancel = document.createElement('button'); cancel.className = 'btn'; cancel.textContent = 'Cancel';
    const ok = document.createElement('button'); ok.className = 'btn primary'; ok.textContent = 'Confirm';
    actions.appendChild(cancel); actions.appendChild(ok);
    card.appendChild(h); card.appendChild(p); card.appendChild(inp); card.appendChild(actions);
    scrim.classList.add('open');

    const close = () => scrim.classList.remove('open');
    cancel.addEventListener('click', () => { close(); reject(new Error('Cancelled')); });
    ok.addEventListener('click', async () => {
      try {
        const cred = EmailAuthProvider.credential(u.email, inp.value);
        await reauthenticateWithCredential(u, cred);
        close(); resolve(true);
      } catch (e) {
        showToast('Re-authentication failed', 'error');
      }
    });
    inp.focus();
  });
}

const authScreen = document.getElementById('auth-screen');

function showAuthScreen(errorMsg) {
  authScreen.style.display = 'flex';
  appShell.hidden = true;
  if (errorMsg) {
    const err = document.getElementById('auth-error');
    err.textContent = errorMsg;
    err.hidden = false;
  }
}
function showApp() {
  authScreen.style.display = 'none';
  appShell.hidden = false;
}

document.getElementById('auth-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('auth-error'); err.hidden = true;
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const btn = document.getElementById('auth-submit');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    if (DEV_MODE) {
      // dev bypass
      bootstrapDev();
      return;
    }
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    err.textContent = e.message?.replace('Firebase: ', '') || 'Sign in failed';
    err.hidden = false;
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});

document.getElementById('auth-reset').addEventListener('click', async () => {
  const email = document.getElementById('auth-email').value.trim();
  if (!email) { showToast('Enter your email first', 'warn'); return; }
  if (DEV_MODE) { showToast('Reset is disabled in dev mode', 'info'); return; }
  try {
    await sendPasswordResetEmail(auth, email);
    showToast('Reset email sent if account exists');
  } catch (e) { showToast(e.message?.replace('Firebase: ', '') || 'Reset failed', 'error'); }
});

document.getElementById('signout-btn').addEventListener('click', async () => {
  if (DEV_MODE) { location.reload(); return; }
  try { await signOut(auth); } catch {}
});

// Auth state listener (real mode)
if (!DEV_MODE) {
  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      detachListeners();
      showAuthScreen();
      return;
    }
    if (user.uid !== ALLOWED_UID) {
      await signOut(auth);
      showAuthScreen('This account is not authorised for Reputifly Accounting.');
      return;
    }
    state.user = user;
    document.getElementById('user-email').textContent = user.email || '—';
    showApp();
    await bootstrapData(user.uid);
  });
}

function detachListeners() {
  while (listeners.length) {
    try { listeners.pop()(); } catch {}
  }
  state.quotations.clear();
  state.invoices.clear();
  state.settings = null;
  render();
}

async function fetchAssetAsDataUrl(path) {
  try {
    const r = await fetch(path);
    const blob = await r.blob();
    return await new Promise((resolve) => {
      const fr = new FileReader();
      fr.onload = () => resolve(fr.result);
      fr.readAsDataURL(blob);
    });
  } catch (e) {
    return '';
  }
}

async function bootstrapData(uid) {
  state.loading.initial = true;
  // Settings doc
  const settingsRef = doc(db, `users/${uid}/settings/default`);
  const settingsSnap = await getDoc(settingsRef);
  if (!settingsSnap.exists()) {
    const seed = { ...DEFAULT_SETTINGS };
    seed.logoBase64 = await fetchAssetAsDataUrl('assets/reputifly-logo-light.png');
    seed.paynowQrBase64 = await fetchAssetAsDataUrl('assets/paynow-qr.jpeg');
    await setDoc(settingsRef, seed);
    state.settings = seed;
  } else {
    state.settings = { ...DEFAULT_SETTINGS, ...settingsSnap.data() };
    if (!state.settings.defaultTerms) state.settings.defaultTerms = DEFAULT_TERMS;
    if (!state.settings.optionalFieldDefaults) state.settings.optionalFieldDefaults = DEFAULT_OPTIONAL;
  }

  // Counters
  await ensureCounter(uid, 'invoice', 'INV-', 4);
  await ensureCounter(uid, 'quotation', 'QINV-', 3);

  // Live listeners
  listeners.push(onSnapshot(doc(db, `users/${uid}/counters/invoice`), (s) => {
    state.counters.invoice = s.data() || null; render();
  }));
  listeners.push(onSnapshot(doc(db, `users/${uid}/counters/quotation`), (s) => {
    state.counters.quotation = s.data() || null; render();
  }));
  listeners.push(onSnapshot(settingsRef, (s) => {
    if (s.exists()) {
      state.settings = { ...DEFAULT_SETTINGS, ...s.data() };
      if (!state.settings.defaultTerms) state.settings.defaultTerms = DEFAULT_TERMS;
      if (!state.settings.optionalFieldDefaults) state.settings.optionalFieldDefaults = DEFAULT_OPTIONAL;
      render();
    }
  }));

  // Quotations
  listeners.push(onSnapshot(
    query(collection(db, `users/${uid}/quotations`), orderBy('createdAt', 'desc')),
    (snap) => {
      state.quotations.clear();
      snap.forEach(d => state.quotations.set(d.id, { id: d.id, ...d.data() }));
      render();
    }
  ));

  // Invoices
  listeners.push(onSnapshot(
    query(collection(db, `users/${uid}/invoices`), orderBy('number', 'desc')),
    (snap) => {
      state.invoices.clear();
      snap.forEach(d => state.invoices.set(d.id, { id: d.id, ...d.data() }));
      render();
    }
  ));

  state.loading.initial = false;
  initDraft();
  render();
}

async function ensureCounter(uid, name, prefix, padding) {
  const ref = doc(db, `users/${uid}/counters/${name}`);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      value: 0,
      prefix, padding,
      updatedAt: serverTimestamp()
    });
  }
}

// REGION: counters / atomic numbering ───────────────────────────────
async function convertQuotationToInvoice(quotationId, paymentDate) {
  const uid = state.user.uid;
  if (DEV_MODE) {
    // synthesize in-memory
    const quote = state.quotations.get(quotationId);
    if (!quote) throw new Error('Quotation not found');
    if (quote.status === 'converted') throw new Error('Already converted');
    const next = (state.counters.invoice?.value || 0) + 1;
    const displayNumber = formatNumber(next, 'INV-', 4);
    const newId = 'i' + Math.random().toString(36).slice(2, 9);
    state.invoices.set(newId, {
      id: newId, version: 1, number: next, displayNumber,
      issueDate: paymentDate,
      client: { ...quote.client },
      items: [...quote.items.map(i => ({ ...i }))],
      subtotal: quote.subtotal, total: quote.total,
      terms: quote.terms || null,
      sourceQuotationId: quotationId,
      sourceQuotationNumber: quote.displayNumber,
      status: 'paid',
      createdAt: { seconds: Math.floor(Date.now() / 1000) }
    });
    state.counters.invoice = { ...state.counters.invoice, value: next };
    state.quotations.set(quotationId, { ...quote, status: 'converted', convertedToInvoiceId: newId });
    render();
    return { invoiceId: newId, displayNumber };
  }
  return await runTransaction(db, async (txn) => {
    const counterRef = doc(db, `users/${uid}/counters/invoice`);
    const counterSnap = await txn.get(counterRef);
    if (!counterSnap.exists()) throw new Error('Counter not initialised');
    const quoteRef = doc(db, `users/${uid}/quotations/${quotationId}`);
    const quoteSnap = await txn.get(quoteRef);
    if (!quoteSnap.exists()) throw new Error('Quotation not found');
    const quote = quoteSnap.data();
    if (quote.status === 'converted') throw new Error('Already converted');

    const cur = counterSnap.data();
    const next = cur.value + 1;
    const displayNumber = formatNumber(next, cur.prefix || 'INV-', cur.padding || 4);

    const invoiceRef = doc(collection(db, `users/${uid}/invoices`));
    const auditRef = doc(collection(invoiceRef, 'audit'));

    txn.set(invoiceRef, {
      version: 1, number: next, displayNumber,
      issueDate: paymentDate,
      client: { ...quote.client },
      items: [...quote.items],
      subtotal: quote.subtotal, total: quote.total,
      terms: quote.terms || null,
      sourceQuotationId: quotationId,
      sourceQuotationNumber: quote.displayNumber,
      status: 'paid',
      createdAt: serverTimestamp()
    });
    txn.update(counterRef, {
      value: next, lastIssuedAt: serverTimestamp(),
      lastInvoiceId: invoiceRef.id, updatedAt: serverTimestamp()
    });
    txn.update(quoteRef, {
      status: 'converted', convertedToInvoiceId: invoiceRef.id,
      convertedAt: serverTimestamp(), updatedAt: serverTimestamp()
    });
    txn.set(auditRef, {
      ts: serverTimestamp(), actor: uid, event: 'created',
      after: { number: next, status: 'paid' }
    });
    return { invoiceId: invoiceRef.id, displayNumber };
  });
}

async function setCounterValue(name, value) {
  if (DEV_MODE) {
    state.counters[name] = { ...state.counters[name], value };
    render(); return;
  }
  const uid = state.user.uid;
  const ref = doc(db, `users/${uid}/counters/${name}`);
  await setDoc(ref, {
    value: value,
    prefix: name === 'invoice' ? 'INV-' : 'QINV-',
    padding: name === 'invoice' ? 4 : 3,
    updatedAt: serverTimestamp()
  }, { merge: true });
}

async function nextQuotationNumber() {
  const uid = state.user.uid;
  if (DEV_MODE) {
    const next = (state.counters.quotation?.value || 0) + 1;
    state.counters.quotation = { ...state.counters.quotation, value: next };
    return { number: next, displayNumber: formatNumber(next, 'QINV-', 3) };
  }
  return await runTransaction(db, async (txn) => {
    const ref = doc(db, `users/${uid}/counters/quotation`);
    const s = await txn.get(ref);
    if (!s.exists()) throw new Error('Quotation counter not initialised');
    const cur = s.data();
    const next = cur.value + 1;
    txn.update(ref, { value: next, updatedAt: serverTimestamp() });
    return { number: next, displayNumber: formatNumber(next, cur.prefix || 'QINV-', cur.padding || 3) };
  });
}

// REGION: quotations-store ──────────────────────────────────────────
async function saveQuotation(data, existingId) {
  const uid = state.user.uid;
  const payload = {
    ...data,
    searchBlob: buildSearchBlob(data),
    updatedAt: DEV_MODE ? { seconds: Math.floor(Date.now()/1000) } : serverTimestamp()
  };

  if (DEV_MODE) {
    if (existingId) {
      const cur = state.quotations.get(existingId) || {};
      state.quotations.set(existingId, { ...cur, ...payload, id: existingId });
      render();
      return existingId;
    } else {
      const id = 'q' + Math.random().toString(36).slice(2, 9);
      const { number, displayNumber } = await nextQuotationNumber();
      state.quotations.set(id, {
        id, version: 1, number, displayNumber,
        status: data.status || 'draft',
        ...payload,
        createdAt: { seconds: Math.floor(Date.now()/1000) }
      });
      render();
      return id;
    }
  }

  if (existingId) {
    await updateDoc(doc(db, `users/${uid}/quotations/${existingId}`), payload);
    return existingId;
  } else {
    const { number, displayNumber } = await nextQuotationNumber();
    const ref = await addDoc(collection(db, `users/${uid}/quotations`), {
      version: 1, number, displayNumber,
      status: data.status || 'draft',
      ...payload,
      createdAt: serverTimestamp()
    });
    return ref.id;
  }
}

async function deleteQuotation(id) {
  await requireRecentAuth();
  // Snapshot the deleted draft's number BEFORE removal so we can renumber.
  const target = state.quotations.get(id);
  const numToDelete = target?.number;

  if (DEV_MODE) {
    state.quotations.delete(id);
    if (numToDelete) maybeReclaimDraftNumber(numToDelete);
    render();
    return;
  }
  await deleteDoc(doc(db, `users/${state.user.uid}/quotations/${id}`));
  if (numToDelete) await maybeReclaimDraftNumber(numToDelete);
}

// If the deleted draft held the highest QINV- number, decrement the counter so
// the next-issued draft re-uses that number (no gaps in the sequential audit
// trail). If it was older / mid-sequence, leave the gap (renumbering existing
// drafts mid-stream would invalidate any PDFs already shared with clients).
async function maybeReclaimDraftNumber(deletedNumber) {
  const cur = state.counters.quotation?.value || 0;
  if (deletedNumber !== cur) return;             // not the most recent — leave the gap
  // Walk down the counter to the highest still-existing number, so chains of
  // recent deletes free all freshly-vacated numbers.
  const remaining = new Set(Array.from(state.quotations.values()).map(q => q.number));
  let next = cur - 1;
  while (next > 0 && !remaining.has(next)) next--;
  await setCounterValue('quotation', next);
}

async function updateQuotation(id, patch) {
  if (DEV_MODE) {
    const cur = state.quotations.get(id) || {};
    const next = { ...cur, ...patch };
    next.searchBlob = buildSearchBlob(next);
    state.quotations.set(id, next); render(); return;
  }
  const payload = { ...patch, updatedAt: serverTimestamp() };
  if (patch.client || patch.items || patch.total) {
    const cur = state.quotations.get(id);
    payload.searchBlob = buildSearchBlob({ ...cur, ...patch });
  }
  await updateDoc(doc(db, `users/${state.user.uid}/quotations/${id}`), payload);
}

// REGION: invoices-store ────────────────────────────────────────────
async function updateInvoiceClient(id, patch) {
  // Only client + items editable
  const payload = { ...patch };
  payload.searchBlob = buildSearchBlob({ ...(state.invoices.get(id) || {}), ...patch });
  if (DEV_MODE) {
    const cur = state.invoices.get(id) || {};
    state.invoices.set(id, { ...cur, ...payload }); render(); return;
  }
  payload.updatedAt = serverTimestamp();
  await updateDoc(doc(db, `users/${state.user.uid}/invoices/${id}`), payload);
  // Revision log
  await addDoc(collection(db, `users/${state.user.uid}/invoices/${id}/revisions`), {
    ts: serverTimestamp(), actor: state.user.uid, after: payload
  });
}

async function voidInvoice(id, reason) {
  await requireRecentAuth();
  if (DEV_MODE) {
    const cur = state.invoices.get(id) || {};
    state.invoices.set(id, { ...cur, status: 'void', voidReason: reason }); render(); return;
  }
  await updateDoc(doc(db, `users/${state.user.uid}/invoices/${id}`), {
    status: 'void', voidReason: reason, updatedAt: serverTimestamp()
  });
  await addDoc(collection(db, `users/${state.user.uid}/invoices/${id}/audit`), {
    ts: serverTimestamp(), actor: state.user.uid, event: 'voided', reason
  });
}

// REGION: settings-store ────────────────────────────────────────────
async function saveSettings(patch) {
  state.settings = { ...state.settings, ...patch };
  render();
  if (DEV_MODE) return;
  await setDoc(doc(db, `users/${state.user.uid}/settings/default`), state.settings, { merge: true });
}

// REGION: search + pagination ───────────────────────────────────────
function searchTokens(s) {
  return s.trim().toLowerCase().split(/\s+/).filter(Boolean);
}

function filterDocs(docMap, q) {
  const tokens = searchTokens(q);
  const arr = Array.from(docMap.values());
  if (!tokens.length) return arr;
  return arr.filter(d => {
    const blob = d.searchBlob || buildSearchBlob(d);
    return tokens.every(t => blob.includes(t));
  });
}

function paginate(arr, page) {
  const visible = page * PAGE_SIZE;
  return { items: arr.slice(0, visible), total: arr.length, hasMore: arr.length > visible };
}

// REGION: tabs-router ───────────────────────────────────────────────
const ROUTES = {
  creation: 'view-creation',
  quotations: 'view-quotations',
  invoices: 'view-invoices',
  library: 'view-library',
  advanced: 'view-advanced'
};

function setRoute(route) {
  // Close any open drawer / sheet when changing routes — avoids stale overlays.
  if (state.drawer && state.drawer.open) closeDrawer();
  closeBottomSheet();

  state.route = route;
  Object.entries(ROUTES).forEach(([k, id]) => {
    document.getElementById(id).hidden = (k !== route);
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.route === route));
  document.querySelectorAll('.tab-dropdown-item').forEach(b => b.classList.toggle('active', b.dataset.route === route));
  document.getElementById('tab-dropdown-label').textContent =
    { creation: 'Create', quotations: 'Drafts', invoices: 'Paid', library: 'Library', advanced: 'Advanced' }[route];
  document.getElementById('tab-dropdown').classList.remove('open');
  render();
}

document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => setRoute(b.dataset.route)));
document.querySelectorAll('.tab-dropdown-item').forEach(b => b.addEventListener('click', () => setRoute(b.dataset.route)));
document.getElementById('tab-dropdown-trigger').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('tab-dropdown').classList.toggle('open');
});
document.addEventListener('click', () => document.getElementById('tab-dropdown').classList.remove('open'));

// REGION: creation-tab ──────────────────────────────────────────────
function initDraft() {
  state.draft = createBlankDraft('quotation');
}

function createBlankDraft(mode = 'quotation') {
  const s = state.settings || DEFAULT_SETTINGS;
  return {
    mode, // 'quotation' | 'invoice'
    issueDate: todayIso(),
    paymentDate: todayIso(),
    client: { name: '', attn: '', address: '', postal: '', email: '' },
    items: [{ description: '', subtitle: '', qty: 1, rate: 0, amount: 0 }],
    notes: '',
    optional: { ...(s.optionalFieldDefaults || DEFAULT_OPTIONAL) },
    includeTerms: false,
    terms: JSON.parse(JSON.stringify(s.defaultTerms || DEFAULT_TERMS))
  };
}

function recomputeTotals(d) {
  d.items.forEach(i => {
    const q = Number(i.qty) || 0; const r = Number(i.rate) || 0;
    i.amount = +(q * r).toFixed(2);
  });
  d.subtotal = +d.items.reduce((s, i) => s + i.amount, 0).toFixed(2);
  d.total = d.subtotal;
  return d;
}

    { key: 'attn', placeholder: 'Attn: First Last', prefix: 'Attn: ', optKey: 'client.attn' },
    { key: 'address', placeholder: '123 Sample Street, #04-56', optKey: 'client.address' },
    { key: 'postal', placeholder: 'Singapore 123456', optKey: 'client.postal' },

    <div class="add-field-host" id="billed-add"><button class="btn dashed sm">+ Add field</button><div class="add-field-pop"></div></div>
  `;

  // Wire client.name editor
  const nameEl = block.querySelector('.party-name');
  nameEl.addEventListener('blur', () => {
    d.client.name = nameEl.textContent.trim();
    nameEl.dataset.empty = !d.client.name;
  });

  const detail = block.querySelector('#billed-detail');
  lines.forEach(line => {
    if (!d.optional[line.optKey]) return; // hidden
    const span = document.createElement('span');
    span.className = 'line optional-line';
    const val = d.client[line.key] || '';
    span.innerHTML = `<button class="opt-x" title="Remove">×</button><span class="ce" contenteditable="true" data-empty="${!val}" data-placeholder="${escapeHtml(line.placeholder)}">${escapeHtml(val)}</span>`;
    const ce = span.querySelector('.ce');
    ce.addEventListener('blur', () => {
      d.client[line.key] = ce.textContent.trim();
      ce.dataset.empty = !d.client[line.key];
    });
    span.querySelector('.opt-x').addEventListener('click', () => {
      d.optional[line.optKey] = false; render();
    });
    detail.appendChild(span);
  });

  // Add-field popover for billed-to
  const addHost = block.querySelector('#billed-add');
  const pop = addHost.querySelector('.add-field-pop');
  const addBtn = addHost.querySelector('button');
  const hidden = lines.filter(l => !d.optional[l.optKey]);

    addBtn.style.display = 'none';

    pop.innerHTML = '';
    hidden.forEach(line => {
      const b = document.createElement('button'); b.textContent = `Add ${line.key}`;

      e.stopPropagation();

  return block;

        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button></div>
    `;
    const desc = row.querySelector('.item-desc-main');
    desc.addEventListener('blur', () => { item.description = desc.textContent.trim(); desc.dataset.empty = !item.description; });
    const sub = row.querySelector('.item-sub');
    if (sub) sub.addEventListener('blur', () => { item.subtitle = sub.textContent.trim(); sub.dataset.empty = !item.subtitle; });
    const rmSub = row.querySelector('[data-rm-sub]');
    if (rmSub) rmSub.addEventListener('click', () => {
      item.showSubtitle = false; item.subtitle = ''; render();
    });
    const addSub = row.querySelector('[data-add-sub]');
    if (addSub) addSub.addEventListener('click', () => {
      item.showSubtitle = true; render();
    });
    // Number inputs: input event = update model + amount cell + totals (NO re-render)
    row.querySelectorAll('input[data-field]').forEach(inp => {
      const handler = () => {
        item[inp.dataset.field] = Number(inp.value) || 0;
        recomputeTotals(d);
        const amtCell = row.querySelector('[data-amount-cell]');
        if (amtCell) amtCell.textContent = fmtMoney(item.amount);
        refreshTotalsDom(d);
      };
      inp.addEventListener('input', handler);
      inp.addEventListener('change', handler);
    });
    row.querySelector('.row-trash button').addEventListener('click', () => {
      if (d.items.length === 1) { showToast('Need at least one line item', 'warn'); return; }
      d.items.splice(idx, 1); render();
    });
    sec.appendChild(row);
  });

  // Add row: dashed "+ Add line item" + library quick-pick button
  const addRow = document.createElement('div');
  addRow.style.cssText = 'display: flex; gap: 8px; margin-top: 12px;';
  const addBlank = document.createElement('button');
  addBlank.className = 'add-item-row';
  addBlank.textContent = '+ Add line item';
  addBlank.style.cssText = 'flex: 1; margin-top: 0;';
  addBlank.addEventListener('click', () => {
    d.items.push({ description: '', subtitle: '', qty: 1, rate: 0, amount: 0, showSubtitle: true });
    render();
  });
  const fromLib = document.createElement('button');
  fromLib.className = 'btn dashed';
  fromLib.style.cssText = 'flex: 0 0 auto; padding: 12px 16px; border-style: dashed;';
  fromLib.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg> From library`;
  fromLib.addEventListener('click', (e) => {
    e.stopPropagation();
    openLibraryPicker(d);
  });
  addRow.appendChild(addBlank);
  addRow.appendChild(fromLib);
  sec.appendChild(addRow);

  return sec;
}

async function handleSave(downloadAfter) {
  const d = state.draft;
  if (!d.client.name) { showToast('Client name is required', 'warn'); return; }
  recomputeTotals(d);

  // Strip transient UI flags from items before persisting
  const cleanItems = d.items.map(i => {
    const { showSubtitle, ...rest } = i;
    return rest;
  });

  const baseDoc = {
    issueDate: d.issueDate,
    status: 'draft',
    client: { ...d.client },
    items: cleanItems,
    subtotal: d.subtotal,
    total: d.total,
    notes: d.notes || '',
    terms: d.includeTerms ? d.terms : null,
    optional: { ...d.optional }
  };

  const saveBtn = document.getElementById('save-draft');
  const pdfBtn = document.getElementById('save-and-pdf');
  if (saveBtn) saveBtn.disabled = true;
  if (pdfBtn) pdfBtn.disabled = true;

  try {
    const id = await saveQuotation(baseDoc);
    const saved = state.quotations.get(id)
      || Array.from(state.quotations.values()).find(q => q.id === id);
    showToast(`${saved?.displayNumber || 'Draft'} saved`);
    if (downloadAfter && saved) {
      await downloadPdf(saved, d.includeTerms ? 'invoice-with-terms' : 'invoice');
    }
    initDraft();
    render();
  } catch (e) {
    console.error(e);
    showToast(e.message || 'Save failed', 'error');
  } finally {
    if (saveBtn) saveBtn.disabled = false;
    if (pdfBtn) pdfBtn.disabled = false;
  }
}

// REGION: invoice-numbering-panel ───────────────────────────────────
function renderInvoiceNumbering() {
  const host = document.getElementById('invoice-numbering-panel');
  if (!host) return;
  const invCur = state.counters.invoice?.value ?? 0;
  const issuedCount = state.invoices.size;
  const nextDisplay = formatNumber(invCur + 1, 'INV-', 4);
  const lastDisplay = invCur > 0 ? formatNumber(invCur, 'INV-', 4) : null;

  host.innerHTML = `
    <div class="ip-info">
      <span class="ip-label">Next invoice number</span>
      <span class="ip-value">${escapeHtml(nextDisplay)}</span>
      ${lastDisplay
        ? `<span class="ip-meta">Last: <strong>${escapeHtml(lastDisplay)}</strong> · ${issuedCount} on record</span>`
        : `<span class="ip-meta">No invoices issued yet</span>`}
    </div>
    <div class="ip-edit">
      <input type="number" min="1" id="ip-next-input" value="${invCur + 1}">
      <button class="btn" id="ip-save">Update</button>
    </div>
  `;

  host.querySelector('#ip-save').addEventListener('click', async () => {
    const val = Number(host.querySelector('#ip-next-input').value) || 1;
    if (val < 1) { showToast('Number must be at least 1', 'warn'); return; }
    if (val === invCur + 1) { showToast('No change'); return; }

    const proceed = async () => {
      try {
        await setCounterValue('invoice', val - 1);
        showToast(`Next invoice will be ${formatNumber(val, 'INV-', 4)}`);
      } catch (e) {
        showToast(e.message || 'Update failed', 'error');
      }
    };

    if (issuedCount > 0) {
      openModal({
        title: 'Change invoice numbering?',
        body: `You have already issued ${issuedCount} invoice(s). Changing the counter could break the sequential audit trail. Type CHANGE to confirm.`,
        okLabel: 'Change', danger: true, requireText: 'CHANGE',
        onOk: async () => { await requireRecentAuth(); await proceed(); }
      });
    } else {
      await proceed();
    }
  });
}

// REGION: list-render ───────────────────────────────────────────────
function renderList(kind) {
  const host = document.getElementById(`${kind}-list`);
  const search = state.search[kind];
  const arr = filterDocs(state[kind], search);
  // sort: recent first by number desc
  arr.sort((a, b) => (b.number || 0) - (a.number || 0));
  const { items, total, hasMore } = paginate(arr, state.page[kind]);

  document.getElementById(`${kind}-count`).textContent =
    total === 0 ? 'No records' : `${total} record${total === 1 ? '' : 's'}`;

  host.innerHTML = '';

  if (total === 0) {
    const empty = document.createElement('div'); empty.className = 'empty';
    empty.innerHTML = `<div class="empty-title">${search ? 'No matches' : 'Nothing here yet'}</div>${search ? 'Try a different search term.' : 'Create one from the Creation tab.'}`;
    host.appendChild(empty);
    return;
  }

  // Header
  const head = document.createElement('div'); head.className = 'list-head';
  head.innerHTML = `<span>Number</span><span>Client</span><span>Issued</span><span>Total</span><span>Status</span><span></span>`;
  host.appendChild(head);

  items.forEach(d => host.appendChild(buildListRow(kind, d, search)));

  if (hasMore) {
    const lm = document.createElement('div'); lm.className = 'load-more';
    lm.innerHTML = `Showing ${items.length} of ${total} <button class="btn sm" id="load-more-${kind}">Load more</button>`;
    host.appendChild(lm);
    lm.querySelector('button').addEventListener('click', () => {
      state.page[kind] = (state.page[kind] || 1) + 1;
      renderList(kind);
    });
  }
}

function buildListRow(kind, d, search) {
  const row = document.createElement('div');
  row.className = `list-row ${d.status === 'void' ? 'void' : ''}`;
  row.dataset.id = d.id;

  const client = d.client || {};
  const tokens = searchTokens(search);
  let matchSnippet = '';
  if (tokens.length && d.items?.length) {
    for (const item of d.items) {
      const text = `${item.description || ''} ${item.subtitle || ''}`;
      const lower = text.toLowerCase();
      if (tokens.some(t => lower.includes(t)) && !tokens.every(t => (client.name || '').toLowerCase().includes(t))) {
        let highlighted = escapeHtml(item.description || '');
        tokens.forEach(t => {
          const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
          highlighted = highlighted.replace(re, '<mark>$1</mark>');
        });
        matchSnippet = highlighted;
        break;
      }
    }
  }

  row.innerHTML = `
    <div class="list-cell-num">${escapeHtml(d.displayNumber || '—')}</div>
    <div class="list-cell-client">
      <span class="client-name">${escapeHtml(client.name || '—')}</span>
      ${client.attn ? `<span class="client-meta">${escapeHtml(client.attn)}</span>` : ''}
      ${matchSnippet ? `<span class="client-match">${matchSnippet}</span>` : ''}
    </div>
    <div class="list-cell-date">${escapeHtml(fmtDate(d.issueDate))}</div>
    <div class="list-cell-num-r">${escapeHtml(fmtMoney(d.total))}</div>
    <div class="list-cell-status"><span class="status-pill ${d.status || 'draft'}"><span class="dot"></span>${escapeHtml(d.status || 'draft')}</span></div>
    <div class="list-cell-actions">
      <button class="icon-btn" title="More" aria-label="More">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
      </button>
    </div>
  `;

  row.addEventListener('click', (e) => {
    if (e.target.closest('.list-cell-actions')) return;
    openDrawer(kind === 'quotations' ? 'quotation' : 'invoice', d.id);
  });
  row.querySelector('.list-cell-actions button').addEventListener('click', (e) => {
    e.stopPropagation();
    openRowMenu(e.currentTarget, kind, d);
  });
  return row;
}

function openRowMenu(anchor, kind, d) {
  const items = [];
  items.push({ label: 'Open', fn: () => openDrawer(kind === 'quotations' ? 'quotation' : 'invoice', d.id) });
  items.push({ label: 'Download PDF', fn: () => downloadPdf(d, d.terms ? 'invoice-with-terms' : 'invoice') });
  if (kind === 'quotations') {
    if (d.status !== 'converted') {
      items.push({ label: 'Mark as paid…', fn: () => promptConvert(d) });
    }
    items.push({ label: 'Delete', fn: () => promptDelete(d), danger: true });
  } else {
    if (d.status !== 'void') {
      items.push({ label: 'Void invoice…', fn: () => promptVoid(d), danger: true });
    }
  }

  if (window.innerWidth <= 760) {
    openBottomSheet(items, d.displayNumber || 'Actions');
  } else {
    openRowPopover(anchor, items);
  }
}

function openRowPopover(anchor, items) {
  const rect = anchor.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.style.cssText = `position: fixed; top: ${rect.bottom + 6}px; right: ${window.innerWidth - rect.right}px;
    background: var(--surface); border-radius: var(--r-md); box-shadow: var(--shadow-pop); padding: 6px; z-index: 250; min-width: 180px;`;
  items.forEach(it => {
    const b = document.createElement('button');
    b.style.cssText = `display: block; width: 100%; text-align: left; font: inherit; font-size: 13px;
      padding: 8px 12px; border: 0; border-radius: var(--r-sm); background: transparent; cursor: pointer;
      color: ${it.danger ? 'var(--danger)' : 'var(--ink)'};`;
    b.textContent = it.label;
    b.addEventListener('mouseenter', () => b.style.background = 'var(--surface-soft)');
    b.addEventListener('mouseleave', () => b.style.background = 'transparent');
    b.addEventListener('click', () => { if (pop.parentNode) pop.parentNode.removeChild(pop); it.fn(); });
    pop.appendChild(b);
  });
  document.body.appendChild(pop);
  setTimeout(() => {
    document.addEventListener('click', () => { if (pop.parentNode) pop.parentNode.removeChild(pop); }, { once: true });
  }, 10);
}

function openBottomSheet(items, title) {
  const sheet = document.getElementById('bottom-sheet');
  const scrim = document.getElementById('bottom-sheet-scrim');
  sheet.innerHTML = '';
  if (title) {
    const t = document.createElement('div');
    t.style.cssText = 'font-size: 11px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-muted); padding: 4px 12px 8px;';
    t.textContent = title;
    sheet.appendChild(t);
  }
  items.forEach(it => {
    const b = document.createElement('button');
    if (it.danger) b.classList.add('danger');
    b.textContent = it.label;
    b.addEventListener('click', () => { closeBottomSheet(); it.fn(); });
    sheet.appendChild(b);
  });
  // Cancel
  const cancel = document.createElement('button');
  cancel.textContent = 'Cancel';
  cancel.style.cssText = 'color: var(--ink-muted); margin-top: 4px; border-top: 1px solid var(--hairline);';
  cancel.addEventListener('click', closeBottomSheet);
  sheet.appendChild(cancel);

  scrim.classList.add('open');
  sheet.classList.add('mounted');
  // small delay so transform animates
  requestAnimationFrame(() => sheet.classList.add('open'));
  sheet.setAttribute('aria-hidden', 'false');
  scrim.addEventListener('click', closeBottomSheet, { once: true });
}

function closeBottomSheet() {
  const sheet = document.getElementById('bottom-sheet');
  const scrim = document.getElementById('bottom-sheet-scrim');
  sheet.classList.remove('open');
  scrim.classList.remove('open');
  sheet.setAttribute('aria-hidden', 'true');
  setTimeout(() => sheet.classList.remove('mounted'), 260);
}

function promptDelete(d) {

    title: `Delete ${d.displayNumber}?`,
    body: 'This permanently deletes the draft invoice. Paid invoices are never deletable, but drafts can be removed.',
    okLabel: 'Delete', danger: true,
    onOk: async () => {
      await deleteQuotation(d.id);
      showToast(`${d.displayNumber} deleted`);
    }
  });
}

function promptVoid(d) {
  // ask reason
  const scrim = document.getElementById('modal-scrim');
  const card = document.getElementById('modal-card');
  card.innerHTML = '';
  const h = document.createElement('h3'); h.textContent = `Void ${d.displayNumber}?`;
  const p = document.createElement('p'); p.textContent = 'Voiding marks the invoice as cancelled but preserves the audit trail. The invoice number is never reused.';
  const inp = document.createElement('input'); inp.className = 'input'; inp.placeholder = 'Reason (optional)';
  const a = document.createElement('div'); a.className = 'modal-actions';
  const cancel = document.createElement('button'); cancel.className = 'btn'; cancel.textContent = 'Cancel';
  const ok = document.createElement('button'); ok.className = 'btn danger'; ok.textContent = 'Void invoice';
  a.appendChild(cancel); a.appendChild(ok);
  card.appendChild(h); card.appendChild(p); card.appendChild(inp); card.appendChild(a);
  scrim.classList.add('open');
  cancel.addEventListener('click', () => scrim.classList.remove('open'));
  ok.addEventListener('click', async () => {
    ok.disabled = true;
