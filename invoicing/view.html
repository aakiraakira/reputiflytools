<html lang="en">

     button to produce a real .pdf download for the client. -->

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:#0A0A0A; --ink-soft:#2B2B2B; --ink-muted:#6B6B6B; --ink-faint:#9E9E9E;
  --hairline:#ECECEC; --hairline-strong:#DEDEDE;
  --surface:#FFFFFF; --surface-soft:#F6F6F6; --surface-card:#F4F4F4;
  --paid:#10B981; --due:#F59E0B; --danger:#DC2626;
  --r-sm:8px; --r-md:14px; --r-lg:20px; --r-xl:24px; --pill:999px;
  --shadow-page: 0 30px 80px -28px rgba(0,0,0,0.22), 0 0 0 1px rgba(0,0,0,0.04);
}
html, body {
  background: #E8E8E8;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  color: var(--ink); line-height: 1.5;
}
body { padding: 56px 24px 96px; display: flex; flex-direction: column; align-items: center; gap: 24px; min-height: 100vh; }
/* When only the status card is showing (loading / not-found / error),
   center it vertically in the viewport. Once the invoice loads,
   #status-host is hidden so this auto-margin no-ops and the .page
   elements fill the layout normally. */
#status-host { margin-top: auto; margin-bottom: auto; }
#invoice-host:not(:empty) ~ .viewer-foot,
#invoice-host:not(:empty) { width: auto; }
.page {
  width: 210mm; min-height: 297mm; background: var(--surface);
  padding: 14mm 14mm; border-radius: 10px; box-shadow: var(--shadow-page);
  position: relative; display: flex; flex-direction: column;
}
.page + .page { page-break-before: always; }
.header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 24px; border-bottom: 1px solid var(--hairline); }
.brand-col { display: flex; flex-direction: column; gap: 18px; }
.brand-logo { height: 42px; width: auto; display: block; }
.meta-col { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 14px; }
.invoice-title { font-size: 44px; font-weight: 800; letter-spacing: -0.045em; line-height: 1; color: var(--ink); }
.invoice-number-pill { display: inline-block; background: var(--ink); color: white; font-size: 12px; font-weight: 600; letter-spacing: 0.05em; padding: 7px 14px; border-radius: var(--pill); font-variant-numeric: tabular-nums; }
.dates { display: flex; flex-direction: column; gap: 5px; font-size: 12.5px; font-variant-numeric: tabular-nums; }
.dates .row { display: flex; justify-content: flex-end; gap: 10px; }
.dates .label { color: var(--ink-faint); font-weight: 500; min-width: 50px; text-align: right; }
.dates .value { color: var(--ink); font-weight: 600; }
.parties { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; margin-top: 28px; }
.party-detail .line { display: block; }
.party-block { display: flex; flex-direction: column; gap: 10px; }
.label-pill { display: inline-block; align-self: flex-start; font-size: 9.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-muted); background: var(--surface-soft); padding: 6px 11px; border-radius: var(--pill); }
.party-name { font-size: 17px; font-weight: 700; letter-spacing: -0.015em; color: var(--ink); line-height: 1.3; }
.party-detail { font-size: 12.5px; color: var(--ink-muted); line-height: 1.65; font-weight: 500; }
.items { margin-top: 30px; }
.items-head { display: grid; grid-template-columns: 1fr 70px 120px 140px; border-bottom: 1px solid var(--hairline-strong); }
.items-head > span { padding: 14px 14px; font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-muted); }
.items-head > span:nth-child(1) { padding-left: 4px; }
.items-head > span:nth-child(n+2) { text-align: right; }
.items-head > span:nth-child(4) { padding-right: 4px; }
.item-row { display: grid; grid-template-columns: 1fr 70px 120px 140px; border-bottom: 1px solid var(--hairline); align-items: center; }
.item-row > div { padding: 20px 14px; }
.item-row > .item-desc { padding-left: 4px; }
.item-row > .item-num { padding-right: 4px; }
.item-row > .item-num:not(:last-child) { padding-right: 14px; }
.item-desc { font-size: 14.5px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
.item-desc small { display: block; margin-top: 3px; font-size: 12px; font-weight: 500; color: var(--ink-muted); letter-spacing: 0; }
.item-num { font-size: 14px; font-variant-numeric: tabular-nums; text-align: right; color: var(--ink); font-weight: 500; }
.item-num.muted { color: var(--ink-muted); font-weight: 500; }
.totals { display: flex; justify-content: flex-end; margin-top: 18px; }
.totals-inner { width: 320px; }
.total-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 4px; font-size: 13px; font-variant-numeric: tabular-nums; }
.total-row .label { color: var(--ink-muted); font-weight: 500; }
.total-row .value { color: var(--ink); font-weight: 600; }
.total-row.grand { margin-top: 8px; padding: 18px 4px 6px; border-top: 1px solid var(--hairline-strong); }
.total-row.grand .label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-soft); }
.total-row.grand .value { font-size: 26px; font-weight: 800; letter-spacing: -0.025em; color: var(--ink); }
.payment { display: grid; grid-template-columns: 168px 1fr; gap: 28px; background: #F2F2F2; border-radius: var(--r-xl); padding: 24px 28px; margin-top: 28px; align-items: center; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03); }
.qr-wrap { width: 168px; height: 168px; background: white; border-radius: var(--r-md); padding: 10px; box-shadow: 0 0 0 1px var(--hairline-strong), 0 6px 18px -10px rgba(0,0,0,0.12); display: flex; align-items: center; justify-content: center; }
.qr-wrap svg, .qr-wrap img { width: 100%; height: 100%; display: block; object-fit: contain; }
.payment-info { display: flex; flex-direction: column; gap: 4px; }
.payment-info .label-pill { background: white; align-self: flex-start; }
.pay-amount { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; color: var(--ink); margin-top: 14px; line-height: 1; font-variant-numeric: tabular-nums; }
.pay-payee { font-size: 17px; font-weight: 700; letter-spacing: -0.015em; color: var(--ink); margin-top: 8px; }
.pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 32px; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(0,0,0,0.07); }
.pay-field { display: flex; flex-direction: column; gap: 2px; font-variant-numeric: tabular-nums; }
.pay-field .k { font-size: 9.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); }
.pay-field .v { font-size: 14px; font-weight: 700; color: var(--ink); letter-spacing: -0.005em; }
.pay-note { margin-top: 14px; font-size: 11.5px; color: var(--ink-muted); line-height: 1.55; font-weight: 500; }
.foot { margin-top: auto; padding-top: 22px; border-top: 1px solid var(--hairline); display: flex; justify-content: space-between; align-items: flex-end; }
.thanks { font-size: 14px; color: var(--ink); font-weight: 700; letter-spacing: -0.015em; }
.thanks small { display: block; font-size: 11.5px; color: var(--ink-muted); font-weight: 500; letter-spacing: 0; margin-top: 3px; }
.wordmark { font-size: 9.5px; font-weight: 700; letter-spacing: 0.32em; color: var(--ink-faint); text-transform: uppercase; }
.terms-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 24px; border-bottom: 1px solid var(--hairline); }
.terms-header .brand-logo { height: 30px; }
.terms-ref { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
.terms-ref .ref-pill { display: inline-block; background: var(--surface-soft); color: var(--ink-muted); font-size: 9.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; padding: 6px 11px; border-radius: var(--pill); }
.terms-ref .ref-num { font-size: 12px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; letter-spacing: -0.005em; }
.terms-intro { margin-top: 32px; display: flex; flex-direction: column; gap: 8px; }
.terms-title { font-size: 38px; font-weight: 800; letter-spacing: -0.04em; line-height: 1.05; color: var(--ink); }
.terms-subtitle { font-size: 13.5px; color: var(--ink-muted); font-weight: 500; line-height: 1.55; max-width: 520px; }
.terms-card { margin-top: 28px; background: var(--surface-soft); border-radius: var(--r-xl); padding: 28px 30px; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03); display: flex; flex-direction: column; }
.terms-section { padding: 22px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
.terms-section:first-child { padding-top: 4px; }
.terms-section:last-child { padding-bottom: 4px; border-bottom: none; }
.terms-section .head { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
.terms-section .num { font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); font-variant-numeric: tabular-nums; }
.terms-section h3 { font-size: 16px; font-weight: 700; color: var(--ink); letter-spacing: -0.015em; }
.terms-section p, .terms-section li { font-size: 13px; color: var(--ink-soft); line-height: 1.65; font-weight: 500; }
.terms-section p + p { margin-top: 8px; }

/* Viewer-specific UI (not part of the printed page) */
.viewer-bar {
  position: fixed; top: 14px; right: 14px; left: 14px;
  display: flex; justify-content: flex-end; gap: 8px;
  z-index: 50;
}
.viewer-btn {
  font: inherit; font-size: 13px; font-weight: 600;
  background: var(--ink); color: white; border: 0;
  padding: 11px 18px; border-radius: var(--pill);
  cursor: pointer; box-shadow: 0 6px 18px -8px rgba(0,0,0,0.35);
  display: inline-flex; align-items: center; gap: 8px;
  transition: transform 100ms ease, opacity 100ms ease;
}
.viewer-btn:hover { transform: translateY(-1px); }
.viewer-btn:active { transform: translateY(0); opacity: 0.9; }
.viewer-btn.secondary { background: white; color: var(--ink); }
.viewer-state {
  background: white; border-radius: var(--r-lg);
  padding: 60px 40px; max-width: 520px; width: 100%;
  text-align: center; box-shadow: var(--shadow-page);
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.viewer-state .state-icon {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--surface-soft);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-muted);
}
.viewer-state .state-icon.error { background: rgba(220,38,38,0.08); color: var(--danger); }
.viewer-state h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
.viewer-state p { font-size: 14px; color: var(--ink-muted); line-height: 1.55; max-width: 380px; }
.viewer-state a { color: var(--ink); text-decoration: underline; font-weight: 600; }

.viewer-foot {
  position: fixed; bottom: 12px; left: 0; right: 0;
  text-align: center; font-size: 11px; color: var(--ink-faint); font-weight: 500;
  letter-spacing: 0.04em; z-index: 40;
}
.viewer-foot a { color: inherit; text-decoration: none; }
.viewer-foot a:hover { text-decoration: underline; }

.voided-watermark {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 5;
}
.voided-watermark span {
  font-size: 140px; font-weight: 900; letter-spacing: 0.08em;
  color: rgba(220,38,38,0.18); transform: rotate(-22deg);
  text-transform: uppercase;
  border: 8px solid rgba(220,38,38,0.18); padding: 12px 56px; border-radius: 16px;
}

/* Mobile: keep the EXACT desktop A4 layout (210mm × 297mm). Phones
   smaller than the page width get a horizontally-scrollable, pinch-
   zoomable view — same proportions, same fonts, same grid as desktop,
   same as the downloaded PDF. Only the chrome (action bar / footer
   padding) shrinks for narrow screens. */
@media (max-width: 794px) {
  body { padding: 16px 8px 80px; overflow-x: auto; }
  .viewer-bar { right: 8px; left: 8px; }
  .viewer-btn { padding: 9px 14px; font-size: 12.5px; }
  .voided-watermark span { font-size: 90px; padding: 10px 36px; }
}

@media print {
  html, body { background: white; padding: 0; }
  body { padding: 0; gap: 0; }
  .page { box-shadow: none; border-radius: 0; width: 210mm; min-height: 297mm; padding: 14mm 14mm; }
  .viewer-bar, .viewer-foot { display: none !important; }
  .voided-watermark span { color: rgba(220,38,38,0.35); border-color: rgba(220,38,38,0.35); }
}
@page { size: A4; margin: 0; }
</style>
</head>
<body>

<!-- Top-right action bar (hidden in print) -->
<div class="viewer-bar" id="viewer-bar" style="display:none;">
  <button class="viewer-btn" id="download-pdf">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download PDF
  </button>
</div>

<!-- Loading / error / not-found state container -->
<div id="status-host" class="viewer-state">
  <div class="state-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
  </div>
  <h1>Loading invoice…</h1>
  <p>One moment while we fetch your document.</p>
</div>

<!-- Invoice render target -->
<div id="invoice-host" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:24px;"></div>

<!-- Embedded templates — verbatim copy of #tpl-invoice / #tpl-invoice-with-terms from index.html -->
<template id="tpl-invoice">
  <div class="page">
    <header class="header">
      <div class="brand-col"><img class="brand-logo" data-bind="logo" alt="Reputifly"></div>
      <div class="meta-col">
        <div class="invoice-title" data-bind="docTitle">Invoice</div>
        <div class="invoice-number-pill" data-bind="displayNumber">INV-0001</div>
        <div class="dates"><div class="row"><span class="label" data-bind="dateLabel">Issued</span><span class="value" data-bind="issueDate">01 May 2026</span></div></div>
      </div>
    </header>
    <section class="parties">
      <div class="party-block">
        <span class="label-pill">From</span>
        <div class="party-name" data-bind="company.name">Reputifly Pte Ltd</div>
        <div class="party-detail">
          <span class="line"><span data-bind="company.uenLine">UEN&nbsp;202531855M</span></span>
          <span class="line" data-bind="company.address1" data-optional="company.address">Woods Square</span>
          <span class="line" data-bind="company.address2" data-optional="company.address">Singapore 737715</span>
          <span class="line" data-bind="company.email" data-optional="company.email">hello@reputifly.com</span>
        </div>
      </div>
      <div class="party-block">
        <span class="label-pill">Billed to</span>
        <div class="party-name" data-bind="client.name">Client</div>
        <div class="party-detail">
          <span class="line" data-bind="client.attn" data-optional="client.attn">Attn:</span>
          <span class="line" data-bind="client.address" data-optional="client.address">Address</span>
          <span class="line" data-bind="client.postal" data-optional="client.postal">Postal</span>
          <span class="line" data-bind="client.email" data-optional="client.email">email</span>
        </div>
      </div>
    </section>
    <section class="items">
      <div class="items-grid">
        <div class="items-head"><span>Description</span><span>Qty</span><span>Rate</span><span>Amount</span></div>
        <div data-bind="items"></div>
      </div>
    </section>
    <section class="totals">
      <div class="totals-inner">
        <div class="total-row"><span class="label">Subtotal</span><span class="value" data-bind="subtotal">S$0.00</span></div>
        <div class="total-row grand"><span class="label">Total</span><span class="value" data-bind="total">S$0.00</span></div>
      </div>
    </section>
    <section class="payment">
      <div class="qr-wrap"><img data-bind="qr" alt="PayNow QR"></div>
      <div class="payment-info">
        <span class="label-pill">Pay via PayNow</span>
        <div class="pay-amount" data-bind="payAmount">S$0.00</div>
        <div class="pay-payee" data-bind="payPayee">Reputifly Pte Ltd</div>
        <div class="pay-grid">
          <div class="pay-field"><span class="k">UEN</span><span class="v" data-bind="payUen">202531855M</span></div>
          <div class="pay-field"><span class="k">Reference</span><span class="v" data-bind="payRef">INV-0001</span></div>
        </div>
        <div class="pay-note" data-optional="payment.note" data-bind="payNote">Scan the QR with your banking app, or transfer via PayNow / FAST quoting the reference above.</div>
      </div>
    </section>
    <footer class="foot" data-optional="footer.block">
      <div class="thanks">
        <span data-optional="footer.thanks" data-bind="footerThanks">Thank you for your business.</span>
        <small data-optional="footer.contact" data-bind="footerContact">Questions? hello@reputifly.com</small>
      </div>
      <div class="wordmark" data-optional="footer.wordmark" data-bind="footerWordmark">REPUTIFLY</div>
    </footer>
  </div>
</template>

  <div class="page">
    <header class="terms-header">
      <img class="brand-logo" data-bind="logo" alt="Reputifly">
      <div class="terms-ref"><span class="ref-pill">Continued</span><span class="ref-num" data-bind="termsRef">REF</span></div>

    <div class="terms-intro">
      <h2 class="terms-title" data-bind="termsTitle">Additional Information</h2>
      <p class="terms-subtitle" data-bind="termsSubtitle">Terms, conditions, and supporting notes.</p>
    </div>
    <div class="terms-card" data-bind="termsSections"></div>
    <footer class="foot">
      <div class="thanks">
        <span data-bind="footerThanks2">Thank you for your business.</span>
        <small data-bind="footerContact2">Questions? hello@reputifly.com</small>
      </div>
      <div class="wordmark">REPUTIFLY · 2 / 2</div>
    </footer>
  </div>
</template>

<div class="viewer-foot">
  Issued via <a href="https://reputifly.com" target="_blank" rel="noopener">Reputifly</a>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCm6E-0T9nOy5TKxX2D6-HdMVER2xrUZWA",
  authDomain: "reputifly-accounting.firebaseapp.com",
  projectId: "reputifly-accounting",
  storageBucket: "reputifly-accounting.firebasestorage.app",
  messagingSenderId: "1095177901433",
  appId: "1:1095177901433:web:38c7403bd8382c9bc10ba8"
};

// ── Tiny utility helpers (subset of index.html, copied so the viewer
// is fully self-contained — no auth code shipped to clients) ──────
const escapeHtml = (s) => String(s || '').replace(/[&<>"']/g, c => (
  { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
));
const fmtMoney = (n) => 'S$' + (Number(n) || 0).toLocaleString('en-SG', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDate = (iso) => {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const day = String(d.getDate()).padStart(2, '0');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${day} ${months[d.getMonth()]} ${d.getFullYear()}`;
};

// Default optional flags — match index.html DEFAULT_OPTIONAL.
const DEFAULT_OPTIONAL = {
  'invoice.dueDate': false,
  'company.address': true, 'company.email': true,
  'client.attn': true, 'client.address': true, 'client.postal': true, 'client.email': true,
  'item.subtitle': true, 'payment.note': true,
  'footer.thanks': true, 'footer.contact': true, 'footer.wordmark': true, 'footer.block': true
};

function bindData(root, d) {
  const c = d.company || {};
  // Smart address split (same as index.html)
  const addrParts = (c.address || '').split(',').map(p => p.trim()).filter(Boolean);
  const splitAt = Math.ceil(addrParts.length / 2);
  const addr1 = addrParts.slice(0, splitAt).join(', ');
  const addr2 = addrParts.slice(splitAt).join(', ');

  const variant = d.terms ? 'invoice-with-terms' : 'invoice';
  const data = {
    'logo': 'assets/reputifly-logo-light.png',
    'qr': 'assets/paynow-qr.jpeg',
    'docTitle': 'Invoice',
    'displayNumber': d.displayNumber || '',
    'dateLabel': 'Issued',
    'issueDate': fmtDate(d.issueDate),
    'company.name': c.name || '',
    'company.uenLine': c.uen ? `UEN ${c.uen}` : '',
    'company.address1': addr1,
    'company.address2': addr2,
    'company.email': c.email || '',
    'client.name': (d.client && d.client.name) || '',
    'client.attn': (d.client && d.client.attn) ? `Attn: ${d.client.attn}` : '',
    'client.address': (d.client && d.client.address) || '',
    'client.postal': (d.client && d.client.postal) || '',
    'client.email': (d.client && d.client.email) || '',
    'subtotal': fmtMoney(d.subtotal),
    'total': fmtMoney(d.total),
    'payAmount': fmtMoney(d.total),
    'payPayee': c.name || '',
    'payUen': c.uen || '',
    'payRef': d.displayNumber || '',
    'payNote': 'Scan the QR with your banking app, or transfer via PayNow / FAST quoting the reference above.',
    'footerThanks': 'Thank you for your business.',
    'footerContact': variant === 'invoice-with-terms' ? 'Continued on next page →' : `Questions? ${c.email || ''}`,
    'footerWordmark': variant === 'invoice-with-terms' ? 'REPUTIFLY · 1 / 2' : (c.name || 'REPUTIFLY').split(' ')[0].toUpperCase(),
    'termsRef': `${d.displayNumber} · ${fmtDate(d.issueDate)}`,
    'termsTitle': (d.terms && d.terms.title) || 'Additional Information',
    'termsSubtitle': (d.terms && d.terms.subtitle) || '',
    'footerThanks2': 'Thank you for your business.',
    'footerContact2': `Questions? ${c.email || ''}`
  };

  root.querySelectorAll('[data-bind]').forEach(el => {
    const key = el.getAttribute('data-bind');
    if (key === 'logo' || key === 'qr') {
      el.setAttribute('src', data[key] || '');
      return;
    }
    if (key === 'items') {
      el.innerHTML = '';
      (d.items || []).forEach(item => {
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
          <div class="item-desc">
            ${escapeHtml(item.description || '')}
            ${item.subtitle ? `<small>${escapeHtml(item.subtitle)}</small>` : ''}
          </div>
          <div class="item-num muted">${Number(item.qty) || 0}</div>
          <div class="item-num">${escapeHtml(fmtMoney(item.rate))}</div>
          <div class="item-num">${escapeHtml(fmtMoney(item.amount))}</div>
        `;
        el.appendChild(row);
      });
      return;
    }
    if (key === 'termsSections') {
      el.innerHTML = '';
      const sections = (d.terms && d.terms.sections) || [];
      sections.forEach((sec, i) => {
        const sd = document.createElement('div');
        sd.className = 'terms-section';
        const paras = (sec.body || '').split(/\n\n+/).map(p => `<p>${escapeHtml(p).replace(/\n/g, '<br>')}</p>`).join('');
        sd.innerHTML = `
          <div class="head">
            <span class="num">${String(i + 1).padStart(2, '0')}</span>
            <h3>${escapeHtml(sec.heading || '')}</h3>
          </div>
          ${paras}
        `;
        el.appendChild(sd);
      });
      return;
    }
    el.textContent = data[key] != null ? data[key] : '';
  });

  // Strip empty optional fields
  const optMap = (d.optional && Object.keys(d.optional).length) ? d.optional : DEFAULT_OPTIONAL;
  root.querySelectorAll('[data-optional]').forEach(el => {
    const key = el.getAttribute('data-optional');
    const visible = optMap[key];
    let textOk = true;
    if (el.hasAttribute('data-bind')) {
      const v = el.textContent.trim();
      if (!v || v === 'Attn:') textOk = false;
    }
    if (visible === false || !textOk) el.remove();
  });
}

function showState({ icon, title, body, error }) {
  const host = document.getElementById('status-host');
  host.innerHTML = `
    <div class="state-icon ${error ? 'error' : ''}">${icon}</div>
    <h1>${escapeHtml(title)}</h1>
    <p>${body}</p>
  `;
  host.style.display = '';
}

function hideStatus() {
  document.getElementById('status-host').style.display = 'none';
}

function pdfFilename(d) {
  const num = (d.displayNumber || 'INVOICE').replace(/\s+/g, '');
  const clientRaw = ((d.client && d.client.name) || '').toString();
  const client = clientRaw.replace(/[^\w\s-]/g, '').trim().replace(/\s+/g, '-').toUpperCase().slice(0, 32);
  return client ? `${num}-${client}` : num;
}

// Pre-fetch every <img> in the rendered tree and replace its src with
// an inline data URL. This guarantees html2canvas can paint them — same-
// origin assets are fine to fetch + readAsDataURL with no CORS dance.
async function inlineImagesAsDataUrls(rootEl) {
  const imgs = Array.from(rootEl.querySelectorAll('img'));
  await Promise.all(imgs.map(async (img) => {
    const src = img.getAttribute('src');
    if (!src || src.startsWith('data:')) return;
    try {
      const resp = await fetch(src);
      if (!resp.ok) return;
      const blob = await resp.blob();
      const dataUrl = await new Promise((resolve, reject) => {
        const r = new FileReader();
        r.onloadend = () => resolve(r.result);
        r.onerror = reject;
        r.readAsDataURL(blob);
      });
      img.setAttribute('src', dataUrl);
      // Wait for the new src to load before continuing — html2canvas
      // checks complete/naturalWidth and silently skips not-yet-loaded.
      await new Promise(r => {
        if (img.complete && img.naturalWidth) r();
        else { img.addEventListener('load', r, { once: true }); img.addEventListener('error', r, { once: true }); }
      });
    } catch (e) {
      console.warn('[pdf] image inline failed for', src, e);
    }
  }));
}

function setupDownloadButton(d, renderedRoot) {
  const btn = document.getElementById('download-pdf');
  document.getElementById('viewer-bar').style.display = '';
  btn.addEventListener('click', async () => {
    const original = btn.innerHTML;
    btn.innerHTML = 'Generating PDF…';
    btn.disabled = true;
    try {
      // Wait for html2pdf CDN to finish loading (defer attr means it
      // may not be ready instantly on first click).
      let waited = 0;
      while (typeof html2pdf === 'undefined' && waited < 5000) {
        await new Promise(r => setTimeout(r, 100)); waited += 100;
      }
      if (typeof html2pdf === 'undefined') throw new Error('PDF library failed to load');

      // Clone the rendered DOM so we can mutate img sources without
      // affecting what's on screen. Inline every image as data URL,
      // then hand to html2pdf for rasterisation into A4 pages.
      const clone = renderedRoot.cloneNode(true);
      // Wrap clone in a fixed-width container so html2canvas reads the
      // A4 layout regardless of the user's viewport.
      const stage = document.createElement('div');
      stage.style.cssText = 'position:fixed; left:-99999px; top:0; width:794px; background:white;';
      stage.appendChild(clone);
      document.body.appendChild(stage);

      try {
        await inlineImagesAsDataUrls(clone);
        try { await document.fonts.ready; } catch {}

        await html2pdf()
          .from(clone)
          .set({
            margin: 0,
            filename: pdfFilename(d) + '.pdf',
            image: { type: 'jpeg', quality: 0.95 },
            html2canvas: {
              scale: 2,
              useCORS: true,
              backgroundColor: '#ffffff',
              windowWidth: 794,
              letterRendering: true
            },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait', compress: true },
            pagebreak: { mode: ['css', 'legacy'], avoid: ['.payment', '.foot', '.terms-section'] }
          })
          .save();
      } finally {
        if (stage.parentNode) stage.parentNode.removeChild(stage);
      }
    } catch (e) {
      console.error('[pdf] generation failed', e);
      alert('Couldn\'t generate the PDF. Please try refreshing the page. (' + (e.message || e) + ')');
    } finally {
      btn.innerHTML = original;
      btn.disabled = false;
    }
  });
}

function applyVoidedOverlay(host) {
  const wm = document.createElement('div');
  wm.className = 'voided-watermark';
  wm.innerHTML = '<span>Voided</span>';
  // Append to each .page so multi-page renders get a watermark per page.
  host.querySelectorAll('.page').forEach(p => {
    const local = wm.cloneNode(true);
    p.style.position = 'relative';
    p.appendChild(local);
  });
}

// ── Boot ────────────────────────────────────────────────────────────
const NOT_FOUND_ICON = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';
const ERROR_ICON     = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>';

(async function boot() {
  const params = new URLSearchParams(location.search);
  const token = (params.get('i') || '').trim().toLowerCase();

  // Validate format BEFORE hitting the network — saves rule-deny round trips
  // and prevents arbitrary input from being passed downstream.
  if (!/^[a-z0-9]{12,24}$/.test(token)) {
    showState({
      icon: NOT_FOUND_ICON,
      title: 'Invoice not found',
      body: 'This share link is invalid or incomplete. Please check the link and try again, or contact the sender.'
    });
    return;
  }

  let app, db, snap;
  try {
    app = initializeApp(FIREBASE_CONFIG);
    db = getFirestore(app);
    snap = await getDoc(doc(db, 'shares', token));
  } catch (e) {
    console.error('[viewer] fetch failed', e);
    showState({
      icon: ERROR_ICON, error: true,
      title: 'Couldn\'t load invoice',
      body: 'Network or service error. Please check your connection and try refreshing the page.'
    });
    return;
  }

  if (!snap.exists()) {
    showState({
      icon: NOT_FOUND_ICON,
      title: 'Invoice not found',
      body: 'This invoice has been removed or the link is no longer valid. If you believe this is a mistake, please contact the sender.'
    });
    return;
  }

  const d = snap.data();

  // Pick template based on whether the doc has terms
  const variant = d.terms ? 'invoice-with-terms' : 'invoice';
  const tpl = document.getElementById(`tpl-${variant}`);
  const clone = tpl.content.cloneNode(true);
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'display:flex; flex-direction:column; align-items:center; gap:24px; width:100%;';
  wrapper.appendChild(clone);
  bindData(wrapper, d);

  if (d.status === 'void') applyVoidedOverlay(wrapper);

  const host = document.getElementById('invoice-host');
  host.appendChild(wrapper);

  // Set tab title to the invoice number for nice browser history.
  if (d.displayNumber) document.title = `${d.displayNumber} · Reputifly`;

  hideStatus();
  setupDownloadButton(d, wrapper.innerHTML);
})();
</script>
