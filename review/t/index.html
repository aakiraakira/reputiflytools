<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Order Tracking</title>
    <link rel="icon" type="image/jpeg" href="https://reputifly.com/wp-content/uploads/2026/01/IMG_2123.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #F8F9FA; color: #111; min-height: 100dvh; -webkit-font-smoothing: antialiased; }
        .container { max-width: 640px; margin: 0 auto; padding: 24px 16px 80px; }
        @media (max-width: 640px) {
            .container { padding: 12px 10px 60px; }
            .card { border-radius: 10px; padding: 16px; }
            h1 { font-size: 22px; }
        }
        .card { background: #fff; border: 1px solid #E5E7EB; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
        .badge { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #D1FAE5; color: #065F46; }
        .badge-warning { background: #FEF3C7; color: #92400E; }
        .badge-info { background: #E0E7FF; color: #3730A3; }
        .progress-track { width: 100%; height: 8px; background: #F3F4F6; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #111; border-radius: 4px; transition: width 0.8s ease; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .stat-item { background: #F8F9FA; border-radius: 12px; padding: 16px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 800; }
        .stat-label { font-size: 12px; color: #6B7280; margin-top: 2px; }
        .proof-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-top: 12px; }
        .proof-grid img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 1px solid #E5E7EB; }
        .proof-grid img:hover { opacity: 0.8; }
        .spinner { width: 24px; height: 24px; border: 3px solid #E5E7EB; border-top-color: #111; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
        .live-dot { width: 8px; height: 8px; background: #10B981; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div style="text-align:center;margin-bottom:24px;padding-top:16px">
            <img src="https://reputifly.com/wp-content/uploads/2025/05/cropped-reputifly-new-e1746390492876.png" alt="Logo" style="height:28px;filter:brightness(0);margin-bottom:16px">
            <h1 style="font-size:22px;font-weight:700">Order Tracking</h1>
            <p style="color:#6B7280;font-size:14px;margin-top:4px"><span class="live-dot"></span> Live updates</p>
        </div>

        <!-- Loading -->
        <div id="loading-state" class="card" style="text-align:center;padding:60px">
            <div class="spinner"></div>
            <p style="color:#6B7280;margin-top:16px">Loading order...</p>
        </div>

        <!-- Error -->
        <div id="error-state" class="card hidden" style="text-align:center;padding:60px">
            <p style="color:#EF4444;font-weight:600">Order not found or invalid link.</p>
        </div>

        <!-- Tracking Content -->
        <div id="tracking-state" class="hidden">
            <!-- Order Info -->
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px">
                    <div>
                        <h2 id="track-company" style="font-size:20px;font-weight:700"></h2>
                        <p id="track-status-text" style="font-size:13px;color:#6B7280;margin-top:2px"></p>
                    </div>
                    <div id="track-badges" style="display:flex;gap:6px;flex-wrap:wrap"></div>
                </div>

                <!-- Progress -->
                <div style="margin-top:20px">
                    <div style="display:flex;justify-content:space-between;font-size:14px;margin-bottom:6px">
                        <span style="font-weight:500">Progress</span>
                        <span id="track-progress-text" style="font-weight:700"></span>
                    </div>
                    <div class="progress-track"><div id="track-progress-bar" class="progress-fill" style="width:0%"></div></div>
                </div>

                <!-- Stats -->
                <div class="stat-grid">
                    <div class="stat-item">
                        <div id="track-completed" class="stat-value">0</div>
                        <div class="stat-label">Completed</div>
                    </div>
                    <div class="stat-item">
                        <div id="track-remaining" class="stat-value">0</div>
                        <div class="stat-label">Remaining</div>
                    </div>
                    <div class="stat-item">
                        <div id="track-total" class="stat-value">0</div>
                        <div class="stat-label">Total Ordered</div>
                    </div>
                    <div class="stat-item">
                        <div id="track-daily" class="stat-value">0</div>
                        <div class="stat-label">Daily Target</div>
                    </div>
                </div>
            </div>

            <!-- TNC Status -->
            <div id="tnc-status-card" class="card">
                <div style="display:flex;align-items:center;gap:12px">
                    <div id="tnc-icon" style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0"></div>
                    <div>
                        <p id="tnc-status-title" style="font-weight:600;font-size:15px"></p>
                        <p id="tnc-status-sub" style="font-size:13px;color:#6B7280"></p>
                    </div>
                </div>
            </div>

            <!-- Replacement Status -->
            <div id="replacement-status-card" class="card">
                <div style="display:flex;align-items:center;gap:12px">
                    <div id="repl-icon" style="width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0"></div>
                    <div>
                        <p id="repl-status-title" style="font-weight:600;font-size:15px"></p>
                        <p id="repl-status-sub" style="font-size:13px;color:#6B7280"></p>
                    </div>
                </div>
            </div>

            <!-- Original Delivery Gallery (date-grouped) -->
            <div class="card">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                    <h3 style="font-size:16px;font-weight:600">Original Delivery</h3>
                    <span id="proof-count-orig" style="font-size:13px;color:#6B7280"></span>
                </div>
                <div id="proof-gallery-orig">
                    <p style="color:#6B7280;font-size:14px;text-align:center;padding:24px 0">No screenshots uploaded yet.</p>
                </div>
            </div>

            <!-- Replacement Gallery (date-grouped, only shown when activated) -->
            <div id="replacement-gallery-card" class="card hidden">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
                    <h3 style="font-size:16px;font-weight:600">Replacement</h3>
                    <span id="proof-count-rep" style="font-size:13px;color:#6B7280"></span>
                </div>
                <div id="proof-gallery-rep"></div>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script>
    firebase.initializeApp({
        apiKey: "AIzaSyBKsPEjFq1QrKnavg6tIR4vRUFO3f8QsMs",
        authDomain: "review-automation-dash.firebaseapp.com",
        projectId: "review-automation-dash",
        storageBucket: "review-automation-dash.firebasestorage.app",
        messagingSenderId: "868503238911",
        appId: "1:868503238911:web:ecc55148b2edc56fca34ca"
    });
    const db = firebase.firestore();

    let currentOrder = null;
    let lastProofs = null;

    // Defensive: escape strings before injecting into HTML attributes (defense-in-depth for proof URLs).
    const escAttr = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    })[c]);

    (async () => {
        // Support both /t/ORDER_ID (clean) and /track?order=ORDER_ID (legacy)
        const pathParts = location.pathname.split('/').filter(Boolean);
        const params = new URLSearchParams(location.search);
        const orderId = pathParts.length >= 2 ? pathParts[pathParts.length - 1] : params.get('order');
        const tokenParam = params.get('token');
        if (!orderId) { show('error-state'); return; }

        try {
            // Validate access
            const doc = await db.collection('orders').doc(orderId).get();
            if (!doc.exists) { show('error-state'); return; }
            const order = doc.data();

            // Token validation only when explicitly passed as ?token= param
            if (tokenParam && order.clientTrackingToken && tokenParam !== order.clientTrackingToken) {
                show('error-state'); return;
            }

            show('tracking-state');
            renderOrder(order);
            loadProofs(orderId);

            // Real-time listener for live updates
            db.collection('orders').doc(orderId).onSnapshot(snap => {
                if (snap.exists) renderOrder(snap.data());
            });

            // Real-time proof listener
            db.collection('orders').doc(orderId).collection('proofs')
                .orderBy('uploadedAt', 'desc')
                .onSnapshot(snap => {
                    lastProofs = snap.docs.map(d => d.data());
                    renderProofs(lastProofs);
                });

        } catch(err) {
            console.error(err);
            show('error-state');
        }
    })();

    function renderOrder(o) {
        currentOrder = o;
        document.getElementById('track-company').textContent = o.companyName || 'Order';
        const completed = o.completedCount || 0;
        const total = o.quantity || 0;
        const remaining = Math.max(0, total - completed);
        const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

        document.getElementById('track-progress-text').textContent = `${completed} / ${total} (${pct}%)`;
        document.getElementById('track-progress-bar').style.width = `${pct}%`;
        document.getElementById('track-completed').textContent = completed;
        document.getElementById('track-remaining').textContent = remaining;
        document.getElementById('track-total').textContent = total;
        document.getElementById('track-daily').textContent = o.dailyTarget || 5;
        document.getElementById('track-status-text').textContent = o.status === 'completed' ? 'Order completed' : `${remaining} reviews remaining`;

        // Badges
        const badgesEl = document.getElementById('track-badges');
        const statusClass = o.status === 'completed' ? 'badge-success' : 'badge-info';
        badgesEl.innerHTML = `<span class="badge ${statusClass}">${o.status || 'active'}</span>`;

        // TNC status
        const tncIcon = document.getElementById('tnc-icon');
        const tncTitle = document.getElementById('tnc-status-title');
        const tncSub = document.getElementById('tnc-status-sub');
        if (o.tncSigned) {
            tncIcon.style.background = '#D1FAE5';
            tncIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            tncTitle.textContent = 'Terms & Conditions Signed';
            tncSub.textContent = 'Agreement has been signed and recorded.';
        } else {
            tncIcon.style.background = '#FEF3C7';
            tncIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
            tncTitle.textContent = 'Terms & Conditions Pending';
            tncSub.textContent = 'Please sign the agreement to proceed.';
        }

        // Replacement status
        const replIcon = document.getElementById('repl-icon');
        const replTitle = document.getElementById('repl-status-title');
        const replSub = document.getElementById('repl-status-sub');
        const isActive = o.replacementActivated === true;
        const replN = o.replacementQty || (isActive ? 0 : Math.round((o.quantity || 0) * 0.3));
        const origQ = o.originalQuantity || (isActive ? ((o.quantity || 0) - replN) : (o.quantity || 0));
        const isDelivered = origQ > 0 && completed >= origQ;
        const isEligible = isDelivered && origQ >= 10 && !isActive;
        if (isActive) {
            const ts = o.replacementActivatedAt?.toDate ? o.replacementActivatedAt.toDate() : null;
            const dateStr = ts ? ts.toLocaleDateString('en-SG', { dateStyle: 'medium' }) : '';
            replIcon.style.background = '#D1FAE5';
            replIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            replTitle.textContent = `Replacement Active — +${replN} reviews`;
            replSub.textContent = dateStr ? `Activated on ${dateStr}` : 'Activated';
        } else if (isEligible) {
            replIcon.style.background = '#FEF3C7';
            replIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 11-6.219-8.56"></path><polyline points="21 4 21 12 13 12"></polyline></svg>';
            replTitle.textContent = `Replacement Available — +${replN} reviews`;
            replSub.textContent = 'Open your TNC link to activate.';
        } else {
            replIcon.style.background = '#F3F4F6';
            replIcon.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>';
            replTitle.textContent = 'Replacement Coverage';
            replSub.textContent = 'Available once your order is fully delivered.';
        }

        // Re-render proofs whenever order changes (replacement activation re-splits the gallery).
        if (lastProofs !== null) renderProofs(lastProofs);
    }

    function loadProofs(orderId) {
        // Initial load handled by onSnapshot above
    }

    function renderProofs(proofs) {
        const o = currentOrder || {};
        const isActive = o.replacementActivated === true;
        const activationTs = o.replacementActivatedAt?.toDate ? o.replacementActivatedAt.toDate().getTime() : null;

        // Split: proofs uploaded BEFORE replacement activation are "original", AFTER are "replacement".
        const orig = [], rep = [];
        proofs.forEach(p => {
            if (!isActive || activationTs === null) { orig.push(p); return; }
            const t = p.uploadedAt?.toDate ? p.uploadedAt.toDate().getTime() : null;
            if (t === null) rep.push({ ...p, _undated: true });
            else if (t <= activationTs) orig.push(p);
            else rep.push(p);
        });

        const tile = (p) => `<a href="${escAttr(p.imageUrl)}" target="_blank" rel="noopener noreferrer" style="display:block;border-radius:8px;overflow:hidden;border:1px solid #E5E7EB"><img src="${escAttr(p.imageUrl)}" alt="Proof" loading="lazy" style="width:100%;height:100px;object-fit:cover;display:block"></a>`;

        // Shared: render a list of proofs grouped by upload date (newest first), with an "Undated" bucket if needed.
        const renderGrouped = (items, emptyMsg) => {
            if (items.length === 0) {
                return `<p style="color:#6B7280;font-size:14px;text-align:center;padding:24px 0">${emptyMsg}</p>`;
            }
            const grouped = {};
            const dated = [];
            const undated = [];
            items.forEach(p => {
                if (p._undated || !(p.uploadedAt && p.uploadedAt.toDate)) { undated.push(p); return; }
                const ts = p.uploadedAt.toDate();
                const key = ts.toLocaleDateString('en-SG', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
                if (!grouped[key]) { grouped[key] = []; dated.push({ key, ts }); }
                grouped[key].push(p);
            });
            dated.sort((a, b) => b.ts.getTime() - a.ts.getTime());

            const renderGroup = (label, color, list) => `
                <div style="margin-bottom:20px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                        <p style="font-size:13px;font-weight:600;color:${color}">${escAttr(label)}</p>
                        <span style="font-size:12px;color:#6B7280">${list.length} screenshot${list.length !== 1 ? 's' : ''} (${list.length} review${list.length !== 1 ? 's' : ''})</span>
                    </div>
                    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px">
                        ${list.map(tile).join('')}
                    </div>
                </div>
            `;

            let html = dated.map(({ key }) => renderGroup(key, '#374151', grouped[key])).join('');
            if (undated.length > 0) html += renderGroup('Undated', '#9CA3AF', undated);
            return html;
        };

        // Original Delivery — now date-grouped to match Replacement
        const galleryOrig = document.getElementById('proof-gallery-orig');
        document.getElementById('proof-count-orig').textContent = `${orig.length} screenshot${orig.length !== 1 ? 's' : ''}`;
        galleryOrig.innerHTML = renderGrouped(orig, 'No screenshots uploaded yet.');

        // Replacement — only shown when activated
        const replCard = document.getElementById('replacement-gallery-card');
        const galleryRep = document.getElementById('proof-gallery-rep');
        const countRep = document.getElementById('proof-count-rep');
        if (!isActive) {
            replCard.classList.add('hidden');
            return;
        }
        replCard.classList.remove('hidden');
        countRep.textContent = `${rep.length} screenshot${rep.length !== 1 ? 's' : ''}`;
        galleryRep.innerHTML = renderGrouped(rep, 'No replacement screenshots yet.');
    }

    function show(id) {
        ['loading-state', 'error-state', 'tracking-state'].forEach(s => {
            document.getElementById(s).classList.toggle('hidden', s !== id);
        });
    }
    </script>
</body>
</html>
