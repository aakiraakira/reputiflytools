            attachEmployeeListeners() {
                document.getElementById('add-employee-btn')?.addEventListener('click', () => {
                    this.showAddEmployeeModal();
                });
                document.querySelectorAll('.edit-employee-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.showEditEmployeeModal(btn.dataset.id, btn.dataset.name, btn.dataset.tier || 'trusted');
                    });
                });
                document.querySelectorAll('.reset-pw-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const uid = btn.dataset.id;
                        const name = btn.dataset.name;
                        const newPw = prompt(`New password for "${name}" (min 6 chars):`);
                        if (!newPw || newPw.length < 6) { if (newPw !== null) this.toast('Password must be at least 6 characters.', 'error'); return; }
                        try {
                            const token = await auth.currentUser.getIdToken();
                            const resp = await fetch(`${API_BASE}/reset-password`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ uid, newPassword: newPw })
                            });
                            if (!resp.ok) throw new Error((await resp.json()).error || 'Failed');
                            this.toast(`Password reset for ${name}!`, 'success');
                        } catch(err) { this.toast(err.message, 'error'); }
                    });
                });
                document.querySelectorAll('.revoke-employee').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const uid = btn.dataset.id;
                        const name = btn.dataset.name;
                        this.showConfirm(`Revoke access for "${name}"? They will no longer be able to log in.`, async () => {
                        try {
                            const token = await auth.currentUser.getIdToken();
                            const resp = await fetch(`${API_BASE}/revoke-employee`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ uid })
                            });
                            const data = await resp.json();
                            if (!resp.ok) throw new Error(data.error || 'Failed');
                            this.toast(`Access revoked for ${name}`, 'success');
                            this.loadEmployees();
                            this.updateView();
                        } catch(err) {
                            this.toast(err.message, 'error');
                        }
                        });
                    });
                });
            },

            showAddEmployeeModal() {
                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="emp-modal">
                        <div class="modal-content">
                            <h2 style="font-size:20px;font-weight:700;margin-bottom:20px">Add Employee</h2>
                            <form id="add-emp-form" style="display:flex;flex-direction:column;gap:16px">

                document.getElementById('cancel-emp').onclick = () => this.el.modal.innerHTML = '';

            // ═══════════════════════════════════════════════════════
            // ═══════════════════════════════════════════════════════
            // TAB: TRACKER (Admin - live sheet view)
            // ═══════════════════════════════════════════════════════
            renderTracker() {
                const isAdmin = this.state.userRole === 'admin';
                const allOrders = isAdmin ? this.state.orders : (this.state._allOrders || this.state.orders);
                const filter = this.state.trackerFilter || '';
                const sort = this.state.trackerSort || { field: 'companyName', dir: 'asc' };
                const status = this.state.activeStatus || 'in-progress';
                // Tab counts use the SAME completion logic as Orders tab — based on completedCount,
                // not the status field, so replacement-activated orders correctly land back in In Progress.
                const isCompleted = (o) => (o.completedCount || 0) >= (o.quantity || 0) && (o.quantity || 0) > 0;
                const inProgressAll = allOrders.filter((o) => !isCompleted(o));
                const completedAll = allOrders.filter(isCompleted);
                const sourceList = status === 'completed' ? completedAll : inProgressAll;
                let activeOrders = sourceList.filter(o => !filter || (o.companyName || '').toLowerCase().includes(filter.toLowerCase()));
                // Sort
                activeOrders = [...activeOrders].sort((a, b) => {
                    let va = a[sort.field], vb = b[sort.field];
                    if (sort.field === 'left') { va = (a.quantity||0) - (a.completedCount||0); vb = (b.quantity||0) - (b.completedCount||0); }
                    if (typeof va === 'number' && typeof vb === 'number') return sort.dir === 'asc' ? va - vb : vb - va;
                    return sort.dir === 'asc' ? String(va||'').localeCompare(String(vb||'')) : String(vb||'').localeCompare(String(va||''));
                });
                return `
                    <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px">
                        <h2 style="font-size:20px;font-weight:700">Tracker</h2>
                        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                            <input type="text" id="tracker-filter" class="input" placeholder="Filter companies..." value="${filter}" style="width:180px;padding:6px 12px;font-size:13px">
                            ${isAdmin ? `<button id="manage-assign-btn" class="btn btn-primary" style="width:auto;font-size:15px;padding:12px 24px;min-height:48px">Manage Assignments</button>` : ''}
                            ${isAdmin ? `<button id="add-company-btn" class="btn btn-secondary btn-sm" style="width:auto">+ Add</button>` : ''}
                            ${isAdmin ? `<button id="bulk-assign-btn" class="btn btn-primary btn-sm" style="width:auto;display:none">Assign Selected</button>` : ''}
                            <button id="copy-all-rows" class="btn btn-secondary btn-sm" style="width:auto">Copy All</button>
                        </div>
                    </div>
                    <div class="status-tabs" style="display:flex;gap:6px;margin-bottom:16px;border-bottom:1px solid var(--border)">
                        <button class="status-tab ${status === 'in-progress' ? 'active' : ''}" data-status="in-progress">In Progress <span class="status-tab-count">${inProgressAll.length}</span></button>
                        <button class="status-tab ${status === 'completed' ? 'active' : ''}" data-status="completed">Completed <span class="status-tab-count">${completedAll.length}</span></button>
                    </div>
                    ${activeOrders.length === 0
                        ? `<div class="card" style="padding:40px;text-align:center"><p style="color:var(--text-secondary)">${filter ? 'No matching companies.' : (status === 'completed' ? 'No completed orders yet.' : 'No active orders. Create an order first.')}</p></div>`
                        : `
                    <div class="card" style="padding:0;overflow-x:auto">
                        <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:800px">
                            <thead>
                                <tr style="background:var(--bg-secondary);border-bottom:2px solid var(--border)">
                                    ${isAdmin ? `<th style="padding:10px 6px;text-align:center;width:32px"><input type="checkbox" id="tracker-select-all" style="cursor:pointer"></th>` : ''}
                                    <th class="sort-header" data-sort="companyName" style="padding:10px 12px;text-align:left;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Company<span style="font-size:10px;margin-left:2px">${sort.field==='companyName'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th class="sort-header" data-sort="dailyTarget" style="padding:10px 4px;text-align:center;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Daily<span style="font-size:10px;margin-left:2px">${sort.field==='dailyTarget'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th class="sort-header" data-sort="completedCount" style="padding:10px 4px;text-align:center;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Done<span style="font-size:10px;margin-left:2px">${sort.field==='completedCount'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th class="sort-header" data-sort="quantity" style="padding:10px 4px;text-align:center;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Ordered<span style="font-size:10px;margin-left:2px">${sort.field==='quantity'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th class="sort-header" data-sort="startingCount" style="padding:10px 4px;text-align:center;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Start<span style="font-size:10px;margin-left:2px">${sort.field==='startingCount'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th style="padding:10px 4px;text-align:center;font-weight:600;white-space:nowrap">End</th>
                                    <th class="sort-header" data-sort="left" style="padding:10px 4px;text-align:center;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Left<span style="font-size:10px;margin-left:2px">${sort.field==='left'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th style="padding:10px 8px;text-align:left;font-weight:600">Comments</th>
                                    <th style="padding:10px 4px;text-align:center;font-weight:600;width:60px">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${activeOrders.map(o => {
                                    const left = (o.quantity || 0) - (o.completedCount || 0);
                                    const endCount = (o.startingCount || 0) + (o.quantity || 0);
                                    const pct = o.quantity > 0 ? Math.round((o.completedCount / o.quantity) * 100) : 0;
                                    const rowColor = pct >= 100 ? '#D1FAE5' : pct >= 50 ? '#FEF3C7' : 'transparent';
                                    const inp = (field, val, bold) => `<input type="number" class="tracker-edit tracker-num" data-id="${o.id}" data-field="${field}" value="${val}" style="width:56px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:6px 2px;font-size:14px;background:white;font-weight:${bold?'700':'500'}">`;
                                    return `
                                    <tr style="border-bottom:1px solid var(--border);background:${rowColor}" data-order-id="${o.id}">
                                        ${isAdmin ? `<td style="padding:8px 6px;text-align:center"><input type="checkbox" class="tracker-select" data-id="${o.id}" style="cursor:pointer"></td>` : ''}
                                        <td style="padding:8px 12px;font-weight:500;font-size:13px">${o.companyName}</td>
                                        <td style="padding:4px 2px;text-align:center">${inp('dailyTarget', o.dailyTarget||5, false)}</td>
                                        <td style="padding:4px 2px;text-align:center">${inp('completedCount', o.completedCount||0, true)}</td>
                                        <td style="padding:4px 2px;text-align:center">${inp('quantity', o.quantity||0, false)}</td>
                                        <td style="padding:4px 2px;text-align:center">${inp('startingCount', o.startingCount||0, false)}</td>
                                        <td style="padding:8px 4px;text-align:center;font-size:13px">${endCount}</td>
                                        <td style="padding:8px 4px;text-align:center;font-weight:600;font-size:13px;color:${left > 0 ? 'var(--error)' : 'var(--success)'}">${left}</td>
                                        <td style="padding:4px 6px"><input type="text" class="tracker-edit" data-id="${o.id}" data-field="comments" value="${(o.comments || '').replace(/"/g, '&quot;')}" style="width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;color:var(--text);background:white" placeholder="Add comment..."></td>
                                        <td style="padding:6px 4px;text-align:center">
                                            <button class="kebab-btn tracker-kebab" data-id="${o.id}" title="More actions" aria-label="More actions">&vellip;</button>
                                            <button class="edit-link-btn" data-id="${o.id}" style="display:none" aria-hidden="true"></button>
                                            <button class="delete-order-btn" data-id="${o.id}" data-name="${o.companyName}" style="display:none" aria-hidden="true"></button>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>`
                    }`;
            },

            attachTrackerListeners() {
                const isAdmin = this.state.userRole === 'admin';

                // Column sort headers
                document.querySelectorAll('.sort-header').forEach(th => {
                    th.onclick = () => {
                        const field = th.dataset.sort;
                        const current = this.state.trackerSort || { field: 'companyName', dir: 'asc' };
                        this.state.trackerSort = { field, dir: current.field === field && current.dir === 'asc' ? 'desc' : 'asc' };
                        const container = document.getElementById('view-container');
                        if (container) { container.innerHTML = this.renderTracker(); this.attachTrackerListeners(); }
                    };
                });

                // Manage Assignments button
                document.getElementById('manage-assign-btn')?.addEventListener('click', () => this.showQuickAssignModal());

                // Add company button
                document.getElementById('add-company-btn')?.addEventListener('click', () => this.showAddCompanyModal());

                // Delete order buttons
                document.querySelectorAll('.delete-order-btn').forEach(btn => {
                    btn.onclick = () => {
                        const name = btn.dataset.name;
                        const id = btn.dataset.id;
                        this.showConfirm(`Delete "${name}"? This will remove the order and all associated data permanently.`, async () => {
                            try {
                                const token = await auth.currentUser.getIdToken();
                                const resp = await fetch(`${API_BASE}/orders/${id}`, {
                                    method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
                                });
                                if (!resp.ok) throw new Error('Delete failed');
                                this.toast(`Deleted ${name}`, 'success');
                                this.loadOrders();
                            } catch(err) { this.toast(err.message, 'error'); }
                        });
                    };
                });

                // Edit link buttons
                document.querySelectorAll('.edit-link-btn').forEach(btn => {
                    btn.onclick = () => {
                        const order = this.state.orders.find(o => o.id === btn.dataset.id);
                        const newLink = prompt('Review Link:', order?.reviewLink || '');
                        if (newLink !== null) {
                            db.collection('orders').doc(btn.dataset.id).update({ reviewLink: newLink, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }).then(() => {
                                if (order) order.reviewLink = newLink;
                                this.toast('Link updated', 'success');
                            }).catch(e => this.toast('Failed: ' + e.message, 'error'));
                        }
                    };
                });

                // Filter input
                document.getElementById('tracker-filter')?.addEventListener('input', e => {
                    this.state.trackerFilter = e.target.value;
                    // Debounce re-render
                    clearTimeout(this._trackerFilterTimeout);
                    this._trackerFilterTimeout = setTimeout(() => {
                        const container = document.getElementById('view-container');
                        if (container && this.state.activeTab === 'tracker') {
                            container.innerHTML = this.renderTracker();
                            this.attachTrackerListeners();
                        }
                    }, 300);
                });

                // Select all checkbox
                document.getElementById('tracker-select-all')?.addEventListener('change', e => {
                    const checks = document.querySelectorAll('.tracker-select');
                    checks.forEach(c => c.checked = e.target.checked);
                    this.updateBulkAssignBtn();
                });

                // Individual checkboxes
                document.querySelectorAll('.tracker-select').forEach(cb => {
                    cb.addEventListener('change', () => this.updateBulkAssignBtn());
                });

                // Bulk assign button
                document.getElementById('bulk-assign-btn')?.addEventListener('click', () => {
                    const selected = [...document.querySelectorAll('.tracker-select:checked')].map(c => c.dataset.id);
                    if (selected.length === 0) return;
                    this.showBulkAssignModal(selected);
                });

                // Copy row buttons in tracker
                document.querySelectorAll('.copy-sheet-row').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        const o = this.state.orders.find(x => x.id === id);
                        if (o) {
                            const endCount = (o.startingCount || 0) + (o.quantity || 0);
                            const left = (o.quantity || 0) - (o.completedCount || 0);
                            const row = `${o.companyName}\t${o.dailyTarget || 5}\t${o.completedCount || 0}\t${o.quantity}\t${o.startingCount || 0}\t${endCount}\t\t${left}\t${o.comments || ''}`;
                            this.copyToClipboard(row, 'Row copied!');
                        }
                    });
                });

                // Copy all rows button
                document.getElementById('copy-all-rows')?.addEventListener('click', () => {
                    const rows = this.state.orders.filter(o => o.status !== 'completed').map(o => {
                        const endCount = (o.startingCount || 0) + (o.quantity || 0);
                        const left = (o.quantity || 0) - (o.completedCount || 0);
                        return `${o.companyName}\t${o.dailyTarget || 5}\t${o.completedCount || 0}\t${o.quantity}\t${o.startingCount || 0}\t${endCount}\t\t${left}\t${o.comments || ''}`;
                    }).join('\n');
                    this.copyToClipboard(rows, 'All rows copied!');
                });

                // Editable cells - save on change
                document.querySelectorAll('.tracker-edit').forEach(input => {
                    input.addEventListener('change', async e => {
                        const orderId = e.target.dataset.id;
                        const field = e.target.dataset.field;
                        let value = e.target.value;
                        if (['dailyTarget','completedCount','quantity','startingCount'].includes(field)) value = parseInt(value) || 0;
                        try {
                            await db.collection('orders').doc(orderId).update({ [field]: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                            // Update local state
                            const order = this.state.orders.find(o => o.id === orderId);
                            if (order) order[field] = value;
                            this.toast('Saved', 'success');
                        } catch(err) {
                            this.toast('Save failed: ' + err.message, 'error');
                        }
                    });
                });
            },

            updateBulkAssignBtn() {
                const selected = document.querySelectorAll('.tracker-select:checked');
                const btn = document.getElementById('bulk-assign-btn');
                if (btn) {
                    btn.style.display = selected.length > 0 ? 'inline-flex' : 'none';
                    btn.textContent = `Assign ${selected.length} Selected`;
                }
            },

            async showBulkAssignModal(orderIds) {
                const companies = orderIds.map(id => this.state.orders.find(o => o.id === id)).filter(Boolean);
                // Refresh employees so newly-created ones appear in the dropdown.
                await this.loadEmployees();
                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="bulk-assign-modal">
                        <div class="modal-content" style="max-width:520px">
                            <h2 style="font-size:20px;font-weight:700;margin-bottom:8px">Bulk Assign</h2>
                            <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">${companies.length} companies selected</p>
                            <form id="bulk-assign-form" style="display:flex;flex-direction:column;gap:16px">
                                <div>
                                    <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Assign to Employee</label>
                                    <select id="bulk-assign-employee" class="input" required>
                                        <option value="">Select employee...</option>
                                        ${this.state.employees.map(e => `<option value="${e.id}">${e.name || e.email}</option>`).join('')}
                                    </select>
                                </div>
                                <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                                    <div style="display:flex;justify-content:space-between;padding:10px 12px;background:var(--bg-secondary);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-secondary)">
                                        <span>Company</span><span>Reviews Today</span>
                                    </div>
                                    <div style="max-height:240px;overflow-y:auto">
                                        ${companies.map(c => {
                                            const left = (c.quantity||0) - (c.completedCount||0);
                                            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px">
                                                <div style="flex:1;min-width:0">
                                                    <span style="font-weight:500">${c.companyName}</span>
                                                    <span style="color:var(--text-secondary);font-size:11px;margin-left:4px">(${left} left)</span>
                                                </div>
                                                <input type="number" class="bulk-count-input tracker-num" data-id="${c.id}" value="${c.dailyTarget || 5}" min="0" max="${left}" style="width:52px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:6px 2px;font-size:14px;font-weight:700;background:white" inputmode="numeric">
                                            </div>`;
                                        }).join('')}
                                    </div>
                                </div>
                                <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:4px">
                                    <button type="button" id="cancel-bulk-assign" class="btn btn-secondary" style="width:auto">Cancel</button>
                                    <button type="submit" class="btn btn-primary" style="width:auto">Assign All</button>
                                </div>
                            </form>
                        </div>
                    </div>`;

                document.getElementById('cancel-bulk-assign').onclick = () => this.el.modal.innerHTML = '';
                document.getElementById('bulk-assign-modal').onclick = e => { if (e.target.id === 'bulk-assign-modal') this.el.modal.innerHTML = ''; };

                document.getElementById('bulk-assign-form').onsubmit = async e => {
                    e.preventDefault();
                    const employeeUid = document.getElementById('bulk-assign-employee').value;
                    if (!employeeUid) { this.toast('Select an employee.', 'error'); return; }

                    // Read per-company counts
                    const perCompanyCounts = {};
                    document.querySelectorAll('.bulk-count-input').forEach(inp => {
                        perCompanyCounts[inp.dataset.id] = parseInt(inp.value) || 0;
                    });
                    const totalAssigned = Object.values(perCompanyCounts).reduce((s, v) => s + v, 0);
                    if (totalAssigned <= 0) { this.toast('Set at least 1 review for a company.', 'error'); return; }

                    const submitBtn = e.target.querySelector('[type="submit"]');
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Assigning...';

                    try {
                        const token = await auth.currentUser.getIdToken();
                        for (const orderId of orderIds) {
                            const count = perCompanyCounts[orderId] || 0;
                            if (count <= 0) continue;
                            await fetch(`${API_BASE}/orders/${orderId}/assign`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ employeeUid, count })
                            });
                        }
                        this.toast(`Assigned ${orderIds.length} companies!`, 'success');
                        this.el.modal.innerHTML = '';
                        this.loadOrders();
                    } catch(err) {
                        this.toast(err.message, 'error');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Assign All';
                    }
                };
            },

            async showQuickAssignModal() {
                // Refresh employees so the dropdown reflects newly-created ones immediately.
                await this.loadEmployees();
                // Force fresh server fetch (bypass client cache)
                this.toast('Loading fresh data...', 'info');
                const freshSnap = await db.collection('orders').get({ source: 'server' });
                const freshData = freshSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                this.state.orders = freshData; // Update state with fresh data
                const today = this.todayStr(); // SGT — single source of truth, matches /assign endpoint
                // Show ALL active orders (even 0 remaining, so user can clean up stale assignments)
                const activeOrders = freshData
                    .filter(o => o.status !== 'completed')
                    .map(o => {
                        const remaining = (o.quantity||0) - (o.completedCount||0);
                        const daily = o.dailyTarget || 5;
                        const daysLeft = remaining > 0 ? Math.ceil(remaining / daily) : 999;
                        return { ...o, remaining, daily, daysLeft };
                    })
                    .sort((a, b) => a.daysLeft - b.daysLeft);

                if (activeOrders.length === 0) { this.toast('No active orders to assign.', 'error'); return; }

                const urgencyTag = (days, remaining) => {
                    if (remaining === 0) return '<span style="color:var(--text-secondary);font-size:11px">complete</span>';
                    if (days <= 3) return '<span style="color:#EF4444;font-weight:600;font-size:11px">critical</span>';
                    if (days <= 7) return '<span style="color:#F59E0B;font-weight:600;font-size:11px">urgent</span>';
                    return '<span style="color:var(--text-secondary);font-size:11px">' + days + 'd left</span>';
                };

                this.el.modal.innerHTML = `
                    <div style="position:fixed;inset:0;background:var(--bg);z-index:9999;overflow-y:auto;padding:0" id="quick-assign-modal">
                        <div style="max-width:700px;margin:0 auto;padding:24px 16px 120px">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
                                <h2 style="font-size:22px;font-weight:800">Manage Assignments</h2>
                                <button id="qa-cancel" class="btn btn-secondary btn-sm" style="width:auto">Close</button>
                            </div>

                            <div style="margin-bottom:16px">
                                <label style="font-size:14px;font-weight:600;display:block;margin-bottom:8px">Employee</label>
                                <select id="qa-employee" class="input" style="font-size:16px;padding:14px" required>
                                    <option value="">Select employee to view their list...</option>
                                    ${this.state.employees.map(e => `<option value="${e.id}">${e.name || e.email}</option>`).join('')}
                                </select>
                            </div>

                            <div id="qa-helper" style="display:none;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:var(--radius);padding:12px 14px;margin-bottom:16px;font-size:13px;color:#1E40AF">
                                <strong id="qa-current-count">0</strong> companies currently assigned to this employee. Tick to assign, untick to remove. List clears when you approve their daily report.
                                <button type="button" id="qa-clear-all" style="float:right;background:none;border:none;color:#DC2626;font-weight:600;cursor:pointer;font-size:12px;padding:0">Clear All</button>
                            </div>

                            <div id="qa-stale-banner" style="display:none"></div>

                            <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:20px">
                                <div style="display:flex;justify-content:space-between;padding:12px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text-secondary)">
                                    <span>Company</span>
                                    <span>Reviews</span>
                                </div>
                                <div id="qa-list">
                                    ${activeOrders.map(o => {
                                        const maxAllowed = Math.max(1, o.remaining);
                                        const defaultCount = Math.min(o.daily, Math.max(1, o.remaining));
                                        return `
                                        <label style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;gap:10px;transition:background 0.1s" onmouseover="this.style.background='var(--bg-secondary)'" onmouseout="this.style.background=''">
                                            <input type="checkbox" class="qa-check" data-id="${o.id}" style="width:18px;height:18px;cursor:pointer;flex-shrink:0">
                                            <div style="flex:1;min-width:0">
                                                <span style="font-weight:500;font-size:13px">${o.companyName}</span>
                                                <div style="display:flex;gap:8px;align-items:center;margin-top:2px;flex-wrap:wrap">
                                                    <span style="font-size:11px;color:var(--text-secondary)">${o.remaining} left</span>
                                                    ${urgencyTag(o.daysLeft, o.remaining)}
                                                    <span class="qa-status" data-id="${o.id}" style="font-size:11px;display:none;font-weight:600"></span>
                                                </div>
                                            </div>
                                            <input type="number" class="qa-count tracker-num" data-id="${o.id}" value="${defaultCount}" min="0" max="${maxAllowed}" style="width:52px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:6px 2px;font-size:14px;font-weight:700;background:white" inputmode="numeric">
                                        </label>`;
                                    }).join('')}
                                </div>
                            </div>

                            <div style="position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:16px;z-index:10000">
                                <div style="max-width:700px;margin:0 auto">
                                    <button type="button" id="qa-submit" class="btn btn-primary" style="width:100%;font-size:16px;min-height:52px" disabled>Select an employee first</button>
                                </div>
                            </div>
                        </div>
                    </div>`;

                document.getElementById('qa-cancel').onclick = () => this.el.modal.innerHTML = '';

                const updateTotal = () => {
                    let total = 0;
                    let checkedCount = 0;
                    document.querySelectorAll('.qa-check:checked').forEach(cb => {
                        const count = parseInt(document.querySelector(`.qa-count[data-id="${cb.dataset.id}"]`)?.value) || 0;
                        total += count;
                        checkedCount++;
                    });
                    const empSelected = !!document.getElementById('qa-employee').value;
                    const btn = document.getElementById('qa-submit');
                    if (!empSelected) {
                        btn.textContent = 'Select an employee first';
                        btn.disabled = true;
                    } else if (checkedCount === 0) {
                        btn.textContent = `Save (clear all assignments)`;
                        btn.disabled = false;
                    } else {
                        btn.textContent = `Save Assignment List (${checkedCount} companies, ${total} reviews)`;
                        btn.disabled = false;
                    }
                };

                // Tickbox source of truth: assignedEmployees.includes(empUid). Today's count
                // shows in the count input + a "✓ today" green pill if the order is in TODAY's
                // daily assignment for this employee. Previously-assigned-but-not-today rows show
                // a grey "previously assigned" pill — admin must explicitly untick to remove them.
                // This fixes the destructive default where opening the modal + saving without
                // changes would scrub stale `dailyAssignment` entries.
                const refreshCheckboxes = async () => {
                    const empUid = document.getElementById('qa-employee').value;
                    if (!empUid) {
                        document.getElementById('qa-helper').style.display = 'none';
                        document.querySelectorAll('.qa-check').forEach(cb => {
                            cb.checked = false;
                            const statusEl = document.querySelector(`.qa-status[data-id="${cb.dataset.id}"]`);
                            if (statusEl) statusEl.style.display = 'none';
                        });
                        updateTotal();
                        return;
                    }

                    // Force fresh server fetch (bypass Firestore cache)
                    const freshSnap = await db.collection('orders').where('status', '==', 'active').get({ source: 'server' });
                    const freshOrders = {};
                    freshSnap.docs.forEach(d => { freshOrders[d.id] = d.data(); });

                    // Mutate activeOrders in place with fresh data
                    activeOrders.forEach(o => {
                        if (freshOrders[o.id]) {
                            o.assignedEmployees = freshOrders[o.id].assignedEmployees || [];
                            o.dailyAssignment = freshOrders[o.id].dailyAssignment || {};
                        }
                    });

                    let currentCount = 0;
                    document.querySelectorAll('.qa-check').forEach(cb => {
                        const orderId = cb.dataset.id;
                        const order = activeOrders.find(o => o.id === orderId);
                        const isAssigned = (order?.assignedEmployees || []).includes(empUid);
                        const da = order?.dailyAssignment?.[empUid];
                        const statusEl = document.querySelector(`.qa-status[data-id="${orderId}"]`);
                        const countInput = document.querySelector(`.qa-count[data-id="${orderId}"]`);

                        if (isAssigned) {
                            cb.checked = true;
                            currentCount++;
                            // Count input: existing daily count if present, else default daily target.
                            if (countInput) countInput.value = da?.count || order.dailyTarget || 5;
                            if (statusEl) {
                                statusEl.style.display = '';
                                statusEl.textContent = da?.date ? `✓ assigned · ${da.date}` : '✓ assigned';
                                statusEl.style.color = '#10B981';
                            }
                        } else {
                            cb.checked = false;
                            if (statusEl) statusEl.style.display = 'none';
                        }
                    });
                    document.getElementById('qa-helper').style.display = '';
                    document.getElementById('qa-current-count').textContent = currentCount;
                    updateTotal();
                };

                document.getElementById('qa-employee').addEventListener('change', refreshCheckboxes);

                // Clear All: unticks all checkboxes (doesn't save until submit)
                document.getElementById('qa-clear-all').addEventListener('click', () => {
                    if (!confirm('Untick all companies? You still need to click Save to apply.')) return;
                    document.querySelectorAll('.qa-check').forEach(cb => cb.checked = false);
                    updateTotal();
                });

                document.querySelectorAll('.qa-check, .qa-count').forEach(el => el.addEventListener('change', updateTotal));
                document.querySelectorAll('.qa-count').forEach(el => el.addEventListener('input', updateTotal));
                updateTotal();

                // Submit — REPLACE employee's list with current ticked state
                document.getElementById('qa-submit').onclick = async () => {
                    const employeeUid = document.getElementById('qa-employee').value;
                    if (!employeeUid) { this.toast('Select an employee.', 'error'); return; }

                    const btn = document.getElementById('qa-submit');
                    btn.disabled = true;
                    btn.textContent = 'Saving...';

                    try {
                        // STEP 1: Collect checked and unchecked orders from the UI
                        const checkedIds = new Set();
                        const countMap = {};
                        document.querySelectorAll('.qa-check:checked').forEach(cb => {
                            const id = cb.dataset.id;
                            const count = parseInt(document.querySelector(`.qa-count[data-id="${id}"]`)?.value) || 0;
                            if (count > 0) {
                                checkedIds.add(id);
                                countMap[id] = count;
                            }
                        });

                        // STEP 2: For every active order, reconcile state
                        // - If checked → ensure assigned
                        // - If unchecked → ensure removed
                        const token = await auth.currentUser.getIdToken();
                        let added = 0, removed = 0, updated = 0;

                        for (const order of activeOrders) {
                            const isCurrentlyAssigned = (order.assignedEmployees || []).includes(employeeUid);
                            const shouldBeAssigned = checkedIds.has(order.id);

                            if (shouldBeAssigned && !isCurrentlyAssigned) {
                                // ADD: use assign endpoint
                                await fetch(`${API_BASE}/orders/${order.id}/assign`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                    body: JSON.stringify({ employeeUid, count: countMap[order.id] })
                                });
                                added++;
                            } else if (shouldBeAssigned && isCurrentlyAssigned) {
                                // UPDATE: count may have changed, call assign endpoint to update dailyAssignment
                                await fetch(`${API_BASE}/orders/${order.id}/assign`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                    body: JSON.stringify({ employeeUid, count: countMap[order.id] })
                                });
                                updated++;
                            } else if (!shouldBeAssigned && isCurrentlyAssigned) {
                                // REMOVE: direct Firestore update to clean both fields
                                await db.collection('orders').doc(order.id).update({
                                    [`dailyAssignment.${employeeUid}`]: firebase.firestore.FieldValue.delete(),
                                    assignedEmployees: firebase.firestore.FieldValue.arrayRemove(employeeUid),
                                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                                });
                                removed++;
                            }
                            // If !shouldBeAssigned && !isCurrentlyAssigned → do nothing
                        }

                        const msg = `Saved: ${added} added, ${removed} removed${updated > 0 ? `, ${updated} updated` : ''}`;
                        this.toast(msg, 'success');
                        this.el.modal.innerHTML = '';
                        await this.loadOrders();
                    } catch(err) {
                        this.toast('Save failed: ' + err.message, 'error');
                        btn.disabled = false;
                        btn.textContent = 'Save Assignment List';
                    }
                };
            },

            // ═══════════════════════════════════════════════════════
            // ═══════════════════════════════════════════════════════
            // TAB: REPORTS (Admin - approve employee daily reports)
            // ═══════════════════════════════════════════════════════
            renderReports() {
                if (!this.state._reports) {
                    this.loadDailyReports();
                    return `<div style="text-align:center;padding:60px"><div class="spinner" style="margin:0 auto 16px"></div><p style="color:var(--text-secondary)">Loading reports...</p></div>`;
                }
                const reports = this.state._reports;
                const pending = reports.filter(r => r.status === 'pending_approval');
                const approved = reports.filter(r => r.status === 'approved');

                return `
                    <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px">
                        <h2 style="font-size:20px;font-weight:700">Employee Reports</h2>
                    </div>
                    ${pending.length > 0 ? `
                        <h3 style="font-size:15px;font-weight:600;color:var(--warning);margin-bottom:12px">Pending Approval (${pending.length})</h3>
                        ${pending.map(r => this.renderReportCard(r, true)).join('')}
                    ` : ''}
                    ${pending.length === 0 && approved.length === 0 ? `
                        <div class="card" style="padding:40px;text-align:center"><p style="color:var(--text-secondary)">No reports yet. Employees submit daily progress here.</p></div>
                    ` : ''}
                    ${approved.length > 0 ? `
                        <div style="display:flex;justify-content:space-between;align-items:center;margin:24px 0 12px">
                            <h3 style="font-size:15px;font-weight:600;color:var(--success)">Recently Approved (${approved.length})</h3>
                            <button id="clear-approved-btn" class="order-action-btn" style="color:var(--error);font-size:13px">Clear All Approved</button>
                        </div>
                        ${approved.slice(0, 10).map(r => this.renderReportCard(r, false)).join('')}
                    ` : ''}`;
            },

            renderReportCard(report, showActions) {
                const dateStr = report.date || 'Unknown date';
                return `
                    <div class="card" style="padding:20px;margin-bottom:12px;${report.status === 'approved' ? 'opacity:0.7' : ''}">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
                            <div>
                                <p style="font-weight:600">${report.employeeName || 'Employee'}</p>
                                <p style="font-size:12px;color:var(--text-secondary)">${dateStr} - ${report.totalReviews || 0} reviews, ${report.totalScreenshots || 0} screenshots</p>
                            </div>
                            <div style="display:flex;align-items:center;gap:8px">
                                <span style="font-weight:700;font-size:15px;color:var(--text)">${report.totalReviews || 0} reviews</span>
                                <span class="badge ${report.status === 'approved' ? 'badge-success' : 'badge-warning'}">${report.status === 'approved' ? 'Approved' : 'Pending'}</span>
                                <button class="delete-report-btn order-action-btn" data-report="${report.id}" style="color:var(--error);font-size:16px;padding:2px 6px" title="Delete this report">x</button>
                            </div>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:8px">
                            ${(report.entries || []).map((entry, i) => `
                                <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg-secondary);border-radius:8px">
                                    <div>
                                        <p style="font-size:13px;font-weight:500">${entry.companyName}</p>
                                        <p style="font-size:11px;color:var(--text-secondary)">${entry.screenshotsCount} screenshot(s)</p>
                                    </div>
                                    ${showActions ? `
                                        <input type="number" class="report-count-edit" data-report="${report.id}" data-idx="${i}" value="${entry.reviewsClaimed}" style="width:60px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:6px;font-size:14px;font-weight:700" inputmode="numeric">
                                    ` : `<span style="font-weight:700;font-size:14px">${entry.reviewsClaimed}</span>`}
                                </div>
                            `).join('')}
                        </div>
                        ${showActions ? `
                            <div style="display:flex;gap:8px;margin-top:16px">
                                <button class="btn btn-primary approve-report" data-report="${report.id}" style="flex:1;min-height:44px">Approve</button>
                            </div>
                        ` : ''}
                    </div>`;
            },

            async loadDailyReports() {
                try {
                    const token = await auth.currentUser.getIdToken();
                    const resp = await fetch(`${API_BASE}/daily-reports`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await resp.json();
                    this.state._reports = data.reports || [];
                } catch(e) {
                    this.state._reports = [];
                }
                this.updateView();
            },

            attachReportListeners() {
                // Approve button
                document.querySelectorAll('.approve-report').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const reportId = btn.dataset.report;
                        const report = this.state._reports.find(r => r.id === reportId);
                        if (!report) return;

                        // Collect potentially edited counts
                        const editedEntries = report.entries.map((entry, i) => {
                            const input = document.querySelector(`.report-count-edit[data-report="${reportId}"][data-idx="${i}"]`);
                            return { ...entry, reviewsClaimed: input ? parseInt(input.value) || 0 : entry.reviewsClaimed };
                        });

                        btn.disabled = true;
                        btn.textContent = 'Approving...';

                        try {
                            const token = await auth.currentUser.getIdToken();
                            const resp = await fetch(`${API_BASE}/daily-report/${reportId}/approve`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ editedEntries })
                            });
                            if (!resp.ok) throw new Error('Approve failed');

                            this.toast('Report approved! Counts updated.', 'success');
                            this.state._reports = null; // Force reload
                            this.loadOrders(); // Refresh tracker counts
                            this.updateView();
                        } catch(err) {
                            this.toast(err.message, 'error');
                            btn.disabled = false;
                            btn.textContent = 'Approve';
                        }
                    });
                });

                // Delete individual report
                document.querySelectorAll('.delete-report-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const reportId = btn.dataset.report;
                        if (!confirm('Delete this report? This only removes the log — order counts already saved are not affected.')) return;
                        try {
                            await db.collection('dailyReports').doc(reportId).delete();
                            this.toast('Report deleted.', 'success');
                            this.state._reports = null;
                            this.updateView();
                        } catch(err) {
                            this.toast('Failed: ' + err.message, 'error');
                        }
                    });
                });

                // Clear all approved reports
                document.getElementById('clear-approved-btn')?.addEventListener('click', async () => {
                    const approved = (this.state._reports || []).filter(r => r.status === 'approved');
                    if (approved.length === 0) return;
                    if (!confirm(`Delete ${approved.length} approved report(s)? This only clears the log — order counts are already saved.`)) return;
                    try {
                        const batch = db.batch();
                        for (const r of approved) {
                            batch.delete(db.collection('dailyReports').doc(r.id));
                        }
                        await batch.commit();
                        this.toast(`${approved.length} approved reports cleared.`, 'success');
                        this.state._reports = null;
                        this.updateView();
                    } catch(err) {
                        this.toast('Failed to clear: ' + err.message, 'error');
                    }
                });
            },

            // ═══════════════════════════════════════════════════════
            // TAB: CLIENT SUBMISSIONS (Admin)
            // ═══════════════════════════════════════════════════════
            async loadClientSubmissions() {
                this.state._clientSubmissionsLoading = true;
                this.state._clientSubmissionsError = null;
                try {
                    const token = await auth.currentUser.getIdToken();
                    const resp = await fetch(`${API_BASE}/client-submissions`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    const data = await resp.json();
                    this.state._clientSubmissions = data.submissions || [];
                } catch(e) {
                    this.state._clientSubmissions = [];
                    this.state._clientSubmissionsError = e.message || 'Network error';
                }
                this.state._clientSubmissionsLoading = false;
                this.state._clientSubmissionsLoaded = true;
                if (this.state.activeTab === 'submissions' || this.state.activeTab === 'orders') this.updateView();
            },

            renderClientSubmissions() {
                const subs = this.state._clientSubmissions || [];
                const filter = this.state._submissionsFilter || { orderId: '', search: '' };
                const orders = this.state.orders || [];
                // Row filter is applied via show/hide in attach phase — render ALL rows here
                // so the search input doesn't lose focus on every keystroke (the input is part
                // of the same innerHTML, and re-rendering it destroys focus).
                const filtered = subs;

                const fmt = (ts) => {
                    if (!ts) return '—';
                    const d = ts._seconds ? new Date(ts._seconds * 1000) : (ts.seconds ? new Date(ts.seconds * 1000) : new Date(ts));
                    if (isNaN(d.getTime())) return '—';
                    return d.toLocaleString('en-SG', { dateStyle: 'medium', timeStyle: 'short' });
                };
                const statusPill = (s) => {
                    if (s.status === 'new') return `<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;background:#DBEAFE;color:#1E40AF;font-size:11px;font-weight:600"><span style="width:6px;height:6px;border-radius:50%;background:#3B82F6"></span>NEW</span>`;
                    if (s.photosDeleted) return `<span style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;background:#F3F4F6;color:#6B7280;font-size:11px;font-weight:600">IMPORTED · photos deleted</span>`;
                    if (s.deleteAfter) {
                        const sec = s.deleteAfter._seconds || s.deleteAfter.seconds;
                        const ms = sec ? sec * 1000 : 0;
                        const hoursLeft = ms ? Math.max(0, Math.round((ms - Date.now()) / 3600000)) : 0;
                        return `<span style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;background:#FEF3C7;color:#92400E;font-size:11px;font-weight:600">IMPORTED · deletes in ${hoursLeft}h</span>`;
                    }
                    return `<span style="display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;background:#D1FAE5;color:#065F46;font-size:11px;font-weight:600">IMPORTED · preserved</span>`;
                };

                const headerRow = `
                    <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px">
                        <h2 style="font-size:20px;font-weight:700">Client Submissions</h2>
                        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                            <input type="text" id="submissions-search" class="input" placeholder="Filter by company..." value="${(filter.search || '').replace(/"/g,'&quot;')}" style="width:180px;padding:6px 12px;font-size:13px">
                            <button id="submissions-refresh" class="btn btn-secondary btn-sm" style="width:auto">Refresh</button>
                        </div>
                    </div>`;

                if (this.state._clientSubmissionsLoading) {
                    return headerRow + `<div style="text-align:center;padding:60px"><div class="spinner" style="margin:0 auto 16px"></div><p style="color:var(--text-secondary)">Loading submissions...</p></div>`;
                }
                if (this.state._clientSubmissionsError) {
                    return headerRow + `<div class="card" style="padding:40px;text-align:center"><p style="color:var(--error);font-weight:600;margin-bottom:8px">Could not load submissions.</p><p style="color:var(--text-secondary);font-size:13px;margin-bottom:16px">${(this.state._clientSubmissionsError + '').replace(/</g,'&lt;')}</p><button id="submissions-retry" class="btn btn-primary" style="width:auto;display:inline-flex">Retry</button></div>`;
                }
                if (filtered.length === 0) {
                    return headerRow + `<div class="card" style="padding:40px;text-align:center"><p style="color:var(--text-secondary)">No submissions yet. Share submission links with clients via the order cards.</p></div>`;
                }

                return headerRow + `
                <div class="card" style="padding:0;overflow-x:auto">
                    <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:720px">
                        <thead>
                            <tr style="background:var(--bg-secondary);border-bottom:2px solid var(--border)">
                                <th style="padding:10px 12px;text-align:left;font-weight:600">Company</th>
                                <th style="padding:10px 12px;text-align:left;font-weight:600;white-space:nowrap">Submitted</th>
                                <th style="padding:10px 8px;text-align:center;font-weight:600">Reviews</th>
                                <th style="padding:10px 8px;text-align:center;font-weight:600">Photos</th>
                                <th style="padding:10px 12px;text-align:left;font-weight:600">Status</th>
                                <th style="padding:10px 12px;text-align:right;font-weight:600">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filtered.map(s => {
                                const order = orders.find(o => o.id === s.orderId);
                                const company = order?.companyName || `Order ${s.orderId.slice(0, 6)}…`;
                                const isImported = s.status === 'imported';
                                const canCancel = isImported && !!s.deleteAfter && !s.photosDeleted;
                                return `
                                <tr style="border-bottom:1px solid var(--border)" data-sub-id="${s.id}">
                                    <td style="padding:10px 12px;font-weight:500">${(company || '').replace(/</g,'&lt;')}</td>
                                    <td style="padding:10px 12px;color:var(--text-secondary);white-space:nowrap">${fmt(s.submittedAt)}</td>
                                    <td style="padding:10px 8px;text-align:center;font-weight:600">${s.reviewCount || 0}</td>
                                    <td style="padding:10px 8px;text-align:center;color:${s.photoCount > 0 ? 'var(--text)' : 'var(--text-secondary)'}">${s.photoCount || 0}</td>
                                    <td style="padding:10px 12px">${statusPill(s)}</td>
                                    <td style="padding:10px 12px;text-align:right">
                                        <div style="display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap">
                                            <button class="btn btn-secondary btn-sm sub-view" data-id="${s.id}" style="width:auto;padding:4px 10px;font-size:11px">View</button>
                                            ${!isImported ? `<button class="btn btn-primary btn-sm sub-import" data-id="${s.id}" style="width:auto;padding:4px 10px;font-size:11px">Import</button>` : ''}
                                            ${canCancel ? `<button class="btn btn-secondary btn-sm sub-cancel-deletion" data-id="${s.id}" style="width:auto;padding:4px 10px;font-size:11px">Keep Photos</button>` : ''}
                                            <button class="btn btn-secondary btn-sm sub-delete" data-id="${s.id}" style="width:auto;padding:4px 10px;font-size:11px;color:var(--error)">Delete</button>
                                        </div>
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>`;
            },

            attachClientSubmissionsListeners() {
                if (!this.state._clientSubmissionsLoaded && !this.state._clientSubmissionsLoading) {
                    this.loadClientSubmissions();
                }
                document.getElementById('submissions-refresh')?.addEventListener('click', () => {
                    if (this.state._clientSubmissionsLoading) return;
                    this.state._clientSubmissionsLoaded = false;
                    this.loadClientSubmissions();
                });
                document.getElementById('submissions-retry')?.addEventListener('click', () => {
                    this.state._clientSubmissionsLoaded = false;
                    this.loadClientSubmissions();
                });
                // Search uses show/hide on rows so the input keeps focus across keystrokes.
                // Falling back to orderId match handles the race where orders haven't loaded yet
                // OR an order has been deleted (otherwise the submission would silently disappear).
                const applyRowFilter = (q) => {
                    const needle = q.trim().toLowerCase();
                    const orders = this.state.orders || [];
                    const rows = document.querySelectorAll('tr[data-sub-id]');
                    rows.forEach(row => {
                        if (!needle) { row.style.display = ''; return; }
                        const subId = row.dataset.subId;
                        const sub = (this.state._clientSubmissions || []).find(s => s.id === subId);
                        if (!sub) { row.style.display = 'none'; return; }
                        const order = orders.find(o => o.id === sub.orderId);
                        const haystack = `${order?.companyName || ''} ${sub.orderId}`.toLowerCase();
                        row.style.display = haystack.includes(needle) ? '' : 'none';
                    });
                };
                const searchEl = document.getElementById('submissions-search');
                if (searchEl) {
                    // Apply current filter on first render
                    applyRowFilter(searchEl.value);
                    searchEl.addEventListener('input', (e) => {
                        this.state._submissionsFilter.search = e.target.value;
                        applyRowFilter(e.target.value);
                    });
                }
                document.querySelectorAll('.sub-view').forEach(btn => {
                    btn.addEventListener('click', () => this.showSubmissionViewModal(btn.dataset.id));
                });
                document.querySelectorAll('.sub-import').forEach(btn => {
                    btn.addEventListener('click', () => this.showSubmissionImportModal(btn.dataset.id));
                });
                document.querySelectorAll('.sub-cancel-deletion').forEach(btn => {
                    btn.addEventListener('click', () => this.cancelSubmissionDeletion(btn.dataset.id));
                });
                document.querySelectorAll('.sub-delete').forEach(btn => {
                    btn.addEventListener('click', () => this.showSubmissionDeleteModal(btn.dataset.id));
                });
            },

            showSubmissionViewModal(subId) {
                const sub = (this.state._clientSubmissions || []).find(s => s.id === subId);
                if (!sub) return;
                const order = (this.state.orders || []).find(o => o.id === sub.orderId);
                const company = order?.companyName || `Order ${sub.orderId.slice(0, 8)}…`;
                const escAttr = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c]));
                const reviewsHtml = (sub.reviews || []).map((r, i) => {
                    // onclick uses this.src so URLs containing apostrophes can't break out of the JS string.
                    const photos = (r.imageDataUrls || []).map(u => `
                        <div style="position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border)">
                            <img src="${escAttr(u)}" style="width:100%;height:120px;object-fit:cover;display:block;cursor:pointer" onclick="window.open(this.src,'_blank')" onerror="this.style.display='none';this.insertAdjacentHTML('afterend','<div style=&quot;height:120px;display:flex;align-items:center;justify-content:center;background:#F3F4F6;color:#9CA3AF;font-size:12px&quot;>image deleted</div>')">
                        </div>
                    `).join('');
                    return `
                        <div style="background:#F8F9FA;border-radius:10px;padding:14px;margin-bottom:10px">
                            <p style="font-size:11px;color:var(--text-secondary);font-weight:600;margin-bottom:6px">Review #${i + 1}</p>
                            <p style="font-size:13px;line-height:1.5;white-space:pre-wrap;margin-bottom:${(r.imageDataUrls || []).length > 0 ? '10px' : '0'}">${escAttr(r.text)}</p>
                            ${(r.imageDataUrls || []).length > 0 ? `<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px">${photos}</div>` : ''}
                        </div>`;
                }).join('');
                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="sub-view-modal">
                        <div class="modal-content" style="max-width:680px;max-height:85vh;overflow-y:auto">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                                <div>
                                    <h2 style="font-size:18px;font-weight:700">Submission from ${escAttr(company)}</h2>
                                    <p style="font-size:12px;color:var(--text-secondary)">${(sub.reviews || []).length} reviews · ${sub.photoCount || 0} photos</p>
                                </div>
                                <button id="sub-view-close" class="btn btn-secondary btn-sm" style="width:auto">Close</button>
                            </div>
                            ${reviewsHtml || '<p style="color:var(--text-secondary);text-align:center;padding:40px">No reviews in this submission.</p>'}
                        </div>
                    </div>`;
                document.getElementById('sub-view-close').onclick = () => this.el.modal.innerHTML = '';
                document.getElementById('sub-view-modal').onclick = e => { if (e.target.id === 'sub-view-modal') this.el.modal.innerHTML = ''; };
            },

            showSubmissionImportModal(subId) {
                const sub = (this.state._clientSubmissions || []).find(s => s.id === subId);
                if (!sub) return;
                const reviewCount = (sub.reviews || []).length;
                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="sub-import-modal">
                        <div class="modal-content" style="max-width:480px">
                            <h2 style="font-size:20px;font-weight:700;margin-bottom:8px">Import these ${reviewCount} reviews?</h2>

            async importSubmission(subId) {
                const sub = (this.state._clientSubmissions || []).find(s => s.id === subId);
                if (!sub) return;
                const confirmBtn = document.getElementById('sub-import-confirm');
                if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = 'Importing...'; }
                try {
                    const token = await auth.currentUser.getIdToken();
                    const resp = await fetch(`${API_BASE}/client-submission/${subId}/import`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await resp.json();
                    if (!resp.ok || !data.submission) throw new Error(data.error || 'Import failed');

                    const order = (this.state.orders || []).find(o => o.id === sub.orderId);
                    const derivedId = `comp_sub_${sub.orderId}`; // Stable per-order id — enables append-merge across multiple submissions
                    const newReviews = (data.submission.reviews || []).map(r => ({
                        text: r.text,
                        status: 'undone',
                        requiresImage: !!r.requiresImage,
                        imageDataUrls: r.imageDataUrls || []
                    }));
                    if (newReviews.length === 0) throw new Error('Server returned no reviews to import.');

                    const existing = await IDB.get(derivedId);
                    const record = existing
                        ? { ...existing, reviewLink: existing.reviewLink || data.submission.link || (order?.reviewLink || ''), reviews: [...(existing.reviews || []), ...newReviews] }
                        : { id: derivedId, name: order?.companyName || `Order ${sub.orderId.slice(0,8)}`, reviewLink: data.submission.link || (order?.reviewLink || ''), reviews: newReviews };

                    await IDB.put(record);
                    this.state.companies = await IDB.getAll();
                    this.state.activeCompanyId = derivedId;

                    // Optimistically update local cache so the order-card "N new" indicator
                    // disappears immediately rather than showing stale state until refresh resolves.
                    this.state._clientSubmissions = (this.state._clientSubmissions || []).map(s =>
                        s.id === subId ? { ...s, status: 'imported', importedAt: new Date(), deleteAfter: { _seconds: Math.floor((Date.now() + 24*60*60*1000) / 1000) } } : s
                    );
                    this.state._clientSubmissionsLoaded = false;

                    this.toast(`Imported ${newReviews.length} reviews into Review Manager.`, 'success');
                    this.el.modal.innerHTML = '';
                    this.state.activeTab = 'reviews';
                    localStorage.setItem('activeTab', 'reviews');
                    this.renderShell();
                    // Background refresh so server-side timestamps replace optimistic ones.
                    this.loadClientSubmissions().catch(() => {});
                } catch(err) {
                    this.toast(err.message || 'Import failed', 'error');
                    // Reset modal so user can retry without page reload.
                    if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.textContent = 'Confirm Import'; }
                }
            },
