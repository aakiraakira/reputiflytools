            attachAssignmentListeners() {
                // Today / Others tab switching
                document.querySelectorAll('.task-view-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.state._taskView = btn.dataset.view;
                        this.updateView();
                    });
                });
                // Expand upload area
                document.querySelectorAll('.expand-upload-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.state._expandedOrderId = btn.dataset.id;
                        this.updateView();
                    });
                });
                // Collapse upload area
                document.querySelectorAll('.collapse-upload-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.state._expandedOrderId = null;
                        this.updateView();
                    });
                });
                // File inputs inside expanded cards
                document.querySelectorAll('.proof-file-input').forEach(input => {
                    input.addEventListener('change', async e => {
                        const files = Array.from(e.target.files);
                        if (files.length === 0) return;
                        const orderId = input.dataset.orderId;
                        if (!this.state._todayUploads[orderId]) this.state._todayUploads[orderId] = { screenshots: [], reviewCount: 0, urls: [] };

                        // Step 1: Compress all images first
                        this.toast(`Compressing ${files.length} image(s)...`, 'info');
                        const compressed = [];
                        for (const file of files) {
                            try {
                                const blob = await compressImage(file, 800, 0.5);
                                const preview = URL.createObjectURL(blob);
                                const base64 = await new Promise((resolve, reject) => {
                                    const reader = new FileReader();
                                    reader.onload = () => resolve(reader.result.split(',')[1]);
                                    reader.onerror = reject;
                                    reader.readAsDataURL(blob);
                                });
                                compressed.push({ preview, base64 });
                            } catch(err) { this.toast(`Compress failed: ${err.message}`, 'error'); }
                        }
                        if (compressed.length === 0) return;

                        // Step 2: Upload all in parallel (batch of 3 at a time)
                        this.toast(`Uploading ${compressed.length} screenshot(s)...`, 'info');
                        const token = await auth.currentUser.getIdToken();
                        let uploaded = 0, failed = 0;
                        const uploadOne = async (item) => {
                            for (let attempt = 0; attempt < 2; attempt++) {
                                try {
                                    const resp = await fetch(`${API_BASE}/upload-proof`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                        body: JSON.stringify({ orderId, imageBase64: item.base64 })
                                    });
                                    const data = await resp.json();
                                    if (!resp.ok) throw new Error(data.error || 'Upload failed');
                                    this.state._todayUploads[orderId].screenshots.push({ preview: item.preview, url: data.imageUrl });
                                    uploaded++;
                                    return;
                                } catch(err) {
                                    if (attempt === 1) { failed++; this.toast(`1 upload failed: ${err.message}`, 'error'); }
                                    else await this.sleep(500); // brief pause before retry
                                }
                            }
                        };
                        // Process in batches of 3
                        for (let i = 0; i < compressed.length; i += 3) {
                            const batch = compressed.slice(i, i + 3);
                            await Promise.all(batch.map(item => uploadOne(item)));
                        }
                        this.toast(`${uploaded} uploaded${failed > 0 ? `, ${failed} failed` : ''}!`, uploaded > 0 ? 'success' : 'error');
                        this.updateView();
                        e.target.value = ''; // Reset file input for re-selection
                    });
                });
                // Remove screenshot
                document.querySelectorAll('.remove-screenshot').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const orderId = btn.dataset.orderId;
                        const idx = parseInt(btn.dataset.idx);
                        this.state._todayUploads[orderId].screenshots.splice(idx, 1);
                        this.updateView();
                    });
                });
                // Review count input
                document.querySelectorAll('.review-count-input').forEach(input => {
                    input.addEventListener('input', e => {
                        const orderId = e.target.dataset.orderId;
                        if (!this.state._todayUploads[orderId]) this.state._todayUploads[orderId] = { screenshots: [], reviewCount: 0 };
                        this.state._todayUploads[orderId].reviewCount = parseInt(e.target.value) || 0;
                    });
                });
                // Save progress for a company
                document.querySelectorAll('.save-upload-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const orderId = btn.dataset.id;
                        const uploads = this.state._todayUploads[orderId];
                        if (!uploads || uploads.screenshots.length === 0) { this.toast('Upload at least one screenshot.', 'error'); return; }
                        const countInput = document.querySelector(`.review-count-input[data-order-id="${orderId}"]`);
                        const count = parseInt(countInput?.value) || 0;
                        if (count <= 0) { this.toast('Enter how many reviews you completed.', 'error'); return; }
                        uploads.reviewCount = count;
                        this.state._expandedOrderId = null;
                        this.toast(`Saved: ${count} reviews for ${btn.dataset.name}`, 'success');
                        this.updateView();
                    });
                });
                // Confirm today's progress
                document.getElementById('confirm-today-btn')?.addEventListener('click', () => {
                    this.showDailyReportModal();
                });
            },

            showDailyReportModal() {
                const uploads = this.state._todayUploads || {};
                const entries = Object.entries(uploads).filter(([_, v]) => v.screenshots.length > 0 || v.reviewCount > 0);

                if (entries.length === 0) {
                    this.toast('No progress to report yet. Upload proofs first.', 'error');
                    return;
                }

                const today = new Date().toLocaleDateString('en-SG', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                const uid = this.state.user?.uid;
                const reportLines = entries.map(([orderId, data]) => {
                    const order = this.state.orders.find(o => o.id === orderId);
                    const assigned = order?.dailyAssignment?.[uid]?.count || 0;
                    const trackUrl = `${SITE_BASE}/track.html?order=${orderId}`;
                    return { orderId, companyName: order?.companyName || 'Unknown', reviewsClaimed: data.reviewCount, screenshotsCount: data.screenshots.length, screenshotUrls: data.screenshots.map(s => s.url), assigned, trackUrl };
                });
                const totalReviews = reportLines.reduce((s, e) => s + e.reviewsClaimed, 0);
                const totalScreenshots = reportLines.reduce((s, e) => s + e.screenshotsCount, 0);

                const reportText = `Today's Report - ${today}\n${'─'.repeat(30)}\n${reportLines.map(e => `${e.companyName}: ${e.reviewsClaimed}${e.assigned ? '/' + e.assigned : ''} reviews (${e.screenshotsCount} screenshots)\n${e.trackUrl}`).join('\n\n')}\n${'─'.repeat(30)}\nTotal: ${totalReviews} reviews (${totalScreenshots} screenshots)`;

                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="report-modal">
                        <div class="modal-content" style="max-width:480px">
                            <h2 style="font-size:20px;font-weight:700;margin-bottom:16px">Confirm Today's Progress</h2>
                            <div style="background:var(--bg-secondary);border-radius:var(--radius);padding:16px;font-family:monospace;font-size:13px;white-space:pre-wrap;line-height:1.6;margin-bottom:16px">${reportText}</div>
                            <div style="display:flex;gap:8px;margin-bottom:16px">
                                <button id="copy-report" class="btn btn-secondary" style="flex:1">Copy Report</button>
                            </div>
                            <div style="display:flex;gap:12px;justify-content:flex-end">
                                <button id="cancel-report" class="btn btn-secondary" style="width:auto">Cancel</button>
                                <button id="submit-report" class="btn btn-primary" style="width:auto">Submit Report</button>
                            </div>
                        </div>
                    </div>`;

                document.getElementById('cancel-report').onclick = () => this.el.modal.innerHTML = '';
                document.getElementById('report-modal').onclick = e => { if (e.target.id === 'report-modal') this.el.modal.innerHTML = ''; };
                document.getElementById('copy-report').onclick = () => this.copyToClipboard(reportText, 'Report copied! Send via WhatsApp.');

                document.getElementById('submit-report').onclick = async () => {
                    const btn = document.getElementById('submit-report');
                    btn.disabled = true;
                    btn.textContent = 'Submitting...';

                    try {
                        const token = await auth.currentUser.getIdToken();
                        const resp = await fetch(`${API_BASE}/daily-report`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ entries: reportLines, date: new Date().toISOString().split('T')[0] })
                        });
                        const data = await resp.json();
                        if (!resp.ok) throw new Error(data.error || 'Failed');

                        this.toast('Report submitted! Waiting for admin approval.', 'success');
                        this.state._todayUploads = {}; // Clear uploads
                        this.el.modal.innerHTML = '';
                        this.loadEmployeeAssignments();
                    } catch(err) {
                        this.toast(err.message, 'error');
                        btn.disabled = false;
                        btn.textContent = 'Submit Report';
                    }
                };
            },

            // ═══════════════════════════════════════════════════════
            // PROOF GALLERY (Admin)
            // ═══════════════════════════════════════════════════════
            async showProofGallery(orderId) {
                const order = this.state.orders.find(o => o.id === orderId);
                if (!order) return;

                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="proof-modal">
                        <div class="modal-content" style="max-width:750px;max-height:85vh;overflow-y:auto">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                                <h2 style="font-size:20px;font-weight:700">${order.companyName} - Proofs</h2>
                                <div style="display:flex;gap:8px">
                                    <span id="proof-total" style="font-size:13px;color:var(--text-secondary);align-self:center"></span>
                                    <button id="close-proofs" class="btn btn-secondary btn-sm" style="width:auto">Close</button>
                                </div>
                            </div>
                            <div id="proof-container">
                                <p style="color:var(--text-secondary);text-align:center;padding:40px">Loading proofs...</p>
                            </div>
                        </div>
                    </div>`;

                document.getElementById('close-proofs').onclick = () => this.el.modal.innerHTML = '';
                document.getElementById('proof-modal').onclick = e => { if (e.target.id === 'proof-modal') this.el.modal.innerHTML = ''; };

                try {
                    const snap = await db.collection('orders').doc(orderId).collection('proofs').orderBy('uploadedAt', 'desc').get();
                    const container = document.getElementById('proof-container');
                    const totalEl = document.getElementById('proof-total');
                    if (snap.empty) {
                        container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:40px">No proofs uploaded yet.</p>';
                        totalEl.textContent = '0 screenshots';
                        return;
                    }

                    totalEl.textContent = `${snap.docs.length} screenshots`;

                    // Group by date
                    const grouped = {};
                    snap.docs.forEach(d => {
                        const p = d.data();
                        const ts = p.uploadedAt?.toDate ? p.uploadedAt.toDate() : new Date(p.uploadedAt);
                        const dateKey = ts.toLocaleDateString('en-SG', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
                        if (!grouped[dateKey]) grouped[dateKey] = [];
                        grouped[dateKey].push({ id: d.id, ...p, _ts: ts });
                    });

                    container.innerHTML = Object.entries(grouped).map(([date, proofs]) => `
                        <div style="margin-bottom:20px">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                                <p style="font-size:13px;font-weight:600;color:var(--text-secondary)">${date}</p>
                                <span style="font-size:12px;color:var(--text-secondary)">${proofs.length} screenshot${proofs.length !== 1 ? 's' : ''}</span>
                            </div>
                            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">
                                ${proofs.map(p => `
                                    <div style="position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border)">
                                        <img src="${p.imageUrl}" style="width:100%;height:110px;object-fit:cover;cursor:pointer;display:block" onclick="window.open('${p.imageUrl}','_blank')">
                                        <button class="delete-proof-btn" data-order-id="${orderId}" data-proof-id="${p.id}" data-storage-path="${p.storagePath || ''}" style="position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.6);color:white;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;backdrop-filter:blur(4px)" title="Delete screenshot">x</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('');

                    // Delete handlers
                    container.querySelectorAll('.delete-proof-btn').forEach(btn => {
                        btn.addEventListener('click', async e => {
                            e.stopPropagation();
                            const proofId = btn.dataset.proofId;
                            const storagePath = btn.dataset.storagePath;
                            const oId = btn.dataset.orderId;
                            if (!confirm('Delete this screenshot? This cannot be undone.')) return;
                            try {
                                // Delete Firestore doc
                                await db.collection('orders').doc(oId).collection('proofs').doc(proofId).delete();
                                // Delete from Storage via admin API
                                if (storagePath) {
                                    const token = await auth.currentUser.getIdToken();
                                    await fetch(`${API_BASE}/delete-proof`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                        body: JSON.stringify({ orderId: oId, proofId, storagePath })
                                    }).catch(() => {}); // Best-effort storage delete
                                }
                                btn.closest('[style*="position:relative"]').remove();
                                this.toast('Screenshot deleted.', 'success');
                                // Update count
                                const remaining = container.querySelectorAll('.delete-proof-btn').length;
                                totalEl.textContent = `${remaining} screenshots`;
                            } catch(err) {
                                this.toast('Delete failed: ' + err.message, 'error');
                            }
                        });
                    });
                } catch(e) {
                    document.getElementById('proof-container').innerHTML = '<p style="color:var(--error)">Failed to load proofs.</p>';
                }
            },

            async downloadProofsZip(orderId, companyName) {
                this.toast('Preparing ZIP download...', 'info');
                try {
                    const token = await auth.currentUser.getIdToken();
                    const resp = await fetch(`${API_BASE}/orders/${orderId}/export-proofs`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.error || `HTTP ${resp.status}`);
                    }
                    const blob = await resp.blob();
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `proofs_${(companyName || orderId).replace(/\s+/g, '_')}.zip`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    URL.revokeObjectURL(a.href);
                    this.toast('ZIP downloaded!', 'success');
                } catch(err) {
                    this.toast(err.message === 'No proofs found' ? 'No proofs uploaded yet for this order.' : `Download failed: ${err.message}`, 'error');
                }
            },

            // Download archive (mode='pdf' → just signed-TNC PDF; mode='zip' → PDF + screenshots)
            async downloadArchive(orderId, mode, companyName) {
                const isPdf = mode === 'pdf';
                this.toast(isPdf ? 'Generating PDF…' : 'Building archive ZIP…', 'info');
                try {
                    const token = await auth.currentUser.getIdToken();
                    const url = isPdf
                        ? `${API_BASE}/orders/${orderId}/archive?format=pdf`
                        : `${API_BASE}/orders/${orderId}/archive`;
                    const resp = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.error || `HTTP ${resp.status}`);
                    }
                    const blob = await resp.blob();
                    const safe = (companyName || orderId).replace(/[^A-Za-z0-9._-]+/g, '_').slice(0, 60);
                    const filename = isPdf ? `tnc-${safe}-${orderId}.pdf` : `archive-${safe}-${orderId}.zip`;
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = filename;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    URL.revokeObjectURL(a.href);
                    this.toast(isPdf ? 'PDF downloaded!' : 'Archive downloaded!', 'success');
                } catch(err) {
                    this.toast(`Download failed: ${err.message}`, 'error');
                }
            },

            // ── Kebab action menu (3-dot popover) — shared across Orders + Tracker ──
            // Single global popover instance. Closes on outside-click, ESC, scroll, or another kebab.
            openOrderActionMenu(anchorEl, orderId) {
                const order = this.state.orders.find(o => o.id === orderId);
                if (!order) return;
                const isAdmin = this.state.userRole === 'admin';
                const hasProofs = (order.completedCount || 0) > 0;
                const items = [
                    { section: 'Share Links' },
                    { label: 'Copy TNC Link', action: () => this.copyToClipboard(`${SITE_BASE}/tnc.html?order=${order.id}`, 'TNC Link Copied!') },
                    { label: 'Copy Tracking Link', action: () => this.copyToClipboard(`${SITE_BASE}/track.html?order=${order.id}`, 'Tracking Link Copied!') },
                    { label: 'Copy Submission Link', action: () => this.copySubmissionLinkFor(order) },
                    { label: 'Copy Sheet Row', action: () => this.copySheetRowFor(order) },
                    { divider: true },
                    { section: 'View & Download' },
                    { label: 'View Proofs', disabled: !hasProofs, action: () => this.showProofGallery(order.id) },
                    { label: 'Download TNC PDF', disabled: !order.tncSigned, action: () => this.downloadArchive(order.id, 'pdf', order.companyName) },
                    { label: 'Download Full Archive', disabled: !order.tncSigned, action: () => this.downloadArchive(order.id, 'zip', order.companyName) },
                    { label: 'Download Proofs Only', disabled: !hasProofs, action: () => this.downloadProofsZip(order.id, order.companyName) },
                ];
                if (isAdmin) {
                    items.push({ divider: true });
                    items.push({ section: 'Manage' });
                    items.push({ label: 'Assign Reviews', action: () => this.showAssignModal(order.id) });
                    items.push({ label: 'Edit Review Link', action: () => this._invokeEditLinkForOrder(order.id) });
                    items.push({ label: 'Delete Order', danger: true, action: () => this._invokeDeleteOrder(order.id, order.companyName) });
                }
                this._showActionPopover(anchorEl, items);
            },

            _invokeEditLinkForOrder(orderId) {
                // Reuse the existing edit-link-btn handler if present, else inline a minimal prompt.
                const btn = document.querySelector(`.edit-link-btn[data-id="${orderId}"]`);
                if (btn) { btn.click(); return; }
                const order = this.state.orders.find(o => o.id === orderId);
                const next = prompt('Review link:', order?.reviewLink || '');
                if (next == null) return;
                db.collection('orders').doc(orderId).update({ reviewLink: next.trim(), updatedAt: firebase.firestore.FieldValue.serverTimestamp() })
                  .then(() => this.toast('Review link updated.', 'success'))
                  .catch(e => this.toast('Update failed: ' + e.message, 'error'));
            },

            _invokeDeleteOrder(orderId, companyName) {
                const btn = document.querySelector(`.delete-order-btn[data-id="${orderId}"]`);
                if (btn) { btn.click(); return; }
                if (!confirm(`Delete "${companyName || orderId}"? This cannot be undone.`)) return;
                db.collection('orders').doc(orderId).delete()
                  .then(() => this.toast('Order deleted.', 'success'))
                  .catch(e => this.toast('Delete failed: ' + e.message, 'error'));
            },

            async copySubmissionLinkFor(order) {
                let token = order.clientTrackingToken;
                if (!token) {
                    token = (crypto.randomUUID && crypto.randomUUID()) || `${Date.now()}-${Math.random().toString(36).slice(2)}`;
                    try {
                        await db.collection('orders').doc(order.id).update({ clientTrackingToken: token, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                        order.clientTrackingToken = token;
                    } catch (err) { this.toast('Failed to generate token: ' + err.message, 'error'); return; }
                }
                this.copyToClipboard(`${SITE_BASE}/submit/?order=${order.id}&token=${token}`, 'Submission Link Copied!');
            },

            copySheetRowFor(order) {
                const endCount = (order.startingCount || 0) + (order.quantity || 0);
                const left = (order.quantity || 0) - (order.completedCount || 0);
                const row = `${order.companyName}\t${order.dailyTarget || 5}\t${order.completedCount || 0}\t${order.quantity}\t${order.startingCount || 0}\t${endCount}\t\t${left}\t${order.comments || ''}`;
                this.copyToClipboard(row, 'Sheet Row Copied!');
            },

            _showActionPopover(anchorEl, items, titleText) {
                this._hideActionPopover();
                const overlay = document.createElement('div');
                overlay.className = 'action-popover-overlay';
                overlay.id = '_action-popover-overlay';
                const title = titleText || (anchorEl.closest('[data-order-id]')
                    ? (this.state.orders.find(o => o.id === anchorEl.closest('[data-order-id]').dataset.orderId)?.companyName || 'Actions')
                    : 'Actions');
                overlay.innerHTML = `
                    <div class="action-popover" role="dialog" aria-modal="true">
                        <div class="action-popover-grip" aria-hidden="true"></div>
                        <div class="action-popover-header">
                            <span class="action-popover-title">${title}</span>
                            <button type="button" class="action-popover-close" aria-label="Close">&times;</button>
                        </div>
                        ${items.map(it => {
                            if (it.divider) return '<div class="action-popover-divider"></div>';
                            if (it.section) return `<div class="action-popover-section-label">${it.section}</div>`;
                            const cls = ['action-popover-item'];
                            if (it.danger) cls.push('danger');
                            const disabled = it.disabled ? 'disabled' : '';
                            return `<button type="button" class="${cls.join(' ')}" ${disabled}>${it.label}</button>`;
                        }).join('')}
                    </div>`;
                document.body.appendChild(overlay);
                if (anchorEl) anchorEl.classList.add('is-open');
                this._popoverAnchor = anchorEl;

                // Wire item clicks (clickable[] and DOM buttons map 1:1 in source order).
                const clickable = items.filter(it => !it.divider && !it.section);
                overlay.querySelectorAll('.action-popover-item').forEach((btn, i) => {
                    btn.addEventListener('click', e => {
                        e.stopPropagation();
                        if (btn.disabled) return;
                        const it = clickable[i];
                        this._hideActionPopover();
                        try { it.action && it.action(); } catch(err) { console.error(err); this.toast('Action failed: ' + err.message, 'error'); }
                    });
                });

                // Backdrop click + close button + ESC
                overlay.addEventListener('click', e => { if (e.target === overlay) this._hideActionPopover(); });
                overlay.querySelector('.action-popover-close').addEventListener('click', () => this._hideActionPopover());
                this._popoverEsc = (e) => { if (e.key === 'Escape') this._hideActionPopover(); };
                document.addEventListener('keydown', this._popoverEsc);

                // Lock background scroll while modal is open
                this._prevBodyOverflow = document.body.style.overflow;
                document.body.style.overflow = 'hidden';

                // Animate in
                requestAnimationFrame(() => overlay.classList.add('show'));
            },

            _hideActionPopover() {
                const overlay = document.getElementById('_action-popover-overlay');
                if (overlay) overlay.remove();
                if (this._popoverAnchor) { this._popoverAnchor.classList.remove('is-open'); this._popoverAnchor = null; }
                if (this._popoverEsc) { document.removeEventListener('keydown', this._popoverEsc); this._popoverEsc = null; }
                if (this._prevBodyOverflow !== undefined) {
                    document.body.style.overflow = this._prevBodyOverflow;
                    this._prevBodyOverflow = undefined;
                }
            },

            // ═══════════════════════════════════════════════════════
            // UTILITIES
            // ═══════════════════════════════════════════════════════
            inferShortName(name) {
                if (!name) return '';
                let n = name.replace(/\b(LLC|Inc|Corp|Ltd|Co|Pte)\b/gi, '').trim();
                const parts = n.split(/[-|–—:]/);
                let primary = parts[0].trim();
                if (primary.length > 25) {
                    for (const kw of [' in ', ' at ', ' of ']) {
                        if (primary.toLowerCase().includes(kw)) { primary = primary.substring(0, primary.toLowerCase().indexOf(kw)); break; }
                    }
                }
                return primary.trim();
            },

            buildAIPrompt(context, companyName, modelType, notes) {
                const extraInstructions = notes?.trim() ? `**Additional Instructions (CRITICAL):** ${notes.trim()}\n\n` : '';
                const nameRule = companyName
                    ? `Mention "${companyName}" in only 5-7 out of 50 reviews. For the rest, use "this place," "the team," etc.`
                    : `Do NOT mention any specific company name.`;

                return `You are an expert copywriter creating authentic Google reviews.
TASK: Generate 50 realistic positive Google reviews based on the CONTEXT below.
CONTEXT: ${context || 'General positive business experience'}

RULES:
${extraInstructions}1. Output ONLY reviews separated by double newlines. No numbering, no titles, no "Here are..." intro.
2. Mix lengths: 80% detailed (3-6 sentences), 20% short (1-2 sentences). Randomize placement.
3. Vary structure: problem-solver, skeptic-turned-believer, direct recommendation, feeling-focused, long-term customer.
4. Use natural varied language. Different perspectives, tones, sentence structures. Sparingly use emojis.
5. ${nameRule}
6. A few reviews should mention a minor hesitation before giving praise.
7. Do NOT invent specific names, numbers, or details not in the context.
8. Since the business is in Singapore, subtly weave in local context where natural.`;
            },

            copyToClipboard(text, msg = 'Copied!') {
                navigator.clipboard.writeText(text).then(() => this.toast(msg, 'success')).catch(() => {
                    const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select();
                    try { document.execCommand('copy'); this.toast(msg, 'success'); } catch(e) { this.toast('Copy failed.', 'error'); }
                    document.body.removeChild(ta);
                });
            },

            downloadJSON(data, filename) {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            },

            toast(message, type = 'success') {
                // Dedup: skip if same message is already showing
                const existing = this.el.toast.querySelectorAll('.toast');
                for (const t of existing) { if (t.textContent === message) return; }
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.innerHTML = `<span>${message}</span>`;
                this.el.toast.appendChild(toast);
                setTimeout(() => toast.classList.add('show'), 10);
                setTimeout(() => { toast.classList.remove('show'); toast.addEventListener('transitionend', () => toast.remove()); }, 3000);
            },

            showConfirm(message, onConfirm) {
                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="confirm-modal">
                        <div class="modal-content" style="max-width:400px;text-align:center">
                            <div style="width:48px;height:48px;background:#FEE2E2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                            </div>
                            <h3 style="font-size:18px;font-weight:700;margin-bottom:8px">Are you sure?</h3>
                            <p style="color:var(--text-secondary);font-size:14px;margin-bottom:24px;line-height:1.5">${message}</p>
                            <div style="display:flex;gap:12px">
                                <button id="confirm-cancel" class="btn btn-secondary" style="flex:1">Cancel</button>
                                <button id="confirm-ok" class="btn btn-danger" style="flex:1">Delete</button>
                            </div>
                        </div>
                    </div>`;
                document.getElementById('confirm-cancel').onclick = () => this.el.modal.innerHTML = '';
                document.getElementById('confirm-modal').onclick = e => { if (e.target.id === 'confirm-modal') this.el.modal.innerHTML = ''; };
                document.getElementById('confirm-ok').onclick = () => { this.el.modal.innerHTML = ''; onConfirm(); };
            },

            sleep(ms) { return new Promise(r => setTimeout(r, ms)); },
        };

        app.init();
    });
    </script>
</body>
</html>
