            handleAIPlaceSelect(place) {
                if (!place?.place_id) return;
                const { ai } = this.state;
                ai.selectedPlace = {
                    name: place.name || '',
                    placeId: place.place_id,
                    reviewLink: `https://search.google.com/local/writereview?placeid=${place.place_id}`,
                    startingCount: place.user_ratings_total || 0,
                    details: { types: place.types || [], address: place.formatted_address || '', website: place.website || '' }
                };
                // Grab positive reviews as context
                if (place.reviews?.length > 0) {
                    ai.contextReviews = place.reviews.filter(r => r.rating >= 4).map(r => r.text).join('\n\n');
                } else {
                    ai.contextReviews = '';
                }
                this.toast(`Selected: ${place.name}`, 'success');
                this.runAIGeneration().catch(() => {}); // Error already toasted inside
            },

            async addAIReviewsToIDB() {
                const { ai } = this.state;
                if (ai.reviews.length === 0) { this.toast('No reviews to add.', 'error'); return; }
                const name = ai.manualName?.trim() || this.inferShortName(ai.selectedPlace.name) || 'AI Generated';
                const link = ai.selectedPlace.reviewLink || '';

                // Check if company already exists in IDB
                const existing = this.state.companies.find(c => c.name.toLowerCase() === name.toLowerCase());
                if (existing) {
                    // Append new reviews (skip duplicates)
                    const existingTexts = new Set(existing.reviews.map(r => r.text));
                    const newReviews = ai.reviews.filter(r => !existingTexts.has(r.text)).map(r => ({ text: r.text, status: 'undone', requiresImage: false, imageDataUrls: [] }));
                    existing.reviews = [...existing.reviews, ...newReviews];
                    if (link && !existing.reviewLink) existing.reviewLink = link;
                    await IDB.put(existing);
                    this.toast(`${newReviews.length} reviews added to "${existing.name}" (${newReviews.length === 0 ? 'all duplicates skipped' : 'duplicates skipped'})`, 'success');
                } else {
                    // Create new company
                    const c = {
                        id: `comp_${Date.now()}`,
                        name,
                        reviewLink: link,
                        reviews: ai.reviews.map(r => ({ text: r.text, status: 'undone', requiresImage: false, imageDataUrls: [] }))
                    };
                    await IDB.put(c);
                    this.toast(`${c.reviews.length} reviews saved to "${name}" in Review Manager!`, 'success');
                }
                this.state.companies = await IDB.getAll();
                this.state.activeCompanyId = this.state.companies.find(c => c.name.toLowerCase() === name.toLowerCase())?.id || this.state.activeCompanyId;
            },

            async generateForCompany(companyId) {
                const company = this.state.companies.find(c => c.id === companyId);
                if (!company) return;

                // Switch to AI tab with company pre-filled, quality mode
                this.state.ai.manualName = company.name;
                this.state.ai.selectedPlace = {
                    name: company.name,
                    placeId: '',
                    reviewLink: company.reviewLink || '',
                    startingCount: 0,
                    details: {}
                };
                this.state.ai.model = 'flash'; // quality mode
                this.state.ai.notes = '';
                this.state.ai.contextReviews = '';
                this.state.activeTab = 'ai';
                this.renderShell();
                this.updateView();

                // Auto-run generation with quality, fallback to quick
                await this.runAIGenerationWithFallback();
            },

            async runAIGenerationWithFallback() {
                const { ai } = this.state;
                ai.model = 'flash'; // quality first
                try {
                    await this.runAIGeneration();
                    if (ai.reviews.length === 0) throw new Error('No reviews generated');
                } catch(err) {
                    // Fallback to quick mode
                    this.toast('Quality mode failed, trying Quick mode...', 'info');
                    ai.model = 'flash-lite';
                    ai.generating = false;
                    ai.reviews = [];
                    await this.runAIGeneration();
                }
            },

            async runAIGeneration() {
                const { ai } = this.state;
                ai.generating = true;
                ai.progress = 0;
                ai.logs = [];
                ai.reviews = [];
                this.updateView();

                const log = (msg, pct) => {
                    const time = new Date().toLocaleTimeString();
                    ai.logs.push(`[${time}] ${msg}`);
                    ai.progress = pct;
                    const logEl = document.getElementById('ai-logs');
                    if (logEl) { logEl.innerHTML = ai.logs.map(l => `<p>${l}</p>`).join(''); logEl.scrollTop = logEl.scrollHeight; }
                    const bar = document.querySelector('.progress-fill');
                    if (bar) bar.style.width = `${pct}%`;
                };

                try {
                    const shortName = ai.manualName.trim() || this.inferShortName(ai.selectedPlace.name);
                    log(`Using company name: "${shortName}"`, 10);
                    await this.sleep(300);

                    const modelName = ai.model === 'flash' ? 'gemini-3.1-flash-lite-preview' : 'gemini-2.5-flash-lite';
                    log(`Building prompt for ${modelName}...`, 25);
                    await this.sleep(300);

                    const prompt = this.buildAIPrompt(ai.contextReviews || '', shortName, ai.model, ai.notes);
                    log(`Sending to Gemini API (server-side)...`, 40);

                    // Call server-side Cloud Function (API key stays on server)
                    const token = await auth.currentUser.getIdToken();
                    const resp = await fetch(`${API_BASE}/generate-reviews`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                        body: JSON.stringify({
                            companyName: shortName,
                            context: ai.contextReviews || '',
                            quantity: 50,
                            model: ai.model === 'flash' ? 'quality' : 'quick',
                            aiNotes: ai.notes
                        })
                    });

                    log('Waiting for response...', 60);
                    if (!resp.ok) {
                        const errData = await resp.json().catch(() => ({}));
                        throw new Error(errData.error || `HTTP ${resp.status}`);
                    }

                    const data = await resp.json();
                    log('Processing reviews...', 80);
                    await this.sleep(300);

                    // Server returns { success, reviews: string[], model }
                    const cleaned = (data.reviews || []).slice(0, 50);
                    ai.reviews = cleaned.map(text => ({ text }));
                    ai.sheetRow.ordered = String(ai.reviews.length);

                    log(`Done! ${ai.reviews.length} reviews generated.`, 100);
                    await this.sleep(500);

                    // Auto-download
                    const dlData = { link: ai.selectedPlace.reviewLink, reviews: ai.reviews.map(r => ({ text: r.text, requiresImage: false })) };
                    const filename = shortName.replace(/\s+/g, '_');
                    this.downloadJSON(dlData, `${filename}.json`);

                    this.toast(`${ai.reviews.length} reviews generated and downloaded!`, 'success');
                } catch(err) {
                    log(`Error: ${err.message}`, ai.progress);
                    this.toast(`Generation failed: ${err.message}`, 'error');
                    ai.generating = false;
                    this.updateView();
                    throw err; // Re-throw for fallback wrapper
                }

                ai.generating = false;
                this.updateView();
            },

            attachAIListeners() {
                const container = document.getElementById('view-container');
                if (!container) return;

                if (container._aiClickAttached) return;
                container._aiClickAttached = true;

                container.addEventListener('click', e => {
                    const target = e.target.closest('[data-model]');
                    if (target) {
                        this.state.ai.model = target.dataset.model;
                        this.updateView();
                    }
                    if (e.target.id === 'ai-reset') {
                        this.state.ai = { ...this.state.ai, selectedPlace: {}, reviews: [], bulkText: '', generating: false, progress: 0, logs: [], sheetRow: { daily: '5', ordered: '', output: '' }, manualName: '', notes: '' };
                        this.updateView();
                    }
                    if (e.target.id === 'ai-download') {
                        const { ai } = this.state;
                        const name = (ai.manualName || ai.selectedPlace.name || 'reviews').replace(/\s+/g, '_');
                        this.downloadJSON({ link: ai.selectedPlace.reviewLink, reviews: ai.reviews.map(r => ({ text: r.text, requiresImage: false })) }, `${name}.json`);
                    }
                    if (e.target.id === 'ai-add-to-reviews') {
                        this.addAIReviewsToIDB();
                    }
                    if (e.target.id === 'ai-gen-sheet') {
                        const { ai } = this.state;
                        const daily = document.getElementById('ai-sheet-daily')?.value || '5';
                        const ordered = document.getElementById('ai-sheet-ordered')?.value || '';
                        const name = ai.manualName || ai.selectedPlace.name || '';
                        const start = ai.selectedPlace.startingCount || 0;
                        const ord = parseInt(ordered) || 0;
                        const row = `${name}\t${daily}\t0\t${ord}\t${start}\t${start + ord}\t\t${ord}`;
                        ai.sheetRow = { daily, ordered, output: row };
                        this.copyToClipboard(row, 'Sheet row copied!');
                        this.updateView();
                    }
                    if (e.target.closest('.ai-remove-review')) {
                        const idx = parseInt(e.target.closest('.ai-remove-review').dataset.idx);
                        this.state.ai.reviews.splice(idx, 1);
                        this.updateView();
                    }
                });

                container.addEventListener('input', e => {
                    if (e.target.id === 'ai-manual-name') this.state.ai.manualName = e.target.value;
                    if (e.target.id === 'ai-notes') this.state.ai.notes = e.target.value;
                });
            },

            // ═══════════════════════════════════════════════════════
            // TAB: EMPLOYEES (Admin)
            // ═══════════════════════════════════════════════════════
            renderEmployees() {
                return `
                    <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px">
                        <h2 style="font-size:20px;font-weight:700">Employees</h2>
                        <button id="add-employee-btn" class="btn btn-primary btn-sm" style="width:auto">+ Add Employee</button>
                    </div>
                    ${this.state.employees.length === 0
                        ? `<div class="card" style="padding:40px;text-align:center"><p style="color:var(--text-secondary)">No employees yet.</p></div>`
                        : `<div style="display:flex;flex-direction:column;gap:8px">
                            ${this.state.employees.map(emp => `
                                <div class="card" style="padding:16px;display:flex;justify-content:space-between;align-items:center">
                                    <div>
                                        <p style="font-weight:600">${emp.name || emp.email}</p>
                                        <p style="font-size:13px;color:var(--text-secondary)">${emp.email}</p>
                                    </div>
                                    <div style="display:flex;gap:8px;align-items:center">
                                        <span class="badge badge-info">Employee</span>
                                        <button class="btn btn-secondary btn-sm reset-pw-btn" data-id="${emp.id}" data-name="${emp.name || emp.email}" style="width:auto;padding:4px 10px;font-size:11px">Reset PW</button>
                                        <button class="btn btn-secondary btn-sm revoke-employee" data-id="${emp.id}" data-name="${emp.name || emp.email}" style="width:auto;padding:4px 10px;font-size:11px;color:var(--error)">Revoke</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>`
                    }`;
            },

            attachEmployeeListeners() {
                document.getElementById('add-employee-btn')?.addEventListener('click', () => {
                    this.showAddEmployeeModal();
                });
                document.querySelectorAll('.reset-pw-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const uid = btn.dataset.id;
                        const name = btn.dataset.name;
                        const newPw = prompt(`New password for "${name}" (min 6 chars):`);
                        if (!newPw || newPw.length < 6) { if (newPw !== null) this.toast('Password must be at least 6 characters.', 'error'); return; }
                        try {
                            const token = await auth.currentUser.getIdToken();
                            const resp = await fetch(`${API_BASE}/reset-password`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ uid, newPassword: newPw })
                            });
                            if (!resp.ok) throw new Error((await resp.json()).error || 'Failed');
                            this.toast(`Password reset for ${name}!`, 'success');
                        } catch(err) { this.toast(err.message, 'error'); }
                    });
                });
                document.querySelectorAll('.revoke-employee').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const uid = btn.dataset.id;
                        const name = btn.dataset.name;
                        this.showConfirm(`Revoke access for "${name}"? They will no longer be able to log in.`, async () => {
                        try {
                            const token = await auth.currentUser.getIdToken();
                            const resp = await fetch(`${API_BASE}/revoke-employee`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ uid })
                            });
                            const data = await resp.json();
                            if (!resp.ok) throw new Error(data.error || 'Failed');
                            this.toast(`Access revoked for ${name}`, 'success');
                            this.loadEmployees();
                            this.updateView();
                        } catch(err) {
                            this.toast(err.message, 'error');
                        }
                        });
                    });
                });
            },

            showAddEmployeeModal() {
                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="emp-modal">
                        <div class="modal-content">
                            <h2 style="font-size:20px;font-weight:700;margin-bottom:20px">Add Employee</h2>
                            <form id="add-emp-form" style="display:flex;flex-direction:column;gap:16px">
                                <div><label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Name</label><input type="text" id="emp-name" class="input" placeholder="Employee name" required></div>
                                <div><label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Email</label><input type="email" id="emp-email" class="input" placeholder="employee@example.com" required></div>
                                <div><label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Password</label><input type="text" id="emp-pass" class="input" placeholder="Temporary password (min 6 chars)" required></div>
                                <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:8px">
                                    <button type="button" id="cancel-emp" class="btn btn-secondary" style="width:auto">Cancel</button>
                                    <button type="submit" class="btn btn-primary" style="width:auto">Create</button>
                                </div>
                            </form>
                        </div>
                    </div>`;
                document.getElementById('cancel-emp').onclick = () => this.el.modal.innerHTML = '';
                document.getElementById('emp-modal').onclick = e => { if (e.target.id === 'emp-modal') this.el.modal.innerHTML = ''; };
                document.getElementById('add-emp-form').onsubmit = async e => {
                    e.preventDefault();
                    const name = document.getElementById('emp-name').value.trim();
                    const email = document.getElementById('emp-email').value.trim();
                    const pass = document.getElementById('emp-pass').value;
                    if (pass.length < 6) { this.toast('Password must be at least 6 characters.', 'error'); return; }

                    const submitBtn = e.target.querySelector('[type="submit"]');
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Creating...';

                    try {
                        const token = await auth.currentUser.getIdToken();
                        const resp = await fetch(`${API_BASE}/create-employee`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ name, email, password: pass })
                        });
                        const data = await resp.json();
                        if (!resp.ok) throw new Error(data.error || 'Failed to create employee');

                        this.toast(`Employee "${name}" created!`, 'success');
                        this.el.modal.innerHTML = '';
                        await this.loadEmployees();
                        this.updateView();
                    } catch(err) {
                        this.toast(err.message, 'error');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Create';
                    }
                };
            },

            // ═══════════════════════════════════════════════════════
            // ═══════════════════════════════════════════════════════
            // TAB: TRACKER (Admin - live sheet view)
            // ═══════════════════════════════════════════════════════
            renderTracker() {
                const isAdmin = this.state.userRole === 'admin';
                const allOrders = isAdmin ? this.state.orders : (this.state._allOrders || this.state.orders);
                const filter = this.state.trackerFilter || '';
                const sort = this.state.trackerSort || { field: 'companyName', dir: 'asc' };
                let activeOrders = allOrders.filter(o => o.status !== 'completed')
                    .filter(o => !filter || o.companyName.toLowerCase().includes(filter.toLowerCase()));
                // Sort
                activeOrders = [...activeOrders].sort((a, b) => {
                    let va = a[sort.field], vb = b[sort.field];
                    if (sort.field === 'left') { va = (a.quantity||0) - (a.completedCount||0); vb = (b.quantity||0) - (b.completedCount||0); }
                    if (typeof va === 'number' && typeof vb === 'number') return sort.dir === 'asc' ? va - vb : vb - va;
                    return sort.dir === 'asc' ? String(va||'').localeCompare(String(vb||'')) : String(vb||'').localeCompare(String(va||''));
                });
                return `
                    <div style="display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:12px;margin-bottom:16px">
                        <h2 style="font-size:20px;font-weight:700">Tracker</h2>
                        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                            <input type="text" id="tracker-filter" class="input" placeholder="Filter companies..." value="${filter}" style="width:180px;padding:6px 12px;font-size:13px">
                            ${isAdmin ? `<button id="add-company-btn" class="btn btn-primary btn-sm" style="width:auto">+ Add Company</button>` : ''}
                            ${isAdmin ? `<button id="bulk-assign-btn" class="btn btn-primary btn-sm" style="width:auto;display:none">Assign Selected</button>` : ''}
                            <button id="copy-all-rows" class="btn btn-secondary btn-sm" style="width:auto">Copy All</button>
                        </div>
                    </div>
                    ${activeOrders.length === 0
                        ? `<div class="card" style="padding:40px;text-align:center"><p style="color:var(--text-secondary)">${filter ? 'No matching companies.' : 'No active orders. Create an order first.'}</p></div>`
                        : `
                    <div class="card" style="padding:0;overflow-x:auto">
                        <table style="width:100%;border-collapse:collapse;font-size:13px;min-width:800px">
                            <thead>
                                <tr style="background:var(--bg-secondary);border-bottom:2px solid var(--border)">
                                    ${isAdmin ? `<th style="padding:10px 6px;text-align:center;width:32px"><input type="checkbox" id="tracker-select-all" style="cursor:pointer"></th>` : ''}
                                    <th class="sort-header" data-sort="companyName" style="padding:10px 12px;text-align:left;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Company<span style="font-size:10px;margin-left:2px">${sort.field==='companyName'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th class="sort-header" data-sort="dailyTarget" style="padding:10px 4px;text-align:center;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Daily<span style="font-size:10px;margin-left:2px">${sort.field==='dailyTarget'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th class="sort-header" data-sort="completedCount" style="padding:10px 4px;text-align:center;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Done<span style="font-size:10px;margin-left:2px">${sort.field==='completedCount'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th class="sort-header" data-sort="quantity" style="padding:10px 4px;text-align:center;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Ordered<span style="font-size:10px;margin-left:2px">${sort.field==='quantity'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th class="sort-header" data-sort="startingCount" style="padding:10px 4px;text-align:center;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Start<span style="font-size:10px;margin-left:2px">${sort.field==='startingCount'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th style="padding:10px 4px;text-align:center;font-weight:600;white-space:nowrap">End</th>
                                    <th class="sort-header" data-sort="left" style="padding:10px 4px;text-align:center;font-weight:600;cursor:pointer;user-select:none;white-space:nowrap">Left<span style="font-size:10px;margin-left:2px">${sort.field==='left'?(sort.dir==='asc'?'▲':'▼'):''}</span></th>
                                    <th style="padding:10px 8px;text-align:left;font-weight:600">Comments</th>
                                    <th style="padding:10px 4px;text-align:center;font-weight:600;width:${isAdmin?'130':'50'}px">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${activeOrders.map(o => {
                                    const left = (o.quantity || 0) - (o.completedCount || 0);
                                    const endCount = (o.startingCount || 0) + (o.quantity || 0);
                                    const pct = o.quantity > 0 ? Math.round((o.completedCount / o.quantity) * 100) : 0;
                                    const rowColor = pct >= 100 ? '#D1FAE5' : pct >= 50 ? '#FEF3C7' : 'transparent';
                                    const inp = (field, val, bold) => `<input type="number" class="tracker-edit tracker-num" data-id="${o.id}" data-field="${field}" value="${val}" style="width:56px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:6px 2px;font-size:14px;background:white;font-weight:${bold?'700':'500'}">`;
                                    return `
                                    <tr style="border-bottom:1px solid var(--border);background:${rowColor}" data-order-id="${o.id}">
                                        ${isAdmin ? `<td style="padding:8px 6px;text-align:center"><input type="checkbox" class="tracker-select" data-id="${o.id}" style="cursor:pointer"></td>` : ''}
                                        <td style="padding:8px 12px;font-weight:500;font-size:13px">${o.companyName}</td>
                                        <td style="padding:4px 2px;text-align:center">${inp('dailyTarget', o.dailyTarget||5, false)}</td>
                                        <td style="padding:4px 2px;text-align:center">${inp('completedCount', o.completedCount||0, true)}</td>
                                        <td style="padding:4px 2px;text-align:center">${inp('quantity', o.quantity||0, false)}</td>
                                        <td style="padding:4px 2px;text-align:center">${inp('startingCount', o.startingCount||0, false)}</td>
                                        <td style="padding:8px 4px;text-align:center;font-size:13px">${endCount}</td>
                                        <td style="padding:8px 4px;text-align:center;font-weight:600;font-size:13px;color:${left > 0 ? 'var(--error)' : 'var(--success)'}">${left}</td>
                                        <td style="padding:4px 6px"><input type="text" class="tracker-edit" data-id="${o.id}" data-field="comments" value="${(o.comments || '').replace(/"/g, '&quot;')}" style="width:100%;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;color:var(--text);background:white" placeholder="Add comment..."></td>
                                        <td style="padding:10px 8px;text-align:center">
                                            <div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap">
                                                <button class="btn btn-secondary btn-sm copy-sheet-row" data-id="${o.id}" style="width:auto;padding:3px 7px;font-size:11px">Copy</button>
                                                ${isAdmin ? `<button class="btn btn-primary btn-sm assign-order" data-id="${o.id}" style="width:auto;padding:3px 7px;font-size:11px">Assign</button>
                                                <button class="btn btn-secondary btn-sm edit-link-btn" data-id="${o.id}" style="width:auto;padding:3px 7px;font-size:11px" title="Edit review link">Link</button>
                                                <button class="btn btn-secondary btn-sm delete-order-btn" data-id="${o.id}" data-name="${o.companyName}" style="width:auto;padding:3px 7px;font-size:11px;color:var(--error)" title="Delete order">X</button>` : ''}
                                            </div>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>`
                    }`;
            },

            attachTrackerListeners() {
                const isAdmin = this.state.userRole === 'admin';

                // Column sort headers
                document.querySelectorAll('.sort-header').forEach(th => {
                    th.onclick = () => {
                        const field = th.dataset.sort;
                        const current = this.state.trackerSort || { field: 'companyName', dir: 'asc' };
                        this.state.trackerSort = { field, dir: current.field === field && current.dir === 'asc' ? 'desc' : 'asc' };
                        const container = document.getElementById('view-container');
                        if (container) { container.innerHTML = this.renderTracker(); this.attachTrackerListeners(); }
                    };
                });

                // Add company button
                document.getElementById('add-company-btn')?.addEventListener('click', () => this.showAddCompanyModal());

                // Delete order buttons
                document.querySelectorAll('.delete-order-btn').forEach(btn => {
                    btn.onclick = () => {
                        const name = btn.dataset.name;
                        const id = btn.dataset.id;
                        this.showConfirm(`Delete "${name}"? This will remove the order and all associated data permanently.`, async () => {
                            try {
                                const token = await auth.currentUser.getIdToken();
                                const resp = await fetch(`${API_BASE}/orders/${id}`, {
                                    method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` }
                                });
                                if (!resp.ok) throw new Error('Delete failed');
                                this.toast(`Deleted ${name}`, 'success');
                                this.loadOrders();
                            } catch(err) { this.toast(err.message, 'error'); }
                        });
                    };
                });

                // Edit link buttons
                document.querySelectorAll('.edit-link-btn').forEach(btn => {
                    btn.onclick = () => {
                        const order = this.state.orders.find(o => o.id === btn.dataset.id);
                        const newLink = prompt('Review Link:', order?.reviewLink || '');
                        if (newLink !== null) {
                            db.collection('orders').doc(btn.dataset.id).update({ reviewLink: newLink, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }).then(() => {
                                if (order) order.reviewLink = newLink;
                                this.toast('Link updated', 'success');
                            }).catch(e => this.toast('Failed: ' + e.message, 'error'));
                        }
                    };
                });

                // Filter input
                document.getElementById('tracker-filter')?.addEventListener('input', e => {
                    this.state.trackerFilter = e.target.value;
                    // Debounce re-render
                    clearTimeout(this._trackerFilterTimeout);
                    this._trackerFilterTimeout = setTimeout(() => {
                        const container = document.getElementById('view-container');
                        if (container && this.state.activeTab === 'tracker') {
                            container.innerHTML = this.renderTracker();
                            this.attachTrackerListeners();
                        }
                    }, 300);
                });

                // Select all checkbox
                document.getElementById('tracker-select-all')?.addEventListener('change', e => {
                    const checks = document.querySelectorAll('.tracker-select');
                    checks.forEach(c => c.checked = e.target.checked);
                    this.updateBulkAssignBtn();
                });

                // Individual checkboxes
                document.querySelectorAll('.tracker-select').forEach(cb => {
                    cb.addEventListener('change', () => this.updateBulkAssignBtn());
                });

                // Bulk assign button
                document.getElementById('bulk-assign-btn')?.addEventListener('click', () => {
                    const selected = [...document.querySelectorAll('.tracker-select:checked')].map(c => c.dataset.id);
                    if (selected.length === 0) return;
                    this.showBulkAssignModal(selected);
                });

                // Copy row buttons in tracker
                document.querySelectorAll('.copy-sheet-row').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const id = btn.dataset.id;
                        const o = this.state.orders.find(x => x.id === id);
                        if (o) {
                            const endCount = (o.startingCount || 0) + (o.quantity || 0);
                            const left = (o.quantity || 0) - (o.completedCount || 0);
                            const row = `${o.companyName}\t${o.dailyTarget || 5}\t${o.completedCount || 0}\t${o.quantity}\t${o.startingCount || 0}\t${endCount}\t\t${left}\t${o.comments || ''}`;
                            this.copyToClipboard(row, 'Row copied!');
                        }
                    });
                });

                // Copy all rows button
                document.getElementById('copy-all-rows')?.addEventListener('click', () => {
                    const rows = this.state.orders.filter(o => o.status !== 'completed').map(o => {
                        const endCount = (o.startingCount || 0) + (o.quantity || 0);
                        const left = (o.quantity || 0) - (o.completedCount || 0);
                        return `${o.companyName}\t${o.dailyTarget || 5}\t${o.completedCount || 0}\t${o.quantity}\t${o.startingCount || 0}\t${endCount}\t\t${left}\t${o.comments || ''}`;
                    }).join('\n');
                    this.copyToClipboard(rows, 'All rows copied!');
                });

                // Editable cells - save on change
                document.querySelectorAll('.tracker-edit').forEach(input => {
                    input.addEventListener('change', async e => {
                        const orderId = e.target.dataset.id;
                        const field = e.target.dataset.field;
                        let value = e.target.value;
                        if (['dailyTarget','completedCount','quantity','startingCount'].includes(field)) value = parseInt(value) || 0;
                        try {
                            await db.collection('orders').doc(orderId).update({ [field]: value, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                            // Update local state
                            const order = this.state.orders.find(o => o.id === orderId);
                            if (order) order[field] = value;
                            this.toast('Saved', 'success');
                        } catch(err) {
                            this.toast('Save failed: ' + err.message, 'error');
                        }
                    });
                });
            },

            updateBulkAssignBtn() {
                const selected = document.querySelectorAll('.tracker-select:checked');
                const btn = document.getElementById('bulk-assign-btn');
                if (btn) {
                    btn.style.display = selected.length > 0 ? 'inline-flex' : 'none';
                    btn.textContent = `Assign ${selected.length} Selected`;
                }
            },

            showBulkAssignModal(orderIds) {
                const companies = orderIds.map(id => this.state.orders.find(o => o.id === id)).filter(Boolean);
                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="bulk-assign-modal">
                        <div class="modal-content" style="max-width:520px">
                            <h2 style="font-size:20px;font-weight:700;margin-bottom:8px">Bulk Assign</h2>
                            <p style="color:var(--text-secondary);font-size:14px;margin-bottom:16px">${companies.length} companies selected</p>
                            <form id="bulk-assign-form" style="display:flex;flex-direction:column;gap:16px">
                                <div>
                                    <label style="font-size:13px;font-weight:500;display:block;margin-bottom:6px">Assign to Employee</label>
                                    <select id="bulk-assign-employee" class="input" required>
                                        <option value="">Select employee...</option>
                                        ${this.state.employees.map(e => `<option value="${e.id}">${e.name || e.email}</option>`).join('')}
                                    </select>
                                </div>
                                <div style="border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                                    <div style="display:flex;justify-content:space-between;padding:10px 12px;background:var(--bg-secondary);border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-secondary)">
                                        <span>Company</span><span>Reviews Today</span>
                                    </div>
                                    <div style="max-height:240px;overflow-y:auto">
                                        ${companies.map(c => {
                                            const left = (c.quantity||0) - (c.completedCount||0);
                                            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px">
                                                <div style="flex:1;min-width:0">
                                                    <span style="font-weight:500">${c.companyName}</span>
                                                    <span style="color:var(--text-secondary);font-size:11px;margin-left:4px">(${left} left)</span>
                                                </div>
                                                <input type="number" class="bulk-count-input tracker-num" data-id="${c.id}" value="${c.dailyTarget || 5}" min="0" max="${left}" style="width:52px;text-align:center;border:1px solid var(--border);border-radius:6px;padding:6px 2px;font-size:14px;font-weight:700;background:white" inputmode="numeric">
                                            </div>`;
                                        }).join('')}
                                    </div>
                                </div>
                                <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:4px">
                                    <button type="button" id="cancel-bulk-assign" class="btn btn-secondary" style="width:auto">Cancel</button>
                                    <button type="submit" class="btn btn-primary" style="width:auto">Assign All</button>
                                </div>
                            </form>
                        </div>
                    </div>`;

                document.getElementById('cancel-bulk-assign').onclick = () => this.el.modal.innerHTML = '';
                document.getElementById('bulk-assign-modal').onclick = e => { if (e.target.id === 'bulk-assign-modal') this.el.modal.innerHTML = ''; };

                document.getElementById('bulk-assign-form').onsubmit = async e => {
                    e.preventDefault();
                    const employeeUid = document.getElementById('bulk-assign-employee').value;
                    if (!employeeUid) { this.toast('Select an employee.', 'error'); return; }

                    // Read per-company counts
                    const perCompanyCounts = {};
                    document.querySelectorAll('.bulk-count-input').forEach(inp => {
                        perCompanyCounts[inp.dataset.id] = parseInt(inp.value) || 0;
                    });
                    const totalAssigned = Object.values(perCompanyCounts).reduce((s, v) => s + v, 0);
                    if (totalAssigned <= 0) { this.toast('Set at least 1 review for a company.', 'error'); return; }

                    const submitBtn = e.target.querySelector('[type="submit"]');
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Assigning...';

                    try {
                        const token = await auth.currentUser.getIdToken();
                        for (const orderId of orderIds) {
                            const count = perCompanyCounts[orderId] || 0;
                            if (count <= 0) continue;
                            await fetch(`${API_BASE}/orders/${orderId}/assign`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ employeeUid, count })
                            });
                        }
                        this.toast(`Assigned ${orderIds.length} companies!`, 'success');
                        this.el.modal.innerHTML = '';
                        this.loadOrders();
                    } catch(err) {
                        this.toast(err.message, 'error');
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Assign All';
                    }
                };
            },

            // ═══════════════════════════════════════════════════════
            // ═══════════════════════════════════════════════════════
            // TAB: REPORTS (Admin - approve employee daily reports)
            // ═══════════════════════════════════════════════════════
            renderReports() {
                if (!this.state._reports) {
                    this.loadDailyReports();
                    return `<div style="text-align:center;padding:60px"><div class="spinner" style="margin:0 auto 16px"></div><p style="color:var(--text-secondary)">Loading reports...</p></div>`;
                }
                const reports = this.state._reports;
                const pending = reports.filter(r => r.status === 'pending_approval');
                const approved = reports.filter(r => r.status === 'approved');

                return `
                    <h2 style="font-size:20px;font-weight:700;margin-bottom:16px">Employee Reports</h2>
                    ${pending.length > 0 ? `
                        <h3 style="font-size:15px;font-weight:600;color:var(--warning);margin-bottom:12px">Pending Approval (${pending.length})</h3>
                        ${pending.map(r => this.renderReportCard(r, true)).join('')}
                    ` : ''}
                    ${pending.length === 0 && approved.length === 0 ? `
                        <div class="card" style="padding:40px;text-align:center"><p style="color:var(--text-secondary)">No reports yet. Employees submit daily progress here.</p></div>
                    ` : ''}
                    ${approved.length > 0 ? `
                        <div style="display:flex;justify-content:space-between;align-items:center;margin:24px 0 12px">
                            <h3 style="font-size:15px;font-weight:600;color:var(--success)">Recently Approved (${approved.length})</h3>
                            <button id="clear-approved-btn" class="order-action-btn" style="color:var(--error);font-size:13px">Clear All Approved</button>
                        </div>
                        ${approved.slice(0, 10).map(r => this.renderReportCard(r, false)).join('')}
                    ` : ''}`;
            },

            renderReportCard(report, showActions) {
                const dateStr = report.date || 'Unknown date';
                return `
                    <div class="card" style="padding:20px;margin-bottom:12px;${report.status === 'approved' ? 'opacity:0.7' : ''}">
                        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
                            <div>
                                <p style="font-weight:600">${report.employeeName || 'Employee'}</p>
                                <p style="font-size:12px;color:var(--text-secondary)">${dateStr} - ${report.totalReviews || 0} reviews, ${report.totalScreenshots || 0} screenshots</p>
                            </div>
                            <div style="display:flex;align-items:center;gap:8px">
                                <span class="badge ${report.status === 'approved' ? 'badge-success' : 'badge-warning'}">${report.status === 'approved' ? 'Approved' : 'Pending'}</span>
                                <button class="delete-report-btn order-action-btn" data-report="${report.id}" style="color:var(--error);font-size:16px;padding:2px 6px" title="Delete this report">x</button>
                            </div>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:8px">
                            ${(report.entries || []).map((entry, i) => `
                                <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:var(--bg-secondary);border-radius:8px">

                                    ` : `<span style="font-weight:700;font-size:14px">${entry.reviewsClaimed}</span>`}
                                </div>
                            `).join('')}
                        </div>
                        ${showActions ? `
                            <div style="display:flex;gap:8px;margin-top:16px">
                                <button class="btn btn-primary approve-report" data-report="${report.id}" style="flex:1;min-height:44px">Approve</button>
                            </div>
                        ` : ''}
                    </div>`;
            },

            async loadDailyReports() {
                try {
                    const token = await auth.currentUser.getIdToken();
                    const resp = await fetch(`${API_BASE}/daily-reports`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await resp.json();
                    this.state._reports = data.reports || [];
                } catch(e) {
                    this.state._reports = [];
                }
                this.updateView();
            },

            attachReportListeners() {
                // Approve button
                document.querySelectorAll('.approve-report').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const reportId = btn.dataset.report;
                        const report = this.state._reports.find(r => r.id === reportId);
                        if (!report) return;

                        // Collect potentially edited counts
                        const editedEntries = report.entries.map((entry, i) => {
                            const input = document.querySelector(`.report-count-edit[data-report="${reportId}"][data-idx="${i}"]`);
                            return { ...entry, reviewsClaimed: input ? parseInt(input.value) || 0 : entry.reviewsClaimed };
                        });

                        btn.disabled = true;
                        btn.textContent = 'Approving...';

                        try {
                            const token = await auth.currentUser.getIdToken();
                            const resp = await fetch(`${API_BASE}/daily-report/${reportId}/approve`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                body: JSON.stringify({ editedEntries })
                            });
                            if (!resp.ok) throw new Error('Approve failed');

                            this.toast('Report approved! Counts updated.', 'success');
                            this.state._reports = null; // Force reload
                            this.loadOrders(); // Refresh tracker counts
                            this.updateView();
                        } catch(err) {
                            this.toast(err.message, 'error');
                            btn.disabled = false;
                            btn.textContent = 'Approve';
                        }
                    });
                });

                // Delete individual report
                document.querySelectorAll('.delete-report-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        const reportId = btn.dataset.report;
                        if (!confirm('Delete this report? This only removes the log — order counts already saved are not affected.')) return;
                        try {
                            await db.collection('dailyReports').doc(reportId).delete();
                            this.toast('Report deleted.', 'success');
                            this.state._reports = null;
                            this.updateView();
                        } catch(err) {
                            this.toast('Failed: ' + err.message, 'error');
                        }
                    });
                });

                // Clear all approved reports
                document.getElementById('clear-approved-btn')?.addEventListener('click', async () => {
                    const approved = (this.state._reports || []).filter(r => r.status === 'approved');
                    if (approved.length === 0) return;
                    if (!confirm(`Delete ${approved.length} approved report(s)? This only clears the log — order counts are already saved.`)) return;
                    try {
                        const batch = db.batch();
                        for (const r of approved) {
                            batch.delete(db.collection('dailyReports').doc(r.id));
                        }
                        await batch.commit();
                        this.toast(`${approved.length} approved reports cleared.`, 'success');
                        this.state._reports = null;
                        this.updateView();
                    } catch(err) {
                        this.toast('Failed to clear: ' + err.message, 'error');
                    }
                });
            },

            attachAssignmentListeners() {
                // Expand upload area
                document.querySelectorAll('.expand-upload-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.state._expandedOrderId = btn.dataset.id;
                        this.updateView();
                    });
                });
                // Collapse upload area
                document.querySelectorAll('.collapse-upload-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.state._expandedOrderId = null;
                        this.updateView();
                    });
                });
                // File inputs inside expanded cards
                document.querySelectorAll('.proof-file-input').forEach(input => {
                    input.addEventListener('change', async e => {
                        const files = Array.from(e.target.files);
                        if (files.length === 0) return;
                        const orderId = input.dataset.orderId;
                        if (!this.state._todayUploads[orderId]) this.state._todayUploads[orderId] = { screenshots: [], reviewCount: 0, urls: [] };

                        // Step 1: Compress all images first
                        this.toast(`Compressing ${files.length} image(s)...`, 'info');
                        const compressed = [];
                        for (const file of files) {
                            try {
                                const blob = await compressImage(file, 800, 0.5);
                                const preview = URL.createObjectURL(blob);
                                const base64 = await new Promise((resolve, reject) => {
                                    const reader = new FileReader();
                                    reader.onload = () => resolve(reader.result.split(',')[1]);
                                    reader.onerror = reject;
                                    reader.readAsDataURL(blob);
                                });
                                compressed.push({ preview, base64 });
                            } catch(err) { this.toast(`Compress failed: ${err.message}`, 'error'); }
                        }
                        if (compressed.length === 0) return;

                        // Step 2: Upload all in parallel (batch of 3 at a time)
                        this.toast(`Uploading ${compressed.length} screenshot(s)...`, 'info');
                        const token = await auth.currentUser.getIdToken();
                        let uploaded = 0, failed = 0;
                        const uploadOne = async (item) => {
                            for (let attempt = 0; attempt < 2; attempt++) {
                                try {
                                    const resp = await fetch(`${API_BASE}/upload-proof`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                        body: JSON.stringify({ orderId, imageBase64: item.base64 })
                                    });
                                    const data = await resp.json();
                                    if (!resp.ok) throw new Error(data.error || 'Upload failed');
                                    this.state._todayUploads[orderId].screenshots.push({ preview: item.preview, url: data.imageUrl });
                                    uploaded++;
                                    return;
                                } catch(err) {
                                    if (attempt === 1) { failed++; this.toast(`1 upload failed: ${err.message}`, 'error'); }
                                    else await this.sleep(500); // brief pause before retry
                                }
                            }
                        };
                        // Process in batches of 3
                        for (let i = 0; i < compressed.length; i += 3) {
                            const batch = compressed.slice(i, i + 3);
                            await Promise.all(batch.map(item => uploadOne(item)));
                        }
                        this.toast(`${uploaded} uploaded${failed > 0 ? `, ${failed} failed` : ''}!`, uploaded > 0 ? 'success' : 'error');
                        this.updateView();
                        e.target.value = ''; // Reset file input for re-selection
                    });
                });
                // Remove screenshot
                document.querySelectorAll('.remove-screenshot').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const orderId = btn.dataset.orderId;
                        const idx = parseInt(btn.dataset.idx);
                        this.state._todayUploads[orderId].screenshots.splice(idx, 1);
                        this.updateView();
                    });
                });
                // Review count input
                document.querySelectorAll('.review-count-input').forEach(input => {
                    input.addEventListener('input', e => {
                        const orderId = e.target.dataset.orderId;
                        if (!this.state._todayUploads[orderId]) this.state._todayUploads[orderId] = { screenshots: [], reviewCount: 0 };
                        this.state._todayUploads[orderId].reviewCount = parseInt(e.target.value) || 0;
                    });
                });
                // Save progress for a company
                document.querySelectorAll('.save-upload-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const orderId = btn.dataset.id;
                        const uploads = this.state._todayUploads[orderId];
                        if (!uploads || uploads.screenshots.length === 0) { this.toast('Upload at least one screenshot.', 'error'); return; }
                        const countInput = document.querySelector(`.review-count-input[data-order-id="${orderId}"]`);
                        const count = parseInt(countInput?.value) || 0;
                        if (count <= 0) { this.toast('Enter how many reviews you completed.', 'error'); return; }
                        uploads.reviewCount = count;
                        this.state._expandedOrderId = null;
                        this.toast(`Saved: ${count} reviews for ${btn.dataset.name}`, 'success');
                        this.updateView();
                    });
                });
                // Confirm today's progress
                document.getElementById('confirm-today-btn')?.addEventListener('click', () => {
                    this.showDailyReportModal();
                });
            },

            showDailyReportModal() {
                const uploads = this.state._todayUploads || {};
                const entries = Object.entries(uploads).filter(([_, v]) => v.screenshots.length > 0 || v.reviewCount > 0);

                if (entries.length === 0) {
                    this.toast('No progress to report yet. Upload proofs first.', 'error');
                    return;
                }

                const today = new Date().toLocaleDateString('en-SG', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                const reportLines = entries.map(([orderId, data]) => {
                    const order = this.state.orders.find(o => o.id === orderId);
                    return { orderId, companyName: order?.companyName || 'Unknown', reviewsClaimed: data.reviewCount, screenshotsCount: data.screenshots.length, screenshotUrls: data.screenshots.map(s => s.url) };
                });
                const totalReviews = reportLines.reduce((s, e) => s + e.reviewsClaimed, 0);
                const totalScreenshots = reportLines.reduce((s, e) => s + e.screenshotsCount, 0);

                const reportText = `Today's Report - ${today}\n${'─'.repeat(30)}\n${reportLines.map(e => `${e.companyName}: ${e.reviewsClaimed} reviews (${e.screenshotsCount} screenshots)`).join('\n')}\n${'─'.repeat(30)}\nTotal: ${totalReviews} reviews (${totalScreenshots} screenshots)`;

                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="report-modal">
                        <div class="modal-content" style="max-width:480px">
                            <h2 style="font-size:20px;font-weight:700;margin-bottom:16px">Confirm Today's Progress</h2>
                            <div style="background:var(--bg-secondary);border-radius:var(--radius);padding:16px;font-family:monospace;font-size:13px;white-space:pre-wrap;line-height:1.6;margin-bottom:16px">${reportText}</div>
                            <div style="display:flex;gap:8px;margin-bottom:16px">
                                <button id="copy-report" class="btn btn-secondary" style="flex:1">Copy Report</button>
                            </div>
                            <div style="display:flex;gap:12px;justify-content:flex-end">
                                <button id="cancel-report" class="btn btn-secondary" style="width:auto">Cancel</button>
                                <button id="submit-report" class="btn btn-primary" style="width:auto">Submit Report</button>
                            </div>
                        </div>
                    </div>`;

                document.getElementById('cancel-report').onclick = () => this.el.modal.innerHTML = '';
                document.getElementById('report-modal').onclick = e => { if (e.target.id === 'report-modal') this.el.modal.innerHTML = ''; };
                document.getElementById('copy-report').onclick = () => this.copyToClipboard(reportText, 'Report copied! Send via WhatsApp.');

                document.getElementById('submit-report').onclick = async () => {
                    const btn = document.getElementById('submit-report');
                    btn.disabled = true;
                    btn.textContent = 'Submitting...';

                    try {
                        const token = await auth.currentUser.getIdToken();
                        const resp = await fetch(`${API_BASE}/daily-report`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ entries: reportLines, date: new Date().toISOString().split('T')[0] })
                        });
                        const data = await resp.json();
                        if (!resp.ok) throw new Error(data.error || 'Failed');

                        this.toast('Report submitted! Waiting for admin approval.', 'success');
                        this.state._todayUploads = {}; // Clear uploads
                        this.el.modal.innerHTML = '';
                        this.loadEmployeeAssignments();
                    } catch(err) {
                        this.toast(err.message, 'error');
                        btn.disabled = false;
                        btn.textContent = 'Submit Report';
                    }
                };
            },

            // ═══════════════════════════════════════════════════════
            // PROOF GALLERY (Admin)
            // ═══════════════════════════════════════════════════════
            async showProofGallery(orderId) {
                const order = this.state.orders.find(o => o.id === orderId);
                if (!order) return;

                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="proof-modal">
                        <div class="modal-content" style="max-width:750px;max-height:85vh;overflow-y:auto">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
                                <h2 style="font-size:20px;font-weight:700">${order.companyName} - Proofs</h2>
                                <div style="display:flex;gap:8px">
                                    <span id="proof-total" style="font-size:13px;color:var(--text-secondary);align-self:center"></span>
                                    <button id="close-proofs" class="btn btn-secondary btn-sm" style="width:auto">Close</button>
                                </div>
                            </div>
                            <div id="proof-container">
                                <p style="color:var(--text-secondary);text-align:center;padding:40px">Loading proofs...</p>
                            </div>
                        </div>
                    </div>`;

                document.getElementById('close-proofs').onclick = () => this.el.modal.innerHTML = '';
                document.getElementById('proof-modal').onclick = e => { if (e.target.id === 'proof-modal') this.el.modal.innerHTML = ''; };

                try {
                    const snap = await db.collection('orders').doc(orderId).collection('proofs').orderBy('uploadedAt', 'desc').get();
                    const container = document.getElementById('proof-container');
                    const totalEl = document.getElementById('proof-total');
                    if (snap.empty) {
                        container.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:40px">No proofs uploaded yet.</p>';
                        totalEl.textContent = '0 screenshots';
                        return;
                    }

                    totalEl.textContent = `${snap.docs.length} screenshots`;

                    // Group by date
                    const grouped = {};
                    snap.docs.forEach(d => {
                        const p = d.data();
                        const ts = p.uploadedAt?.toDate ? p.uploadedAt.toDate() : new Date(p.uploadedAt);
                        const dateKey = ts.toLocaleDateString('en-SG', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
                        if (!grouped[dateKey]) grouped[dateKey] = [];
                        grouped[dateKey].push({ id: d.id, ...p, _ts: ts });
                    });

                    container.innerHTML = Object.entries(grouped).map(([date, proofs]) => `
                        <div style="margin-bottom:20px">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                                <p style="font-size:13px;font-weight:600;color:var(--text-secondary)">${date}</p>
                                <span style="font-size:12px;color:var(--text-secondary)">${proofs.length} screenshot${proofs.length !== 1 ? 's' : ''}</span>
                            </div>
                            <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px">
                                ${proofs.map(p => `
                                    <div style="position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--border)">
                                        <img src="${p.imageUrl}" style="width:100%;height:110px;object-fit:cover;cursor:pointer;display:block" onclick="window.open('${p.imageUrl}','_blank')">
                                        <button class="delete-proof-btn" data-order-id="${orderId}" data-proof-id="${p.id}" data-storage-path="${p.storagePath || ''}" style="position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.6);color:white;border:none;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;backdrop-filter:blur(4px)" title="Delete screenshot">x</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('');

                    // Delete handlers
                    container.querySelectorAll('.delete-proof-btn').forEach(btn => {
                        btn.addEventListener('click', async e => {
                            e.stopPropagation();
                            const proofId = btn.dataset.proofId;
                            const storagePath = btn.dataset.storagePath;
                            const oId = btn.dataset.orderId;
                            if (!confirm('Delete this screenshot? This cannot be undone.')) return;
                            try {
                                // Delete Firestore doc
                                await db.collection('orders').doc(oId).collection('proofs').doc(proofId).delete();
                                // Delete from Storage via admin API
                                if (storagePath) {
                                    const token = await auth.currentUser.getIdToken();
                                    await fetch(`${API_BASE}/delete-proof`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                                        body: JSON.stringify({ orderId: oId, proofId, storagePath })
                                    }).catch(() => {}); // Best-effort storage delete
                                }
                                btn.closest('[style*="position:relative"]').remove();
                                this.toast('Screenshot deleted.', 'success');
                                // Update count
                                const remaining = container.querySelectorAll('.delete-proof-btn').length;
                                totalEl.textContent = `${remaining} screenshots`;
                            } catch(err) {
                                this.toast('Delete failed: ' + err.message, 'error');
                            }
                        });
                    });
                } catch(e) {
                    document.getElementById('proof-container').innerHTML = '<p style="color:var(--error)">Failed to load proofs.</p>';
                }
            },

            async downloadProofsZip(orderId, companyName) {
                this.toast('Preparing ZIP download...', 'info');
                try {
                    const token = await auth.currentUser.getIdToken();
                    const resp = await fetch(`${API_BASE}/orders/${orderId}/export-proofs`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (!resp.ok) {
                        const err = await resp.json().catch(() => ({}));
                        throw new Error(err.error || `HTTP ${resp.status}`);
                    }
                    const blob = await resp.blob();
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `proofs_${(companyName || orderId).replace(/\s+/g, '_')}.zip`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    URL.revokeObjectURL(a.href);
                    this.toast('ZIP downloaded!', 'success');
                } catch(err) {
                    this.toast(err.message === 'No proofs found' ? 'No proofs uploaded yet for this order.' : `Download failed: ${err.message}`, 'error');
                }
            },

            // ═══════════════════════════════════════════════════════
            // UTILITIES
            // ═══════════════════════════════════════════════════════
            inferShortName(name) {
                if (!name) return '';
                let n = name.replace(/\b(LLC|Inc|Corp|Ltd|Co|Pte)\b/gi, '').trim();
                const parts = n.split(/[-|–—:]/);
                let primary = parts[0].trim();
                if (primary.length > 25) {
                    for (const kw of [' in ', ' at ', ' of ']) {
                        if (primary.toLowerCase().includes(kw)) { primary = primary.substring(0, primary.toLowerCase().indexOf(kw)); break; }
                    }
                }
                return primary.trim();
            },

            buildAIPrompt(context, companyName, modelType, notes) {
                const extraInstructions = notes?.trim() ? `**Additional Instructions (CRITICAL):** ${notes.trim()}\n\n` : '';
                const nameRule = companyName
                    ? `Mention "${companyName}" in only 5-7 out of 50 reviews. For the rest, use "this place," "the team," etc.`
                    : `Do NOT mention any specific company name.`;

                return `You are an expert copywriter creating authentic Google reviews.
TASK: Generate 50 realistic positive Google reviews based on the CONTEXT below.
CONTEXT: ${context || 'General positive business experience'}

RULES:
${extraInstructions}1. Output ONLY reviews separated by double newlines. No numbering, no titles, no "Here are..." intro.
2. Mix lengths: 80% detailed (3-6 sentences), 20% short (1-2 sentences). Randomize placement.
3. Vary structure: problem-solver, skeptic-turned-believer, direct recommendation, feeling-focused, long-term customer.
4. Use natural varied language. Different perspectives, tones, sentence structures. Sparingly use emojis.
5. ${nameRule}
6. A few reviews should mention a minor hesitation before giving praise.
7. Do NOT invent specific names, numbers, or details not in the context.
8. Since the business is in Singapore, subtly weave in local context where natural.`;
            },

            copyToClipboard(text, msg = 'Copied!') {
                navigator.clipboard.writeText(text).then(() => this.toast(msg, 'success')).catch(() => {
                    const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select();
                    try { document.execCommand('copy'); this.toast(msg, 'success'); } catch(e) { this.toast('Copy failed.', 'error'); }
                    document.body.removeChild(ta);
                });
            },

            downloadJSON(data, filename) {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(a.href);
            },

            toast(message, type = 'success') {
                // Dedup: skip if same message is already showing
                const existing = this.el.toast.querySelectorAll('.toast');
                for (const t of existing) { if (t.textContent === message) return; }
                const toast = document.createElement('div');
                toast.className = `toast toast-${type}`;
                toast.innerHTML = `<span>${message}</span>`;
                this.el.toast.appendChild(toast);
                setTimeout(() => toast.classList.add('show'), 10);
                setTimeout(() => { toast.classList.remove('show'); toast.addEventListener('transitionend', () => toast.remove()); }, 3000);
            },

            showConfirm(message, onConfirm) {
                this.el.modal.innerHTML = `
                    <div class="modal-overlay" id="confirm-modal">
                        <div class="modal-content" style="max-width:400px;text-align:center">
                            <div style="width:48px;height:48px;background:#FEE2E2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.5c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>
                            </div>
                            <h3 style="font-size:18px;font-weight:700;margin-bottom:8px">Are you sure?</h3>
                            <p style="color:var(--text-secondary);font-size:14px;margin-bottom:24px;line-height:1.5">${message}</p>
                            <div style="display:flex;gap:12px">
                                <button id="confirm-cancel" class="btn btn-secondary" style="flex:1">Cancel</button>
                                <button id="confirm-ok" class="btn btn-danger" style="flex:1">Delete</button>
                            </div>
                        </div>
                    </div>`;
                document.getElementById('confirm-cancel').onclick = () => this.el.modal.innerHTML = '';
                document.getElementById('confirm-modal').onclick = e => { if (e.target.id === 'confirm-modal') this.el.modal.innerHTML = ''; };
                document.getElementById('confirm-ok').onclick = () => { this.el.modal.innerHTML = ''; onConfirm(); };
            },

            sleep(ms) { return new Promise(r => setTimeout(r, ms)); },
        };

        app.init();
    });
    </script>
</body>
</html>
